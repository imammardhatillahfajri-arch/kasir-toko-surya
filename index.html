          }}>
          {saving?'⏳ Memproses...':statusBayar==='Piutang'?`📋 Catat Piutang ${fmt(total)}`:`✅ Bayar ${fmt(total)}`}
        </button>
      </div>
    </div>
    </>
  );
}



// ── BARCODE SCANNER ────────────────────────────────────────────────────────
function BarcodeScanner({onDetected, onClose}) {
  const videoRef = React.useRef(null);
  const [error, setError] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [manualCode, setManualCode] = useState('');
  const streamRef = React.useRef(null);
  const animRef = React.useRef(null);
  const detectorRef = React.useRef(null);

  useEffect(()=>{ startCamera(); return ()=>stopCamera(); },[]);

  const stopCamera = () => {
    if(animRef.current) cancelAnimationFrame(animRef.current);
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
  };

  const startCamera = async() => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment'}
      });
      streamRef.current = stream;
      if(videoRef.current){
        videoRef.current.srcObject = stream;
        await videoRef.current.play();
        setScanning(true);
        if('BarcodeDetector' in window){
          detectorRef.current = new BarcodeDetector({
            formats:['ean_13','ean_8','code_128','code_39','qr_code','upc_a','upc_e']
          });
          detectLoop();
        }
      }
    } catch(e){
      setError(e.name==='NotAllowedError'
        ? 'Izin kamera ditolak! Aktifkan izin kamera di browser.'
        : 'Gagal akses kamera: '+e.message
      );
    }
  };

  const detectLoop = async() => {
    if(!videoRef.current || videoRef.current.readyState < 2){
      animRef.current = requestAnimationFrame(detectLoop);
      return;
    }
    try {
      const codes = await detectorRef.current.detect(videoRef.current);
      if(codes.length>0){ stopCamera(); onDetected(codes[0].rawValue); return; }
    } catch(e){}
    animRef.current = requestAnimationFrame(detectLoop);
  };

  const handleManual = () => {
    if(manualCode.trim()){ stopCamera(); onDetected(manualCode.trim()); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{color:'#fff',fontWeight:700,fontSize:17}}>📷 Scan Barcode</div>
          <button onClick={()=>{stopCamera();onClose();}}
            style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:'50%',width:36,height:36,cursor:'pointer',fontSize:20,fontWeight:700}}>×</button>
        </div>

        <div style={{position:'relative',borderRadius:14,overflow:'hidden',background:'#111',width:'100%',height:240}}>
          <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover'}} autoPlay playsInline muted/>
          {scanning && !error && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
              <div style={{width:200,height:100,border:`2px solid ${G}`,borderRadius:8,boxShadow:`inset 0 0 0 9999px rgba(0,0,0,0.3)`}}/>
            </div>
          )}
          {error && (
            <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center',padding:16,textAlign:'center'}}>
              <div>
                <div style={{fontSize:28,marginBottom:8}}>⚠️</div>
                <div style={{color:'#fff',fontSize:12,lineHeight:1.6}}>{error}</div>
              </div>
            </div>
          )}
        </div>

        {scanning && !error && (
          <div style={{textAlign:'center',color:'rgba(255,255,255,0.6)',fontSize:12,marginTop:8}}>
            Arahkan ke barcode produk
          </div>
        )}

        <div style={{background:'rgba(255,255,255,0.1)',borderRadius:12,padding:14,marginTop:14}}>
          <div style={{color:'rgba(255,255,255,0.7)',fontSize:12,marginBottom:8,textAlign:'center'}}>
            Atau input manual / barcode gun
          </div>
          <div style={{display:'flex',gap:8}}>
            <input value={manualCode} onChange={e=>setManualCode(e.target.value)}
              placeholder="Ketik barcode..." autoFocus
              onKeyDown={e=>e.key==='Enter'&&handleManual()}
              style={{flex:1,padding:'10px 12px',borderRadius:8,border:'none',fontSize:14,outline:'none'}}/>
            <button onClick={handleManual}
              style={{padding:'10px 14px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>
              Cari
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Transaksi() {
  const [products, setProducts] = useState([]);
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [activeCat, setActiveCat] = useState('Semua');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try {
      const prods = await sbGetAll('products',{order:'name'});
      setProducts(prods);
      try {
        const units = await sbGet('product_units',{select:'product_id',order:'id'});
        const counts = {};
        units.forEach(u=>{ counts[u.product_id]=(counts[u.product_id]||0)+1; });
        setProductUnits(counts);
      } catch(e){}
    } 
    catch(e){ setError(e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  // Load products sekali saja saat komponen mount
  useEffect(()=>{
    setProducts([]); // reset dulu
    sbGetAll('products',{order:'name'}).then(p=>{
      const sorted = (p||[]).sort((a,b)=>a.name.localeCompare(b.name));
      setProducts(sorted);
    }).catch(()=>{});
  },[]);

  const [allVariants, setAllVariants] = useState({});

  useEffect(()=>{
    if(!products.length) return;
    (async()=>{
      try {
        const [units, variants] = await Promise.all([
          sbGet('product_units',{order:'id'}),
          sbGet('product_variants',{order:'id'}),
        ]);
        const groupedU = {};
        units.forEach(u=>{ if(!groupedU[u.product_id]) groupedU[u.product_id]=[]; groupedU[u.product_id].push(u); });
        setAllUnits(groupedU);
        const groupedV = {};
        variants.forEach(v=>{ if(!groupedV[v.product_id]) groupedV[v.product_id]=[]; groupedV[v.product_id].push(v); });
        setAllVariants(groupedV);
      } catch(e){}
    })();
  },[products]);

  // 3-level category: Utama > Sub > Brand
  const [activeSub, setActiveSub] = useState('Semua');
  const [activeBrand, setActiveBrand] = useState('Semua');

  const getMain  = (cat) => (cat||'').split(' > ')[0] || '';
  const getSub   = (cat) => (cat||'').split(' > ')[1] || '';
  const getBrand = (cat) => (cat||'').split(' > ')[2] || '';

  // Level 1: Kategori Utama
  const mainCats = [...new Set(products.map(p=>getMain(p.category)).filter(Boolean))].sort();
  // Level 2: Sub dari main yang dipilih
  const subCats = activeCat==='Semua'
    ? [...new Set(products.map(p=>getSub(p.category)).filter(Boolean))].sort()
    : [...new Set(products.filter(p=>getMain(p.category)===activeCat).map(p=>getSub(p.category)).filter(Boolean))].sort();
  // Level 3: Brand dari sub yang dipilih (hanya tampil jika sub dipilih)
  const brandCats = activeSub==='Semua'
    ? []
    : [...new Set(products.filter(p=>getMain(p.category)===activeCat&&getSub(p.category)===activeSub).map(p=>getBrand(p.category)).filter(Boolean))].sort();
  const [unitSelector, setUnitSelector] = useState(null);
  const [allUnits, setAllUnits] = useState({});
  const [showScanner, setShowScanner] = useState(false);
  const [showMobileCart, setShowMobileCart] = useState(false);

  const filtered = products.filter(p=>{
    const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase());
    const matchMain   = activeCat==='Semua'   || getMain(p.category)===activeCat;
    const matchSub    = activeSub==='Semua'   || getSub(p.category)===activeSub;
    const matchBrand  = activeSub==='Semua'   || activeBrand==='Semua' || getBrand(p.category)===activeBrand;
    // Search selalu ikut filter kategori yang aktif
    return matchSearch && matchMain && matchSub && matchBrand;
  });

  const addToCartDirect = (product, unit, price) => {
    const cartKey = product.id+'_'+unit;
    setCart(prev=>{
      const ex=prev.find(i=>i.cartKey===cartKey);
      if(ex) return prev.map(i=>i.cartKey===cartKey?{...i,qty:i.qty+1}:i);
      return [...prev,{...product,cartKey,unit,price,qty:1}];
    });
    setUnitSelector(null);
  };
  const addToCart = (p) => {
    const units    = allUnits[p.id]    || [];
    const variants = allVariants[p.id] || [];
    if(variants.length>0) {
      setUnitSelector({product:p, units, variants, mode:'variant'});
    } else if(units.length>0) {
      setUnitSelector({product:p, units, variants:[], mode:'unit'});
    } else {
      addToCartDirect(p,'Pcs',p.price);
    }
  };
  const updateQty   = (cartKey,d)        => setCart(prev=>prev.map(i=>(i.cartKey||i.id+'_Pcs')===cartKey?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0));
  const updatePrice = (cartKey,newPrice) => setCart(prev=>prev.map(i=>(i.cartKey||i.id)===cartKey?{...i,price:newPrice}:i));
  const clearCart = () => { setCart([]); };
  const getQty = (id) => cart.filter(i=>i.id===id).reduce((s,i)=>s+i.qty,0);
  const totalItems = cart.reduce((s,i)=>s+i.qty, 0);

  const handleBarcode = (code) => {
    setShowScanner(false);
    if(!code) return;
    // Cari produk berdasarkan barcode atau nama
    const found = products.find(p =>
      p.barcode === code ||
      p.barcode === code.trim() ||
      p.name.toLowerCase().includes(code.toLowerCase())
    );
    if(found) {
      addToCart(found);
      // Feedback visual
      setSearch('');
    } else {
      // Tidak ketemu - set ke search bar
      setSearch(code);
      alert(`Barcode "${code}" tidak ditemukan di database!`);
    }
  };

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  return (
    <>
    {/* Barcode Scanner */}

          <div style={{width:40,height:4,background:'#eee',borderRadius:2,margin:'0 auto 16px'}}/>
          <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:TX}}>{unitSelector.product.name}</div>
          <div style={{fontSize:12,color:MT,marginBottom:14}}>{unitSelector.mode==='variant'?'Pilih varian produk:':'Pilih satuan pembelian:'}</div>
          {/* Mode: Varian */}
          {unitSelector.mode==='variant' ? (
            <>
              {unitSelector.variants.map(v=>(

            return (
              <button key={cat} onClick={()=>{setActiveCat(cat);setActiveSub('Semua');setActiveBrand('Semua');}}
                style={{flexShrink:0,padding:'6px 14px',border:`1.5px solid ${isActive?G:'#e0e0e0'}`,borderRadius:20,background:isActive?G:'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                {icon} {cat}
              </button>
            );
          })}
        </div>

        {/* Category Pills — Level 2: Sub Kategori */}
        <div style={{background:'#FAFAFA',borderBottom:'1px solid #f0f0f0',padding:'6px 12px',overflowX:'auto',display:'flex',gap:6,scrollbarWidth:'none',flexShrink:0}}>
          {['Semua',...subCats].map(cat=>{
            const isActive=activeSub===cat;
            const icon=cat==='Semua'?'📋':CAT_ICONS[cat]||'📦';
            return (
              <button key={cat} onClick={()=>{setActiveSub(cat);setActiveBrand('Semua');}}
                style={{flexShrink:0,padding:'5px 12px',border:`1.5px solid ${isActive?'#3498DB':'#e0e0e0'}`,borderRadius:20,background:isActive?'#3498DB':'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:11,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                {icon} {cat}
              </button>
            );
          })}
        </div>

        {/* Category Pills — Level 3: Brand (hanya muncul kalau sub dipilih & ada brand) */}
        {activeSub!=='Semua' && brandCats.length>1 && (
          <div style={{background:'#F5F5F5',borderBottom:'1px solid #eee',padding:'5px 12px',overflowX:'auto',display:'flex',gap:6,scrollbarWidth:'none',flexShrink:0}}>
            {['Semua',...brandCats].map(brand=>{
              const isActive=activeBrand===brand;
              return (
                <button key={brand} onClick={()=>setActiveBrand(brand)}
                  style={{flexShrink:0,padding:'4px 10px',border:`1.5px solid ${isActive?OR:'#ddd'}`,borderRadius:20,background:isActive?OR:'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:10,cursor:'pointer',whiteSpace:'nowrap'}}>
                  🏷️ {brand}
                </button>
              );
            })}
          </div>
        )}

        {/* Product List */}
        <div style={{flex:1,overflowY:'auto'}}>
          {loading?<Loading/>:filtered.length===0
            ?<div style={{textAlign:'center',padding:'48px 0',color:MT}}><div style={{fontSize:36,marginBottom:10}}>🔍</div>Produk tidak ditemukan</div>
            :filtered.map((p,i)=>{
              const qty=getQty(p.id);
              const sub=(p.category||'').split(' > ')[1]||'';
              return (
                <div key={p.id} style={{background:'#fff',borderBottom:'1px solid #f0f0f0',padding:'10px 12px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background=GL}
                  onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  {/* Icon */}
                  <div style={{width:44,height:44,borderRadius:10,background:'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,border:'1px solid #eee'}}>
                    {CAT_ICONS[sub]||'📦'}
                  </div>
                  {/* Info — klik untuk tambah */}
                  <div style={{flex:1,minWidth:0}} onClick={()=>addToCart(p)}>
                    <div style={{fontSize:13,fontWeight:700,color:TX,lineHeight:1.3}}>{p.name}</div>
                    <div style={{fontSize:12,marginTop:2}}>
                      <span style={{color:MT}}>sisa {p.stock} · </span>
                      <span style={{color:GD,fontWeight:700}}>{fmt(p.price)}</span>
                    </div>
                    <div style={{fontSize:10,color:'#bbb',marginTop:1}}>{getSub(p.category)}{getBrand(p.category)&&getBrand(p.category)!=='Umum'?` · ${getBrand(p.category)}`:''}</div>
                  </div>
                  {/* Qty Control */}
                  <div style={{flexShrink:0}}>
                    {qty===0
                      ? <button onClick={()=>addToCart(p)}
                          style={{width:34,height:34,borderRadius:'50%',background:G,border:'none',color:'#fff',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,boxShadow:'0 2px 6px rgba(46,204,113,0.35)'}}>+</button>
                      : <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <button onClick={()=>updateQty((cart.find(i=>i.id===p.id)?.cartKey||p.id+'_Pcs'),-1)} style={{width:28,height:28,borderRadius:'50%',background:'#fff',border:`2px solid ${G}`,color:G,fontSize:16,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                          <span style={{minWidth:22,textAlign:'center',fontWeight:800,fontSize:14,color:TX}}>{qty}</span>
                          <button onClick={()=>addToCart(p)} style={{width:28,height:28,borderRadius:'50%',background:G,border:'none',color:'#fff',fontSize:16,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                        </div>
                    }
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>

      {/* ── MOBILE: Tombol Keranjang Floating ── */}
      {totalItems > 0 && (
        <div className='mobile-only' style={{position:'fixed',bottom:70,left:16,right:16,zIndex:50}}>
          <button onClick={()=>setShowMobileCart(true)}
            style={{width:'100%',padding:'14px 20px',background:G,color:'#fff',border:'none',borderRadius:16,fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 4px 20px rgba(46,204,113,0.5)'}}>
            <div style={{background:'rgba(255,255,255,0.25)',borderRadius:10,padding:'4px 12px',fontWeight:800}}>
              {totalItems} Barang
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span>{fmt(totalHarga)}</span>
              <span style={{fontSize:20}}>›</span>
            </div>
          </button>
        </div>
      )}

      {/* ── MOBILE: Bottom Sheet Keranjang ── */}
      {showMobileCart && (
        <div className='mobile-only' style={{position:'fixed',inset:0,zIndex:100,display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,background:'rgba(0,0,0,0.5)'}} onClick={()=>setShowMobileCart(false)}/>
          <div style={{background:'#fff',borderRadius:'20px 20px 0 0',maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'12px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{fontWeight:700,fontSize:15}}>🛒 Keranjang <span style={{background:G,color:'#fff',borderRadius:10,padding:'2px 8px',fontSize:12,marginLeft:4}}>{totalItems}</span></div>
              <button onClick={()=>setShowMobileCart(false)} style={{background:'#eee',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:16,fontWeight:700}}>×</button>
            </div>
            <div style={{flex:1,overflowY:'auto'}}>
              <PanelKanan cart={cart} setCart={setCart} updateQty={updateQty} updatePrice={updatePrice} clearCart={()=>{clearCart();setShowMobileCart(false);}} reload={load} onSuccess={()=>setShowMobileCart(false)}/>
            </div>
          </div>
        </div>
      )}

      {/* ── KANAN: Keranjang + Bayar ──────────────────────────────────── */}
      <div className='panel-kanan-desktop' style={{width:340,flexShrink:0,background:'#fff',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <PanelKanan
          cart={cart}
          setCart={setCart}
          updateQty={updateQty}
          updatePrice={updatePrice}
          clearCart={clearCart}
          reload={load}
          onSuccess={()=>{}}
        />
      </div>
    </div>
    </>
  );
}



// ── VARIANT MODAL ──────────────────────────────────────────────────────────
function VariantModal({product, onClose, onSaved}) {
  const [variants, setVariants] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    attr1_name: 'Panjang', attr1_val: '',   // misal: Panjang, 50m
    attr2_name: 'Warna',   attr2_val: '',   // misal: Warna, Merah
    price: '', stock: '', barcode: ''
  });
  // Nama atribut bisa diubah
  const [attr1, setAttr1] = useState('Panjang');
  const [attr2, setAttr2] = useState('Warna');
  const [useAttr2, setUseAttr2] = useState(true);

  const loadVariants = async() => {
    setLoading(true);
    try {
      const data = await sbGet('product_variants', {eq:{product_id:product.id}, order:'id'});
      setVariants(data);
    } catch(e){}
    setLoading(false);
  };
  useEffect(()=>{ loadVariants(); },[]);

  const addVariant = async() => {
    if(!form.attr1_val) return alert(`${attr1} wajib diisi!`);
    if(!form.price) return alert('Harga wajib diisi!');
    setSaving(true);
    try {
      const variantName = useAttr2 && form.attr2_val
        ? `${form.attr1_val} - ${form.attr2_val}`
        : form.attr1_val;
      await sbInsert('product_variants', [{
        product_id: product.id,
        name: variantName,
        price: parseInt(form.price),
        stock: parseInt(form.stock||0),
        barcode: form.barcode||'',
      }]);
      setForm({attr1_name:attr1, attr1_val:'', attr2_name:attr2, attr2_val:'', price:'', stock:'', barcode:''});
      await loadVariants();
      onSaved();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const deleteVariant = async(id) => {
    if(!confirm('Hapus varian ini?')) return;
    try { await sbDelete('product_variants', id); await loadVariants(); onSaved(); }
    catch(e){ alert('Gagal: '+e.message); }
  };

  // Quick fill buttons untuk atribut umum
  const ATTR1_OPTS = ['Panjang', 'Ukuran', 'Kapasitas', 'Tipe', 'Model'];
  const ATTR2_OPTS = ['Warna', 'Material', 'Grade', 'Merk'];
  const VAL1_OPTS = {
    'Panjang': ['25m','50m','100m','150m','200m','250m','300m'],
    'Ukuran': ['S','M','L','XL','1/2"','3/4"','1"','1.5"','2"','3"','4"'],
    'Kapasitas': ['125W','250W','500W','1000W','1/2 HP','3/4 HP','1 HP'],
    'Tipe': ['Type A','Type B','Type C'],
    'Model': [],
  };
  const VAL2_OPTS = {
    'Warna': ['Merah','Hitam','Kuning','Biru','Putih','Hijau','Abu-abu','Orange','Coklat'],
    'Material': ['PVC','Galvanis','Stainless','Besi','Aluminium','Kuningan'],
    'Grade': ['SNI','Non SNI','Premium','Standard'],
    'Merk': [],
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'16px 16px 0 0',width:'100%',maxWidth:520,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:TX}}>🎨 Kelola Varian</div>
            <div style={{fontSize:12,color:MT,marginTop:2}}>{product.name}</div>
          </div>
          <button onClick={onClose} style={{background:'#eee',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:18,fontWeight:700}}>×</button>
        </div>

        <div style={{overflowY:'auto',flex:1,padding:16}}>

          {/* Daftar Varian yang sudah ada */}
          {loading ? <Loading/> : variants.length===0
            ? <div style={{textAlign:'center',padding:'16px 0',color:MT,fontSize:13}}>Belum ada varian. Tambah di bawah!</div>
            : <div style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:MT,marginBottom:8}}>VARIAN TERSEDIA ({variants.length})</div>
                {variants.map(v=>(
                  <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#F8F0FF',borderRadius:10,marginBottom:6,border:'1.5px solid #8E44AD'}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:TX}}>{v.name}</div>
                      <div style={{fontSize:12,color:MT,marginTop:2}}>
                        <span style={{color:GD,fontWeight:700}}>{fmt(v.price)}</span>
                        <span style={{marginLeft:8}}>Stok: <span style={{color:v.stock<5?RD:MT,fontWeight:600}}>{v.stock}</span></span>
                        {v.barcode&&<span style={{marginLeft:8,color:'#bbb'}}>{v.barcode}</span>}
                      </div>
                    </div>
                    <button onClick={()=>deleteVariant(v.id)} style={{padding:'5px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:6,cursor:'pointer',fontSize:13,color:RD}}>🗑️</button>
                  </div>
                ))}
              </div>
          }

          {/* Form Tambah Varian */}
          <div style={{background:'#F5F6FA',borderRadius:12,padding:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:TX}}>➕ Tambah Varian Baru</div>

            {/* Pilih nama atribut */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:4,display:'block'}}>Atribut 1 (Wajib)</label>
              <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                {ATTR1_OPTS.map(opt=>(
                  <button key={opt} onClick={()=>setAttr1(opt)}
                    style={{padding:'4px 10px',border:`1.5px solid ${attr1===opt?'#8E44AD':'#ddd'}`,borderRadius:16,background:attr1===opt?'#F3E5F5':'#fff',color:attr1===opt?'#7B1FA2':TX,fontSize:11,fontWeight:attr1===opt?700:500,cursor:'pointer'}}>
                    {opt}
                  </button>
                ))}
              </div>
              <input value={form.attr1_val} onChange={e=>setForm(f=>({...f,attr1_val:e.target.value}))}
                placeholder={`Nilai ${attr1} (contoh: 50m, 1x1.5mm...)`}
                style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              {/* Quick values */}
              {VAL1_OPTS[attr1]?.length>0 && (
                <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                  {VAL1_OPTS[attr1].map(v=>(
                    <button key={v} onClick={()=>setForm(f=>({...f,attr1_val:v}))}
                      style={{padding:'3px 8px',border:`1px solid ${form.attr1_val===v?'#8E44AD':'#ddd'}`,borderRadius:12,background:form.attr1_val===v?'#F3E5F5':'#fff',fontSize:10,cursor:'pointer',color:form.attr1_val===v?'#7B1FA2':TX}}>
                      {v}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Atribut 2 (Opsional) */}
            <div style={{marginBottom:10}}>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:MT,fontWeight:600,marginBottom:4,cursor:'pointer'}}>
                <input type="checkbox" checked={useAttr2} onChange={e=>setUseAttr2(e.target.checked)} style={{width:14,height:14}}/>
                Atribut 2 (Opsional)
              </label>
              {useAttr2 && (
                <>
                  <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                    {ATTR2_OPTS.map(opt=>(
                      <button key={opt} onClick={()=>setAttr2(opt)}
                        style={{padding:'4px 10px',border:`1.5px solid ${attr2===opt?'#3498DB':'#ddd'}`,borderRadius:16,background:attr2===opt?'#E3F2FD':'#fff',color:attr2===opt?'#1976D2':TX,fontSize:11,fontWeight:attr2===opt?700:500,cursor:'pointer'}}>
                        {opt}
                      </button>
                    ))}
                  </div>
                  <input value={form.attr2_val} onChange={e=>setForm(f=>({...f,attr2_val:e.target.value}))}
                    placeholder={`Nilai ${attr2} (contoh: Merah, Hitam...)`}
                    style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                  {VAL2_OPTS[attr2]?.length>0 && (
                    <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                      {VAL2_OPTS[attr2].map(v=>(
                        <button key={v} onClick={()=>setForm(f=>({...f,attr2_val:v}))}
                          style={{padding:'3px 8px',border:`1px solid ${form.attr2_val===v?'#3498DB':'#ddd'}`,borderRadius:12,background:form.attr2_val===v?'#E3F2FD':'#fff',fontSize:10,cursor:'pointer',color:form.attr2_val===v?'#1976D2':TX}}>
                          {v}
                        </button>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>

            {/* Preview nama varian */}
            {form.attr1_val && (
              <div style={{background:'#fff',borderRadius:8,padding:'8px 12px',marginBottom:10,border:`1px solid #8E44AD`,fontSize:12}}>
                🎨 Nama varian: <b style={{color:'#7B1FA2'}}>
                  {useAttr2&&form.attr2_val ? `${form.attr1_val} - ${form.attr2_val}` : form.attr1_val}
                </b>
              </div>
            )}

            {/* Harga & Stok */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Harga *</label>
                <input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}
                  placeholder="Rp" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Stok Awal</label>
                <input value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}
                  placeholder="0" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Barcode (opsional)</label>
              <input value={form.barcode} onChange={e=>setForm(f=>({...f,barcode:e.target.value}))}
                placeholder="Scan atau ketik barcode..."
                style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            </div>

            <button onClick={addVariant} disabled={saving||!form.attr1_val||!form.price}
              style={{width:'100%',padding:11,background:saving||!form.attr1_val||!form.price?'#ccc':'#8E44AD',color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14}}>
              {saving?'Menyimpan...':'💾 Simpan Varian'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── UNIT MODAL ─────────────────────────────────────────────────────────────
function UnitModal({product, onClose, onSaved}) {
  const [units, setUnits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({unit_name:'',price:'',ratio:'1',is_default:false,base_unit:''});
  const [saving, setSaving] = useState(false);

  const loadUnits = async() => {
    setLoading(true);
    try { setUnits(await sbGet('product_units',{eq:{product_id:product.id},order:'id'})); }
    catch(e){}
    setLoading(false);
  };
  useEffect(()=>{loadUnits();},[]);

  const addUnit = async() => {
    if(!form.unit_name||!form.price) return alert('Nama satuan & harga wajib!');
    setSaving(true);
    try {
      // Kalau ada base_unit, simpan di nama: "Roll (50 Meter)"
      const unitLabel = form.base_unit && form.ratio > 1
        ? `${form.unit_name} (${form.ratio} ${form.base_unit})`
        : form.unit_name;
      await sbInsert('product_units',[{
        product_id: product.id,
        unit_name: unitLabel,
        price: parseInt(form.price),
        ratio: parseFloat(form.ratio||1),
        is_default: form.is_default
      }]);
      setForm({unit_name:'',price:'',ratio:'1',is_default:false,base_unit:''});
      await loadUnits(); onSaved();
    } catch(e){alert('Gagal: '+e.message);}
    setSaving(false);
  };

  const deleteUnit = async(id) => {
    if(!confirm('Hapus satuan ini?')) return;
    try { await sbDelete('product_units',id); await loadUnits(); onSaved(); }
    catch(e){alert('Gagal: '+e.message);}
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'16px 16px 0 0',width:'100%',maxWidth:500,maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>⚖️ Multi Satuan</div>
            <div style={{fontSize:12,color:MT,marginTop:2}}>{product.name}</div>
          </div>
          <button onClick={onClose} style={{background:'#eee',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:18,fontWeight:700}}>×</button>
        </div>
        <div style={{overflowY:'auto',flex:1,padding:16}}>
          {loading ? <Loading/> : units.length===0
            ? <div style={{textAlign:'center',padding:'20px 0',color:MT,fontSize:13}}>Belum ada satuan. Tambah di bawah!</div>
            : (units||[]).filter(u=>u&&u.id).map(u=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:u.is_default?GL:'#F9F9F9',borderRadius:10,marginBottom:8,border:`1.5px solid ${u.is_default?G:'#eee'}`}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{u.unit_name} {u.is_default&&<span style={{fontSize:10,background:G,color:'#fff',borderRadius:4,padding:'1px 6px'}}>DEFAULT</span>}</div>
                  <div style={{fontSize:12,color:GD,marginTop:2}}>{fmt(u.price)} / {u.unit_name}</div>
                  {u.ratio>1&&<div style={{fontSize:11,color:MT}}>1 {u.unit_name} = {u.ratio} pcs</div>}
                </div>
                <button onClick={()=>deleteUnit(u.id)} style={{padding:'5px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:6,cursor:'pointer',fontSize:13,color:RD}}>🗑️</button>
              </div>
            ))
          }
          <div style={{background:'#F5F6FA',borderRadius:12,padding:14,marginTop:8}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:TX}}>➕ Tambah Satuan Baru</div>

            {/* Baris 1: Nama Satuan & Harga */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>

              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Harga *</label>
                <input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}
                  placeholder="Rp" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            {/* Baris 2: Jumlah Isi & Satuan Terkecil */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Jumlah Isi</label>
                <input value={form.ratio} onChange={e=>setForm(f=>({...f,ratio:e.target.value}))}
                  placeholder="contoh: 50, 100, 12..." type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Satuan Terkecil</label>
                <input value={form.base_unit||''} onChange={e=>setForm(f=>({...f,base_unit:e.target.value}))}
                  placeholder="Meter, Pcs, Kg, Lbr..."
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            {/* Preview */}
            {form.unit_name && form.price && (
              <div style={{background:'#fff',borderRadius:8,padding:'9px 12px',marginBottom:10,fontSize:12,border:`1px solid ${G}`}}>
                💡 <b>1 {form.unit_name}</b>
                {form.ratio>1 ? ` = ${form.ratio} ${form.base_unit||'pcs'}` : ''}
                {' → '}<b style={{color:GD}}>Rp {parseInt(form.price||0).toLocaleString('id-ID')}</b>
                {form.ratio>1&&form.price ? ` (Rp ${Math.round(parseInt(form.price)/parseInt(form.ratio)).toLocaleString('id-ID')} / ${form.base_unit||'pcs'})` : ''}
              </div>
            )}

            {/* Default checkbox */}
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,marginBottom:10,padding:'8px 10px',background:'#fff',borderRadius:8,border:'1px solid #eee'}}>
              <input type="checkbox" checked={form.is_default} onChange={e=>setForm(f=>({...f,is_default:e.target.checked}))} style={{width:16,height:16}}/>
              <div>
                <div style={{fontWeight:600,color:TX}}>Jadikan Satuan Default</div>
                <div style={{fontSize:11,color:MT}}>Satuan ini yang pertama muncul saat transaksi</div>
              </div>

            <button onClick={addUnit} disabled={saving||!form.unit_name||!form.price}
              style={{width:'100%',padding:11,background:saving||!form.unit_name||!form.price?'#ccc':G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14}}>
              {saving?'Menyimpan...':'💾 Simpan Satuan'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── MANAJEMEN ──────────────────────────────────────────────────────────────
function Manajemen() {
  const [products, setProducts] = useState([]);
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({name:"",price:"",stock:"",category:"",tipe_barang:"Default"});
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [unitProduct, setUnitProduct] = useState(null);
  const [variantProduct, setVariantProduct] = useState(null);
  const [productUnits, setProductUnits] = useState({});

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try { setProducts(await sbGetAll("products",{order:"name"})); }
    catch(e) { setError(e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const filtered = products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  const openEdit = (p) => { setEditId(p.id); setForm({name:p.name,price:p.price,stock:p.stock,category:p.category||"",tipe_barang:p.tipe_barang||"Default"}); setShowForm(true); };
  const save = async() => {
    if(!form.name||!form.price) return alert("Nama & harga wajib!");
    setSaving(true);
    try {
      const data={name:form.name,price:parseInt(form.price),stock:parseInt(form.stock||0),category:form.category,tipe_barang:form.tipe_barang||"Default"};
      editId ? await sbUpdate("products",editId,data) : await sbInsert("products",data);
      setShowForm(false); setEditId(null); setForm({name:"",price:"",stock:"",category:""}); load();
    } catch(e) { alert("Gagal: "+e.message); }
    setSaving(false);
  };
  const del = async(id) => { if(!confirm("Hapus produk ini?")) return; try { await sbDelete("products",id); load(); } catch(e) { alert("Gagal: "+e.message); } };

  if(error) return <ErrBox msg={error} onRetry={load}/>;
  return <>
    {unitProduct && <UnitModal product={unitProduct} onClose={()=>setUnitProduct(null)} onSaved={load}/>}
    {variantProduct && <VariantModal product={variantProduct} onClose={()=>setVariantProduct(null)} onSaved={load}/>}
    <div style={{padding:16,maxWidth:900,margin:"0 auto"}}>
    <div style={{display:"flex",gap:10,marginBottom:16}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cari produk..."
        style={{flex:1,padding:"10px 14px",border:"1.5px solid #eee",borderRadius:8,fontSize:14,outline:"none"}}/>
      <button onClick={()=>{setEditId(null);setForm({name:"",price:"",stock:"",category:""});setShowForm(v=>!v);}}
        style={{padding:"10px 16px",background:G,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>+ Tambah</button>
    </div>
    {showForm&&<div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:16,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
      <h4 style={{margin:"0 0 12px",fontSize:15}}>{editId?"✏️ Edit Produk":"➕ Tambah Produk"}</h4>
      {[["name","Nama Produk *","text"],["price","Harga Jual Eceran (Rp) *","number"],["buy_price","Harga Beli (Rp)","number"],["stock","Stok (unit kecil)","number"],["unit_kecil","Unit Kecil (meter/pcs/buah)","text"],["unit_besar","Unit Besar (roll/box/lusin)","text"],["konversi","Konversi (1 unit besar = ? unit kecil)","number"],["harga_besar","Harga Jual Unit Besar (Rp)","number"],["category","Kategori","text"]].map(([k,label,type])=>(
        <div key={k} style={{marginBottom:8}}>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>{label}</label>
          <input value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))} placeholder={label} type={type}
            style={{width:"100%",padding:"10px 12px",border:"1.5px solid #eee",borderRadius:8,fontSize:14,boxSizing:'border-box'}}
            onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
        </div>
      ))}
      <div style={{marginBottom:8}}>
        <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Tipe Barang</label>
        <select value={form.tipe_barang||'Default'} onChange={e=>setForm(p=>({...p,tipe_barang:e.target.value}))}
          style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:14,background:'#fff',boxSizing:'border-box'}}>
          <option value="Default">📦 Default</option>
          <option value="Multi Satuan">⚖️ Multi Satuan</option>
          <option value="Varian">🎨 Varian</option>
          <option value="Add On">➕ Add On</option>
        </select>
      </div>
      {/* Kalau Multi Satuan - tampilkan tombol kelola satuan */}
      {(form.tipe_barang==='Multi Satuan'||form.tipe_barang==='Varian') && editId && (
        <div style={{background:form.tipe_barang==='Multi Satuan'?'#F3E5F5':'#E3F2FD',borderRadius:10,padding:'12px 14px',marginBottom:8,border:`1.5px solid ${form.tipe_barang==='Multi Satuan'?'#8E44AD':'#3498DB'}`}}>
          <div style={{fontSize:13,fontWeight:600,color:form.tipe_barang==='Multi Satuan'?'#7B1FA2':'#1976D2',marginBottom:8}}>
            {form.tipe_barang==='Multi Satuan'?'⚖️ Kelola Satuan & Harga':'🎨 Kelola Varian'}
          </div>
          <button type="button" onClick={()=>{
              if(!editId){ alert('Simpan produk dulu sebelum kelola satuan!'); return; }
              const prod = products.find(p=>p.id===editId);
              if(form.tipe_barang==='Varian') {
                setVariantProduct(prod); setShowForm(false);
              } else {
                setUnitProduct(prod); setShowForm(false);
              }
            }}
            style={{width:'100%',padding:'9px 0',background:form.tipe_barang==='Multi Satuan'?'#8E44AD':'#3498DB',color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:13}}>
            {form.tipe_barang==='Multi Satuan'?'⚖️ Buka Kelola Satuan':'🎨 Buka Kelola Varian'}
          </button>
          <div style={{fontSize:11,color:MT,marginTop:6,textAlign:'center'}}>
            Simpan dulu perubahan di atas, lalu kelola {form.tipe_barang==='Multi Satuan'?'satuan':'varian'}-nya
          </div>
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} disabled={saving} style={{flex:1,padding:10,background:saving?MT:G,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>{saving?"Menyimpan...":"💾 Simpan"}</button>
        <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{flex:1,padding:10,background:"#eee",border:"none",borderRadius:8,cursor:"pointer"}}>Batal</button>
      </div>
    </div>}
    {loading?<Loading/>:(
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
        {filtered.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:MT}}>Belum ada produk. Tambah dulu!</div>}
        {filtered.map((p,i)=>(
          <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px",borderBottom:i<filtered.length-1?"1px solid #f0f0f0":"none"}}>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{p.name}</div><div style={{fontSize:12,color:MT}}>{p.category||"—"}</div></div>
            <div style={{textAlign:"right",marginRight:12}}><div style={{fontWeight:700,color:G}}>{fmt(p.price)}</div><div style={{fontSize:12,color:p.stock<20?RD:MT}}>Stok: {p.stock}</div></div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>openEdit(p)} style={{padding:"6px 10px",background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:"pointer",fontSize:13,color:GD}}>✏️</button>
              <button onClick={()=>del(p.id)} style={{padding:"6px 10px",background:"#FFF0F0",border:`1px solid ${RD}`,borderRadius:6,cursor:"pointer",fontSize:13,color:RD}}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
    )}
  </div>
  </>;
}


// ── MANAJEMEN STOK ─────────────────────────────────────────────────────────
function ManajemenStok() {
  const [products, setProducts] = useState([]);
  const [logs, setLogs] = useState([]);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({product_id:'', type:'masuk', qty:'', notes:''});
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  const load = useCallback(async() => {
    setLoading(true); setError(null);
    try {
      const [prods, lg] = await Promise.all([
        sbGetAll('products', {order:'name'}),
        sbGet('stock_logs', {order:'created_at', asc:false, limit:50}),
      ]);
      setProducts(prods); setLogs(lg);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);
  useEffect(()=>{load();},[load]);

  const filtered = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));

  const saveLog = async() => {
    if(!form.product_id || !form.qty) return alert('Pilih produk & isi qty!');
    setSaving(true);
    try {
      const product = products.find(p => p.id === parseInt(form.product_id));
      const qty = parseInt(form.qty);
      const stockBefore = product.stock;
      const stockAfter = form.type === 'masuk' || form.type === 'retur'
        ? stockBefore + qty
        : form.type === 'opname' ? qty
        : Math.max(0, stockBefore - qty);

      await sbInsert('stock_logs', [{
        product_id: product.id,
        type: form.type,
        qty,
        stock_before: stockBefore,
        stock_after: stockAfter,
        notes: form.notes,
      }]);
      await sbUpdate('products', product.id, {stock: stockAfter});
      setForm({product_id:'', type:'masuk', qty:'', notes:''});
      setShowForm(false);
      await load();
    } catch(e) { alert('Gagal: ' + e.message); }
    setSaving(false);
  };

  const typeColor = {masuk:G, keluar:RD, opname:'#3498DB', retur:OR};
  const typeIcon  = {masuk:'📥', keluar:'📤', opname:'📋', retur:'🔄'};

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  return (
    <div style={{padding:16, maxWidth:900, margin:'0 auto'}}>
      <div style={{display:'flex', gap:10, marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cari produk..."
          style={{flex:1, padding:'10px 14px', border:'1.5px solid #eee', borderRadius:8, fontSize:14, outline:'none'}}/>
        <button onClick={()=>setShowForm(v=>!v)}
          style={{padding:'10px 16px', background:G, color:'#fff', border:'none', borderRadius:8, fontWeight:700, cursor:'pointer'}}>
          + Catat Stok
        </button>
      </div>

      {showForm && (
        <div style={{background:'#fff', borderRadius:12, padding:16, marginBottom:16, boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
          <h4 style={{margin:'0 0 14px', fontSize:15}}>📋 Catat Perubahan Stok</h4>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12, color:MT, fontWeight:600, display:'block', marginBottom:4}}>Jenis</label>
            <div style={{display:'flex', gap:8}}>
              {[['masuk','📥 Stok Masuk',G],['keluar','📤 Stok Keluar',RD],['opname','📋 Opname',`#3498DB`],['retur','🔄 Retur',OR]].map(([val,label,color])=>(
                <button key={val} onClick={()=>setForm(f=>({...f,type:val}))}
                  style={{flex:1, padding:'8px 4px', border:`2px solid ${form.type===val?color:'#eee'}`, borderRadius:8, background:form.type===val?color+'18':'#fff', color:form.type===val?color:MT, fontWeight:form.type===val?700:500, cursor:'pointer', fontSize:11}}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <select value={form.product_id} onChange={e=>setForm(f=>({...f,product_id:e.target.value}))}
            style={{width:'100%', marginBottom:8, padding:'10px 12px', border:'1.5px solid #eee', borderRadius:8, fontSize:14, background:'#fff', boxSizing:'border-box'}}>
            <option value="">-- Pilih Produk --</option>
            {filtered.map(p=><option key={p.id} value={p.id}>{p.name} (Stok: {p.stock})</option>)}
          </select>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8}}>
            <input value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}
              placeholder={form.type==='opname'?'Stok aktual':'Jumlah'} type="number"
              style={{padding:'10px 12px', border:'1.5px solid #eee', borderRadius:8, fontSize:14}}/>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              placeholder="Keterangan (opsional)"
              style={{padding:'10px 12px', border:'1.5px solid #eee', borderRadius:8, fontSize:14}}/>
          </div>
          {form.product_id && form.qty && (
            <div style={{background:GL, borderRadius:8, padding:'10px 14px', marginBottom:10, fontSize:13}}>
              {(() => {
                const p = products.find(x=>x.id===parseInt(form.product_id));
                if(!p) return null;
                const qty = parseInt(form.qty||0);
                const after = form.type==='masuk'||form.type==='retur' ? p.stock+qty : form.type==='opname' ? qty : Math.max(0,p.stock-qty);
                return <span>Stok: <b>{p.stock}</b> → <b style={{color:G}}>{after}</b></span>;
              })()}
            </div>
          )}
          <div style={{display:'flex', gap:8}}>
            <button onClick={saveLog} disabled={saving}
              style={{flex:1, padding:10, background:saving?MT:G, color:'#fff', border:'none', borderRadius:8, fontWeight:700, cursor:'pointer'}}>
              {saving?'Menyimpan...':'💾 Simpan'}
            </button>
            <button onClick={()=>setShowForm(false)} style={{flex:1, padding:10, background:'#eee', border:'none', borderRadius:8, cursor:'pointer'}}>Batal</button>
          </div>
        </div>
      )}

      {/* Stok Menipis */}
      <div style={{background:'#fff', borderRadius:12, padding:16, marginBottom:14, boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
        <h4 style={{margin:'0 0 12px', fontSize:14, color:RD}}>⚠️ Stok Menipis ({'<'}20)</h4>
        {loading ? <Loading/> : products.filter(p=>p.stock<20).length===0
          ? <div style={{color:MT, fontSize:13}}>Semua stok aman ✅</div>
          : products.filter(p=>p.stock<20).map((p,i)=>(
            <div key={p.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'8px 0', borderBottom:'1px solid #f5f5f5'}}>
              <span style={{fontSize:13, fontWeight:600}}>{p.name}</span>
              <span style={{fontSize:13, fontWeight:800, color:p.stock===0?RD:OR}}>
                {p.stock===0?'HABIS':p.stock+' pcs'}
              </span>
            </div>
          ))
        }
      </div>

      {/* Log Stok */}
      <div style={{background:'#fff', borderRadius:12, padding:16, boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
        <h4 style={{margin:'0 0 12px', fontSize:14}}>📜 Riwayat Perubahan Stok</h4>
        {loading ? <Loading/> : logs.length===0
          ? <div style={{textAlign:'center', padding:'24px 0', color:MT}}>Belum ada log stok</div>
          : logs.map((log,i)=>(
            <div key={log.id} style={{display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid #f5f5f5'}}>
              <div style={{width:36, height:36, borderRadius:10, background:typeColor[log.type]+'18', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0}}>
                {typeIcon[log.type]}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13, fontWeight:600}}>{products.find(p=>p.id===log.product_id)?.name||'Produk'}</div>
                <div style={{fontSize:11, color:MT, marginTop:2}}>{log.notes||log.type} · {log.created_at?.slice(0,10)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:13, fontWeight:700, color:typeColor[log.type]}}>
                  {log.type==='masuk'||log.type==='retur'?'+':log.type==='keluar'?'-':''}{log.qty}
                </div>
                <div style={{fontSize:11, color:MT}}>{log.stock_before} → {log.stock_after}</div>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// ── MANAJEMEN PELANGGAN ────────────────────────────────────────────────────
function ManajemenPelanggan() {
  const [customers, setCustomers] = useState([]);
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({name:'', phone:'', address:'', notes:''});
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try { setCustomers(await sbGet('customers', {order:'name'})); }
    catch(e){ setError(e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const filtered = customers.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||
    (c.phone||'').includes(search));

  const save = async()=>{
    if(!form.name) return alert('Nama wajib diisi!');
    setSaving(true);
    try {
      editId ? await sbUpdate('customers', editId, form) : await sbInsert('customers', [form]);
      setShowForm(false); setEditId(null); setForm({name:'',phone:'',address:'',notes:''});
      load();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const del = async(id)=>{
    if(!confirm('Hapus pelanggan ini?')) return;
    try { await sbDelete('customers', id); load(); }
    catch(e){ alert('Gagal: '+e.message); }
  };

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  return (
    <div style={{padding:16, maxWidth:900, margin:'0 auto'}}>
      <div style={{display:'flex', gap:10, marginBottom:16}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cari nama / no. HP..."
          style={{flex:1, padding:'10px 14px', border:'1.5px solid #eee', borderRadius:8, fontSize:14, outline:'none'}}/>
        <button onClick={()=>{setEditId(null);setForm({name:'',phone:'',address:'',notes:''});setShowForm(v=>!v);}}

    setLoading(false);
  },[]);

  const filtered = suppliers.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||

          {[['name','Nama Supplier *'],['phone','No. HP / Telepon'],['address','Alamat'],['notes','Catatan']].map(([k,label])=>(

function HutangPiutang() {
  const [tab, setTab]             = useState('piutang');
  const [transactions, setTrans]  = useState([]);
  const [debts, setDebts]         = useState([]);
  const [loading, setLoading]     = useState(true);
  const [search, setSearch]       = useState('');
  const [filterStatus, setFilterStatus] = useState('belum'); // belum | lunas | semua
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [selectedInvoice, setSelectedInvoice]   = useState(null);
  const [txItems, setTxItems]     = useState([]);
  const [showForm, setShowForm]   = useState(false);
  const [form, setForm]           = useState({party_name:'',amount:'',description:'',due_date:''});
  const [saving, setSaving]       = useState(false);
  const [showStruk, setShowStruk] = useState(false);

  const [customers, setCustomers] = useState([]);

  const [poHutang, setPoHutang] = useState([]); // PO dengan bayar=Hutang

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const [txs, dbs, custs, pos] = await Promise.all([
        sbGet('transactions',{order:'created_at',asc:false}),
        sbGet('debts',{order:'created_at',asc:false}),
        sbGet('customers',{order:'name'}),
        sbGet('purchase_orders',{order:'created_at',asc:false}),
      ]);
      setTrans(txs||[]);
      setDebts(dbs||[]);
      setCustomers(custs||[]);
      // Load items untuk setiap PO hutang
      const hutangPOs = (pos||[]).filter(p=>p.bayar==='Hutang'&&p.status!=='Dibatalkan');
      const withItems = await Promise.all(hutangPOs.map(async po=>({
        ...po,
        items: await sbGet('po_items',{eq:{po_id:po.id},order:'id'})
      })));
      setPoHutang(withItems);
    } catch(e){}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const today = new Date().toISOString().slice(0,10);

  // Group piutang by customer
  const piutangTx = transactions.filter(t=>t.status==='Piutang'||t.status==='Lunas'&&(t.paid||0)<t.total);
  const allPiutang = transactions.filter(t=>t.status==='Piutang');

  const customerMap = {};
  allPiutang.forEach(t=>{
    const name = t.customer||'Umum';
    if(!customerMap[name]) customerMap[name]={name,txList:[],total:0,sisa:0,overdue:0,dueToday:0,dueSoon:0,txCount:0};
    customerMap[name].txList.push(t);
    customerMap[name].total += t.total;
    customerMap[name].sisa  += t.total-(t.paid||0);
    customerMap[name].txCount++;
    if(t.due_date){
      if(t.due_date<today)       customerMap[name].overdue  += t.total-(t.paid||0);
      else if(t.due_date===today) customerMap[name].dueToday += t.total-(t.paid||0);
      else                        customerMap[name].dueSoon  += t.total-(t.paid||0);
    }
  });

  // Also include lunas transactions in customer history
  transactions.filter(t=>t.status==='Lunas'&&t.customer).forEach(t=>{
    const name = t.customer;
    if(customerMap[name]) customerMap[name].txList.push(t);
  });

  const customerList = Object.values(customerMap)
    .filter(c=>!search || c.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.sisa-a.sisa);

  const totalPiutang = customerList.reduce((s,c)=>s+c.sisa,0);
  const totalTx      = allPiutang.length;
  const totalOverdue = customerList.reduce((s,c)=>s+c.overdue,0);

  // Hutang manual
  const hutangList  = debts.filter(d=>d.type==='hutang');
  const totalHutang = hutangList.filter(d=>d.status!=='Lunas').reduce((s,d)=>s+(d.amount-(d.paid||0)),0);

  // Open invoice detail
  const openInvoice = async(tx) => {
    setSelectedInvoice({...tx, itemsLoading:true});
    setTxItems([]);
    try {
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id},order:'id'});
      setTxItems(items||[]);
    } catch(e){}
    setSelectedInvoice(prev=>({...prev, itemsLoading:false}));
  };

  // Lunasi sekaligus semua piutang pelanggan
  const lunasiSekaligus = async(customer) => {
    if(!confirm(`Lunasi SEMUA piutang ${customer.name}?\nTotal: ${fmt(customer.sisa)}`)) return;
    try {
      for(const tx of customer.txList.filter(t=>t.status==='Piutang')) {
        await sbUpdate('transactions',tx.id,{status:'Lunas',paid:tx.total,change:0});
      }
      notifyDataChanged('piutang');
      load();
      setSelectedCustomer(null);
      alert(`✅ Semua piutang ${customer.name} berhasil dilunasi!`);
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // Tandai 1 invoice lunas
  const tandaiLunas = async(tx) => {
    if(!confirm(`Tandai ${tx.invoice_no} LUNAS?\nTotal: ${fmt(tx.total)}`)) return;
    try {
      await sbUpdate('transactions',tx.id,{status:'Lunas',paid:tx.total,change:0});
      notifyDataChanged('piutang');
      load();
      setSelectedInvoice(null);
      alert('✅ Piutang berhasil dilunasi!');
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // Bayar sebagian
  const [bayarInput, setBayarInput] = useState('');
  const bayarSebagian = async(tx) => {
    const jumlah = parseInt(bayarInput)||0;
    if(!jumlah||jumlah<=0) return alert('Masukkan jumlah bayar!');
    const sisa = tx.total-(tx.paid||0);
    if(jumlah>sisa) return alert(`Jumlah bayar melebihi sisa: ${fmt(sisa)}`);
    try {
      const newPaid  = (tx.paid||0)+jumlah;
      const newStatus = newPaid>=tx.total?'Lunas':'Piutang';
      await sbUpdate('transactions',tx.id,{paid:newPaid,status:newStatus,change:Math.max(0,newPaid-tx.total)});
      notifyDataChanged('piutang');
      setBayarInput('');
      load();
      setSelectedInvoice(null);
      alert(`✅ Pembayaran ${fmt(jumlah)} berhasil!${newStatus==='Lunas'?' Piutang LUNAS!':''}`);
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // ── STRUK PIUTANG VIEW — pakai StrukSukses sama seperti transaksi penjualan ──
  if(showStruk && selectedInvoice) return (
    <StrukSukses
      cart={txItems.map(i=>({...i,name:i.product_name,unit:i.unit||'pcs',cartKey:i.id}))}
      total={selectedInvoice.total}
      paidNum={selectedInvoice.paid||0}
      invoice={selectedInvoice.invoice_no}
      customer={selectedInvoice.customer||'Umum'}
      metodeBayar={selectedInvoice.metode_bayar||'Piutang'}
      status={selectedInvoice.status}
      kasirName={selectedInvoice.dilayani_oleh||'Admin'}
      txId={selectedInvoice.id}
      onNew={()=>setShowStruk(false)}
    />
  );

  // ── INVOICE DETAIL VIEW ──
  if(selectedInvoice) {
    const sisa = selectedInvoice.total-(selectedInvoice.paid||0);
    const isOverdue = selectedInvoice.due_date&&selectedInvoice.due_date<today;
    return (
      <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={()=>setSelectedInvoice(null)} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{selectedCustomer?.name||selectedInvoice.customer||'Umum'}</div>
            <div style={{fontSize:10,color:MT,fontFamily:'monospace'}}>{selectedInvoice.invoice_no}</div>
          </div>
          <button onClick={()=>setShowStruk(true)} style={{marginLeft:'auto',background:'#eee',border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:600}}>
            Lihat Struk
          </button>
        </div>

        {/* Status badge */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:sisa<=0?G:RD}}/>
          <span style={{fontWeight:700,fontSize:13,color:sisa<=0?G:RD}}>{sisa<=0?'Lunas':'Belum Lunas'}</span>
        </div>

        {/* Info grid */}
        <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:12}}>
            <div><div style={{color:MT,fontSize:10}}>Tanggal Transaksi</div><div style={{fontWeight:600,marginTop:2}}>{selectedInvoice.created_at?.slice(0,16).replace('T',' ')}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Jatuh Tempo</div><div style={{fontWeight:600,marginTop:2,color:isOverdue?RD:selectedInvoice.due_date?OR:MT}}>{selectedInvoice.due_date||'Tidak di set'}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Total</div><div style={{fontWeight:700,fontSize:14,marginTop:2}}>{fmt(selectedInvoice.total)}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Belum Dibayar</div><div style={{fontWeight:700,fontSize:14,color:RD,marginTop:2}}>{fmt(sisa)}</div></div>
          </div>
          {isOverdue&&<div style={{marginTop:8,background:'#FFF0F0',borderRadius:8,padding:'6px 10px',fontSize:11,color:RD,fontWeight:700}}>🚨 LEWAT JATUH TEMPO!</div>}
        </div>

  // ── CUSTOMER DETAIL VIEW ──

          {/* Filter belum/lunas */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>

            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {customerList.map((c,i)=>{
                const isOverdue  = c.overdue>0;
                const isDueToday = c.dueToday>0;
                return (
                  <div key={i} onClick={()=>setSelectedCustomer(c)}
                    style={{background:'#fff',borderRadius:12,padding:'13px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F5F6FA'}
                    onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,color:MT,flexShrink:0}}>

                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14}}>{c.name}</div>
                      {(c.overdue>0||c.dueToday>0)&&(
                        <div style={{fontSize:10,color:isOverdue?RD:OR,fontWeight:600,marginTop:1}}>
                          JT: {isOverdue?'LEWAT':'Hari ini'} · {fmt(isOverdue?c.overdue:c.dueToday)}

                      )}

                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:RD}}/>

            + Tambah Piutang

      )}

      {/* ── TAB HUTANG SUPPLIER ── */}
      {tab==='hutang'&&(
        <>
          {/* Summary */}
          <div style={{background:'linear-gradient(135deg,#F3E5F5,#E1BEE7)',borderRadius:14,padding:'14px 18px',marginBottom:14,border:'1px solid #CE93D830',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:12,color:MT}}>Total Hutang ke Supplier</div>
              <div style={{fontWeight:800,fontSize:20,color:'#8E44AD'}}>{fmt(
                totalHutang +
                poHutang.filter(p=>p.status!=='Lunas').reduce((s,p)=>s+(p.total||0),0)
              )}</div>

          </div>

              <div style={{padding:'10px 16px',background:'#F3E5F5',fontWeight:700,fontSize:13,color:'#8E44AD',borderBottom:'1px solid #E1BEE7'}}>
