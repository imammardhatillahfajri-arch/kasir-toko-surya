          <div>
            <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>📅 Tanggal Pembelian</label>
            <input type="date" value={form.tanggal} onChange={e=>setForm(f=>({...f,tanggal:e.target.value}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Jatuh Tempo</label>
            <input type="date" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Status Bayar</label>
            <select value={form.bayar} onChange={e=>setForm(f=>({...f,bayar:e.target.value}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
              {['Lunas','Hutang','Belum'].map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>💸 Diskon Nota (%) — bisa "5+5"</label>
            <input type="text" value={form.diskon_persen_nota} placeholder="0" onChange={e=>setForm(f=>({...f,diskon_persen_nota:e.target.value}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            {effectiveDiskonPct(form.diskon_persen_nota)!==null&&(
              <div style={{fontSize:10,color:OR,marginTop:3}}>efektif {effectiveDiskonPct(form.diskon_persen_nota).toFixed(2)}%</div>
            )}
          </div>
          <div>
            <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>🧾 PPN (%)</label>
            <input type="number" min="0" max="100" value={form.ppn_persen} onChange={e=>setForm(f=>({...f,ppn_persen:parseFloat(e.target.value)||0}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:'#8E44AD',fontWeight:600,display:'block',marginBottom:4}}>➖ Potongan Tambahan (Rp)</label>
            <input type="number" min="0" value={form.potongan_nominal} placeholder="0" onChange={e=>setForm(f=>({...f,potongan_nominal:parseInt(e.target.value)||0}))}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #8E44AD66',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
        </div>
        <div>
          <label style={{fontSize:12,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Catatan (opsional)</label>
          <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
            placeholder="Catatan pembelian..."
            style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
        </div>
      </div>

      <button onClick={savePO} disabled={saving}
        style={{width:'100%',padding:14,background:saving?MT:G,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:16,cursor:'pointer'}}>
        {saving?'⏳ Menyimpan...':'💾 Buat Purchase Order'}
      </button>
    </div>
  );

  // ── VIEW: BROWSE PRODUK (Split Panel seperti Transaksi) ──
  if(view==='browse') return (
    <div className='split-layout' style={{display:'flex',height:'calc(100vh - 60px)',overflow:'hidden',background:GR}}>

      {/* ── KIRI: List Produk ── */}
      <div className='panel-kiri-full' style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRight:'2px solid #eee',minWidth:0}}>
        {/* Search + back */}
        <div style={{padding:'10px 12px',background:'#fff',borderBottom:'1px solid #eee',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <button onClick={()=>setView('list')}
              style={{flexShrink:0,padding:'7px 12px',background:'#F5F6FA',border:'1px solid #eee',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12,color:MT}}>
              ← PO
            </button>
            <div style={{position:'relative',flex:1}}>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Cari produk..."
                style={{width:'100%',padding:'9px 12px 9px 34px',border:'1.5px solid #eee',borderRadius:20,fontSize:13,outline:'none',boxSizing:'border-box'}}
                onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
            </div>
            <button onClick={()=>setShowTambahProdukPembelian(true)}
              style={{flexShrink:0,padding:'7px 12px',background:GL,border:`1px solid ${G}`,borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12,color:GD}}>
              ➕ Baru
            </button>
          </div>
          {/* Kategori pills */}
          <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:2}}>
            {kategoriList.map(k=>(
              <button key={k} onClick={()=>setActiveKat(k)}
                style={{flexShrink:0,padding:'4px 11px',border:`1.5px solid ${activeKat===k?G:'#eee'}`,borderRadius:14,background:activeKat===k?G:'#fff',color:activeKat===k?'#fff':MT,fontSize:11,fontWeight:activeKat===k?700:500,cursor:'pointer'}}>
                {k}
              </button>
            ))}
          </div>
        </div>

        {/* Product list */}
        <div style={{flex:1,overflowY:'auto'}}>
          {poUnitSel&&<PembelianUnitModal product={poUnitSel.product} units={poUnitSel.units} existing={poUnitSel.existing}
            onOk={applyUnitSel} onClose={()=>setPoUnitSel(null)}/>}
          {showTambahProdukPembelian&&(
            <TambahProdukBaruModal
              initialName={search}
              allProducts={window._cachedProducts||products||[]}
              onClose={()=>setShowTambahProdukPembelian(false)}
              onCreated={(newProd)=>{
                addToCart(newProd);
                setShowTambahProdukPembelian(false);
                setSearch('');
                alert(`✅ "${newProd.name}" ditambahkan & langsung masuk keranjang!`);
              }}
            />
          )}
          {prodLoading ? <Loading/> : filteredProds.length===0 ? (
            <div style={{textAlign:'center',padding:'48px 0',color:MT}}>
              <div style={{fontSize:36,marginBottom:10}}>🔍</div>
              <div style={{marginBottom:14}}>Produk tidak ditemukan</div>
              <button onClick={()=>setShowTambahProdukPembelian(true)}
                style={{padding:'10px 20px',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>
                ➕ Tambah "{search}" sebagai Produk Baru
              </button>
            </div>
          ) : filteredProds.map((prod,i)=>{
            const isMulti = getUnitList(prod).length>1;
            const lines = cart.filter(c=>c.product.id===prod.id);
            const inCart = lines[0];
            const qty = inCart?.qty||0;
            return (
              <div key={prod.id} style={{background:'#fff',borderBottom:'1px solid #f0f0f0',padding:'10px 12px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}
                onMouseEnter={e=>e.currentTarget.style.background=GL}
                onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div style={{width:44,height:44,borderRadius:10,background:'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,border:'1px solid #eee'}}>
                  📦
                </div>
                <div style={{flex:1,minWidth:0}} onClick={()=>handleProductTap(prod)}>
                  <div style={{fontSize:13,fontWeight:700,color:TX,lineHeight:1.3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{prod.name}</div>
                  <div style={{fontSize:12,marginTop:2}}>
                    <span style={{color:MT}}>stok {prod.stock} · </span>
                    <span style={{color:'#8E44AD',fontWeight:700}}>beli: {prod.buy_price?fmt(prod.buy_price):'—'}</span>
                    <span style={{color:MT}}> · jual: </span>
                    <span style={{color:GD,fontWeight:700}}>{fmt(prod.price)}</span>
                  </div>
                  <div style={{fontSize:10,color:'#bbb',marginTop:1}}>{prod.category?.split(' > ').slice(-1)[0]}</div>
                </div>
                <div style={{flexShrink:0}}>
                  {isMulti
                    ? (lines.length===0
                        ? <button onClick={()=>handleProductTap(prod)}
                            style={{width:34,height:34,borderRadius:'50%',background:'#8E44AD',border:'none',color:'#fff',fontSize:16,cursor:'pointer',fontWeight:700,boxShadow:'0 2px 6px rgba(142,68,173,0.35)'}}>⚖️</button>
                        : <button onClick={()=>handleProductTap(prod)}
                            style={{padding:'6px 10px',borderRadius:14,background:'#F3E5F5',border:'1.5px solid #8E44AD',color:'#8E44AD',fontSize:11,fontWeight:800,cursor:'pointer',whiteSpace:'nowrap'}}>
                            ✏️ {lines[0]?._rincian||lines.map(l=>`${l.qty} ${l.unit}`).join(' + ')}
                          </button>)
                    : (qty===0
                        ? <button onClick={()=>addToCart(prod)}
                            style={{width:34,height:34,borderRadius:'50%',background:G,border:'none',color:'#fff',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,boxShadow:'0 2px 6px rgba(46,204,113,0.35)'}}>+</button>
                        : <div style={{display:'flex',alignItems:'center',gap:5}}>
                            <button onClick={()=>updateQty(inCart?.cartKey||prod.id,qty-1)}
                              style={{width:28,height:28,borderRadius:'50%',background:'#eee',border:'none',cursor:'pointer',fontSize:16,fontWeight:700}}>−</button>
                            <span style={{width:24,textAlign:'center',fontWeight:700,color:G,fontSize:14}}>{qty}</span>
                            <button onClick={()=>updateQty(inCart?.cartKey||prod.id,qty+1)}
                              style={{width:28,height:28,borderRadius:'50%',background:G,border:'none',color:'#fff',cursor:'pointer',fontSize:16,fontWeight:700}}>+</button>
                          </div>)
                  }
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── KANAN: Keranjang + Checkout ── */}
      <div className='panel-kanan' style={{width:320,display:'flex',flexDirection:'column',background:'#fff',flexShrink:0}}>
        {/* Header keranjang */}
        <div style={{padding:'12px 16px',borderBottom:'1px solid #eee',background:'#F5F6FA',flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:15,color:TX}}>🛒 Keranjang Beli</div>
          <div style={{fontSize:12,color:MT,marginTop:2}}>{totalQty} item · {fmt(totalCart)}</div>
        </div>

        {/* Cart items */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
          {cart.length===0 ? (
            <div style={{textAlign:'center',padding:'40px 16px',color:MT}}>
              <div style={{fontSize:36,marginBottom:8}}>🛒</div>
              <div style={{fontSize:13}}>Belum ada barang</div>
              <div style={{fontSize:11,marginTop:4}}>Klik produk di kiri untuk tambah</div>
            </div>
          ) : cart.map(item=>(
            <div key={item.cartKey||item.product.id} style={{padding:'10px 14px',borderBottom:'1px solid #f5f5f5'}}>
              <div style={{fontWeight:600,fontSize:12,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.product.name}</div>
              {item._rincian&&<div style={{fontSize:10,color:'#8E44AD',fontWeight:700,marginBottom:4}}>⚖️ {item._rincian}</div>}
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <button onClick={()=>updateQty(item.cartKey||item.product.id,item.qty-1)}
                  style={{width:24,height:24,borderRadius:'50%',background:'#eee',border:'none',cursor:'pointer',fontSize:14,fontWeight:700}}>−</button>
                <span style={{fontWeight:700,color:G,minWidth:20,textAlign:'center'}}>{item.qty}</span>
                <button onClick={()=>updateQty(item.cartKey||item.product.id,item.qty+1)}
                  style={{width:24,height:24,borderRadius:'50%',background:GL,border:`1px solid ${G}`,cursor:'pointer',fontSize:14,color:GD,fontWeight:700}}>+</button>
                <span style={{color:MT,fontSize:11,marginLeft:4}}>{item.unit||'pcs'}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                <span style={{fontSize:11,color:MT}}>Harga beli:</span>
                <input value={item.price} onChange={e=>updatePrice(item.product.id,e.target.value)}
                  type="number" min="0"
                  style={{flex:1,padding:'5px 8px',border:'1.5px solid #eee',borderRadius:6,fontSize:12,outline:'none'}}
                  onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,color:OR}}>Disc%:</span>
                <input value={item.diskon_persen||'0'} onChange={e=>updateDiskonItem(item.cartKey||item.product.id,e.target.value)}
                  type="text" placeholder="0 / 5+5"
                  style={{width:56,padding:'5px 6px',border:`1.5px solid ${OR}66`,borderRadius:6,fontSize:11,outline:'none',boxSizing:'border-box'}}/>
                <span style={{flex:1}}/>
                {applyTieredDiskon(item.price*item.qty,item.diskon_persen||'0')>0&&<span style={{fontSize:10,color:MT,textDecoration:'line-through'}}>{fmt(item.price*item.qty)}</span>}
                <span style={{fontWeight:700,color:G,fontSize:12,flexShrink:0}}>{fmt(item.price*item.qty - applyTieredDiskon(item.price*item.qty,item.diskon_persen||'0'))}</span>
              </div>
            </div>
          ))}
        </div>

        {/* Checkout form */}
        {cart.length>0&&(
          <div style={{padding:'12px 14px',borderTop:'2px solid #eee',flexShrink:0,background:'#F5F6FA'}}>
            {/* Supplier */}
            <div style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <label style={{fontSize:11,color:MT,fontWeight:600}}>Supplier *</label>
                <button onClick={()=>setShowAddSupplierPem(v=>!v)}
                  style={{fontSize:10,color:G,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>
                  + Tambah Baru
                </button>
              </div>
              <select value={form.supplier_id} onChange={e=>setForm(f=>({...f,supplier_id:e.target.value}))}
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff',outline:'none'}}>
                <option value="">-- Pilih --</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            {/* Form tambah supplier */}
            {showAddSupplierPem&&(
              <div style={{background:'#E8F5E9',borderRadius:10,padding:10,marginBottom:8,border:`1px solid ${G}30`}}>
                <div style={{fontSize:11,fontWeight:700,color:GD,marginBottom:6}}>➕ Tambah Supplier Baru</div>
                {[['newSupName','Nama *'],['newSupPhone','Telp'],['newSupAddress','Alamat']].map(([k,label])=>(
                  <input key={k} value={newSupForm[k]||''} onChange={e=>setNewSupForm(f=>({...f,[k]:e.target.value}))}
                    placeholder={label}
                    style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box',marginBottom:5}}/>
                ))}
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>setShowAddSupplierPem(false)}
                    style={{flex:1,padding:'7px 0',background:'#eee',border:'none',borderRadius:7,cursor:'pointer',fontSize:11}}>Batal</button>
                  <button onClick={async()=>{
                    if(!newSupForm.newSupName) return alert('Nama supplier wajib!');
                    try {
                      const [sup] = await sbInsert('suppliers',[{name:newSupForm.newSupName,phone:newSupForm.newSupPhone||'',address:newSupForm.newSupAddress||''}]);
                      setSuppliers(prev=>[...prev,sup]);
                      setForm(f=>({...f,supplier_id:String(sup.id)}));
                      setNewSupForm({});
                      setShowAddSupplierPem(false);
                      alert('✅ Supplier berhasil ditambahkan!');
                    } catch(e){ alert('Gagal: '+e.message); }
                  }} style={{flex:2,padding:'7px 0',background:G,color:'#fff',border:'none',borderRadius:7,fontWeight:700,cursor:'pointer',fontSize:11}}>
                    💾 Simpan
                  </button>
                </div>
              </div>
            )}
            {/* Status bayar */}
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {['Lunas','Hutang','Belum'].map(opt=>(
                <button key={opt} onClick={()=>setForm(f=>({...f,bayar:opt}))}
                  style={{flex:1,padding:'6px 0',border:`1.5px solid ${form.bayar===opt?bC[opt]:'#eee'}`,borderRadius:7,background:form.bayar===opt?bC[opt]+'18':'#fff',color:form.bayar===opt?bC[opt]:MT,fontWeight:form.bayar===opt?700:500,cursor:'pointer',fontSize:11}}>
                  {opt}
                </button>
              ))}
            </div>
            {/* Tanggal pembelian */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>📅 Tanggal Pembelian</label>
              <input type="date" value={form.tanggal||new Date().toISOString().slice(0,10)} onChange={e=>setForm(f=>({...f,tanggal:e.target.value}))}
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
            </div>
            {/* Jatuh tempo */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Jatuh Tempo</label>
              <input type="date" value={form.due} onChange={e=>setForm(f=>({...f,due:e.target.value}))}
                style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
            </div>
            {/* Diskon, PPN & Potongan */}
            <div style={{display:'flex',gap:6,marginBottom:6}}>
              <div style={{flex:1}}>
                <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>💸 Diskon (%)</label>
                <input type="text" value={form.diskon_persen_nota} placeholder="0 / 5+5" onChange={e=>setForm(f=>({...f,diskon_persen_nota:e.target.value}))}
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
              </div>
              <div style={{flex:1}}>
                <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>🧾 PPN (%)</label>
                <input type="number" min="0" max="100" value={form.ppn_persen} onChange={e=>setForm(f=>({...f,ppn_persen:parseFloat(e.target.value)||0}))}
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:'#8E44AD',fontWeight:600,display:'block',marginBottom:3}}>➖ Potongan (Rp)</label>
              <input type="number" min="0" value={form.potongan_nominal} placeholder="0" onChange={e=>setForm(f=>({...f,potongan_nominal:parseInt(e.target.value)||0}))}
                style={{width:'100%',padding:'7px 10px',border:'1.5px solid #8E44AD66',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
            </div>
            {/* Total & Simpan */}
            {(totalDiskonItem>0||diskonNominal>0||ppnNominal>0||potonganNominal>0)&&(
              <div style={{fontSize:11,color:MT,marginBottom:6,lineHeight:1.6}}>
                Subtotal {fmt(totalCart)}
                {totalDiskonItem>0&&<span style={{color:OR}}> − {fmt(Math.round(totalDiskonItem))} (item)</span>}
                {diskonNominal>0&&<span style={{color:RD}}> − {fmt(diskonNominal)} (nota)</span>}
                {ppnNominal>0&&<span> + PPN {fmt(ppnNominal)}</span>}
                {potonganNominal>0&&<span style={{color:'#8E44AD'}}> − {fmt(potonganNominal)} (potongan)</span>}
              </div>
            )}
            <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,marginBottom:10}}>
              <span>Total</span><span style={{color:G}}>{fmt(totalFinal)}</span>
            </div>
            <button onClick={savePO} disabled={saving||!form.supplier_id}
              style={{width:'100%',padding:12,background:saving||!form.supplier_id?MT:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer'}}>
              {saving?'⏳ Menyimpan...':'💾 Buat PO'}
            </button>
          </div>
        )}
      </div>
    </div>
  );

  // ── VIEW: SCAN NOTA ──
  if(view==='scan') return (
    <ScanNota
      onBack={()=>setView('list')}
      onDataReady={()=>{ loadOrders(); setView('list'); }}
    />
  );

  // ── VIEW: LIST PO ──
  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>
      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
        {[
          {label:'Total PO',value:orders.length,icon:'📦',color:G},
          {label:'Menunggu',value:orders.filter(o=>o.status==='Proses').length,icon:'⏳',color:OR},
          {label:'Total Belanja',value:fmt(orders.reduce((s,o)=>s+(o.total||0),0)),icon:'💰',color:'#3498DB'},
        ].map(s=>(
          <div key={s.label} style={{background:'#fff',borderRadius:12,padding:'14px 12px',boxShadow:'0 2px 6px rgba(0,0,0,0.07)',borderTop:`3px solid ${s.color}`}}>
            <div style={{fontSize:20}}>{s.icon}</div>
            <div style={{fontSize:18,fontWeight:800,marginTop:4}}>{s.value}</div>
            <div style={{fontSize:11,color:MT,marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Tombol buat PO */}
      <div style={{display:'flex',gap:10,marginBottom:14}}>

// ── SHIFT KASIR & CASH DRAWER (opsional, multi-device) ──────────────────────
function ShiftStartForm({currentUser, onStarted}) {
  const [drawers, setDrawers]     = useState([]);
  const [openShifts, setOpenShifts] = useState([]); // shift status 'open' semua drawer
  const [selDrawer, setSelDrawer] = useState('');
  const [saldoAwal, setSaldoAwal] = useState('');
  const [loading, setLoading]     = useState(true);
  const [saving, setSaving]       = useState(false);
  const [showAddDrawer, setShowAddDrawer] = useState(false);
  const [newDrawerName, setNewDrawerName] = useState('');

  const load = async() => {
    setLoading(true);
    try {
      const [dw, sh] = await Promise.all([
        sbGetAll('cashdrawers',{order:'name'}),
        sbGetAll('shifts',{eq:{status:'open'},order:'opening_at',asc:false}),
      ]);
      setDrawers(dw||[]);
      setOpenShifts(sh||[]);
      if(!selDrawer && dw?.length) setSelDrawer(String(dw[0].id));
    } catch(e){}
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const addDrawer = async() => {
    if(!newDrawerName.trim()) return alert('Isi nama cashdrawer!');
    try {
      const r = await sbInsert('cashdrawers',[{name:newDrawerName.trim()}]);
      setNewDrawerName(''); setShowAddDrawer(false);
      await load();
      if(r?.[0]?.id) setSelDrawer(String(r[0].id));
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const drawer = drawers.find(d=>String(d.id)===String(selDrawer));
  const usedBy = openShifts.find(s=>String(s.cashdrawer_id)===String(selDrawer));

  const isiDataTerakhir = async() => {
    try {
      const last = await sbGet('shifts',{eq:{cashdrawer_id:parseInt(selDrawer),status:'closed'},order:'closing_at',asc:false});
      if(last?.[0]) setSaldoAwal(String(last[0].closing_balance||0));
      else alert('Belum ada riwayat shift untuk cashdrawer ini.');
    } catch(e){}
  };

  const mulai = async() => {
    if(!selDrawer) return alert('Pilih atau tambah cashdrawer dulu!');
    if(usedBy) return alert(`Cashdrawer ini sedang dipakai oleh ${usedBy.user_name} (${usedBy.user_email}).\\nMinta dia tutup shift dulu, atau pilih cashdrawer lain.`);
    const saldo = parseInt(String(saldoAwal).replace(/\\D/g,''))||0;
    setSaving(true);
    try {
      const r = await sbInsert('shifts',[{
        cashdrawer_id: parseInt(selDrawer),
        cashdrawer_name: drawer?.name||'',
        user_email: currentUser.email, user_name: currentUser.nama||currentUser.username,
        opening_balance: saldo, status:'open',
      }]);
      const shift = r?.[0];
      setActiveShift({id:shift.id, cashdrawer_id:parseInt(selDrawer), cashdrawer_name:drawer?.name||'', opening_balance:saldo, opening_at:shift.opening_at});
      onStarted();
    } catch(e){ alert('Gagal mulai shift: '+e.message+(e.message.includes('shifts')?'\\n\\nKemungkinan tabel shifts/cashdrawers belum dibuat. Jalankan SQL migrasi.':'')); }
    setSaving(false);
  };

  if(loading) return <Loading/>;

  return (
    <div style={{maxWidth:500,margin:'0 auto'}}>
      <div style={{background:'#F5F6FA',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:12,color:MT}}>Tambah / Edit Cashdrawer</div>
        <button onClick={()=>setShowAddDrawer(v=>!v)}
          style={{width:30,height:30,borderRadius:'50%',background:G,color:'#fff',border:'none',fontSize:18,cursor:'pointer'}}>+</button>
      </div>
      {showAddDrawer&&(
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <input value={newDrawerName} onChange={e=>setNewDrawerName(e.target.value)} placeholder="Nama cashdrawer, mis. Kasir Depan"
            style={{flex:1,padding:'9px 12px',border:'1.5px solid #ddd',borderRadius:8,fontSize:13}}/>
          <button onClick={addDrawer} style={{padding:'9px 16px',background:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>Simpan</button>
        </div>
      )}
      <div style={{fontSize:12,color:MT,textAlign:'center',marginBottom:16}}>
        Fitur Cashdrawer dapat mengelola siapa yang pegang kasir & cocokkan saldo kas fisik saat tutup shift.
      </div>

      <div style={{background:`linear-gradient(120deg,#FFF3D6,${GL})`,borderRadius:12,padding:14,marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:44,height:44,borderRadius:'50%',background:OR,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:16}}>
          {(currentUser.nama||currentUser.username||'?').slice(0,2).toUpperCase()}
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:15}}>{currentUser.nama||currentUser.username}</div>
          <div style={{fontSize:12,color:MT}}>{currentUser.role==='admin'?'Admin/Owner':'Kasir'}</div>
        </div>
      </div>

      {drawers.length===0 ? (
        <div style={{textAlign:'center',color:MT,fontSize:13,padding:20}}>Belum ada cashdrawer. Tambah dulu lewat tombol + di atas.</div>
      ) : (
        <>
          <div style={{fontSize:12,color:MT,fontWeight:600,marginBottom:6}}>Pilih Cashdrawer</div>
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            <select value={selDrawer} onChange={e=>setSelDrawer(e.target.value)}
              style={{flex:1,padding:'11px 12px',border:`1.5px solid ${usedBy?RD:'#ddd'}`,borderRadius:10,fontSize:14,fontWeight:700,background:'#fff'}}>
              {drawers.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
            <button onClick={load} style={{padding:'0 16px',background:'#F5F6FA',border:'none',borderRadius:10,fontWeight:600,fontSize:13,cursor:'pointer',color:TX}}>🔄 Refresh</button>
          </div>

          {usedBy&&(
            <div style={{background:'#FFF0F0',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>Sedang digunakan oleh:</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:13}}>
                <div><div style={{color:MT,fontSize:11}}>Nama</div><div style={{fontWeight:600}}>{usedBy.user_name}</div></div>
                <div><div style={{color:MT,fontSize:11}}>Email</div><div style={{fontWeight:600,wordBreak:'break-all'}}>{usedBy.user_email}</div></div>
              </div>
            </div>
          )}

          <div style={{fontSize:12,color:MT,fontWeight:600,marginBottom:6}}>Masukkan Saldo Awal</div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'11px 14px',border:'1.5px solid #ddd',borderRadius:12,marginBottom:8}}>
            <span style={{fontWeight:800,fontSize:18,color:MT}}>Rp</span>
            <input value={saldoAwal?parseInt(String(saldoAwal).replace(/\\D/g,''))||0:''} placeholder="0" inputMode="numeric"
              onChange={e=>setSaldoAwal(e.target.value.replace(/\\D/g,''))}
              style={{flex:1,border:'none',outline:'none',fontSize:20,fontWeight:800}}/>
          </div>
          <button onClick={isiDataTerakhir} style={{background:'none',border:'none',color:G,fontWeight:700,fontSize:13,cursor:'pointer',padding:0,marginBottom:20}}>
            Masukkan Data Terakhir
          </button>

          <button onClick={mulai} disabled={saving||!!usedBy}
            style={{width:'100%',padding:15,background:saving||usedBy?MT:G,color:'#fff',border:'none',borderRadius:28,fontWeight:800,fontSize:15,cursor:'pointer'}}>
            {saving?'⏳ Memulai...':'Mulai Shift Cashdrawer'}
          </button>
        </>
      )}
    </div>
  );
}

function ShiftActiveCard({shift, currentUser, onClosed}) {
  const [now, setNow]           = useState(Date.now());
  const [showClose, setShowClose] = useState(false);
  const [live, setLive]         = useState({masuk:0, keluar:0, tunai:0});
  const [fisik, setFisik]       = useState('');
  const [catatan, setCatatan]   = useState('');
  const [saving, setSaving]     = useState(false);

  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(t); },[]);

  const loadLive = async() => {
    try {
      const pays = await sbGetAll('payments',{eq:{shift_id:shift.id},order:'created_at'});
      const masuk  = (pays||[]).filter(p=>p.type==='masuk').reduce((s,p)=>s+(p.amount||0),0);
      const keluar = (pays||[]).filter(p=>p.type==='keluar').reduce((s,p)=>s+(p.amount||0),0);
      const tunai  = (pays||[]).filter(p=>p.type==='masuk'&&(p.method==='Tunai'||p.method==='Manual')).reduce((s,p)=>s+(p.amount||0),0);
      setLive({masuk,keluar,tunai});
    } catch(e){}
  };
  useEffect(()=>{ loadLive(); const t=setInterval(loadLive,8000); return ()=>clearInterval(t); },[shift.id]);

  const elapsed = (()=>{
    const ms = now - new Date(shift.opening_at).getTime();
    const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
    return `${h}j ${m}m`;
  })();

  const expected = (shift.opening_balance||0) + live.tunai - live.keluar;
  const fisikNum = parseInt(String(fisik).replace(/\D/g,''))||0;
  const selisih  = fisikNum - expected;

  const tutupShift = async() => {
    if(!fisik) return alert('Isi jumlah uang fisik yang dihitung di laci!');
    if(!confirm(`Tutup shift cashdrawer "${shift.cashdrawer_name}"?\n\nSaldo seharusnya: ${fmt(expected)}\nUang fisik: ${fmt(fisikNum)}\nSelisih: ${selisih===0?'Rp 0 (pas!)':fmt(selisih)}`)) return;
    setSaving(true);
    try {
      await sbUpdate('shifts', shift.id, {
        status:'closed', closing_at:new Date().toISOString(),
        closing_balance:fisikNum, expected_balance:expected, selisih, notes:catatan||null,
      });
      setActiveShift(null);
      onClosed();
    } catch(e){ alert('Gagal tutup shift: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{maxWidth:500,margin:'0 auto'}}>
      <div style={{background:`linear-gradient(120deg,${G},${GD})`,borderRadius:14,padding:20,color:'#fff',marginBottom:16}}>
        <div style={{fontSize:12,opacity:0.85}}>Shift Aktif · {shift.cashdrawer_name}</div>
        <div style={{fontSize:22,fontWeight:800,marginTop:4}}>⏱ {elapsed}</div>
        <div style={{fontSize:13,opacity:0.9,marginTop:6}}>Kasir: {shift.user_name}</div>
        <div style={{fontSize:11,opacity:0.75,marginTop:2}}>Mulai: {new Date(shift.opening_at).toLocaleString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT}}>Saldo Awal</div>
          <div style={{fontWeight:800,fontSize:16,marginTop:2}}>{fmt(shift.opening_balance||0)}</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT}}>Saldo Seharusnya</div>
          <div style={{fontWeight:800,fontSize:16,marginTop:2,color:GD}}>{fmt(expected)}</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT}}>Kas Masuk (tunai)</div>
          <div style={{fontWeight:800,fontSize:16,marginTop:2,color:G}}>+{fmt(live.tunai)}</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT}}>Kas Keluar</div>
          <div style={{fontWeight:800,fontSize:16,marginTop:2,color:RD}}>-{fmt(live.keluar)}</div>
        </div>
      </div>

      {!showClose ? (
        <button onClick={()=>setShowClose(true)}
          style={{width:'100%',padding:15,background:RD,color:'#fff',border:'none',borderRadius:28,fontWeight:800,fontSize:15,cursor:'pointer'}}>
          🔒 Tutup Shift
        </button>
      ) : (
        <div style={{background:'#fff',borderRadius:14,padding:16,boxShadow:'0 2px 10px rgba(0,0,0,0.08)'}}>
          <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>Hitung Uang Fisik di Laci</div>
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'11px 14px',border:`1.5px solid ${G}`,borderRadius:12,marginBottom:10}}>
            <span style={{fontWeight:800,fontSize:18,color:MT}}>Rp</span>
            <input value={fisik?parseInt(String(fisik).replace(/\D/g,''))||0:''} placeholder="0" inputMode="numeric"
              onChange={e=>setFisik(e.target.value.replace(/\D/g,''))}
              style={{flex:1,border:'none',outline:'none',fontSize:20,fontWeight:800}}/>
          </div>
          {fisik&&(
            <div style={{background:selisih===0?GL:selisih>0?'#FFF8E1':'#FFF0F0',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>Saldo seharusnya</span><b>{fmt(expected)}</b></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>Uang fisik</span><b>{fmt(fisikNum)}</b></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:14,paddingTop:6,borderTop:'1px solid rgba(0,0,0,0.08)'}}>
                <span style={{fontWeight:700}}>Selisih</span>
                <span style={{fontWeight:900,color:selisih===0?GD:selisih>0?'#F57C00':RD}}>
                  {selisih===0?'✅ Pas!':selisih>0?`+${fmt(selisih)} (lebih)`:`${fmt(selisih)} (kurang)`}
                </span>
              </div>
            </div>
          )}
          <input value={catatan} onChange={e=>setCatatan(e.target.value)} placeholder="Catatan (opsional)"
            style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box',marginBottom:12}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowClose(false)} disabled={saving}
              style={{flex:1,padding:12,background:'#eee',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer'}}>Batal</button>
            <button onClick={tutupShift} disabled={saving}
              style={{flex:2,padding:12,background:saving?MT:RD,color:'#fff',border:'none',borderRadius:10,fontWeight:800,cursor:'pointer'}}>
              {saving?'⏳ Menyimpan...':'🔒 Konfirmasi Tutup Shift'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function RiwayatShift() {
  const [shifts, setShifts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);

  useEffect(()=>{
    sbGetAll('shifts',{eq:{status:'closed'},order:'closing_at',asc:false}).then(d=>{setShifts(d||[]);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  if(loading) return <Loading/>;
  if(!shifts.length) return <div style={{textAlign:'center',color:MT,padding:30,fontSize:13}}>Belum ada riwayat shift.</div>;

  return (
    <div style={{maxWidth:600,margin:'0 auto'}}>
      {shifts.map(s=>(
        <div key={s.id} onClick={()=>setSelected(selected?.id===s.id?null:s)}
          style={{background:'#fff',borderRadius:12,padding:14,marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',cursor:'pointer',border:selected?.id===s.id?`1.5px solid ${G}`:'1.5px solid transparent'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:700,fontSize:13}}>{s.cashdrawer_name} · {s.user_name}</div>
              <div style={{fontSize:11,color:MT,marginTop:2}}>
                {new Date(s.opening_at).toLocaleDateString('id-ID',{day:'numeric',month:'short'})} · {new Date(s.opening_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} - {new Date(s.closing_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:800,fontSize:13,color:s.selisih===0?GD:s.selisih>0?'#F57C00':RD}}>
                {s.selisih===0?'✅ Pas':fmt(s.selisih)}
              </div>
              <div style={{fontSize:10,color:MT}}>selisih</div>
            </div>
          </div>
          {selected?.id===s.id&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed #ddd',fontSize:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              <div><span style={{color:MT}}>Saldo awal:</span> {fmt(s.opening_balance||0)}</div>
              <div><span style={{color:MT}}>Saldo seharusnya:</span> {fmt(s.expected_balance||0)}</div>

function Shift() {
  const [tab, setTab] = useState('current');
  const [currentUser, setCurrentUser] = useState(()=>getSession());
  const [activeShift, setActiveShiftState] = useState(()=>getActiveShift());
  const [checking, setChecking] = useState(true);

  // Verifikasi shift lokal masih 'open' di database (bisa saja sudah ditutup dari device lain)
  useEffect(()=>{
    (async()=>{
      const local = getActiveShift();
      if(local?.id) {
        try {
          const r = await sbGet('shifts',{eq:{id:local.id}});
          if(!r?.[0]||r[0].status!=='open') { setActiveShift(null); setActiveShiftState(null); }
        } catch(e){}
      }
      setChecking(false);
    })();
  },[]);

  if(checking) return <Loading/>;

  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',gap:20,marginBottom:16,borderBottom:'2px solid #eee'}}>
        {[['current','Saat Ini'],['riwayat','Riwayat']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{background:'none',border:'none',padding:'10px 4px',fontWeight:700,fontSize:15,color:tab===k?TX:MT,borderBottom:tab===k?`2px solid ${G}`:'2px solid transparent',marginBottom:-2,cursor:'pointer'}}>
            {l}
          </button>
        ))}
      </div>
      {tab==='current' ? (
        activeShift
          ? <ShiftActiveCard shift={activeShift} currentUser={currentUser} onClosed={()=>setActiveShiftState(null)}/>
          : <ShiftStartForm currentUser={currentUser} onStarted={()=>setActiveShiftState(getActiveShift())}/>
      ) : <RiwayatShift/>}
    </div>
  );
}

function BluetoothPrinterPanel() {
  const [status, setStatus]   = useState('');
  const [busy, setBusy]       = useState(false);
  const [savedName, setSavedName] = useState(window.BTPrinter?.savedName());
  const supported = window.BTPrinter?.isSupported();

  const connect = async() => {
    setBusy(true); setStatus('📡 Pilih printer di dialog Bluetooth...');
    try {
      const name = await window.BTPrinter.connect();
      setSavedName(name);
      setStatus('✅ Terhubung dengan '+name);
    } catch(e){ setStatus('❌ '+e.message); }
    setBusy(false);
  };

  const testPrint = async() => {
    setBusy(true); setStatus('🖨️ Mencetak tes...');
    try {
      await window.BTPrinter.printText(
        '================================\n'+
        '        TES PRINTER\n'+
        '================================\n'+
        'Jika teks ini tercetak dengan\n'+
        'rapi, printer sudah siap dipakai\n'+
        'untuk mencetak struk transaksi.\n\n'+
        (window.TOKO_NAMA||'SURYA LISTRIK')+'\n\n\n'
      );
      setStatus('✅ Tes cetak terkirim! Cek hasilnya di printer.');
    } catch(e){ setStatus('❌ '+e.message); }
    setBusy(false);
  };

  const forget = () => {
    window.BTPrinter.disconnect();
    localStorage.removeItem('mykasir_printer_name');
    setSavedName(null);
    setStatus('Perangkat dilupakan. Silakan hubungkan ulang.');
  };

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',border:'1.5px solid #EDE7F6'}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:'#7B1FA2'}}>🔵 Printer Thermal Bluetooth</div>
      <div style={{fontSize:11,color:MT,marginBottom:12}}>
        Hubungkan printer thermal 58mm via Bluetooth untuk cetak struk langsung tanpa dialog print browser. Hanya didukung Chrome di Android/Desktop (tidak di iPhone/Safari).
      </div>

      {!supported ? (
        <div style={{background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,padding:'10px 12px',fontSize:12,color:RD}}>
          ⚠️ Browser ini tidak mendukung Web Bluetooth. Buka lewat Chrome di Android atau Desktop.
        </div>
      ) : (
        <>
          {savedName&&(
            <div style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'8px 12px',fontSize:12,color:GD,fontWeight:600,marginBottom:10}}>
              📎 Tersimpan: {savedName}
            </div>
          )}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button onClick={connect} disabled={busy}
              style={{padding:'9px 16px',background:busy?'#eee':'#7B1FA2',color:'#fff',border:'none',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>
              {savedName?'🔄 Hubungkan Ulang':'🔗 Hubungkan Printer'}
            </button>
            <button onClick={testPrint} disabled={busy}
              style={{padding:'9px 16px',background:busy?'#eee':'#E3F2FD',color:'#1976D2',border:'1.5px solid #3498DB',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>
              🖨️ Tes Cetak
            </button>
            {savedName&&(
              <button onClick={forget} disabled={busy}
                style={{padding:'9px 16px',background:'#fff',color:RD,border:`1.5px solid ${RD}`,borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}}>
                🗑️ Lupakan
              </button>
            )}
          </div>
          {status&&<div style={{marginTop:10,fontSize:12,fontWeight:600,color:status.startsWith('❌')?RD:GD}}>{status}</div>}
          <div style={{fontSize:10,color:MT,marginTop:10,lineHeight:1.5}}>
            💡 Kalau gagal terhubung: pastikan printer sudah menyala & dalam mode pairing, coba tekan "Hubungkan Printer" lagi. Kalau tetap gagal setelah connect (tes cetak error), kemungkinan printer pakai protokol berbeda dari yang didukung — laporkan merk/tipe printernya.
          </div>
        </>
      )}
    </div>
  );
}

    // Order matters - delete child tables first
    const deleteOrder = [
      'debt_payments','po_items','return_items','transaction_items',
      'stock_logs','returns','debts','purchase_orders','transactions'
    ];

    // Jika purchase_orders dipilih, WAJIB hapus po_items dulu
    if(selected['purchase_orders']) {
      try {
        const {error} = await sb.from('po_items').delete().gt('id', 0);
        if(!error) logs.push('✅ po_items: otomatis dihapus (relasi PO)');
      } catch(e){}
    }
    // Jika transactions dipilih, WAJIB hapus transaction_items dulu
    if(selected['transactions']) {
      try {
        const {error} = await sb.from('transaction_items').delete().gt('id', 0);
        if(!error) logs.push('✅ transaction_items: otomatis dihapus (relasi transaksi)');
      } catch(e){}
    }
    // Jika returns dipilih, WAJIB hapus return_items dulu
    if(selected['returns']) {
      try {
        const {error} = await sb.from('return_items').delete().gt('id', 0);
        if(!error) logs.push('✅ return_items: otomatis dihapus (relasi retur)');
      } catch(e){}
    }
    setLog([...logs]);
    
    for(const table of deleteOrder) {
      if(selected[table]) {
        try {
          const {error} = await sb.from(table).delete().gt('id', 0);
          if(error) throw error;
          logs.push('✅ '+table+': berhasil dihapus');
        } catch(e) {
          if(e.message?.includes('does not exist')||e.message?.includes('schema cache')) {
            logs.push('⚠️ '+table+': tabel tidak ada (dilewati)');
          } else {
            logs.push('❌ '+table+': '+e.message);
          }
        }
        setLog([...logs]);
      }
    }
    
    notifyDataChanged('reset');
    setResetting(false);
    setStep(3);
    setLog(logs);
  };

  if(step===3) return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <h2 style={{margin:'0 0 20px',fontSize:17,fontWeight:800,color:RD}}>🗑️ Reset Selesai</h2>
      <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',marginBottom:16}}>
        {log.map((l,i)=>(
          <div key={i} style={{fontSize:12,padding:'4px 0',borderBottom:'1px solid #f5f5f5',color:l.startsWith('✅')?GD:RD}}>{l}</div>
        ))}
      </div>
      <button onClick={()=>{onBack();}} style={{width:'100%',padding:13,background:G,color:'#fff',border:'none',borderRadius:12,fontWeight:700,cursor:'pointer',fontSize:14}}>
        ✅ Selesai
      </button>
    </div>
  );

  if(step===2) return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>setStep(1)} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:RD}}>⚠️ Konfirmasi Reset</h2>
      </div>

      <div style={{background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontWeight:700,color:RD,marginBottom:8,fontSize:15}}>🚨 PERINGATAN!</div>
        <div style={{fontSize:13,color:'#7d0000',lineHeight:1.6}}>
          Data yang dihapus <b>TIDAK BISA DIKEMBALIKAN</b>.<br/>
          Pastikan sudah backup data sebelum melanjutkan.<br/><br/>
          Data yang akan dihapus ({selectedCount} tabel):
        </div>
        <ul style={{margin:'8px 0 0',paddingLeft:20}}>
          {dataOptions.filter(o=>selected[o.key]).map(o=>(
            <li key={o.key} style={{fontSize:12,color:RD,fontWeight:600}}>{o.icon} {o.label}</li>
          ))}
        </ul>
      </div>

      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <label style={{fontSize:13,fontWeight:600,color:TX,display:'block',marginBottom:8}}>
          Ketik <b style={{color:RD}}>RESET</b> untuk konfirmasi:
        </label>
        <input value={konfirmText} onChange={e=>setKonfirmText(e.target.value)}
          placeholder="Ketik RESET di sini..."
          style={{width:'100%',padding:'12px 14px',border:`2px solid ${konfirmText==='RESET'?G:RD}`,borderRadius:10,fontSize:16,fontWeight:700,textAlign:'center',boxSizing:'border-box',outline:'none',letterSpacing:2}}/>
        {konfirmText==='RESET'&&<div style={{color:G,fontSize:12,marginTop:6,textAlign:'center',fontWeight:600}}>✅ Konfirmasi valid</div>}
      </div>

      <button onClick={doReset} disabled={resetting||konfirmText!=='RESET'}
        style={{width:'100%',padding:14,background:resetting||konfirmText!=='RESET'?MT:RD,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
        {resetting?'⏳ Menghapus data...':'🗑️ HAPUS DATA SEKARANG'}
      </button>
    </div>
  );

  return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>🗑️ Reset Data Transaksi</h2>
      </div>

      <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:12,padding:14,marginBottom:16,fontSize:12,color:'#7d4e00'}}>
        ⚠️ <b>Perhatian:</b> Fitur ini hanya menghapus data transaksi. Data produk, kategori, pelanggan, supplier <b>TIDAK</b> akan terhapus.
      </div>

      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>Pilih data yang ingin direset:</div>
          <button onClick={selectAll} style={{fontSize:12,color:RD,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Pilih Semua</button>
        </div>
        {dataOptions.map(opt=>(
          <label key={opt.key} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #f5f5f5',cursor:'pointer'}}>
            <input type="checkbox" checked={selected[opt.key]}
              onChange={e=>setSelected(p=>({...p,[opt.key]:e.target.checked}))}
              style={{width:18,height:18,accentColor:RD,flexShrink:0}}/>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{opt.icon} {opt.label}</div>
              <div style={{fontSize:11,color:MT}}>{opt.sub}</div>
              {opt.depends&&<div style={{fontSize:10,color:OR}}>⚠️ Sebaiknya dihapus bersama dengan {opt.depends}</div>}
            </div>
          </label>
        ))}
      </div>

      <button onClick={()=>{
        if(selectedCount===0) return alert('Pilih minimal 1 data yang ingin direset!');
        setStep(2);
        setKonfirmText('');
      }} disabled={selectedCount===0}
        style={{width:'100%',padding:14,background:selectedCount===0?MT:RD,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
        {selectedCount===0?'Pilih data dulu':` Lanjut Reset ${selectedCount} Tabel →`}
      </button>
    </div>
  );
}

  useEffect(()=>{
    (async()=>{
      try {
        const settings = await sbGet('app_settings',{order:'key'});
        const map = {};
        settings.forEach(s=>map[s.key]=s.value);
        setForm({
          toko_nama:       map.toko_nama||'SURYA LISTRIK',
          toko_alamat:     map.toko_alamat||'',

// ── EXPORT DATA ────────────────────────────────────────────────────────────
function ExportData({onBack}) {
  const [loading, setLoading] = useState(false);

  const exportCSV = async(type) => {
    setLoading(true);
    try {
      let data, filename, headers;

      if(type==='products'){
        data = await sbGetAll('products',{order:'name'});
        headers = ['ID','Nama','Harga Jual','Harga Beli','Stok','Kategori','Barcode','Tipe'];
        filename = 'produk_surya_listrik.csv';
      } else if(type==='transactions'){
        data = await sbGetAll('transactions',{order:'created_at',asc:false});
        headers = ['ID','Invoice','Pelanggan','Total','Bayar','Kembalian','Status','Tanggal'];
        filename = 'transaksi_surya_listrik.csv';
      } else if(type==='stock_low'){
        const all = await sbGetAll('products',{order:'stock'});
        data = all.filter(p=>p.stock<20);
        headers = ['ID','Nama','Stok','Min Stok','Kategori'];
        filename = 'stok_menipis_surya_listrik.csv';
      }

      // Generate CSV
      const rows = data.map(d=>{
        if(type==='products') return [d.id,d.name,d.price,d.buy_price||0,d.stock,d.category||'',d.barcode||'',d.tipe_barang||'Default'];
        if(type==='transactions') return [d.id,d.invoice_no,d.customer,d.total,d.paid,d.change,d.status,d.created_at?.slice(0,10)];
        if(type==='stock_low') return [d.id,d.name,d.stock,d.min_stock||0,d.category||''];
        return [];
      });

      const csv = [headers, ...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e){ alert('Gagal export: '+e.message); }
    setLoading(false);
  };

  const exports = [
    {icon:'📦',label:'Export Produk',sub:`Semua data produk (nama, harga, stok, kategori)`,type:'products',color:'#E8F5E9',border:G},
    {icon:'🧾',label:'Export Transaksi',sub:'Semua riwayat transaksi penjualan',type:'transactions',color:'#E3F2FD',border:'#3498DB'},
    {icon:'⚠️',label:'Export Stok Menipis',sub:'Produk dengan stok < 20',type:'stock_low',color:'#FFF3E0',border:OR},
  ];

  return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📤 Export Data</h2>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {exports.map((ex,i)=>(
          <button key={i} onClick={()=>exportCSV(ex.type)} disabled={loading}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px 20px',background:'#fff',border:`1.5px solid ${ex.border}`,borderRadius:14,cursor:loading?'not-allowed':'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',opacity:loading?0.7:1}}>
            <div style={{width:48,height:48,borderRadius:12,background:ex.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
              {ex.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:TX}}>{ex.label}</div>
              <div style={{fontSize:12,color:MT,marginTop:2}}>{ex.sub}</div>
            </div>

// ── PENGATURAN USER (Admin only) ───────────────────────────────────────────
function PengaturanUser({currentUser, onBack}) {
  const [users, setUsers]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm]       = useState({email:'',username:'',nama:'',role:'kasir',pin:'',is_active:true});
  const [saving, setSaving]   = useState(false);
  const [devMap, setDevMap]   = useState({}); // email -> daftar perangkat

  const loadDevices = async() => {
    try {
      const rows = await sbGetAll('user_devices',{order:'last_seen',asc:false});
      const m = {};
      (rows||[]).forEach(d=>{ if(!m[d.email]) m[d.email]=[]; m[d.email].push(d); });
      setDevMap(m);
    } catch(e){ setDevMap({}); }
  };

  const resetDevices = async(u) => {
    if(!u.email) return;
    const devs = devMap[u.email]||[];
    if(!devs.length) return alert('Belum ada perangkat terdaftar untuk akun ini.');
    if(!confirm(`Reset perangkat untuk ${u.nama} (${u.email})?\n\n${devs.map(d=>'• '+(d.device_name||'Perangkat')).join('\n')}\n\nSemua slot dikosongkan — dia bisa login lagi dari perangkat mana pun (maks ${MAX_DEVICES}).`)) return;
    try {
      const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      await sbc.from('user_devices').delete().eq('email', u.email);
      loadDevices();
      alert('✅ Perangkat direset. '+u.nama+' bisa login dari perangkat baru.');
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const load = async()=>{
    setLoading(true);
    try {
      const d = await sbGet('app_users',{order:'id'});
      setUsers(Array.isArray(d) ? d.filter(u=>u&&u.id) : []);
    } catch(e){ setUsers([]); }
    setLoading(false);
  };
  useEffect(()=>{load();loadDevices();},[]);

  const save = async()=>{
    if(!form.email||!form.nama) return alert('Email & nama wajib!');
    setSaving(true);
    try {
      const email = form.email.toLowerCase().trim();
      const data = {
        email,
        username: (form.username||email.split('@')[0]).toLowerCase().trim(),
        nama: form.nama, role: form.role, pin: form.pin||'', is_active: form.is_active,
      };
      const isNew = !editId;
      if(editId) { await sbUpdate('app_users',editId,data); }
      else { await sbInsert('app_users',[data]); }
      setShowForm(false); setEditId(null);
      setForm({email:'',username:'',nama:'',role:'kasir',pin:'',is_active:true});
      load();
      if(isNew) alert(`✅ Profil pengguna tersimpan!\n\n⚠️ LANGKAH TERAKHIR: buat akun login-nya di Supabase Dashboard →\nAuthentication → Users → Add user\ndengan email yang sama persis:\n${email}\n\n(centang "Auto Confirm User")`);
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const toggleActive = async(user)=>{
    if(user.id===currentUser?.id) return alert('Tidak bisa menonaktifkan akun sendiri!');
    try { await sbUpdate('app_users',user.id,{is_active:!user.is_active}); load(); }
    catch(e){ alert('Gagal: '+e.message); }
  };

  return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        {onBack&&<button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>}
        <h3 style={{margin:0,fontSize:16,flex:1}}>👥 Manajemen User</h3>
        <button onClick={()=>{setEditId(null);setForm({email:'',username:'',nama:'',role:'kasir',pin:'',is_active:true});setShowForm(v=>!v);}}
          style={{padding:'8px 16px',background:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:13}}>+ Tambah</button>
      </div>

      {showForm && (
        <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
          <h4 style={{margin:'0 0 12px',fontSize:14}}>{editId?'✏️ Edit':'➕ Tambah'} User</h4>
          {[['nama','Nama Lengkap *'],['email','Email Login *'],['username','Username (tampilan)'],['pin','PIN (4-6 digit)']].map(([k,label])=>(
            <div key={k} style={{marginBottom:8}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>{label}</label>
              <input value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={label}
                type={k==='email'?'email':'text'}
                style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:14,boxSizing:'border-box'}}/>
            </div>
          ))}
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Role</label>
            <div style={{display:'flex',gap:8}}>
              {[['admin','👑 Admin'],['kasir','🧑‍💼 Kasir']].map(([val,label])=>(
                <button key={val} onClick={()=>setForm(f=>({...f,role:val}))}
                  style={{flex:1,padding:'9px 0',border:`2px solid ${form.role===val?G:'#eee'}`,borderRadius:8,background:form.role===val?GL:'#fff',color:form.role===val?GD:MT,fontWeight:form.role===val?700:500,cursor:'pointer',fontSize:13}}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,cursor:'pointer',fontSize:13}}>
            <input type="checkbox" checked={form.is_active} onChange={e=>setForm(f=>({...f,is_active:e.target.checked}))} style={{width:16,height:16}}/>
            Akun Aktif
          </label>
          <div style={{display:'flex',gap:8}}>
            <button onClick={save} disabled={saving} style={{flex:1,padding:10,background:saving?MT:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>{saving?'Menyimpan...':'💾 Simpan'}</button>
            <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{flex:1,padding:10,background:'#eee',border:'none',borderRadius:8,cursor:'pointer'}}>Batal</button>
          </div>
        </div>
      )}

      {loading ? <Loading/> : users.length===0 ? (
        <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada user</div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {users.map(u=>(
            <div key={u.id} style={{background:'#fff',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',display:'flex',alignItems:'center',gap:12,opacity:u.is_active?1:0.6}}>
              <div style={{width:44,height:44,borderRadius:'50%',background:u.role==='admin'?'#FFF3E0':'#E8F5E9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>
                {u.role==='admin'?'👑':'🧑'}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}}>{u.nama}
                  {u.id===currentUser?.id&&<span style={{fontSize:10,background:G,color:'#fff',borderRadius:4,padding:'1px 6px',marginLeft:4}}>Anda</span>}
                </div>
                <div style={{fontSize:12,color:MT,marginTop:2}}>{u.email||('@'+u.username)} · {u.role==='admin'?'Admin':'Kasir'}</div>
                {(devMap[u.email]||[]).length>0&&(
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4,flexWrap:'wrap'}}>
                    <span style={{fontSize:10,fontWeight:700,color:'#8E44AD',background:'#F3E5F5',borderRadius:5,padding:'2px 8px'}}>
                      📱 {(devMap[u.email]||[]).length}/{MAX_DEVICES}: {(devMap[u.email]||[]).map(d=>d.device_name||'?').join(', ')}
                    </span>
                    <button onClick={(e)=>{e.stopPropagation();resetDevices(u);}}
                      style={{fontSize:10,fontWeight:700,color:RD,background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:5,padding:'2px 8px',cursor:'pointer'}}>
                      🔓 Reset
                    </button>
                  </div>
                )}
                <div style={{fontSize:11,color:u.is_active?GD:RD}}>{u.is_active?'✅ Aktif':'❌ Nonaktif'}</div>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>{setEditId(u.id);setForm({email:u.email||'',username:u.username||'',nama:u.nama||'',role:u.role||'kasir',pin:u.pin||'',is_active:u.is_active});setShowForm(true);}}
                  style={{padding:'6px 10px',background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:'pointer',fontSize:13,color:GD}}>✏️</button>
                {u.id!==currentUser?.id&&(
                  <button onClick={()=>toggleActive(u)}
                    style={{padding:'6px 10px',background:u.is_active?'#FFF0F0':'#F0FFF0',border:`1px solid ${u.is_active?RD:G}`,borderRadius:6,cursor:'pointer',fontSize:12,color:u.is_active?RD:GD,fontWeight:600}}>
                    {u.is_active?'Nonaktif':'Aktifkan'}
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Dispatch event ketika ada perubahan data
const notifyDataChanged = (type='all') => {
  window.dispatchEvent(new CustomEvent('kasir:dataChanged', {detail:{type}}));
};

// Hook untuk listen perubahan data
const useDataSync = (callback, deps=[]) => {
  React.useEffect(()=>{
    callback();
    const handler = () => callback();
    window.addEventListener('kasir:dataChanged', handler);
    return () => window.removeEventListener('kasir:dataChanged', handler);
  }, deps);
};

// ── Indikator status koneksi — muncul di seluruh app saat sinyal bermasalah ─
function useNetworkStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  const [slow, setSlow]     = useState(false);
  useEffect(()=>{
    const goOnline  = ()=>{ setOnline(true); setSlow(false); };
    const goOffline = ()=>setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    // Cek berkala: request kecil ke Supabase, kalau lama/gagal tandai "lambat"
    const ping = async()=>{
      if(!navigator.onLine){ setOnline(false); return; }
      const start = Date.now();
      try {
        await withTimeout(sb.from('app_settings').select('key').limit(1), 6000);
        setOnline(true);
        setSlow(Date.now()-start > 3000);
      } catch(e){ setSlow(true); }
    };
    const interval = setInterval(ping, 20000);
    return ()=>{ window.removeEventListener('online',goOnline); window.removeEventListener('offline',goOffline); clearInterval(interval); };
  },[]);
  return {online, slow};
}

function NetworkStatusBanner() {
  const {online, slow} = useNetworkStatus();
  if(online && !slow) return null;
  return (
    <div style={{position:'fixed',top:0,left:0,right:0,zIndex:9999,textAlign:'center',padding:'6px 12px',fontSize:12,fontWeight:700,color:'#fff',
      background: online ? OR : RD}}>
      {online ? '🟡 Koneksi lambat — beberapa aksi mungkin butuh waktu lebih lama' : '🔴 Tidak ada koneksi internet — transaksi & data baru tidak akan tersimpan'}
    </div>
  );
}

// ── Pelindung: kalau satu halaman error, jangan sampai seluruh app ikut blank ─
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = {hasError:false, error:null}; }
  static getDerivedStateFromError(error){ return {hasError:true, error}; }
  componentDidCatch(error, info){ console.error('[ErrorBoundary]', error, info); }
  componentDidUpdate(prevProps){ if(prevProps.pageKey!==this.props.pageKey && this.state.hasError) this.setState({hasError:false,error:null}); }
  render(){
    if(this.state.hasError){
      return (
        <div style={{padding:'48px 24px',textAlign:'center',maxWidth:420,margin:'0 auto'}}>
          <div style={{fontSize:44,marginBottom:14}}>⚠️</div>
          <div style={{fontWeight:800,fontSize:16,marginBottom:8}}>Halaman ini mengalami error</div>
          <div style={{fontSize:12,color:MT,marginBottom:18,wordBreak:'break-word'}}>{String(this.state.error?.message||this.state.error||'Error tidak diketahui')}</div>
          <button onClick={()=>this.setState({hasError:false,error:null})}
            style={{padding:'11px 24px',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:14}}>
            🔄 Coba Lagi
          </button>
          <div style={{fontSize:11,color:MT,marginTop:14}}>Halaman lain di app ini tetap aman digunakan.</div>
        </div>
      );
    }
    return this.props.children;
  }
}

  <script>
    // Register Service Worker (only if sw.js exists)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // Check if sw.js exists first
          const swCheck = await fetch('/sw.js',{method:'HEAD'}).catch(()=>({ok:false}));
          if(!swCheck.ok) { console.log('[PWA] sw.js not found, skipping SW registration'); return; }
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.log('[PWA] Service Worker registered:', reg.scope);
          
          // Check for updates
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Ada update tersedia
                if (confirm('Update app tersedia! Reload sekarang?')) {
                  window.location.reload();
                }
              }
            });
          });
        } catch(err) {
          console.warn('[PWA] SW registration failed:', err);
        }
      });
    }

    // Install prompt (Android)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Tampilkan tombol install custom
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'flex';
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
      console.log('[PWA] App installed!');
    });

    // Global install function dipanggil dari React
    window.installPWA = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      deferredPrompt = null;
    };
  </script>
