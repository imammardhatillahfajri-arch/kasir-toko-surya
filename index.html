              </div>
              {poHutang.map((po,i)=>(
                <POHutangItem key={po.id} po={po} today={today} load={load}/>
              ))}
            </div>
          )}

          <button onClick={()=>setShowForm(true)}
            style={{width:'100%',marginBottom:14,padding:'12px 0',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:14}}>
            + Catat Hutang Manual
          </button>

          {showForm&&(
            <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:14,boxShadow:'0 2px 8px rgba(0,0,0,0.1)'}}>
              <h4 style={{margin:'0 0 12px',fontSize:14}}>📝 Catat Hutang</h4>
              {[['party_name','Nama Supplier *','text'],['description','Keterangan','text'],['amount','Jumlah (Rp) *','number'],['due_date','Jatuh Tempo','date']].map(([k,label,type])=>(
                <div key={k} style={{marginBottom:8}}>
                  <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>{label}</label>
                  <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                    type={type} placeholder={label}
                    style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                </div>
              ))}
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button onClick={()=>{setShowForm(false);setForm({party_name:'',amount:'',description:'',due_date:''}); }} style={{flex:1,padding:10,background:'#eee',border:'none',borderRadius:8,cursor:'pointer'}}>Batal</button>
                <button onClick={async()=>{
                  if(!form.party_name||!form.amount) return alert('Nama & jumlah wajib!');
                  setSaving(true);
                  try {
                    await sbInsert('debts',[{...form,type:'hutang',amount:parseInt(form.amount),paid:0,status:'Belum'}]);
                    setShowForm(false); setForm({party_name:'',amount:'',description:'',due_date:''});
                    load();
                  } catch(e){ alert('Gagal: '+e.message); }
                  setSaving(false);
                }} disabled={saving} style={{flex:2,padding:10,background:saving?MT:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                  {saving?'⏳':'💾 Simpan'}
                </button>
              </div>
            </div>
          )}

          {loading ? <Loading/> : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {hutangList.length===0
                ? <div style={{textAlign:'center',padding:'32px 0',color:MT,background:'#fff',borderRadius:12}}><div style={{fontSize:36}}>✅</div><div>Tidak ada hutang</div></div>
                : hutangList.map((d,i)=>{
                  const sisa   = d.amount-(d.paid||0);
                  const lunas  = d.status==='Lunas'||sisa<=0;
                  const overdue= !lunas&&d.due_date&&d.due_date<today;
                  return (
                    <div key={d.id} style={{background:'#fff',borderRadius:12,padding:'13px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:`4px solid ${lunas?G:overdue?RD:'#8E44AD'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:lunas?0:8}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{d.party_name}</div>
                          {d.description&&<div style={{fontSize:11,color:MT}}>{d.description}</div>}
                          {d.due_date&&<div style={{fontSize:11,fontWeight:600,color:overdue?RD:OR}}>{overdue?'🚨':'📅'} {d.due_date}</div>}
                        </div>
                        <div style={{textAlign:'right'}}>
                          <div style={{fontWeight:800,fontSize:15,color:lunas?G:'#8E44AD'}}>{lunas?'LUNAS':fmt(sisa)}</div>
                          {!lunas&&<div style={{fontSize:10,color:MT}}>dari {fmt(d.amount)}</div>}
                        </div>
                      </div>
                      {!lunas&&(
                        <div style={{display:'flex',gap:6}}>
                          <button onClick={async()=>{
                            const jumlah = prompt(`Bayar hutang ${d.party_name}?\nSisa: ${fmt(sisa)}`);
                            if(!jumlah) return;
                            const newPaid = (d.paid||0)+parseInt(jumlah);
                            await sbUpdate('debts',d.id,{paid:newPaid,status:newPaid>=d.amount?'Lunas':'Belum'});
                            load();
                          }} style={{flex:1,padding:'7px 0',background:'#F3E5F5',border:'1px solid #8E44AD',borderRadius:8,cursor:'pointer',color:'#8E44AD',fontWeight:700,fontSize:12}}>
                            💳 Bayar
                          </button>
                          <button onClick={async()=>{
                            if(!confirm('Tandai lunas?')) return;
                            await sbUpdate('debts',d.id,{paid:d.amount,status:'Lunas'});
                            load();
                          }} style={{flex:1,padding:'7px 0',background:GL,border:`1px solid ${G}`,borderRadius:8,cursor:'pointer',color:GD,fontWeight:700,fontSize:12}}>
                            ✅ Lunas
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })
              }
            </div>
          )}
        </>
      )}
    </div>
  );
}


function ManajemenRetur() {
  const [returns, setReturns]     = useState([]);
  const [products, setProducts]   = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [showForm, setShowForm]   = useState(false);
  const [activeTab, setActiveTab] = useState('semua'); // semua | pelanggan | supplier
  const [search, setSearch]       = useState('');

  // Form state
  const [form, setForm] = useState({
    type: 'dari_pelanggan', // dari_pelanggan | ke_supplier
    transaction_id: '',
    customer: '',
    supplier_id: '',
    reason: '',
    action: 'refund', // refund | tukar_barang
    notes: '',
  });
  const [items, setItems] = useState([{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
  const [saving, setSaving] = useState(false);

  const load = async() => {
    setLoading(true);
    try {
      const [rets, prods, sups] = await Promise.all([
        sbGet('returns',{order:'created_at',asc:false}),
        sbGetAll('products',{order:'name'}),
        sbGet('suppliers',{order:'name'}),
      ]);
      setReturns(rets||[]);
      setProducts(prods||[]);
      setSuppliers(sups||[]);
    } catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const genReturnNo = () => {
    const now = new Date();
    return `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
  };

  const addItem = () => setItems(prev=>[...prev,{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
  const removeItem = (i) => setItems(prev=>prev.filter((_,idx)=>idx!==i));
  const updateItem = (i,field,val) => setItems(prev=>prev.map((item,idx)=>idx===i?{...item,[field]:val}:item));

  const selectProduct = (i, productId) => {
    const prod = products.find(p=>p.id===parseInt(productId));
    if(prod) updateItem(i,'product_name',prod.name);
    if(prod) updateItem(i,'price',prod.price);
    updateItem(i,'product_id',productId);
  };

  const total = items.reduce((s,i)=>s+(parseInt(i.price)||0)*(parseInt(i.qty)||0),0);

  const save = async() => {
    if(!form.customer&&form.type==='dari_pelanggan') return alert('Nama pelanggan wajib!');
    if(!form.supplier_id&&form.type==='ke_supplier') return alert('Supplier wajib dipilih!');
    if(items.some(i=>!i.product_name)) return alert('Nama produk wajib diisi!');
    setSaving(true);
    try {
      const sup = suppliers.find(s=>s.id===parseInt(form.supplier_id));
      const retData = {
        return_no: genReturnNo(),
        type: form.type,
        customer: form.type==='dari_pelanggan'?form.customer:'',
        supplier: form.type==='ke_supplier'?(sup?.name||''):'',
        supplier_id: form.type==='ke_supplier'?parseInt(form.supplier_id)||null:null,
        reason: form.reason,
        action: form.type==='dari_pelanggan'?form.action:'retur_supplier',
        total,
        notes: form.notes,
        status: 'Selesai',
      };
      const ret = await sbInsert('returns',[retData]);
      const retId = ret[0]?.id;

      // Insert items
      if(retId) {
        await sbInsert('return_items', items.map(i=>({
          return_id: retId,
          product_id: parseInt(i.product_id)||null,
          product_name: i.product_name,
          qty: parseInt(i.qty)||1,
          price: parseInt(i.price)||0,
          reason: i.reason,
        })));

        // Update stok - retur dari pelanggan: stok naik, retur ke supplier: stok turun
        for(const item of items) {
          if(item.product_id) {
            const prod = products.find(p=>p.id===parseInt(item.product_id));
            if(prod) {
              const newStok = form.type==='dari_pelanggan'
                ? prod.stock + parseInt(item.qty)
                : prod.stock - parseInt(item.qty);
              await sbUpdate('products', parseInt(item.product_id), {stock: Math.max(0,newStok)});
              await sbInsert('stock_logs',[{
                product_id: parseInt(item.product_id),
                type: form.type==='dari_pelanggan'?'masuk':'keluar',
                qty: parseInt(item.qty),
                notes: `Retur ${form.type==='dari_pelanggan'?'dari pelanggan':'ke supplier'}: ${form.reason}`,
              }]);
            }
          }
        }
      }

      setShowForm(false);
      setForm({type:'dari_pelanggan',transaction_id:'',customer:'',supplier_id:'',reason:'',action:'refund',notes:''});
      setItems([{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
      load();
      alert('✅ Retur berhasil dicatat!');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const filtered = returns.filter(r=>{
    if(activeTab==='pelanggan' && r.type!=='dari_pelanggan') return false;
    if(activeTab==='supplier'  && r.type!=='ke_supplier') return false;
    if(search && !r.return_no?.toLowerCase().includes(search.toLowerCase()) &&
       !r.customer?.toLowerCase().includes(search.toLowerCase()) &&
       !r.supplier?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const totalRetur   = returns.filter(r=>r.type==='dari_pelanggan').reduce((s,r)=>s+r.total,0);
  const totalSupplier = returns.filter(r=>r.type==='ke_supplier').reduce((s,r)=>s+r.total,0);

  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800}}>🔄 Manajemen Retur</h2>
        <button onClick={()=>setShowForm(true)}
          style={{padding:'9px 18px',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:14}}>
          + Catat Retur
        </button>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:'4px solid #E74C3C'}}>
          <div style={{fontSize:11,color:MT}}>🔄 Retur dari Pelanggan</div>
          <div style={{fontSize:18,fontWeight:800,color:'#E74C3C',marginTop:4}}>{fmt(totalRetur)}</div>
          <div style={{fontSize:11,color:MT}}>{returns.filter(r=>r.type==='dari_pelanggan').length} transaksi</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:'4px solid #8E44AD'}}>
          <div style={{fontSize:11,color:MT}}>📦 Retur ke Supplier</div>
          <div style={{fontSize:18,fontWeight:800,color:'#8E44AD',marginTop:4}}>{fmt(totalSupplier)}</div>
          <div style={{fontSize:11,color:MT}}>{returns.filter(r=>r.type==='ke_supplier').length} transaksi</div>
        </div>
      </div>

      {/* Tabs + Search */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',background:'#fff',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
          {[['semua','Semua'],['pelanggan','Dari Pelanggan'],['supplier','Ke Supplier']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'8px 14px',border:'none',background:activeTab===id?G:'transparent',color:activeTab===id?'#fff':MT,fontWeight:activeTab===id?700:500,cursor:'pointer',fontSize:12}}>
              {label}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Cari nomor retur / nama..."
          style={{flex:1,padding:'8px 12px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',minWidth:200}}/>
      </div>

      {/* Form tambah retur */}
      {showForm && (
        <div style={{background:'#fff',borderRadius:14,padding:20,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{margin:0,fontSize:16}}>📝 Catat Retur Baru</h3>
            <button onClick={()=>setShowForm(false)} style={{background:'#eee',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:16}}>×</button>
          </div>

          {/* Jenis retur */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:6}}>Jenis Retur</label>
            <div style={{display:'flex',gap:8}}>
              {[['dari_pelanggan','🔄 Dari Pelanggan','#E74C3C'],['ke_supplier','📦 Ke Supplier','#8E44AD']].map(([val,label,color])=>(
                <button key={val} onClick={()=>setForm(f=>({...f,type:val}))}
                  style={{flex:1,padding:'10px 0',border:`2px solid ${form.type===val?color:'#eee'}`,borderRadius:10,background:form.type===val?color+'18':'#fff',color:form.type===val?color:MT,fontWeight:form.type===val?700:500,cursor:'pointer',fontSize:13}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Info pelanggan / supplier */}
          {form.type==='dari_pelanggan' ? (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Nama Pelanggan *</label>
                <input value={form.customer} onChange={e=>setForm(f=>({...f,customer:e.target.value}))}
                  placeholder="Nama pelanggan..."
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Proses Retur</label>
                <select value={form.action} onChange={e=>setForm(f=>({...f,action:e.target.value}))}
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                  <option value="refund">💵 Refund (Uang kembali)</option>
                  <option value="tukar_barang">🔄 Tukar Barang</option>
                </select>
              </div>
            </div>
          ) : (
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Supplier *</label>
              <select value={form.supplier_id} onChange={e=>setForm(f=>({...f,supplier_id:e.target.value}))}
                style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                <option value="">-- Pilih Supplier --</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}

          )}

          {/* Alasan */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Alasan Retur *</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
              {['Barang rusak','Barang cacat','Salah produk','Salah ukuran','Kelebihan stok','Lainnya'].map(r=>(
                <button key={r} onClick={()=>setForm(f=>({...f,reason:r}))}
                  style={{padding:'4px 10px',border:`1.5px solid ${form.reason===r?RD:'#eee'}`,borderRadius:16,background:form.reason===r?'#FFF0F0':'#fff',color:form.reason===r?RD:MT,fontSize:11,cursor:'pointer',fontWeight:form.reason===r?700:500}}>
                  {r}
                </button>
              ))}
            </div>
            <input value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}
              placeholder="Ketik alasan retur..."
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>

          {/* Items */}
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <label style={{fontSize:12,fontWeight:600,color:MT}}>Daftar Barang Diretur</label>
              <button onClick={addItem} style={{padding:'4px 10px',background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:'pointer',fontSize:12,color:GD,fontWeight:600}}>+ Tambah</button>
            </div>
            {items.map((item,i)=>(
              <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:10,marginBottom:8}}>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:8,marginBottom:6}}>
                  <select value={item.product_id} onChange={e=>selectProduct(i,e.target.value)}
                    style={{padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
                    <option value="">-- Pilih Produk --</option>
                    {products.slice(0,100).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  <input value={item.qty} onChange={e=>updateItem(i,'qty',e.target.value)} type="number" min="1" placeholder="Qty"
                    style={{padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
                  <input value={item.price} onChange={e=>updateItem(i,'price',e.target.value)} type="number" placeholder="Harga"
                    style={{padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
                  {items.length>1&&<button onClick={()=>removeItem(i)} style={{padding:'6px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,cursor:'pointer',color:RD,fontSize:12}}>🗑️</button>}
                </div>
                <input value={item.reason} onChange={e=>updateItem(i,'reason',e.target.value)} placeholder="Kondisi/alasan item ini..."
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:11,boxSizing:'border-box'}}/>
              </div>
            ))}
          </div>

          {/* Total */}
          <div style={{background:GL,borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:700,fontSize:14}}>Total Nilai Retur</span>
            <span style={{fontWeight:800,fontSize:18,color:GD}}>{fmt(total)}</span>
          </div>

          {/* Catatan */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Catatan (opsional)</label>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              placeholder="Catatan tambahan..."
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>

          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:12,background:'#eee',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700}}>Batal</button>
            <button onClick={save} disabled={saving}
              style={{flex:2,padding:12,background:saving?MT:G,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:14}}>
              {saving?'⏳ Menyimpan...':'✅ Simpan Retur'}
            </button>
          </div>
        </div>
      )}

      {/* List retur */}
      {loading ? <Loading/> : filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'40px 0',color:MT}}>
          <div style={{fontSize:40,marginBottom:8}}>🔄</div>
          <div>Belum ada data retur</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map(r=>(
            <div key={r.id} style={{background:'#fff',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:`4px solid ${r.type==='dari_pelanggan'?'#E74C3C':'#8E44AD'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:TX}}>{r.return_no}</div>
                  <div style={{fontSize:12,color:MT,marginTop:2}}>
                    {r.type==='dari_pelanggan'?`🔄 ${r.customer||'Umum'}`:` 📦 ${r.supplier||'Supplier'}`}
                  </div>
                  <div style={{fontSize:11,color:MT,marginTop:2}}>{r.reason}</div>
                  {r.action==='refund'&&<span style={{fontSize:10,background:'#FFF0F0',color:RD,borderRadius:4,padding:'1px 6px',marginTop:3,display:'inline-block'}}>💵 Refund</span>}
                  {r.action==='tukar_barang'&&<span style={{fontSize:10,background:GL,color:GD,borderRadius:4,padding:'1px 6px',marginTop:3,display:'inline-block'}}>🔄 Tukar Barang</span>}
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:800,fontSize:16,color:r.type==='dari_pelanggan'?'#E74C3C':'#8E44AD'}}>{fmt(r.total)}</div>
                  <div style={{fontSize:11,color:MT,marginTop:2}}>{r.created_at?.slice(0,10)}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── KEUANGAN ───────────────────────────────────────────────────────────────
function Keuangan({refreshKey}) {
  const [txList,   setTxList]   = useState([]);
  const [returns,  setReturns]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [activeTab,setActiveTab]= useState('semua');
  const [search,   setSearch]   = useState('');

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const [txs, rets] = await Promise.all([
        sbGet('transactions',{order:'created_at',asc:false}),
        sbGet('returns',{order:'created_at',asc:false}),
      ]);
      setTxList(txs||[]);
      setReturns(rets||[]);
    } catch(e){}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const today    = new Date().toISOString().slice(0,10);
  const todayTx  = txList.filter(t=>t.created_at?.slice(0,10)===today&&t.status==='Lunas');
  const todayRet = returns.filter(r=>r.created_at?.slice(0,10)===today&&r.type==='dari_pelanggan');

  // Pendapatan hari ini = omset lunas - retur hari ini
  const pendapatanHariIni = todayTx.reduce((s,t)=>s+t.total,0) - todayRet.reduce((s,r)=>s+r.total,0);

  // Total keseluruhan
  const totalOmset   = txList.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0);
  const totalRetur   = returns.filter(r=>r.type==='dari_pelanggan').reduce((s,r)=>s+r.total,0);
  const totalNeto    = totalOmset - totalRetur;
  const totalPiutang = txList.filter(t=>t.status==='Piutang').reduce((s,t)=>s+t.total,0);

  // Filter list
  const filteredTx = txList.filter(t=>{
    if(activeTab==='lunas'   && t.status!=='Lunas') return false;
    if(activeTab==='piutang' && t.status!=='Piutang') return false;
    if(activeTab==='retur') return false;
    if(search && !t.invoice_no?.toLowerCase().includes(search.toLowerCase()) &&
       !t.customer?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const filteredRet = returns.filter(r=>{
    if(search && !r.return_no?.toLowerCase().includes(search.toLowerCase()) &&
       !r.customer?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'Pendapatan Hari Ini',value:fmt(pendapatanHariIni),icon:'📈',color:G,sub:`${todayTx.length} tx - ${fmt(todayRet.reduce((s,r)=>s+r.total,0))} retur`},
          {label:'Total Omset (Neto)',value:fmt(totalNeto),icon:'💎',color:'#3498DB',sub:`Bruto ${fmt(totalOmset)} - Retur ${fmt(totalRetur)}`},
          {label:'Total Piutang',value:fmt(totalPiutang),icon:'⏳',color:OR,sub:`${txList.filter(t=>t.status==='Piutang').length} transaksi belum lunas`},
          {label:'Total Retur',value:fmt(totalRetur),icon:'🔄',color:RD,sub:`${returns.filter(r=>r.type==='dari_pelanggan').length} retur dari pelanggan`},
        ].map((d,i)=>(
          <div key={i} style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',borderLeft:`4px solid ${d.color}`}}>
            <div style={{fontSize:20}}>{d.icon}</div>
            <div style={{fontSize:11,color:MT,marginTop:4}}>{d.label}</div>
            <div style={{fontSize:17,fontWeight:800,color:d.color,marginTop:2}}>{d.value}</div>
            <div style={{fontSize:10,color:MT,marginTop:2}}>{d.sub}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',marginBottom:12}}>
        {[['semua','Semua'],['lunas','✅ Lunas'],['piutang','⏳ Piutang'],['retur','🔄 Retur']].map(([tab,label])=>(
          <button key={tab} onClick={()=>setActiveTab(tab)}
            style={{flex:1,padding:'10px 4px',border:'none',background:activeTab===tab?G:'transparent',color:activeTab===tab?'#fff':MT,fontWeight:activeTab===tab?700:500,cursor:'pointer',fontSize:11,transition:'all 0.15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Search */}
      <div style={{marginBottom:12}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Cari invoice / nama pelanggan..."
          style={{width:'100%',padding:'9px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',boxSizing:'border-box'}}
          onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
      </div>

      {/* List */}
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden'}}>
        {loading ? <div style={{padding:20}}><Loading/></div> : (

          activeTab==='retur' ? (
            // Retur list
            filteredRet.length===0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada retur</div>
            ) : filteredRet.map((r,i)=>(
              <div key={r.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid #f5f5f5',borderLeft:`3px solid ${r.type==='dari_pelanggan'?RD:'#8E44AD'}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,fontFamily:'monospace'}}>{r.return_no}</div>
                  <div style={{fontSize:11,color:MT,marginTop:2}}>{r.customer||r.supplier||'—'} · {r.reason}</div>
                  <div style={{fontSize:10,color:MT}}>{r.created_at?.slice(0,10)} · {r.created_at?.slice(11,16)}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:RD}}>-{fmt(r.total)}</div>
                  <div style={{fontSize:10,color:r.action==='refund'?RD:G,fontWeight:600,marginTop:2}}>
                    {r.action==='refund'?'💵 Refund':'🔄 Tukar'}
                  </div>
                </div>
              </div>
            ))
          ) : (
            // Transaksi list
            filteredTx.length===0 ? (

// ── LAPORAN PENJUALAN BARANG ───────────────────────────────────────────────
function LaporanPenjualanBarang({period}) {
  const [data, setData]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortBy, setSortBy]   = useState('omset'); // omset | qty

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const [txs, items] = await Promise.all([
          sbGet('transactions',{order:'created_at'}),
          sbGet('transaction_items',{order:'id'}),
        ]);

        const validTxIds = new Set(
          txs.filter(t=>t.created_at>=sinceStr&&t.status==='Lunas').map(t=>t.id)
        );

        const map = {};
        items.filter(i=>validTxIds.has(i.transaction_id)).forEach(i=>{
          const key = i.product_name;
          if(!map[key]) map[key] = {name:key, qty:0, omset:0, transaksi:0};
          map[key].qty      += i.qty;
          map[key].omset    += i.price * i.qty;
          map[key].transaksi++;
        });

        const sorted = Object.values(map).sort((a,b)=>b[sortBy]-a[sortBy]);
        setData(sorted);
      } catch(e){}
      setLoading(false);
    })();
  },[period, sortBy]);

  const totalOmset = data.reduce((s,d)=>s+d.omset,0);
  const totalQty   = data.reduce((s,d)=>s+d.qty,0);
  const maxOmset   = Math.max(...data.map(d=>d.omset),1);

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14}}>🏪 Penjualan Barang ({period} Hari)</div>
        <div style={{display:'flex',gap:6}}>
          {[['omset','Omset'],['qty','Qty']].map(([val,label])=>(
            <button key={val} onClick={()=>setSortBy(val)}
              style={{padding:'5px 12px',border:`1.5px solid ${sortBy===val?G:'#eee'}`,borderRadius:16,background:sortBy===val?G:'#fff',color:sortBy===val?'#fff':MT,fontSize:11,fontWeight:sortBy===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
        <div style={{background:GL,borderRadius:8,padding:'8px 12px'}}>
          <div style={{fontSize:10,color:MT}}>Total Omset</div>
          <div style={{fontSize:15,fontWeight:800,color:GD}}>{fmt(totalOmset)}</div>
        </div>
        <div style={{background:'#E3F2FD',borderRadius:8,padding:'8px 12px'}}>
          <div style={{fontSize:10,color:MT}}>Total Qty Terjual</div>
          <div style={{fontSize:15,fontWeight:800,color:'#1976D2'}}>{totalQty.toLocaleString('id-ID')} pcs</div>
        </div>
      </div>

      {data.length===0 ? (
        <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada data penjualan</div>
      ) : (
        <div style={{maxHeight:400,overflowY:'auto'}}>
          {data.map((d,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                  <div style={{width:22,height:22,borderRadius:6,background:i<3?['#FFF9C4','#F5F5F5','#FBE9E7'][i]:GL,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:i<3?['#F57F17','#616161','#BF360C'][i]:GD,flexShrink:0}}>
                    {i+1}
                  </div>
                  <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:G}}>{fmt(d.omset)}</div>
                  <div style={{fontSize:10,color:MT}}>{d.qty} pcs · {d.transaksi} tx</div>
                </div>
              </div>
              <div style={{height:5,background:'#F5F6FA',borderRadius:3}}>
                <div style={{height:'100%',background:i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':G,borderRadius:3,width:`${(d.omset/maxOmset)*100}%`}}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── LAPORAN PENJUALAN ─────────────────────────────────────────────────────
function LaporanPenjualan() {
  const today = new Date().toISOString().slice(0,10);
  const [filter, setFilter]         = useState({dari: today, sampai: today, status:'', search:''});
  const [transactions, setTrans]    = useState([]);
  const [loading, setLoading]       = useState(false);
  const [selected, setSelected]     = useState(null); // transaksi yang diklik
  const [txItems, setTxItems]       = useState([]);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [editMode, setEditMode]     = useState(false);
  const [editForm, setEditForm]     = useState({});
  const [editItems, setEditItems]   = useState([]);
  const [products, setProducts]     = useState([]);
  const [saving, setSaving]         = useState(false);
  const [showReturForm, setShowReturForm] = useState(false);
  const [showStruk, setShowStruk]   = useState(false);

  const loadProducts = async() => {
    if(products.length>0) return;
    try { setProducts(await sbGetAll('products',{order:'name'})); } catch(e){}
  };

  const search = async() => {
    if(!filter.dari||!filter.sampai) return alert('Pilih tanggal terlebih dahulu!');
    setLoading(true); setSelected(null); setEditMode(false);
    try {
      const all = await sbGet('transactions',{order:'created_at',asc:false});
      const filtered = all.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(tgl < filter.dari || tgl > filter.sampai) return false;
        if(filter.status && t.status !== filter.status) return false;
        if(filter.search && !t.invoice_no?.toLowerCase().includes(filter.search.toLowerCase()) &&
           !t.customer?.toLowerCase().includes(filter.search.toLowerCase())) return false;
        return true;
      });
      setTrans(filtered);
    } catch(e){}
    setLoading(false);
  };

  const openDetail = async(tx) => {
    setSelected(tx); setEditMode(false); setShowReturForm(false); setShowStruk(false);
    setLoadingDetail(true);
    try {
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id},order:'id'});
      setTxItems(items||[]);
      setEditForm({
        customer: tx.customer||'',
        metode_bayar: tx.metode_bayar||'Tunai',
        status: tx.status||'Lunas',
        paid: tx.paid||tx.total,
      });
      setEditItems((items||[]).map(i=>({...i})));
    } catch(e){}
    setLoadingDetail(false);
    await loadProducts();
  };

  const addEditItem = () => setEditItems(prev=>[...prev,{id:'new_'+Date.now(),product_id:null,product_name:'',qty:1,price:0}]);
  const removeEditItem = (id) => setEditItems(prev=>prev.filter(i=>i.id!==id));
  const updateEditItem = (id,field,val) => setEditItems(prev=>prev.map(i=>i.id===id?{...i,[field]:val}:i));
  const selectEditProduct = (id,productId) => {
    const prod = products.find(p=>p.id===parseInt(productId));
    if(prod) {
      updateEditItem(id,'product_name',prod.name);
      updateEditItem(id,'price',prod.price);
      updateEditItem(id,'product_id',prod.id);
    }
  };

  const editTotal = editItems.reduce((s,i)=>s+(parseInt(i.price)||0)*(parseInt(i.qty)||0),0);

  const saveEdit = async() => {
    if(editItems.some(i=>!i.product_name||!i.qty||!i.price)) return alert('Lengkapi semua item!');
    setSaving(true);
    try {
      // Update transaksi
      await sbUpdate('transactions', selected.id, {
        customer: editForm.customer,
        status: editForm.status,
        total: editTotal,
        paid: parseInt(editForm.paid)||editTotal,
        change: (parseInt(editForm.paid)||editTotal) - editTotal,
      });

      // Hapus items lama & insert baru
      // Supabase: delete where transaction_id
      const sb = window._sb || (window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
      await sb.from('transaction_items').delete().eq('transaction_id', selected.id);
      await sbInsert('transaction_items', editItems.map(i=>({
        transaction_id: selected.id,
        product_id: i.product_id||null,
        product_name: i.product_name,
        qty: parseInt(i.qty),
        price: parseInt(i.price),
        subtotal: parseInt(i.qty)*parseInt(i.price),
      })));

      // Refresh - update semua state dengan data terbaru
      const updatedTx = {
        ...selected,
        customer: editForm.customer,
        status:   editForm.status,
        total:    editTotal,
        paid:     parseInt(editForm.paid)||editTotal,
        change:   (parseInt(editForm.paid)||editTotal) - editTotal,
      };
      setSelected(updatedTx);
      setTxItems(editItems.map(i=>({
        ...i,
        qty:   parseInt(i.qty),
        price: parseInt(i.price),
        subtotal: parseInt(i.qty)*parseInt(i.price),
      })));
      setEditMode(false);
      setTrans(prev=>prev.map(t=>t.id===selected.id?updatedTx:t));
      // Tawarkan cetak ulang
      notifyDataChanged('transaction');
      if(window.confirm('✅ Transaksi berhasil diupdate!\n\nCetak ulang faktur terbaru?')) {
        setShowStruk(true);
      }
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const totalOmset = transactions.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0);
  const totalPiutang = transactions.filter(t=>t.status==='Piutang').reduce((s,t)=>s+t.total,0);

  return (
    <div style={{padding:16,maxWidth:1100,margin:'0 auto'}}>
      <div style={{fontWeight:800,fontSize:17,marginBottom:14}}>📋 Laporan Penjualan</div>

      {/* Filter */}
      <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr auto',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Dari Tanggal</label>
            <input type="date" value={filter.dari} onChange={e=>setFilter(f=>({...f,dari:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Sampai Tanggal</label>
            <input type="date" value={filter.sampai} onChange={e=>setFilter(f=>({...f,sampai:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Status</label>
            <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
              <option value="">Semua Status</option>
              <option value="Lunas">Lunas</option>
              <option value="Piutang">Piutang</option>
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Cari Invoice/Pelanggan</label>
            <input value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))}
              placeholder="INV-xxx atau nama..." onKeyDown={e=>e.key==='Enter'&&search()}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <button onClick={search} disabled={loading}
            style={{padding:'9px 20px',background:loading?MT:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14,whiteSpace:'nowrap'}}>
            {loading?'⏳':'🔍 Tampilkan'}
          </button>
        </div>

        {/* Quick filter buttons */}
        <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
          {[
            ['Hari Ini', ()=>{const t=new Date().toISOString().slice(0,10);setFilter(f=>({...f,dari:t,sampai:t}));}],
            ['Minggu Ini', ()=>{const t=new Date();const d=new Date(t);d.setDate(t.getDate()-t.getDay());setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:t.toISOString().slice(0,10)}));}],
            ['Bulan Ini', ()=>{const t=new Date();const d=new Date(t.getFullYear(),t.getMonth(),1);setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:t.toISOString().slice(0,10)}));}],
            ['Bulan Lalu', ()=>{const t=new Date();const d=new Date(t.getFullYear(),t.getMonth()-1,1);const e=new Date(t.getFullYear(),t.getMonth(),0);setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:e.toISOString().slice(0,10)}));}],
          ].map(([label,fn])=>(
            <button key={label} onClick={()=>{fn();setTimeout(search,100);}}
              style={{padding:'5px 12px',background:'#F5F6FA',border:'1px solid #eee',borderRadius:16,cursor:'pointer',fontSize:11,color:MT,fontWeight:500}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {transactions.length>0&&(
        <>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
            {[
              {label:'Total Transaksi',value:transactions.length+' tx',color:'#3498DB'},
              {label:'Total Omset',value:fmt(totalOmset),color:G},
              {label:'Total Piutang',value:fmt(totalPiutang),color:OR},
            ].map((s,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:10,padding:'10px 14px',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',borderLeft:`3px solid ${s.color}`}}>
                <div style={{fontSize:11,color:MT}}>{s.label}</div>
                <div style={{fontSize:16,fontWeight:800,color:s.color,marginTop:2}}>{s.value}</div>
              </div>
            ))}
          </div>

          {/* Mobile: jika ada selected → fullscreen detail */}
          {selected&&(
            <div style={{display:'block'}}>
              <style>{`@media(min-width:700px){.laporan-mobile-back{display:none!important}}`}</style>
              <button className="laporan-mobile-back" onClick={()=>setSelected(null)}
                style={{background:'none',border:'none',color:G,fontWeight:700,fontSize:14,cursor:'pointer',padding:'0 0 12px 0',display:'block'}}>
                ← Kembali ke Daftar
              </button>
            </div>
          )}

          {/* Layout 2 kolom: List kiri, Detail kanan */}
          <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>

            {/* List transaksi - hide on mobile when detail selected */}
            <div style={{flex:'0 0 340px',background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden',maxHeight:'70vh',display:'flex',flexDirection:'column'}}
              className={selected?'hide-on-mobile':''}>
              <div style={{padding:'10px 14px',borderBottom:'1px solid #eee',fontWeight:700,fontSize:13,color:MT,flexShrink:0}}>
                {transactions.length} Transaksi
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {transactions.map(tx=>(
                  <div key={tx.id} onClick={()=>openDetail(tx)}
                    style={{padding:'10px 14px',borderBottom:'1px solid #f5f5f5',cursor:'pointer',background:selected?.id===tx.id?GL:'#fff',borderLeft:selected?.id===tx.id?`3px solid ${G}`:'3px solid transparent'}}
                    onMouseEnter={e=>e.currentTarget.style.background=selected?.id===tx.id?GL:'#F5F6FA'}
                    onMouseLeave={e=>e.currentTarget.style.background=selected?.id===tx.id?GL:'#fff'}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:12,color:TX,fontFamily:'monospace'}}>{tx.invoice_no}</div>
                        <div style={{fontSize:11,color:MT,marginTop:1}}>{tx.customer||'Umum'}</div>
                        <div style={{fontSize:10,color:MT}}>{tx.created_at?.slice(0,10)} · {tx.created_at?.slice(11,16)}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(tx.total)}</div>
                        <div style={{fontSize:10,fontWeight:600,color:tx.status==='Lunas'?GD:OR,marginTop:2}}>{tx.status}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Detail transaksi */}
            {selected&&(
              <div style={{flex:1,background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden',minWidth:0}}>
                {loadingDetail ? <div style={{padding:20}}><Loading/></div> : (
                  <>
                    {/* Header detail */}
                    <div style={{padding:'12px 16px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F5F6FA'}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,fontFamily:'monospace'}}>{selected.invoice_no}</div>
                        <div style={{fontSize:11,color:MT,marginTop:2}}>{selected.created_at?.slice(0,10)} · {selected.customer||'Umum'}</div>
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        {!editMode&&!showReturForm&&(
                          <>
                            <button onClick={()=>{setEditMode(true);setShowReturForm(false);}}
                              style={{padding:'6px 12px',background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:8,cursor:'pointer',fontSize:12,color:'#1976D2',fontWeight:600}}>
                              ✏️ Edit
                            </button>
                            <button onClick={()=>{setShowReturForm(true);setEditMode(false);}}
                              style={{padding:'6px 12px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,cursor:'pointer',fontSize:12,color:RD,fontWeight:600}}>
                              🔄 Retur
                            </button>
                            <button onClick={()=>{setShowStruk(true);setEditMode(false);setShowReturForm(false);}}
                              style={{padding:'6px 12px',background:GL,border:`1px solid ${G}`,borderRadius:8,cursor:'pointer',fontSize:12,color:GD,fontWeight:600}}>
                              🖨️ Cetak Ulang
                            </button>
                          </>
                        )}
                        {editMode&&(
                          <>
                            <button onClick={saveEdit} disabled={saving}
                              style={{padding:'6px 14px',background:saving?MT:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:700}}>
                              {saving?'⏳':'💾 Simpan'}
                            </button>
                            <button onClick={()=>setEditMode(false)}
                              style={{padding:'6px 12px',background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontSize:12}}>
                              Batal
                            </button>
                          </>
                        )}
                        {showReturForm&&(
                          <button onClick={()=>setShowReturForm(false)}
                            style={{padding:'6px 12px',background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontSize:12}}>
                            ← Kembali
                          </button>
                        )}
                      </div>
                    </div>

                    <div style={{padding:16,maxHeight:'60vh',overflowY:'auto'}}>
                      {!editMode&&!showReturForm&&(
                        <>
                          {/* Info transaksi */}
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                            {[
                              {label:'Total',value:fmt(selected.total),color:G},
                              {label:'Status',value:selected.status,color:selected.status==='Lunas'?GD:OR},
                              {label:'Dibayar',value:fmt(selected.paid||0),color:TX},
                              {label:'Kembalian',value:fmt(selected.change||0),color:TX},
                            ].map((s,i)=>(
                              <div key={i} style={{background:'#F5F6FA',borderRadius:8,padding:'8px 12px'}}>
                                <div style={{fontSize:10,color:MT}}>{s.label}</div>
                                <div style={{fontWeight:700,color:s.color,fontSize:14}}>{s.value}</div>
                              </div>
                            ))}
                          </div>
                          {/* Items */}
                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                            <thead>
                              <tr style={{background:'#F5F6FA'}}>
                                <th style={{padding:'6px 8px',textAlign:'left',fontWeight:600,color:MT}}>Produk</th>
                                <th style={{padding:'6px 8px',textAlign:'center',fontWeight:600,color:MT}}>Qty</th>
                                <th style={{padding:'6px 8px',textAlign:'right',fontWeight:600,color:MT}}>Harga</th>
                                <th style={{padding:'6px 8px',textAlign:'right',fontWeight:600,color:MT}}>Subtotal</th>
                              </tr>
                            </thead>
                            <tbody>
                              {txItems.map((item,i)=>(
                                <tr key={i} style={{borderBottom:'1px solid #f5f5f5'}}>
                                  <td style={{padding:'6px 8px',fontWeight:500}}>{item.product_name}</td>
                                  <td style={{padding:'6px 8px',textAlign:'center'}}>{item.qty} pcs</td>
                                  <td style={{padding:'6px 8px',textAlign:'right'}}>{fmt(item.price)}</td>
                                  <td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:G}}>{fmt(item.price*item.qty)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </>
                      )}

                      {/* Edit Mode */}
                      {editMode&&(
                        <div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                            <div>
                              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Nama Pelanggan</label>
                              <input value={editForm.customer} onChange={e=>setEditForm(f=>({...f,customer:e.target.value}))}
                                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Status</label>
                              <select value={editForm.status} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))}
                                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                                <option value="Lunas">Lunas</option>
                                <option value="Piutang">Piutang</option>
                              </select>
                            </div>
                          </div>

                          {/* Edit items */}
                          <div style={{marginBottom:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                              <label style={{fontSize:11,color:MT,fontWeight:600}}>Item Transaksi</label>
                              <button onClick={addEditItem} style={{padding:'3px 10px',background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:'pointer',fontSize:11,color:GD,fontWeight:600}}>+ Item</button>
                            </div>
                            {editItems.map(item=>(
                              <div key={item.id} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:6,marginBottom:6}}>
                                <select value={item.product_id||''} onChange={e=>selectEditProduct(item.id,e.target.value)}
                                  style={{padding:'7px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:11,background:'#fff'}}>
                                  <option value="">{item.product_name||'-- Pilih Produk --'}</option>
                                  {products.slice(0,200).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                                </select>
                                <input value={item.qty} onChange={e=>updateEditItem(item.id,'qty',e.target.value)} type="number" min="1" placeholder="Qty"
                                  style={{padding:'7px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:11,boxSizing:'border-box'}}/>
                                <input value={item.price} onChange={e=>updateEditItem(item.id,'price',e.target.value)} type="number" placeholder="Harga"
                                  style={{padding:'7px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:11,boxSizing:'border-box'}}/>
                                <button onClick={()=>removeEditItem(item.id)}
                                  style={{padding:'6px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:7,cursor:'pointer',color:RD,fontSize:11}}>🗑️</button>
                              </div>
                            ))}
                          </div>

                          <div style={{background:GL,borderRadius:8,padding:'8px 12px',display:'flex',justifyContent:'space-between'}}>
                            <span style={{fontWeight:700}}>Total Baru</span>
                            <span style={{fontWeight:800,color:GD,fontSize:15}}>{fmt(editTotal)}</span>
                          </div>
                        </div>
                      )}

                      {/* Retur Form */}
                      {showReturForm&&(
                        <ReturInlineForm transaction={selected} txItems={txItems} onDone={()=>setShowReturForm(false)}/>
                      )}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        </>
      )}

      {transactions.length===0&&!loading&&(
        <div style={{textAlign:'center',padding:'40px 0',color:MT,background:'#fff',borderRadius:12}}>
          <div style={{fontSize:40,marginBottom:8}}>📋</div>
          <div style={{fontWeight:600,marginBottom:4}}>Pilih periode dan klik Tampilkan</div>
          <div style={{fontSize:12}}>Data transaksi akan muncul di sini</div>
        </div>
      )}

      {/* Struk cetak ulang */}
      {showStruk&&selected&&(
        <StrukSukses
          cart={txItems.map(i=>({...i,name:i.product_name,unit:i.unit||'pcs',cartKey:i.id}))}
          total={selected.total}
          paidNum={selected.paid||selected.total}
          invoice={selected.invoice_no}
          customer={selected.customer}
          metodeBayar={selected.metode_bayar||'Tunai'}
          status={selected.status}
          kasirName={selected.dilayani_oleh||selected.kasir||'Admin'}
          txId={selected.id}
          onNew={()=>setShowStruk(false)}
        />
      )}
    </div>
  );
}

// ── RETUR INLINE (di dalam detail transaksi) ───────────────────────────────
function ReturInlineForm({transaction, txItems, onDone}) {
  const [selectedItems, setSelectedItems] = useState(()=>{
    const init = {};
    txItems.forEach(i=>{ init[i.id]={checked:false,qty:i.qty,price:i.price}; });
    return init;
  });
  const [reason, setReason]   = useState('');
  const [action, setAction]   = useState('refund');
  const [saving, setSaving]   = useState(false);
  const [done, setDone]       = useState(false);
  const [returnNo, setReturnNo] = useState('');

  const toggle = (id) => setSelectedItems(p=>({...p,[id]:{...p[id],checked:!p[id].checked}}));
  const updateQty = (id,v) => setSelectedItems(p=>({...p,[id]:{...p[id],qty:Math.max(1,parseInt(v)||1)}}));
  const total = txItems.filter(i=>selectedItems[i.id]?.checked).reduce((s,i)=>s+(selectedItems[i.id]?.price||i.price)*(selectedItems[i.id]?.qty||i.qty),0);

  const save = async() => {
    const items = txItems.filter(i=>selectedItems[i.id]?.checked);
    if(!items.length) return alert('Pilih minimal 1 barang!');
    if(!reason) return alert('Pilih alasan retur!');
    setSaving(true);
    try {
      const now = new Date();
      const no = `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
      const ret = await sbInsert('returns',[{
        return_no:no, type:'dari_pelanggan',
        transaction_id:transaction.id,
        customer:transaction.customer||'Umum',
        reason, action, total, status:'Selesai',
        notes:`Retur dari ${transaction.invoice_no}`,
      }]);
      const retId = ret[0]?.id;
      if(retId) {
        await sbInsert('return_items', items.map(i=>({
          return_id:retId, product_id:i.product_id||null,
          product_name:i.product_name,
          qty:selectedItems[i.id]?.qty||i.qty,
          price:selectedItems[i.id]?.price||i.price,
          reason,
        })));
        for(const item of items){
          if(item.product_id){
            await sbInsert('stock_logs',[{
              product_id:item.product_id, type:'masuk',
              qty:selectedItems[item.id]?.qty||item.qty,
              notes:`Retur dari ${transaction.invoice_no}`,
            }]);
          }
        }
      }
      setReturnNo(no); setDone(true);
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  if(done) return (
    <div style={{textAlign:'center',padding:'24px 0'}}>
      <div style={{fontSize:40,marginBottom:8}}>✅</div>
      <div style={{fontWeight:700,color:GD,fontSize:16}}>Retur Berhasil!</div>
      <div style={{fontSize:12,color:MT,marginTop:4}}>No. Retur: <b>{returnNo}</b></div>
      <div style={{fontSize:11,color:MT,marginTop:2}}>Total: {fmt(total)} · {action==='refund'?'💵 Refund':'🔄 Tukar Barang'}</div>
      <button onClick={onDone} style={{marginTop:14,padding:'9px 24px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Selesai</button>
    </div>
  );

  return (
    <div>
      <div style={{fontWeight:700,fontSize:14,color:RD,marginBottom:12}}>🔄 Form Retur</div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:6}}>Pilih barang yang diretur:</div>
        {txItems.map(item=>(
          <div key={item.id} onClick={()=>toggle(item.id)}
            style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,marginBottom:4,background:selectedItems[item.id]?.checked?'#FFF0F0':'#F5F6FA',border:`1px solid ${selectedItems[item.id]?.checked?RD:'#eee'}`,cursor:'pointer'}}>
            <input type="checkbox" checked={selectedItems[item.id]?.checked||false} onChange={()=>toggle(item.id)} style={{width:16,height:16,accentColor:RD}} onClick={e=>e.stopPropagation()}/>
            <div style={{flex:1,fontSize:12,fontWeight:500}}>{item.product_name}</div>
            <div style={{fontSize:11,color:MT}}>{item.qty}x {fmt(item.price)}</div>
            {selectedItems[item.id]?.checked&&(
              <input type="number" min="1" max={item.qty} value={selectedItems[item.id]?.qty}
                onChange={e=>{ e.stopPropagation(); updateQty(item.id,e.target.value); }}
                onClick={e=>e.stopPropagation()}
                style={{width:50,padding:'3px 6px',border:`1px solid ${RD}`,borderRadius:6,fontSize:12,textAlign:'center'}}/>
            )}

        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Alasan *</label>
          <select value={reason} onChange={e=>setReason(e.target.value)}
            style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
            <option value="">-- Pilih --</option>
