function ProductSearchInput({products, value, onSelect, placeholder='Cari nama produk...'}) {
  const [q, setQ]           = React.useState('');
  const [open, setOpen]     = React.useState(false);
  const [focused, setFocus] = React.useState(false);
  const ref = React.useRef(null);

  // Tampilkan nama produk terpilih di input
  const chosen = value ? products.find(p=>p.id===parseInt(value)||p.id===value) : null;

  React.useEffect(()=>{
    if(!focused) setQ(chosen?chosen.name:'');
  },[value, focused, chosen]);

  // Klik luar → tutup
  React.useEffect(()=>{
    const h = e=>{ if(ref.current&&!ref.current.contains(e.target)){ setOpen(false); setFocus(false); } };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);

  const results = React.useMemo(()=>{
    if(!q.trim()) return products.slice(0,40);
    return products.filter(p=>smartMatch(q,p.name,p.category||''))
      .sort((a,b)=>smartScore(q,b.name)-smartScore(q,a.name)).slice(0,40);
  },[q,products]);

  return (
    <div ref={ref} style={{position:'relative',flex:1}}>
      <input value={q} placeholder={placeholder}
        onChange={e=>{ setQ(e.target.value); setOpen(true); }}
        onFocus={()=>{ setFocus(true); setQ(''); setOpen(true); }}
        style={{width:'100%',padding:'8px 10px',border:'1.5px solid #ddd',borderRadius:8,fontSize:12,boxSizing:'border-box',background:'#fff'}}/>
      {open&&(
        <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid #ddd',borderRadius:8,boxShadow:'0 4px 16px rgba(0,0,0,0.13)',zIndex:900,maxHeight:220,overflowY:'auto',marginTop:2}}>
          {results.length===0
            ? <div style={{padding:'10px 12px',color:MT,fontSize:12}}>Tidak ada hasil</div>
            : results.map(p=>(
              <div key={p.id} onMouseDown={()=>{ onSelect(p); setQ(p.name); setOpen(false); setFocus(false); }}
                style={{padding:'8px 12px',cursor:'pointer',fontSize:12,borderBottom:'1px solid #f5f5f5',background:value===p.id||value===String(p.id)?GL:'#fff'}}>
                <div style={{fontWeight:600}}>{p.name}</div>
                <div style={{fontSize:10,color:MT}}>Stok: {p.stock||0} · {p.category||'Umum'}</div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ── Helper: pembatasan 2 perangkat per akun ─────────────────────────────────
const MAX_DEVICES = 2;
function getDeviceId() {
  let id = localStorage.getItem('mykasir_device_id');
  if(!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : 'dev-'+Date.now()+'-'+Math.random().toString(36).slice(2));
    localStorage.setItem('mykasir_device_id', id);
  }
  return id;
}
function getDeviceName() {
  const ua = navigator.userAgent;
  const os = /Android/i.test(ua)?'Android':/iPhone|iPad/i.test(ua)?'iPhone/iPad':/Windows/i.test(ua)?'Windows':/Mac/i.test(ua)?'Mac':'Perangkat';
  const br = /Edg\//i.test(ua)?'Edge':/Chrome/i.test(ua)?'Chrome':/Firefox/i.test(ua)?'Firefox':/Safari/i.test(ua)?'Safari':'Browser';
  return os+' · '+br;
}
// Daftarkan perangkat ini untuk email tsb. Return: {ok, devices}
async function registerDevice(email) {
  const devId = getDeviceId();
  try {
    const rows = await sbGet('user_devices',{eq:{email}});
    const mine = (rows||[]).find(d=>d.device_id===devId);
    if(mine) {
      await sbUpdate('user_devices', mine.id, {last_seen:new Date().toISOString(), device_name:getDeviceName()}).catch(()=>{});
      return {ok:true};
    }
    if((rows||[]).length >= MAX_DEVICES) return {ok:false, devices:rows};
    await sbInsert('user_devices',[{email, device_id:devId, device_name:getDeviceName()}]);
    return {ok:true};
  } catch(e) {
    // Tabel belum ada → jangan mengunci siapa pun, cukup peringatan di console
    console.warn('user_devices belum ada — batas perangkat tidak aktif. Jalankan SQL migrasi.', e.message);
    return {ok:true};
  }
}
// Lepaskan slot perangkat ini saat logout
async function releaseDevice(email) {
  if(!email) return;
  try {
    const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
    await sbc.from('user_devices').delete().eq('email', email).eq('device_id', getDeviceId());
  } catch(e){}
}

// ── PRINTER THERMAL BLUETOOTH (ESC/POS via Web Bluetooth) ───────────────────
// Auto-deteksi: mencoba beberapa service/characteristic UUID yang umum dipakai
// printer thermal 58mm/80mm bluetooth (Goojprt, Xprinter, iPrt, dan sejenisnya),
// lalu mencari characteristic yang bisa ditulis (write / writeWithoutResponse).
const BT_COMMON_SERVICES = [
  '000018f0-0000-1000-8000-00805f9b34fb', // paling umum dipakai printer klon 58mm
  '0000ff00-0000-1000-8000-00805f9b34fb', // varian lain yang sering dipakai
  '49535343-fe7d-4ae5-8fa9-9fafd205e455', // varian modul serial BLE (mis. beberapa Xprinter)
  '0000ffe0-0000-1000-8000-00805f9b34fb', // modul BLE-serial gaya HM-10, banyak dipakai printer generic tanpa merk
  '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // Nordic UART Service, dipakai sebagian printer clone berbasis nRF/ESP32
];
window.BTPrinter = {
  device: null, char: null,

  isSupported() { return !!navigator.bluetooth; },

  async connect() {
    if(!navigator.bluetooth) throw new Error('Browser ini tidak mendukung Bluetooth (pakai Chrome di Android/Desktop).');
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: BT_COMMON_SERVICES,
    });
    const server = await device.gatt.connect();
    let foundChar = null;
    let foundServiceCount = 0;
    // Coba service yang dikenal dulu
    for(const svcId of BT_COMMON_SERVICES) {
      try {
        const svc = await server.getPrimaryService(svcId);
        foundServiceCount++;
        const chars = await svc.getCharacteristics();
        console.log('[BTPrinter] service ditemukan:', svcId, 'karakteristik:', chars.map(c=>c.uuid+' (write='+!!c.properties.write+', writeNoResp='+!!c.properties.writeWithoutResponse+')'));
        foundChar = chars.find(c=>c.properties.write||c.properties.writeWithoutResponse) || foundChar;
        if(foundChar) break;
      } catch(e){ /* service ini tidak ada di printer ini, coba berikutnya */ }
    }
    // Fallback: telusuri SEMUA service yang di-expose dari daftar yang diizinkan
    if(!foundChar) {
      try {
        const services = await server.getPrimaryServices();
        for(const svc of services) {
          const chars = await svc.getCharacteristics();
          const w = chars.find(c=>c.properties.write||c.properties.writeWithoutResponse);
          if(w){ foundChar = w; break; }
        }
      } catch(e){}
    }
    if(!foundChar) {
      device.gatt.disconnect();
      throw new Error(
        foundServiceCount===0
          ? 'Printer ini tidak mengekspos jalur BLE yang dikenal (dicoba 5 protokol umum). Kemungkinan besar printer ini hanya mendukung Bluetooth Classic (SPP) — Chrome TIDAK BISA cetak langsung ke printer jenis ini sama sekali (batasan browser, bukan bug app). Gunakan tombol "Cetak Thermal" (dialog print biasa) setelah pairing printer di Pengaturan Bluetooth HP/laptop.\n\nUntuk pastikan: buka tab baru → ketik chrome://bluetooth-internals/#devices → cari printer ini → lihat daftar GATT Service UUID-nya. Kalau ada, kirim ke Claude biar bisa ditambahkan persis.'
          : 'Printer terhubung dan ada service yang dikenal, tapi tidak ada jalur tulis (write) di dalamnya. Buka Console browser (F12) untuk detail characteristic yang terdeteksi, atau cek chrome://bluetooth-internals/#devices untuk UUID service lengkapnya, lalu laporkan ke Claude.'
      );
    }
    this.device = device;
    this.char = foundChar;
    localStorage.setItem('mykasir_printer_name', device.name||'Printer Bluetooth');
    device.addEventListener('gattserverdisconnected', ()=>{ this.char=null; });
    return device.name||'Printer';
  },

  async ensureConnected() {
    if(this.char && this.device?.gatt?.connected) return true;
    await this.connect();
    return true;
  },

  async writeRaw(bytes) {
    // Kirim per-potong (banyak printer BLE murah punya batas ~150-180 byte per write)
    const CHUNK = 150;
    for(let i=0;i<bytes.length;i+=CHUNK) {
      const chunk = bytes.slice(i,i+CHUNK);
      if(this.char.properties.writeWithoutResponse) await this.char.writeValueWithoutResponse(chunk);
      else await this.char.writeValue(chunk);
      await new Promise(r=>setTimeout(r,20));
    }
  },

  async printText(text) {
    await this.ensureConnected();
    const enc = new TextEncoder();
    const init = new Uint8Array([0x1B,0x40]); // ESC @  → reset printer
    const cut  = new Uint8Array([0x1D,0x56,0x00]); // GS V 0 → potong kertas (full cut)
    const feed = new Uint8Array([0x1B,0x64,0x03]); // feed 3 baris sebelum potong
    const body = enc.encode(text);
    const payload = new Uint8Array(init.length+body.length+feed.length+cut.length);
    payload.set(init,0);
    payload.set(body,init.length);
    payload.set(feed,init.length+body.length);
    payload.set(cut,init.length+body.length+feed.length);
    await this.writeRaw(payload);
  },

  disconnect() {
    try{ this.device?.gatt?.disconnect(); }catch(e){}
    this.device=null; this.char=null;
  },

  isConnected() { return !!(this.char && this.device?.gatt?.connected); },
  savedName() { return localStorage.getItem('mykasir_printer_name')||null; },
};

// ── ESC/POS text builder: struk 58mm (32 kolom) dari data transaksi kasir ───
function buildStrukEscPos({toko, alamat, telp, invoice, tgl, jam, customer, kasir, items, total, diskon, pajak, paid, change, status, dueDate, catatan, kodeUnik}) {
  const W = 32; // lebar karakter untuk kertas 58mm font normal
  const line = ch=>ch.repeat(W)+'\n';
  const center = s => { s=String(s); const pad=Math.max(0,Math.floor((W-s.length)/2)); return ' '.repeat(pad)+s+'\n'; };
  const two = (l,r) => { l=String(l); r=String(r); const sp=Math.max(1,W-l.length-r.length); return l+' '.repeat(sp)+r+'\n'; };
  const wrap = (s,w) => { const out=[]; s=String(s); while(s.length>w){ out.push(s.slice(0,w)); s=s.slice(w);} out.push(s); return out; };

  let t = '';
  t += center(toko.toUpperCase());
  if(alamat) wrap(alamat,W).forEach(l=>t+=center(l));
  if(telp)   t += center('Telp: '+telp);
  t += line('=');
  t += `${invoice}\n`;
  t += two(tgl, jam);
  t += `Kasir: ${kasir||'-'}\n`;
  t += `Plgn : ${customer||'Umum'}\n`;
  t += line('-');
  items.forEach(it=>{
    wrap(it.name,W).forEach(l=>t+=l+'\n');
    t += two(`${it.qty} ${it.unit||'pcs'} x ${fmt(it.price).replace('Rp ','')}`, fmt(it.qty*it.price).replace('Rp ',''));
  });
  t += line('-');
  t += two('Subtotal', fmt(items.reduce((s,i)=>s+i.qty*i.price,0)));
  if(diskon>0) t += two('Diskon', '-'+fmt(diskon));
  if(pajak>0)  t += two('Pajak', fmt(pajak));
  t += two('TOTAL', fmt(total));
  t += two('Bayar', fmt(paid));
  if(status==='Piutang') {
    t += two('Sisa', fmt(total-paid));
    if(dueDate) t += `Jatuh tempo: ${dueDate}\n`;
  } else {
    t += two('Kembali', fmt(Math.max(0,change)));
  }
  t += line('=');
  if(catatan) { wrap(catatan,W).forEach(l=>t+=l+'\n'); t+=line('-'); }
  t += center('Terima kasih!');
  if(kodeUnik) t += center(kodeUnik);
  t += '\n\n\n';
  return t;
}

// ── Helper: pencarian pintar (multi-kata AND, abaikan simbol, toleran typo) ─
// "kawat petak 1x1" cocok dengan 'KAWAT PETAK 1"X1"90CM'; "kabel" tetap ketemu walau diketik "kabel"/"kable"
// ── Helper: qty desimal — toleran koma (2,5) maupun titik (2.5) ────────────
function parseQty(v) {
  if(typeof v === 'number') return v;
  const n = parseFloat(String(v??'').replace(',','.'));
  return isNaN(n) ? 0 : n;
}

// ── Helper: diskon berjenjang, mis. "5+5" (bertingkat, bukan 10% flat) ──────
// "10" → diskon flat 10%. "5+5" → potong 5%, lalu potong 5% lagi dari sisa.
function parseTieredDiskon(str) {
  return String(str??'0').split('+').map(s=>parseFloat(String(s).trim())||0);
}
function applyTieredDiskon(raw, str) {
  const tiers = parseTieredDiskon(str);
  let sisa = raw;
  tiers.forEach(t => { sisa = sisa * (1 - t/100); });
  return raw - sisa; // nominal diskon
}
function effectiveDiskonPct(str) {
  const tiers = parseTieredDiskon(str);
  if(tiers.length<=1) return null; // bukan berjenjang, tak perlu tampilkan keterangan
  let sisa = 100;
  tiers.forEach(t => { sisa = sisa*(1-t/100); });
  return 100-sisa;
}

function lev1(a,b){ // beda maksimal 1 huruf (insert/delete/ganti)
  if(a===b) return true;
  const la=a.length, lb=b.length;
  if(Math.abs(la-lb)>1) return false;
  let i=0,j=0,diff=0;
  while(i<la&&j<lb){
    if(a[i]===b[j]){i++;j++;continue;}
    if(++diff>1) return false;
    if(la>lb) i++; else if(lb>la) j++; else {i++;j++;}
  }
  return diff+(la-i)+(lb-j)<=1;
}
function smartMatch(query, ...fields) {
  const q = (query||'').toLowerCase().trim();
  if(!q) return true;
  const haySpaced = fields.join(' ').toLowerCase().replace(/[^a-z0-9]+/g,' ');
  const haySquash = fields.join(' ').toLowerCase().replace(/[^a-z0-9]+/g,'');
  const words = haySpaced.split(' ').filter(Boolean);
  return q.replace(/[^a-z0-9]+/g,' ').split(' ').filter(Boolean)
    .every(t =>
      haySpaced.includes(t) || haySquash.includes(t) ||
      (t.length>=5 && words.some(w => lev1(t,w) || (w.length>t.length && lev1(t, w.slice(0,t.length)))))
    );
}
// Skor relevansi untuk mengurutkan hasil pencarian
function smartScore(query, name) {
  const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  const q = norm(query); if(!q) return 0;
  const n = norm(name);
  if(n===q) return 1000;
  let s = 0;
  if(n.startsWith(q)) s += 500;
  const nw = n.split(' ');
  q.split(' ').forEach(t=>{
    if(nw.includes(t)) s += 60;               // kata persis
    else if(nw.some(w=>w.startsWith(t))) s += 40; // awalan kata
    else if(n.includes(t)) s += 20;            // substring
    else s += 5;                               // cocok via squash/typo
  });
  return s;
}

// ── Helper: catat arus kas ke tabel payments (basis tanggal uang berpindah) ─
// ── Helper: shift kasir aktif di perangkat ini (localStorage) ───────────────
function getActiveShift() {
  try { return JSON.parse(localStorage.getItem('mykasir_active_shift')||'null'); }
  catch(e){ return null; }
}
function setActiveShift(shift) {
  if(shift) localStorage.setItem('mykasir_active_shift', JSON.stringify(shift));
  else localStorage.removeItem('mykasir_active_shift');
}

async function catatPembayaran({transaction_id=null, type='masuk', amount=0, method=null, note=''}) {
  if(!amount||amount<=0) return;
  const shift = getActiveShift();
  try {
    await sbInsert('payments',[{transaction_id, type, amount, method, note, shift_id: shift?.id||null}]);
  } catch(e){
    // Kolom shift_id mungkin belum ada di database (migrasi belum dijalankan) —
    // JANGAN sampai catatan kas hilang total karenanya. Coba lagi tanpa shift_id.
    try {
      await sbInsert('payments',[{transaction_id, type, amount, method, note}]);
      console.warn('[catatPembayaran] Kolom shift_id belum ada di tabel payments — tercatat tanpa atribusi shift. Jalankan: alter table payments add column if not exists shift_id bigint references shifts(id);');
    } catch(e2){
      console.error('[catatPembayaran] GAGAL TOTAL mencatat kas — cek tabel payments!', e2.message);
    }
  }
}

// ── Helper: kembalikan stok (retur pelanggan / hapus / revisi transaksi) ────
async function stokMasuk(productId, qty, note) {
  if(!productId||!qty) return;
  try {
    const prods = await sbGet('products',{eq:{id:productId}});
    const prod = prods?.[0]; if(!prod||prod.pakai_stok===false) return;
    await sbUpdate('products', productId, {stock:(prod.stock||0)+qty});
    // Un-consume batch FIFO: isi kembali batch terbaru yang sudah terpakai
    let left = qty;
    const batches = (await sbGet('stock_batches',{eq:{product_id:productId},order:'tanggal_masuk',asc:false}).catch(()=>[]))||[];
    for(const b of batches){
      if(left<=0) break;
      const ruang = (b.qty_awal||0)-(b.qty_sisa||0);
      if(ruang<=0) continue;
      const add = Math.min(ruang,left);
      await sbUpdate('stock_batches',b.id,{qty_sisa:(b.qty_sisa||0)+add}).catch(()=>{});
      left -= add;
    }
    await sbInsert('stock_logs',[{product_id:productId,type:'masuk',qty,notes:note}]).catch(()=>{});
  } catch(e){ console.warn('stokMasuk gagal:',e.message); }
}

// ── Helper: keluarkan stok FIFO (tambahan item saat revisi transaksi) ───────
async function stokKeluar(productId, qty, note) {
  if(!productId||!qty) return;
  try {
    const prods = await sbGet('products',{eq:{id:productId}});
    const prod = prods?.[0]; if(!prod||prod.pakai_stok===false) return;
    await sbUpdate('products', productId, {stock:Math.max(0,(prod.stock||0)-qty)});
    let left = qty;
    const batches = ((await sbGet('stock_batches',{eq:{product_id:productId},order:'tanggal_masuk',asc:true}).catch(()=>[]))||[]).filter(b=>b.qty_sisa>0);
    for(const b of batches){
      if(left<=0) break;
      const ambil = Math.min(b.qty_sisa,left);
      await sbUpdate('stock_batches',b.id,{qty_sisa:b.qty_sisa-ambil}).catch(()=>{});
      left -= ambil;
    }
    await sbInsert('stock_logs',[{product_id:productId,type:'keluar',qty,notes:note}]).catch(()=>{});
  } catch(e){ console.warn('stokKeluar gagal:',e.message); }
}

// ── Helper: sesuaikan stok akibat revisi/retur PO ───────────────────────────
// deltaItems: [{product_id, name, satuan, delta}] — delta dalam satuan PO (bisa minus)
async function adjustStockPO(deltaItems, poId, note) {
  let allProds = null;
  for(const d of (deltaItems||[])) {
    if(!d.delta) continue;
    let prod = null;
    if(d.product_id) {
      const r = await sbGet('products',{eq:{id:d.product_id}}).catch(()=>[]);
      prod = r?.[0]||null;
    }
    if(!prod && d.name) {
      if(!allProds) allProds = await sbGetAll('products',{order:'name'}).catch(()=>[]);
      const q = (d.name||'').toLowerCase().trim();
      prod = allProds.find(p=>p.name.toLowerCase()===q)
          || allProds.find(p=>p.name.toLowerCase().includes(q)||q.includes(p.name.toLowerCase()));
    }
    if(!prod||prod.pakai_stok===false) continue;
    // Konversi unit besar → unit kecil (sama seperti saat terima PO)
    const itemUnit  = (d.satuan||'').toLowerCase();
    const unitBesar = (prod.unit_besar||'').toLowerCase();
    const isBesar   = unitBesar&&unitBesar!=='pcs'&&itemUnit&&(itemUnit===unitBesar||itemUnit.includes(unitBesar)||unitBesar.includes(itemUnit));
    const konv      = isBesar?(prod.konversi||1):1;
    const qtyDelta  = d.delta*konv;
    await sbUpdate('products', prod.id, {stock: Math.max(0,(prod.stock||0)+qtyDelta)}).catch(()=>{});
    // Sesuaikan batch FIFO milik PO ini
    const batches = await sbGet('stock_batches',{eq:{product_id:prod.id,po_id:poId}}).catch(()=>[]);
    if(batches?.length){
      const b = batches[0];
      await sbUpdate('stock_batches', b.id, {
        qty_awal: Math.max(0,(b.qty_awal||0)+qtyDelta),
        qty_sisa: Math.max(0,(b.qty_sisa||0)+qtyDelta),
      }).catch(()=>{});
    }
    await sbInsert('stock_logs',[{
      product_id: prod.id,
      type: qtyDelta>0?'masuk':'keluar',
      qty: Math.abs(qtyDelta),
      notes: note,
    }]).catch(()=>{});
  }
}

// ── Helper: simpan riwayat revisi PO (kolom jsonb `revisions`) ──────────────
// Return array revisi terbaru, atau null kalau kolom belum ada di database
async function appendPORevision(po, entry, extraFields={}) {
  const revs = Array.isArray(po.revisions)?[...po.revisions,entry]:[entry];
  try {
    await sbUpdate('purchase_orders', po.id, {...extraFields, revisions: revs});
    return revs;
  } catch(e) {
    // Kolom revisions belum ada → simpan field lain saja, riwayat di-skip
    await sbUpdate('purchase_orders', po.id, extraFields).catch(()=>{});
    console.warn('Kolom revisions belum ada. Jalankan SQL: alter table purchase_orders add column revisions jsonb default \'[]\';');
    return null;
  }
}

// ── FORM RETUR PO KE SUPPLIER ────────────────────────────────────────────────
function ReturPOForm({po, onDone, onCancel}) {
  const items = po.items||[];
  const [sel, setSel] = React.useState(()=>{const o={};items.forEach((it,i)=>{o[i]={checked:false,qty:it.qty};});return o;});
  const [reason, setReason] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  const returQtyOf = (i,it) => sel[i]?.checked?Math.min(Math.max(parseInt(sel[i].qty)||0,0),it.qty):0;
  const totalRetur = items.reduce((s,it,i)=>s+returQtyOf(i,it)*(it.price||0),0);

  const save = async() => {
    const returItems = items.map((it,i)=>({name:it.name,qty:returQtyOf(i,it),price:it.price||0,satuan:it.satuan,product_id:it.product_id})).filter(it=>it.qty>0);
    if(!returItems.length) return alert('Pilih minimal 1 barang yang diretur!');
    if(!reason.trim()) return alert('Isi alasan retur!');
    if(!confirm(`Retur ${returItems.length} barang senilai ${fmt(totalRetur)} ke ${po.supplier}?\n\nTotal PO, keuangan, dan stok akan disesuaikan otomatis.`)) return;
    setSaving(true);
    try {
      // 1. Susun item baru setelah retur
      const newItems = items.map((it,i)=>({...it, qty: it.qty - returQtyOf(i,it)})).filter(it=>it.qty>0);
      const newTotal = newItems.reduce((s,i2)=>s+(i2.qty*(i2.price||0)),0);

      // 2. Ganti po_items di database
      const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      await sbc.from('po_items').delete().eq('po_id', po.id);
      if(newItems.length) await sbInsert('po_items', newItems.map(i2=>({
        po_id: po.id, name: i2.name, qty: parseInt(i2.qty)||0, price: parseInt(i2.price)||0,
        subtotal: (parseInt(i2.qty)||0)*(parseInt(i2.price)||0),
        product_id: i2.product_id||null, satuan: i2.satuan||'pcs',
      })));

      // 3. Update total PO + simpan riwayat revisi
      const entry = {
        tanggal: new Date().toISOString(),
        tipe: 'retur',
        catatan: reason,
        totalLama: po.total||0,
        totalBaru: newTotal,
        totalRetur,
        itemsLama: items.map(i2=>({name:i2.name,qty:i2.qty,price:i2.price||0,satuan:i2.satuan||'pcs'})),
        itemsBaru: newItems.map(i2=>({name:i2.name,qty:i2.qty,price:i2.price||0,satuan:i2.satuan||'pcs'})),
        itemsRetur: returItems.map(i2=>({name:i2.name,qty:i2.qty,price:i2.price,satuan:i2.satuan||'pcs'})),
      };
      const revs = await appendPORevision(po, entry, {total:newTotal});

      // 4. Stok berkurang (hanya jika barang sudah diterima / stok sudah masuk)
      if(po.status==='Diterima') {
        await adjustStockPO(
          returItems.map(it=>({product_id:it.product_id,name:it.name,satuan:it.satuan,delta:-it.qty})),
          po.id, `Retur PO-${po.id} ke ${po.supplier}: ${reason}`
        );
      }

      notifyDataChanged('pembelian');
      const infoKeuangan = po.bayar==='Hutang'
        ? `Hutang ke ${po.supplier} otomatis berkurang ${fmt(totalRetur)}.`
        : `⚠️ PO sudah LUNAS — minta refund / potongan nota ${fmt(totalRetur)} ke supplier.`;
      alert(`✅ Retur berhasil dicatat!\n\nTotal PO: ${fmt(po.total||0)} → ${fmt(newTotal)}\n${infoKeuangan}${po.status==='Diterima'?'\nStok sudah disesuaikan otomatis.':''}${revs===null?'\n\n⚠️ Riwayat revisi tidak tersimpan (kolom belum ada). Jalankan SQL migrasi.':''}`);
      onDone({total:newTotal, items:newItems, revisions:revs!==null?revs:po.revisions});
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',marginBottom:14,border:`1.5px solid ${RD}`}}>
      <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:RD}}>↩️ Retur ke Supplier</div>
      <div style={{fontSize:12,color:MT,marginBottom:12}}>Pilih barang yang dikembalikan ke {po.supplier}</div>
      {items.map((it,i)=>(
        <div key={i} style={{background:sel[i]?.checked?'#FFF0F0':'#F5F6FA',borderRadius:10,padding:'10px 12px',marginBottom:8,border:`1.5px solid ${sel[i]?.checked?RD:'#eee'}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="checkbox" checked={sel[i]?.checked||false}
              onChange={()=>setSel(p=>({...p,[i]:{...p[i],checked:!p[i]?.checked}}))}
              style={{width:17,height:17,cursor:'pointer',accentColor:RD}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{it.name}</div>
              <div style={{fontSize:11,color:MT}}>Dibeli: {it.qty} {it.satuan||'pcs'} × {fmt(it.price)}</div>
            </div>
            {sel[i]?.checked&&(
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:11,color:MT}}>Qty retur:</span>
                <input type="number" min={1} max={it.qty} value={sel[i].qty}
                  onChange={e=>setSel(p=>({...p,[i]:{...p[i],qty:e.target.value}}))}
                  style={{width:60,padding:'6px 8px',border:`1.5px solid ${RD}`,borderRadius:8,fontSize:13,fontWeight:700,textAlign:'center'}}/>
              </div>
            )}
          </div>
        </div>
      ))}
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Alasan retur *</label>
        <input value={reason} onChange={e=>setReason(e.target.value)}
          placeholder="Barang rusak / tidak sesuai pesanan / dll"
          style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
      </div>
      {totalRetur>0&&(
        <div style={{background:'#FFF0F0',borderRadius:8,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
          <span style={{fontWeight:700,fontSize:13,color:RD}}>Total Retur</span>
          <span style={{fontWeight:800,fontSize:15,color:RD}}>{fmt(totalRetur)}</span>
        </div>
      )}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onCancel} disabled={saving}
          style={{flex:1,padding:12,background:'#eee',border:'none',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>Batal</button>
        <button onClick={save} disabled={saving||!totalRetur}
          style={{flex:2,padding:12,background:saving||!totalRetur?MT:RD,color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:14,cursor:'pointer'}}>
          {saving?'⏳ Menyimpan...':'↩️ Proses Retur'}
        </button>
      </div>
    </div>
  );
}

// ── RIWAYAT REVISI PO ────────────────────────────────────────────────────────
function RiwayatRevisiPO({po}) {
  const revs = Array.isArray(po.revisions)?po.revisions:[];
  if(!revs.length) return null;
  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10}}>📜 Riwayat Revisi ({revs.length})</div>
      {revs.map((r,i)=>{
        const isRetur = r.tipe==='retur';
        const selisih = (r.totalBaru||0)-(r.totalLama||0);
        return (
          <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:'10px 12px',marginBottom:8,borderLeft:`3px solid ${isRetur?RD:OR}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <div>
                <span style={{fontWeight:700,fontSize:12,color:isRetur?RD:OR}}>{isRetur?'↩️ Retur':'✏️ Edit'} #{i+1}</span>
                <span style={{fontSize:11,color:MT,marginLeft:8}}>{r.tanggal?new Date(r.tanggal).toLocaleString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</span>
              </div>
              <button onClick={()=>printRevisiPO(po,r)}
                style={{padding:'4px 12px',background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:6,cursor:'pointer',fontSize:11,color:'#1976D2',fontWeight:700}}>
                🖨️ Invoice
              </button>
            </div>
            <div style={{fontSize:12}}>
              {fmt(r.totalLama)} → <b style={{color:selisih>0?OR:GD}}>{fmt(r.totalBaru)}</b>
              <span style={{color:selisih>0?OR:GD,fontWeight:700,marginLeft:6}}>({selisih>0?'+':''}{fmt(selisih).replace('Rp ','Rp ')})</span>
            </div>
            {r.catatan&&<div style={{fontSize:11,color:MT,marginTop:2}}>📝 {r.catatan}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── VIEW EDIT PO (komponen terpisah agar hooks React legal) ─────────────────
function EditPOView({po, onCancel, onSaved}) {
    const [editForm, setEditForm] = React.useState({
      supplier:    po.supplier||'',
      bayar:       po.bayar||'Lunas',
      due_date:    po.due_date||'',
      notes:       po.notes||'',
      status:      po.status||'Proses',
    });
    const [items, setItems] = React.useState(
      (po.items||[]).map(i=>({...i, name:i.name||'', qty:i.qty||1, price:i.price||0}))
    );
    const [savingEdit, setSavingEdit] = React.useState(false);

    const saveEdit = async() => {
      if(!editForm.supplier) return alert('Nama supplier wajib!');
      if(items.length===0) return alert('Minimal 1 item!');
      setSavingEdit(true);
      try {
        const totalEdit = items.reduce((s,i)=>s+(i.qty*i.price),0);
        const totalLama = po.total||0;
        const itemsBerubah = JSON.stringify((po.items||[]).map(i=>({n:i.name,q:i.qty,p:i.price})))
                          !== JSON.stringify(items.map(i=>({n:i.name,q:parseInt(i.qty)||0,p:parseInt(i.price)||0})));

        // ── Riwayat revisi (hanya jika total/item berubah) ──
        let newRevs = Array.isArray(po.revisions)?po.revisions:[];
        if(totalEdit!==totalLama||itemsBerubah) {
          const entry = {
            tanggal: new Date().toISOString(),
            tipe: 'edit',
            catatan: editForm.notes||'',
            totalLama,
            totalBaru: totalEdit,
            itemsLama: (po.items||[]).map(i=>({name:i.name,qty:i.qty,price:i.price||0,satuan:i.satuan||'pcs'})),
            itemsBaru: items.map(i=>({name:i.name,qty:parseInt(i.qty)||0,price:parseInt(i.price)||0,satuan:i.satuan||'pcs'})),
          };
          const r = await appendPORevision(po, entry, {
            supplier:  editForm.supplier,
            bayar:     editForm.bayar,
            due_date:  editForm.due_date||null,
            notes:     editForm.notes||'',
            status:    editForm.status,
            total:     totalEdit,
          });
          if(r!==null) newRevs = r;
        } else {
          await sbUpdate('purchase_orders', po.id, {
            supplier:  editForm.supplier,
            bayar:     editForm.bayar,
            due_date:  editForm.due_date||null,
            notes:     editForm.notes||'',
            status:    editForm.status,
            total:     totalEdit,
          });
        }

        // Delete & reinsert items
        const sb = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
        await sb.from('po_items').delete().eq('po_id', po.id);
        await sbInsert('po_items', items.map(i=>({
          po_id: po.id,
          name: i.name,
          qty: parseInt(i.qty)||1,
          price: parseInt(i.price)||0,
          subtotal: (parseInt(i.qty)||1)*(parseInt(i.price)||0),
          product_id: i.product_id||null,
          satuan: i.satuan||'pcs',
        })));

        // ── Sesuaikan stok kalau barang PO sudah diterima (stok sudah masuk) ──
        if(po.status==='Diterima'&&itemsBerubah) {
          const key = it=>it.product_id?('p'+it.product_id):('n'+(it.name||'').toLowerCase().trim());
          const oldMap={}, newMap={}, meta={};
          (po.items||[]).forEach(it=>{oldMap[key(it)]=(oldMap[key(it)]||0)+(parseInt(it.qty)||0);meta[key(it)]=it;});
          items.forEach(it=>{newMap[key(it)]=(newMap[key(it)]||0)+(parseInt(it.qty)||0);meta[key(it)]=it;});
          const deltas=[];
          Object.keys({...oldMap,...newMap}).forEach(k=>{
            const d=(newMap[k]||0)-(oldMap[k]||0);
            if(d) deltas.push({product_id:meta[k].product_id,name:meta[k].name,satuan:meta[k].satuan,delta:d});
          });
          if(deltas.length) await adjustStockPO(deltas, po.id, `Revisi PO-${po.id} (${po.supplier})`);
        }

        notifyDataChanged('pembelian');
        const selisih = totalEdit-totalLama;
        alert(`✅ PO berhasil diupdate!${selisih!==0?`\nTotal: ${fmt(totalLama)} → ${fmt(totalEdit)}${editForm.bayar==='Hutang'?`\nHutang supplier ${selisih>0?'bertambah':'berkurang'} ${fmt(Math.abs(selisih))}`:''}`:''}${po.status==='Diterima'&&itemsBerubah?'\nStok sudah disesuaikan otomatis.':''}`);
        onSaved({...editForm, total:totalEdit, items, revisions:newRevs});
      } catch(e){ alert('Gagal: '+e.message); }
      setSavingEdit(false);
    };

    return (
      <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>

function PembelianUnitModal({product, units, existing, onOk, onClose}) {
  const uk = product.unit_kecil||'pcs';
  const [qtys, setQtys]   = React.useState(()=>units.map(()=>''));

  const [hargaUnitIdx, setHargaUnitIdx] = React.useState(0); // satuan yang dipakai untuk input harga
  const hargaRatio = units[hargaUnitIdx]?.ratio||1;
  // Harga per satuan kecil (hasil konversi otomatis)
  const hargaBase = hargaRatio>1 ? (parseFloat(harga)||0)/hargaRatio : (parseFloat(harga)||0);
  const totalKecil = units.reduce((s,u,i)=>s+(parseInt(qtys[i])||0)*u.ratio,0);
  const totalRp = Math.round(totalKecil*hargaBase);

  const ok = () => {
    const h = Math.round(hargaBase);
    if(totalKecil<=0) return alert('Isi jumlah minimal di salah satu satuan!');
    if(h<=0) return alert('Isi harga beli!');
    onOk({rows: units.map((u,i)=>({name:u.name, ratio:u.ratio, qty:parseInt(qtys[i])||0})), harga:h});
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#fff',borderRadius:16,padding:20,width:'100%',maxWidth:400,maxHeight:'88vh',overflowY:'auto',boxShadow:'0 8px 30px rgba(0,0,0,0.3)'}}>
        <div style={{fontWeight:900,fontSize:16,textAlign:'center',marginBottom:14,letterSpacing:0.5}}>TAMBAH MULTISATUAN</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',borderBottom:'1px solid #eee',paddingBottom:10,marginBottom:16}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{product.name}</div>
            <div style={{fontSize:11,color:MT}}>stok: {product.stock||0} {uk}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
            <div style={{fontWeight:700,fontSize:13}}>{product.buy_price?fmt(product.buy_price):'—'}</div>
            <div style={{fontSize:10,color:MT}}>beli terakhir/{uk}</div>
          </div>
        </div>

        {units.map((u,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:600}}>
              {u.name}
              {u.ratio>1&&<span style={{fontSize:11,color:MT,fontWeight:500}}> ({u.ratio} {uk})</span>}
            </div>
            <input type="number" min="0" value={qtys[i]} placeholder="0"
              onChange={e=>setQtys(q=>q.map((v,j)=>j===i?e.target.value:v))}
              style={{width:110,padding:'9px 12px',border:'1.5px solid #ddd',borderRadius:20,fontSize:15,fontWeight:700,textAlign:'center'}}/>
          </div>
        ))}

        <div style={{fontSize:12,color:MT,fontWeight:600,marginTop:16,marginBottom:6}}>Input harga beli pakai satuan:</div>
        <div style={{display:'flex',gap:6,marginBottom:8}}>
          {units.map((u,i)=>(
            <button key={i} onClick={()=>setHargaUnitIdx(i)}
              style={{flex:1,padding:'7px 4px',border:`1.5px solid ${hargaUnitIdx===i?G:'#eee'}`,borderRadius:16,background:hargaUnitIdx===i?G:'#fff',color:hargaUnitIdx===i?'#fff':MT,fontSize:12,fontWeight:hargaUnitIdx===i?800:500,cursor:'pointer'}}>
              per {u.name}
            </button>
          ))}
        </div>
        <input type="number" min="0" value={harga} onChange={e=>setHarga(e.target.value)}
          placeholder={'Harga per '+(units[hargaUnitIdx]?.name||uk)}
          style={{width:'100%',padding:'11px 14px',border:`1.8px solid ${G}`,borderRadius:10,fontSize:16,fontWeight:700,boxSizing:'border-box',textAlign:'center'}}/>
        {hargaRatio>1&&(parseFloat(harga)||0)>0&&(
          <div style={{background:'#FFF8E1',border:'1px solid #F9A825',borderRadius:8,padding:'7px 12px',marginTop:8,fontSize:12,textAlign:'center'}}>
            🔄 Otomatis dikonversi: <b style={{color:GD}}>{fmt(Math.round(hargaBase))} / {uk}</b>
            <span style={{color:MT}}> ({fmt(parseFloat(harga)||0)} ÷ {hargaRatio})</span>
          </div>
        )}

        {totalKecil>0&&(
          <div style={{background:GL,borderRadius:8,padding:'8px 12px',marginTop:10,fontSize:12,display:'flex',justifyContent:'space-between'}}>
            <span style={{color:GD,fontWeight:600}}>Total: {totalKecil} {uk}</span>
            <span style={{color:GD,fontWeight:800}}>{fmt(totalRp)}</span>
          </div>
        )}

        <div style={{display:'flex',gap:0,marginTop:16,borderTop:'1px solid #eee',paddingTop:4}}>
          <button onClick={onClose}
            style={{flex:1,padding:12,background:'none',border:'none',color:GD,fontWeight:800,fontSize:14,cursor:'pointer',letterSpacing:1}}>BATAL</button>
          <button onClick={ok}
            style={{flex:1,padding:12,background:'none',border:'none',color:GD,fontWeight:800,fontSize:14,cursor:'pointer',letterSpacing:1}}>OK</button>
        </div>
      </div>
    </div>
  );
}

function Pembelian() {
  // View: 'browse' | 'cart' | 'list' | 'detail'
  const [view,       setView]       = useState('list');
  const [products,   setProducts]   = useState([]);
  const [cart,       setCart]       = useState([]); // {product, qty, price, buy_price}
  const [poUnitSel,  setPoUnitSel]  = useState(null); // modal multisatuan pembelian
  const [showTambahProdukPembelian, setShowTambahProdukPembelian] = useState(false);
  const [poUnits,    setPoUnits]    = useState({});   // product_id -> satuan tambahan
  const [orders,     setOrders]     = useState([]);
  const [selected,   setSelected]   = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [prodLoading,setProdLoading]= useState(false);
  const [search,     setSearch]     = useState('');
  const [activeKat,  setActiveKat]  = useState('Semua');
  const [suppliers,  setSuppliers]  = useState([]);
  const [saving,     setSaving]     = useState(false);

  // Checkout form
  const [form, setForm] = useState({supplier_id:'', bayar:'Lunas', due:'', notes:'', tanggal:new Date().toISOString().slice(0,10), diskon_persen_nota:'0', ppn_persen:0, potongan_nominal:0});
  const [editPO, setEditPO] = useState(false);
  const [showReturPO, setShowReturPO] = useState(false);
  const [editItems, setEditItems] = useState([]);
  const [showAddSupplierPem, setShowAddSupplierPem] = useState(false);
  const [newSupForm, setNewSupForm] = useState({});

  // Load suppliers & orders
  const loadOrders = async() => {
    setLoading(true);
    try {
      const [sups, pos] = await Promise.all([
        sbGet('suppliers',{order:'name'}),
        sbGetAll('purchase_orders',{order:'created_at',asc:false}),
      ]);
      setSuppliers(sups||[]);
      const withItems = await Promise.all((pos||[]).map(async po=>({
        ...po, items: await sbGet('po_items',{eq:{po_id:po.id}})
      })));
      setOrders(withItems);
    } catch(e){}
    setLoading(false);
  };

  // Load products dengan cache
  const loadPoUnits = async() => {
    try {
      const units = await sbGetAll('product_units',{order:'id'});
      const m = {};
      (units||[]).forEach(u=>{ if(!m[u.product_id]) m[u.product_id]=[]; m[u.product_id].push(u); });
      setPoUnits(m);
    } catch(e){ setPoUnits({}); }
  };
  const loadProducts = async() => {
    loadPoUnits();
    if(window._cachedProducts?.length > 0) {
      setProducts(window._cachedProducts);
      return;
    }
    setProdLoading(true);
    try {
      const data = await sbGetAll('products',{order:'name'});
      window._cachedProducts = data||[];
      setProducts(data||[]);
    } catch(e){}
    setProdLoading(false);
  };

  useEffect(()=>{
    loadOrders();
    loadProducts();
  },[]);

  // Kategori dari produk
  const kategoriList = ['Semua', ...new Set(
    products.map(p=>p.category?.split(' > ')[0]||'Lainnya').filter(Boolean)
  )].slice(0,20);

  // Filter produk
  const filteredProds = products.filter(p=>{
    const matchKat = activeKat==='Semua' || p.category?.startsWith(activeKat);
    const matchSearch = smartMatch(search, p.name, p.category||'');
    return matchKat && matchSearch;
  }).sort((a,b)=>search?smartScore(search,b.name)-smartScore(search,a.name):0);

  // Cart helpers
  // Susun daftar satuan produk: unit kecil + unit besar (kolom) + satuan tambahan (tabel product_units)
  const getUnitList = (prod) => {
    const uk = prod.unit_kecil||'pcs';
    const list = [{name:uk, ratio:1}];
    if(prod.unit_besar&&(prod.konversi||1)>1) list.push({name:prod.unit_besar, ratio:prod.konversi||1});
    (poUnits[prod.id]||[]).forEach(u=>{
      const r = u.ratio||1;
      if(r>1&&!list.find(x=>x.name.toLowerCase()===String(u.unit_name||'').toLowerCase())) list.push({name:u.unit_name, ratio:r});
    });
    return list;
  };
  // Produk multisatuan → buka modal ala Kasir Pintar; produk biasa → langsung tambah
  const handleProductTap = (prod) => {
    const units = getUnitList(prod);
    if(units.length>1){
      const line = cart.find(i=>i.product.id===prod.id);
      setPoUnitSel({product:prod, units, existing:{harga: line?.price ?? (prod.buy_price||''), qtyBase: ''}});
    } else {
      addToCart(prod);
    }
  };
  // Total masuk keranjang dalam satuan dasar (seperti Kasir Pintar), rincian disimpan untuk tampilan
  const applyUnitSel = ({rows, harga}) => {
    const p = poUnitSel.product;
    const totalBase = rows.reduce((s,r)=>s+r.qty*r.ratio,0);
    const rincian = rows.filter(r=>r.qty>0).map(r=>`${r.qty} ${r.name}`).join(' + ');
    setCart(prev=>{
      const next = prev.filter(i=>i.product.id!==p.id);
      if(totalBase>0) next.push({
        product:p, cartKey:p.id+'_kecil', qty:totalBase, price:harga,
        unit:p.unit_kecil||'pcs', isBesar:false, _rincian:rincian,
      });
      return next;
    });
    setPoUnitSel(null);
  };
  const addToCart = (prod) => {
    const isBesar = prod._forceBesar;
    const cartKey = prod.id + (isBesar?'_besar':'_kecil');
    setCart(prev=>{
      const exist = prev.find(i=>i.cartKey===cartKey);
      if(exist) return prev.map(i=>i.cartKey===cartKey?{...i,qty:i.qty+1}:i);
      return [...prev, {
        product: prod,
        cartKey,
        qty: 1,
        price: isBesar ? (prod.harga_besar||prod.buy_price||0) : (prod.buy_price||0),
        unit: isBesar ? (prod.unit_besar||'unit') : (prod.unit_kecil||'pcs'),
        isBesar,
      }];
    });
  };
  const updateQty = (key, qty) => {
    const match = i => (i.cartKey===key)||(i.product.id===key);
    if(qty<=0) { setCart(prev=>prev.filter(i=>!match(i))); return; }
    setCart(prev=>prev.map(i=>match(i)?{...i,qty:Math.max(1,parseInt(qty)||1)}:i));
  };
  const updatePrice = (prodId, price) => {
    setCart(prev=>prev.map(i=>i.product.id===prodId?{...i,price:parseInt(price)||0}:i));
  };
  const updateDiskonItem = (cartKey, val) => {
    setCart(prev=>prev.map(i=>(i.cartKey||i.product.id)===cartKey?{...i,diskon_persen:val}:i));
  };
  const totalQty  = cart.reduce((s,i)=>s+i.qty, 0);
  const totalCart = cart.reduce((s,i)=>s+i.price*i.qty, 0); // subtotal sebelum diskon apapun
  const subtotalAfterItemDiskon = cart.reduce((s,i)=>s+(i.price*i.qty - applyTieredDiskon(i.price*i.qty, i.diskon_persen||'0')), 0);
  const totalDiskonItem = totalCart - subtotalAfterItemDiskon;
  const diskonNominal = Math.round(applyTieredDiskon(subtotalAfterItemDiskon, form.diskon_persen_nota||'0'));
  const totalAfterDiskon = subtotalAfterItemDiskon - diskonNominal;
  const ppnNominal = Math.round(totalAfterDiskon*((form.ppn_persen||0)/100));
  const potonganNominal = parseInt(form.potongan_nominal)||0;
  const totalFinal = Math.max(0, totalAfterDiskon + ppnNominal - potonganNominal);

  // Save PO
  const savePO = async() => {
    if(!form.supplier_id) return alert('Pilih supplier dulu!');
    if(cart.length===0) return alert('Keranjang masih kosong!');
    setSaving(true);
    try {
      const sup = suppliers.find(s=>s.id===parseInt(form.supplier_id));
      const [po] = await sbInsert('purchase_orders',[{
        supplier: sup?.name||'',
        supplier_id: parseInt(form.supplier_id),
        status: 'Proses',
        bayar: form.bayar,
        total: totalFinal,
        diskon_persen: form.diskon_persen_nota||'0',
        ppn_persen: form.ppn_persen||0,
        potongan_nominal: potonganNominal,
        due_date: form.due||null,
        notes: form.notes||'',
        created_at: form.tanggal ? form.tanggal+'T09:00:00' : undefined,
      }]);
      await sbInsert('po_items', cart.map(i=>({
        po_id: po.id,
        product_id: i.product.id,
        name: i.product.name,
        qty: i.qty,
        price: i.price,
        subtotal: i.qty*i.price - applyTieredDiskon(i.qty*i.price, i.diskon_persen||'0'),
        diskon_persen: i.diskon_persen||'0',
        satuan: i.unit||i.product.unit_kecil||'pcs',
      })));
      notifyDataChanged('pembelian');
      setCart([]);
      setForm({supplier_id:'', bayar:'Lunas', due:'', notes:'', tanggal:new Date().toISOString().slice(0,10), diskon_persen_nota:'0', ppn_persen:0, potongan_nominal:0});
      setView('list');
      loadOrders();
      alert('✅ Purchase Order berhasil dibuat!');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  // Mark received - update stok & harga beli + saran harga jual
  const [priceUpdates, setPriceUpdates] = useState([]); // item yang perlu update harga jual
  const [showPriceModal, setShowPriceModal] = useState(false);
  const [pendingPO, setPendingPO] = useState(null);

  const markReceived = async(po) => {
    if(!confirm(`Tandai PO-${po.id} sudah diterima? Stok akan diupdate otomatis.`)) return;
    try {
      await sbUpdate('purchase_orders', po.id, {status:'Diterima'});
      const updates = [];

      for(const item of po.items||[]) {
        let productId = item.product_id;
        let prod = null;
        const newBuyPrice = item.price ? parseInt(item.price) : 0;

        // Cari by product_id dulu
        if(productId) {
          const prods = await sbGet('products',{eq:{id:productId}});
          if(prods?.length>0) prod = prods[0];
        }

        // Kalau tidak ada product_id, cari by nama produk dengan fuzzy match
        if(!prod && item.name) {
          const byName = await sbGet('products',{order:'name'});
          const q = item.name.toLowerCase().trim();
          const stopWords = ['dan','ke','di','dari','atau','yang','untuk','per','x','no','uk'];
          const itemWords = q.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));

          // Score setiap produk berdasarkan kecocokan kata - lebih pintar
          const scored = byName.map(p=>{
            const pName = p.name.toLowerCase();
            const pWords = pName.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));
            let score = 0;
            if(pName===q) score=100;
            else {
              itemWords.forEach(w=>{ if(pName.includes(w)) score+=20; });
              pWords.forEach(w=>{ if(q.includes(w)) score+=10; });
              if(itemWords[0]&&pWords[0]&&pWords[0].startsWith(itemWords[0])) score+=15;
              itemWords.forEach((w,i)=>{ if(pWords[i]&&pWords[i].includes(w)) score+=5; });
            }
            return {...p, score};
          }).filter(p=>p.score>=20).sort((a,b)=>b.score-a.score);

          if(scored.length>0 && scored[0].score>=20) {
            prod = scored[0];
            productId = scored[0].id;
          }
        }

        if(prod && productId) {
          // Konversi qty dari unit besar ke unit kecil
          const itemUnit = (item.satuan||item.unit||'').toLowerCase();
          const prodUnitBesar = (prod.unit_besar||'').toLowerCase();
          const isUnitBesar = prodUnitBesar && prodUnitBesar!=='pcs' && itemUnit &&
                              (itemUnit===prodUnitBesar || itemUnit.includes(prodUnitBesar) || prodUnitBesar.includes(itemUnit));
          let konversi = isUnitBesar ? (prod.konversi||1) : 1;
          // Cek juga satuan tambahan di tabel product_units (mis. ROLL ratio 10)
          if(konversi===1 && itemUnit && itemUnit!==(prod.unit_kecil||'pcs').toLowerCase() && itemUnit!=='pcs'){
            try {
              const pu = await sbGet('product_units',{eq:{product_id:productId}});
              const hit = (pu||[]).find(u=>{
                const un=(u.unit_name||'').toLowerCase();
                return un&&(un===itemUnit||un.includes(itemUnit)||itemUnit.includes(un));
              });
              if(hit&&(hit.ratio||1)>1) konversi = hit.ratio;
            } catch(e){}
          }
          const qtyToAdd = (parseInt(item.qty)||0) * konversi;

          // Harga beli per unit kecil
          const newBuyPricePerUnit = newBuyPrice>0 ? Math.round(newBuyPrice/konversi) : (prod.buy_price||0);
          const newStock = (prod.stock||0) + qtyToAdd;
          await sbUpdate('products', productId, {
            stock: newStock,
            buy_price: newBuyPricePerUnit||prod.buy_price||0,
          });
          // FIFO: catat batch masuk
          await sbInsert('stock_batches',[{
            product_id:   productId,
            po_id:        po.id,
            qty_awal:     qtyToAdd,
            qty_sisa:     qtyToAdd,
            buy_price:    newBuyPricePerUnit||prod.buy_price||0,
            tanggal_masuk: po.created_at?.slice(0,10)||new Date().toISOString().slice(0,10),
          }]).catch(e=>console.log('batch insert error:',e));
          await sbInsert('stock_logs',[{
            product_id: productId,
            type: 'masuk',
            qty: qtyToAdd,
            notes: 'Pembelian dari '+po.supplier+' - PO-'+po.id,
          }]).catch(()=>{});

          // Cek apakah harga beli berubah & harga jual perlu diupdate
          const oldBuyPrice = prod.buy_price||0;
          const currentSellPrice = prod.price||0;
          if(newBuyPricePerUnit>0 && newBuyPricePerUnit !== oldBuyPrice) {
            // Saran margin dihitung dari harga per unit kecil (hasil konversi)
            const saran20 = Math.ceil(newBuyPricePerUnit * 1.20 / 100) * 100;
            const saran30 = Math.ceil(newBuyPricePerUnit * 1.30 / 100) * 100;
            const saran40 = Math.ceil(newBuyPricePerUnit * 1.40 / 100) * 100;
            updates.push({
              productId,
              name: item.name,
              matchedName: prod.name,
              oldBuyPrice, newBuyPrice: newBuyPricePerUnit,
              currentSellPrice,
              saran20, saran30, saran40,
              newSellPrice: saran20, // default markup 20%
              isNew: false,
            });
          }
        } else if(!prod) {
          // Produk belum ada di database
          if(newBuyPrice>0) {
            const saran20 = Math.ceil(newBuyPrice * 1.20 / 100) * 100;
            const saran30 = Math.ceil(newBuyPrice * 1.30 / 100) * 100;
            const saran40 = Math.ceil(newBuyPrice * 1.40 / 100) * 100;
            // Cari kandidat produk yang mungkin cocok
            const allProds = await sbGet('products',{order:'name'});
            const qc = item.name.toLowerCase().trim();
            const stopWordsC = ['dan','ke','di','dari','atau','yang','untuk','per','x'];
            const itemWordsC = qc.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWordsC.includes(w));
            const candidates = allProds.map(p=>{
              const pName = p.name.toLowerCase();
              const pWords = pName.split(/[\s\-\/,]+/).filter(w=>w.length>=2);
              let score = 0;
              if(pName===qc) score=100;
              else {
                itemWordsC.forEach(w=>{ if(pName.includes(w)) score+=20; });
                pWords.forEach(w=>{ if(qc.includes(w)) score+=10; });
                if(itemWordsC[0]&&pWords[0]&&pWords[0].startsWith(itemWordsC[0])) score+=15;
              }
              return {...p,score};
            }).filter(p=>p.score>=20).sort((a,b)=>b.score-a.score).slice(0,5);
            
            updates.push({
              productId: null, name: item.name,
              matchedName: null,
              oldBuyPrice: 0, newBuyPrice,
              currentSellPrice: 0,
              saran20, saran30, saran40,
              newSellPrice: saran20,
              isNew: true,
              candidates, // produk kandidat untuk dipilih manual
            });
          }
        }
      }

      notifyDataChanged('pembelian');
      setSelected(s=>({...s,status:'Diterima'}));
      loadOrders();

      if(updates.length>0) {
        setPriceUpdates(updates);
        setPendingPO(po);
        setShowPriceModal(true);
      } else {
        alert('✅ Stok berhasil diupdate!');
      }
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const savePriceUpdates = async() => {
    try {
      for(const u of priceUpdates) {
        if(u.productId && u.newSellPrice>0) {
          await sbUpdate('products', u.productId, {price: parseInt(u.newSellPrice)});
        }
      }
      setShowPriceModal(false);
      setPriceUpdates([]);
      notifyDataChanged('products');
      alert('✅ Stok & harga jual berhasil diupdate!');
    } catch(e){ alert('Gagal update harga: '+e.message); }
  };

  const sC = {Diterima:G, Proses:OR, Dibatalkan:RD};
  const bC = {Lunas:G, Hutang:OR, Belum:RD};

  // ── MODAL: SARAN HARGA JUAL ──
  if(showPriceModal && priceUpdates.length>0) return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:12,padding:'12px 16px',marginBottom:16,fontSize:13}}>
        <div style={{fontWeight:700,color:OR,marginBottom:4}}>💡 Update Harga Jual</div>
        <div style={{color:'#7d4e00'}}>Harga beli beberapa produk berubah. Sistem menyarankan harga jual baru agar profit tetap terjaga.</div>
      </div>

      {priceUpdates.map((u,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{u.name}</div>
          {u.matchedName&&u.matchedName!==u.name&&(
            <div style={{fontSize:11,color:OR,marginBottom:8,background:'#FFF3E0',padding:'4px 8px',borderRadius:6}}>
              ⚠️ Nama di nota: <b>"{u.name}"</b> → dicocokkan ke: <b>"{u.matchedName}"</b>
            </div>
          )}
          {u.isNew
            ? <div>
                <div style={{fontSize:11,color:OR,marginBottom:6,background:'#FFF3E0',padding:'6px 10px',borderRadius:6}}>
                  ⚠️ Produk ini belum ada di database
                </div>
                {u.candidates?.length>0&&(

                <div style={{background:'#FFF3E0',borderRadius:8,padding:'6px 10px'}}>
                  <div style={{color:MT}}>Harga Beli Baru</div>
                  <div style={{fontWeight:700,color:OR}}>{fmt(u.newBuyPrice)}</div>
                </div>
                <div style={{background:'#E3F2FD',borderRadius:8,padding:'6px 10px'}}>
                  <div style={{color:MT}}>Harga Jual Saat Ini</div>
                  <div style={{fontWeight:700,color:'#1976D2'}}>{fmt(u.currentSellPrice)}</div>
                </div>
              </div>
          }

          {/* Saran margin */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:6}}>💡 Saran Harga Jual:</div>

            <div style={{fontSize:10,color:MT,fontWeight:600,marginBottom:4}}>📈 Mark Up (dari harga beli):</div>
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {[
                {label:'MU 20%', value:Math.ceil(u.newBuyPrice*1.20/100)*100},
                {label:'MU 30%', value:Math.ceil(u.newBuyPrice*1.30/100)*100},
                {label:'MU 40%', value:Math.ceil(u.newBuyPrice*1.40/100)*100},
              ].map((s,j)=>(
                <button key={j} onClick={()=>setPriceUpdates(prev=>prev.map((p,k)=>k===i?{...p,newSellPrice:s.value}:p))}
                  style={{flex:1,padding:'6px 4px',border:`1.5px solid ${u.newSellPrice===s.value?G:'#eee'}`,borderRadius:8,background:u.newSellPrice===s.value?GL:'#fff',color:u.newSellPrice===s.value?GD:MT,cursor:'pointer',fontSize:10,fontWeight:u.newSellPrice===s.value?700:500,textAlign:'center'}}>
                  <div style={{fontWeight:700,fontSize:11}}>{fmt(s.value)}</div>
                  <div style={{fontSize:9,color:MT}}>{s.label}</div>
                </button>
              ))}
            </div>
            {/* Margin */}
            <div style={{fontSize:10,color:MT,fontWeight:600,marginBottom:4}}>💹 Margin (dari harga jual):</div>
            <div style={{display:'flex',gap:5}}>
              {[
                {label:'Margin 20%', value:Math.ceil(u.newBuyPrice/(1-0.20)/100)*100},
                {label:'Margin 30%', value:Math.ceil(u.newBuyPrice/(1-0.30)/100)*100},
                {label:'Margin 40%', value:Math.ceil(u.newBuyPrice/(1-0.40)/100)*100},
              ].map((s,j)=>(
                <button key={j} onClick={()=>setPriceUpdates(prev=>prev.map((p,k)=>k===i?{...p,newSellPrice:s.value}:p))}
                  style={{flex:1,padding:'6px 4px',border:`1.5px solid ${u.newSellPrice===s.value?'#8E44AD':'#eee'}`,borderRadius:8,background:u.newSellPrice===s.value?'#F3E5F5':'#fff',color:u.newSellPrice===s.value?'#8E44AD':MT,cursor:'pointer',fontSize:10,fontWeight:u.newSellPrice===s.value?700:500,textAlign:'center'}}>
                  <div style={{fontWeight:700,fontSize:11}}>{fmt(s.value)}</div>
                  <div style={{fontSize:9,color:MT}}>{s.label}</div>

            <input type="number" value={u.newSellPrice}

                </span>
                <span style={{color:'#8E44AD'}}>
                  Margin: {Math.round((u.newSellPrice-u.newBuyPrice)/u.newSellPrice*100)}%

          style={{flex:2,padding:12,background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:13}}>

  if(view==='detail' && selected && editPO) return (

  // ── VIEW: DETAIL PO ──
  if(view==='detail' && selected) return (

      <button onClick={()=>setView('list')} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,marginBottom:12,padding:0}}>← Kembali</button>
      <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{fontWeight:800,fontSize:18}}>PO-{selected.id}</div>
            <div style={{color:MT,fontSize:13,marginTop:2}}>{selected.supplier}</div>
            <div style={{fontSize:12,color:MT}}>{selected.created_at?.slice(0,10)}</div>
          </div>
          <span style={{fontSize:12,borderRadius:8,padding:'4px 14px',background:sC[selected.status]+'22',color:sC[selected.status],fontWeight:700}}>{selected.status}</span>

              <div style={{fontSize:11,color:MT}}>{k}</div>
              <div style={{fontSize:13,fontWeight:700,marginTop:2}}>{v}</div>
            </div>

        </div>
      </div>

        </div>
        {(selected.items||[]).map((it,i)=>{
          const raw = (it.qty||0)*(it.price||0);

            <div key={i} style={{display:'grid',gridTemplateColumns:'1fr auto auto auto auto',gap:6,padding:'10px 8px',borderBottom:i<(selected.items?.length-1)?'1px solid #f5f5f5':'none',fontSize:13}}>

              <span style={{textAlign:'center',color:MT}}>{it.qty} {it.satuan||'pcs'}</span>

              <span style={{textAlign:'center',color:OR,fontSize:11}}>{diskonNomItem>0?(it.diskon_persen||'0')+'%':'-'}</span>
              <span style={{textAlign:'right',fontWeight:700,color:G}}>{fmt(raw-diskonNomItem)}</span>
            </div>
          );
        })}
        {(()=>{
          const subtotal = (selected.items||[]).reduce((s,it)=>s+(it.qty||0)*(it.price||0),0);
          const subtotalAfterItem = (selected.items||[]).reduce((s,it)=>{ const raw=(it.qty||0)*(it.price||0); return s+raw-applyTieredDiskon(raw,it.diskon_persen||'0'); },0);
          const totalDiskonItem = subtotal - subtotalAfterItem;
          const diskonNotaNom = applyTieredDiskon(subtotalAfterItem, selected.diskon_persen||'0');
          const ppnNom = Math.round((subtotalAfterItem-diskonNotaNom)*((selected.ppn_persen||0)/100));
          const potongan = selected.potongan_nominal||0;
          if(totalDiskonItem<=0 && diskonNotaNom<=0 && ppnNom<=0 && potongan<=0) return null;
          return (
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed #ddd'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:MT,marginBottom:3}}><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
              {totalDiskonItem>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:OR,marginBottom:3}}><span>Total Diskon Item</span><span>-{fmt(Math.round(totalDiskonItem))}</span></div>}
              {diskonNotaNom>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:RD,marginBottom:3}}><span>Diskon Nota ({selected.diskon_persen}%)</span><span>-{fmt(diskonNotaNom)}</span></div>}
              {ppnNom>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:MT,marginBottom:3}}><span>PPN ({selected.ppn_persen}%)</span><span>+{fmt(ppnNom)}</span></div>}
              {potongan>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#8E44AD',marginBottom:3}}><span>Potongan Tambahan</span><span>-{fmt(potongan)}</span></div>}
            </div>
          );
        })()}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:12,paddingTop:10,borderTop:`2px solid ${G}`,fontWeight:800,fontSize:16}}>
          <span>Total</span><span style={{color:G}}>{fmt(selected.total)}</span>
        </div>
      </div>

      {/* Print Invoice PO */}
      <button onClick={()=>printInvoicePO(selected)}
        style={{width:'100%',padding:12,background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',color:'#1976D2',marginBottom:10}}>
        🖨️ Print Invoice Pembelian
      </button>

      {/* Form Retur ke Supplier */}
      {showReturPO&&(
        <ReturPOForm po={selected}
          onCancel={()=>setShowReturPO(false)}
          onDone={({total,items,revisions})=>{
            setSelected(s=>({...s,total,items,revisions}));
            setShowReturPO(false);
            loadOrders();
          }}/>
      )}

      {/* Riwayat Revisi PO */}
      <RiwayatRevisiPO po={selected}/>

      {/* Action buttons */}
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        {(selected.status==='Proses'||selected.status==='Diterima')&&(
          <button onClick={()=>{setEditPO(true);setShowReturPO(false);}}
            style={{flex:1,padding:12,background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:10,fontWeight:700,cursor:'pointer',color:'#1976D2',fontSize:13}}>
            ✏️ Edit PO
          </button>

        {selected.status==='Diterima'&&!showReturPO&&(selected.items||[]).length>0&&(

            style={{flex:1,padding:12,background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:10,fontWeight:700,cursor:'pointer',color:RD,fontSize:13}}>
            ↩️ Retur
          </button>
        )}
        <button onClick={async()=>{
          const perluBalikStok = selected.status==='Diterima'&&(selected.items||[]).length>0;
          if(!confirm(`Hapus PO-${selected.id}?${perluBalikStok?'\nStok yang sudah masuk dari PO ini akan dikurangi kembali.':''}\nData tidak bisa dikembalikan!`)) return;
          try {
            // Balikkan stok kalau barang PO sudah diterima
            if(perluBalikStok) {
              await adjustStockPO(
                (selected.items||[]).map(it=>({product_id:it.product_id,name:it.name,satuan:it.satuan,delta:-(parseInt(it.qty)||0)})),
                selected.id, `Hapus PO-${selected.id} (${selected.supplier})`
              );
            }
            const sb = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
            // Bersihkan dulu data anak yang masih menahan PO ini (mencegah gagal hapus setengah jalan)
            await sb.from('stock_batches').delete().eq('po_id', selected.id).catch(()=>{});
            await sb.from('po_payments').delete().eq('po_id', selected.id).catch(()=>{});
            await sb.from('po_items').delete().eq('po_id', selected.id);
            await sb.from('purchase_orders').delete().eq('id', selected.id);
            notifyDataChanged('pembelian');
            loadOrders();
            setView('list');
            alert(`✅ PO berhasil dihapus!${perluBalikStok?'\nStok sudah disesuaikan kembali.':''}`);
          } catch(e){ alert('Gagal hapus: '+e.message+'\n\nPO mungkin tersisa sebagian (misal 0 item tapi masih tercatat). Coba hapus lagi — proses sudah diperbaiki untuk membersihkan data terkait terlebih dulu.'); }
        }}
          style={{flex:1,padding:12,background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:10,fontWeight:700,cursor:'pointer',color:RD,fontSize:13}}>
          🗑️ Hapus PO
        </button>

        </button>
      )}
    </div>

  // ── VIEW: CHECKOUT ──
  if(view==='cart') return (

      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>

        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>🛒 Keranjang Pembelian</h2>
      </div>

      {/* Cart items */}
      <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 2px 8px rgba(0,0,0,0.07)',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Daftar Barang ({cart.length} item)</div>
        {cart.map(item=>(
          <div key={item.cartKey||item.product.id} style={{borderBottom:'1px solid #f5f5f5',paddingBottom:12,marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.product.name}</div>
            {item._rincian&&<div style={{fontSize:10,color:'#8E44AD',fontWeight:700,marginBottom:5}}>⚖️ {item._rincian} = {item.qty} {item.unit||'pcs'}</div>}

                <label style={{fontSize:10,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Harga Beli / {item.unit||'pcs'}</label>
                <input value={item.price} onChange={e=>updatePrice(item.product.id,e.target.value)}
                  type="number" min="0"
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>

                  <input value={item.qty} onChange={e=>updateQty(item.cartKey||item.product.id,parseInt(e.target.value)||1)}

                  <button onClick={()=>updateQty(item.cartKey||item.product.id, item.qty+1)}
                    style={{width:30,height:30,borderRadius:'50%',background:GL,border:`1px solid ${G}`,cursor:'pointer',fontSize:16,color:GD,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>

              <div style={{textAlign:'right'}}>
                <div style={{fontSize:10,color:MT,marginBottom:3}}>Subtotal</div>

          <span>Total</span><span style={{color:G}}>{fmt(totalFinal)}</span>

          <select value={form.supplier_id} onChange={e=>setForm(f=>({...f,supplier_id:e.target.value}))}
