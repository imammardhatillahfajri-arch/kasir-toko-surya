// ── RESET DATA ────────────────────────────────────────────────────────────
function ResetData({onBack}) {
  const [step, setStep]       = useState(1); // 1=pilih, 2=konfirmasi, 3=selesai
  const [selected, setSelected] = useState({
    transactions: false,
    transaction_items: false,
    purchase_orders: false,
    po_items: false,
    returns: false,
    return_items: false,
    debts: false,
    debt_payments: false,
    stock_logs: false,
  });
  const [konfirmText, setKonfirmText] = useState('');
  const [resetting, setResetting]     = useState(false);
  const [log, setLog]                 = useState([]);

  const dataOptions = [
    {key:'transactions',      label:'Transaksi Penjualan',    icon:'🧾', sub:'Semua invoice penjualan'},
    {key:'transaction_items', label:'Item Transaksi',         icon:'📋', sub:'Detail barang per transaksi', depends:'transactions'},
    {key:'purchase_orders',   label:'Purchase Order (PO)',    icon:'📦', sub:'Semua pembelian ke supplier'},
    {key:'po_items',          label:'Item PO',                icon:'📦', sub:'Detail barang per PO', depends:'purchase_orders'},
    {key:'returns',           label:'Retur',                  icon:'🔄', sub:'Semua data retur'},
    {key:'return_items',      label:'Item Retur',             icon:'🔄', sub:'Detail item retur', depends:'returns'},
    {key:'debts',             label:'Hutang Piutang',         icon:'💰', sub:'Semua catatan hutang piutang'},
    {key:'debt_payments',     label:'Pembayaran Hutang',      icon:'💳', sub:'Riwayat pembayaran hutang', depends:'debts'},
    {key:'stock_logs',        label:'Log Stok',               icon:'📊', sub:'Riwayat perubahan stok'},
  ];

  const selectedCount = Object.values(selected).filter(Boolean).length;

  const selectAll = () => {
    const allTrue = {};
    Object.keys(selected).forEach(k=>allTrue[k]=true);
    setSelected(allTrue);
  };

  const doReset = async() => {
    if(konfirmText !== 'RESET') return alert('Ketik RESET dengan huruf kapital!');
    setResetting(true);
    const logs = [];
    // Gunakan supabase client yang sudah ada via window._sb
    // Reuse existing Supabase client
    const sb = window._sb || supabase.createClient(SB_URL, SB_KEY);
    window._sb = sb;
    
    // Order matters - delete child tables first
    const deleteOrder = [
      'debt_payments','po_items','return_items','transaction_items',
      'stock_logs','returns','debts','purchase_orders','transactions'
    ];

    // Jika purchase_orders dipilih, WAJIB hapus po_items dulu
    if(selected['purchase_orders']) {
      try {
        const {error} = await sb.from('po_items').delete().gt('id', 0);
        if(!error) logs.push('✅ po_items: otomatis dihapus (relasi PO)');
      } catch(e){}
    }
    // Jika transactions dipilih, WAJIB hapus transaction_items dulu
    if(selected['transactions']) {
      try {
        const {error} = await sb.from('transaction_items').delete().gt('id', 0);
        if(!error) logs.push('✅ transaction_items: otomatis dihapus (relasi transaksi)');
      } catch(e){}
    }
    // Jika returns dipilih, WAJIB hapus return_items dulu
    if(selected['returns']) {
      try {
        const {error} = await sb.from('return_items').delete().gt('id', 0);
        if(!error) logs.push('✅ return_items: otomatis dihapus (relasi retur)');
      } catch(e){}
    }
    setLog([...logs]);
    
    for(const table of deleteOrder) {
      if(selected[table]) {
        try {
          const {error} = await sb.from(table).delete().gt('id', 0);
          if(error) throw error;
          logs.push('✅ '+table+': berhasil dihapus');
        } catch(e) {
          if(e.message?.includes('does not exist')||e.message?.includes('schema cache')) {
            logs.push('⚠️ '+table+': tabel tidak ada (dilewati)');
          } else {
            logs.push('❌ '+table+': '+e.message);
          }
        }
        setLog([...logs]);
      }
    }
    
    notifyDataChanged('reset');
    setResetting(false);
    setStep(3);
    setLog(logs);
  };

  if(step===3) return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <h2 style={{margin:'0 0 20px',fontSize:17,fontWeight:800,color:RD}}>🗑️ Reset Selesai</h2>
      <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',marginBottom:16}}>
        {log.map((l,i)=>(
          <div key={i} style={{fontSize:12,padding:'4px 0',borderBottom:'1px solid #f5f5f5',color:l.startsWith('✅')?GD:RD}}>{l}</div>
        ))}
      </div>
      <button onClick={()=>{onBack();}} style={{width:'100%',padding:13,background:G,color:'#fff',border:'none',borderRadius:12,fontWeight:700,cursor:'pointer',fontSize:14}}>
        ✅ Selesai
      </button>
    </div>
  );

  if(step===2) return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>setStep(1)} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800,color:RD}}>⚠️ Konfirmasi Reset</h2>
      </div>

      <div style={{background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:12,padding:16,marginBottom:16}}>
        <div style={{fontWeight:700,color:RD,marginBottom:8,fontSize:15}}>🚨 PERINGATAN!</div>
        <div style={{fontSize:13,color:'#7d0000',lineHeight:1.6}}>
          Data yang dihapus <b>TIDAK BISA DIKEMBALIKAN</b>.<br/>
          Pastikan sudah backup data sebelum melanjutkan.<br/><br/>
          Data yang akan dihapus ({selectedCount} tabel):
        </div>
        <ul style={{margin:'8px 0 0',paddingLeft:20}}>
          {dataOptions.filter(o=>selected[o.key]).map(o=>(
            <li key={o.key} style={{fontSize:12,color:RD,fontWeight:600}}>{o.icon} {o.label}</li>
          ))}
        </ul>
      </div>

      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <label style={{fontSize:13,fontWeight:600,color:TX,display:'block',marginBottom:8}}>
          Ketik <b style={{color:RD}}>RESET</b> untuk konfirmasi:
        </label>
        <input value={konfirmText} onChange={e=>setKonfirmText(e.target.value)}
          placeholder="Ketik RESET di sini..."
          style={{width:'100%',padding:'12px 14px',border:`2px solid ${konfirmText==='RESET'?G:RD}`,borderRadius:10,fontSize:16,fontWeight:700,textAlign:'center',boxSizing:'border-box',outline:'none',letterSpacing:2}}/>
        {konfirmText==='RESET'&&<div style={{color:G,fontSize:12,marginTop:6,textAlign:'center',fontWeight:600}}>✅ Konfirmasi valid</div>}
      </div>

      <button onClick={doReset} disabled={resetting||konfirmText!=='RESET'}
        style={{width:'100%',padding:14,background:resetting||konfirmText!=='RESET'?MT:RD,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
        {resetting?'⏳ Menghapus data...':'🗑️ HAPUS DATA SEKARANG'}
      </button>
    </div>
  );

  return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>🗑️ Reset Data Transaksi</h2>
      </div>

      <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:12,padding:14,marginBottom:16,fontSize:12,color:'#7d4e00'}}>
        ⚠️ <b>Perhatian:</b> Fitur ini hanya menghapus data transaksi. Data produk, kategori, pelanggan, supplier <b>TIDAK</b> akan terhapus.
      </div>

      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>Pilih data yang ingin direset:</div>
          <button onClick={selectAll} style={{fontSize:12,color:RD,background:'none',border:'none',cursor:'pointer',fontWeight:600}}>Pilih Semua</button>
        </div>
        {dataOptions.map(opt=>(
          <label key={opt.key} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #f5f5f5',cursor:'pointer'}}>
            <input type="checkbox" checked={selected[opt.key]}
              onChange={e=>setSelected(p=>({...p,[opt.key]:e.target.checked}))}
              style={{width:18,height:18,accentColor:RD,flexShrink:0}}/>
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{opt.icon} {opt.label}</div>
              <div style={{fontSize:11,color:MT}}>{opt.sub}</div>
              {opt.depends&&<div style={{fontSize:10,color:OR}}>⚠️ Sebaiknya dihapus bersama dengan {opt.depends}</div>}
            </div>
          </label>
        ))}
      </div>

      <button onClick={()=>{
        if(selectedCount===0) return alert('Pilih minimal 1 data yang ingin direset!');
        setStep(2);
        setKonfirmText('');
      }} disabled={selectedCount===0}
        style={{width:'100%',padding:14,background:selectedCount===0?MT:RD,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
        {selectedCount===0?'Pilih data dulu':` Lanjut Reset ${selectedCount} Tabel →`}
      </button>
    </div>
  );
}

// ── EXPORT DATA ────────────────────────────────────────────────────────────
function ExportData({onBack}) {
  const [loading, setLoading] = useState(false);

  const exportCSV = async(type) => {
    setLoading(true);
    try {
      let data, filename, headers;

      if(type==='products'){
        data = await sbGetAll('products',{order:'name'});
        headers = ['ID','Nama','Harga Jual','Harga Beli','Stok','Kategori','Barcode','Tipe'];
        filename = 'produk_surya_listrik.csv';
      } else if(type==='transactions'){
        data = await sbGet('transactions',{order:'created_at',asc:false});
        headers = ['ID','Invoice','Pelanggan','Total','Bayar','Kembalian','Status','Tanggal'];
        filename = 'transaksi_surya_listrik.csv';
      } else if(type==='stock_low'){
        const all = await sbGetAll('products',{order:'stock'});
        data = all.filter(p=>p.stock<20);
        headers = ['ID','Nama','Stok','Min Stok','Kategori'];
        filename = 'stok_menipis_surya_listrik.csv';
      }

      // Generate CSV
      const rows = data.map(d=>{
        if(type==='products') return [d.id,d.name,d.price,d.buy_price||0,d.stock,d.category||'',d.barcode||'',d.tipe_barang||'Default'];
        if(type==='transactions') return [d.id,d.invoice_no,d.customer,d.total,d.paid,d.change,d.status,d.created_at?.slice(0,10)];
        if(type==='stock_low') return [d.id,d.name,d.stock,d.min_stock||0,d.category||''];
        return [];
      });

      const csv = [headers, ...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e){ alert('Gagal export: '+e.message); }
    setLoading(false);
  };

  const exports = [
    {icon:'📦',label:'Export Produk',sub:`Semua data produk (nama, harga, stok, kategori)`,type:'products',color:'#E8F5E9',border:G},
    {icon:'🧾',label:'Export Transaksi',sub:'Semua riwayat transaksi penjualan',type:'transactions',color:'#E3F2FD',border:'#3498DB'},
    {icon:'⚠️',label:'Export Stok Menipis',sub:'Produk dengan stok < 20',type:'stock_low',color:'#FFF3E0',border:OR},
  ];

  return (
    <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📤 Export Data</h2>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {exports.map((ex,i)=>(
          <button key={i} onClick={()=>exportCSV(ex.type)} disabled={loading}
            style={{display:'flex',alignItems:'center',gap:14,padding:'16px 20px',background:'#fff',border:`1.5px solid ${ex.border}`,borderRadius:14,cursor:loading?'not-allowed':'pointer',textAlign:'left',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',opacity:loading?0.7:1}}>
            <div style={{width:48,height:48,borderRadius:12,background:ex.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
              {ex.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:TX}}>{ex.label}</div>
              <div style={{fontSize:12,color:MT,marginTop:2}}>{ex.sub}</div>
            </div>
            <div style={{color:ex.border,fontWeight:700,fontSize:13}}>
              {loading?'⏳':'⬇️ CSV'}
            </div>
          </button>
        ))}
      </div>

      <div style={{marginTop:14,padding:12,background:'#F5F6FA',borderRadius:10,fontSize:12,color:MT,textAlign:'center'}}>
        💡 File CSV bisa dibuka di Excel / Google Sheets
      </div>
    </div>
  );
}


// ── PENGATURAN USER (Admin only) ───────────────────────────────────────────
function PengaturanUser({currentUser, onBack}) {
  const [users, setUsers]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId]   = useState(null);
  const [form, setForm]       = useState({username:'',password:'',nama:'',role:'kasir',pin:'',is_active:true});
  const [saving, setSaving]   = useState(false);

  const load = async()=>{
    setLoading(true);
    try {
      const d = await sbGet('app_users',{order:'id'});
      setUsers(Array.isArray(d) ? d.filter(u=>u&&u.id) : []);
    } catch(e){ setUsers([]); }
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const save = async()=>{
    if(!form.username||!form.password||!form.nama) return alert('Username, password & nama wajib!');
    setSaving(true);
    try {
      const data = {...form, username:form.username.toLowerCase().trim()};
      if(editId) { await sbUpdate('app_users',editId,data); }
      else { await sbInsert('app_users',[data]); }
      setShowForm(false); setEditId(null);
      setForm({username:'',password:'',nama:'',role:'kasir',pin:'',is_active:true});
      load();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const toggleActive = async(user)=>{
    if(user.id===currentUser?.id) return alert('Tidak bisa menonaktifkan akun sendiri!');
    try { await sbUpdate('app_users',user.id,{is_active:!user.is_active}); load(); }
    catch(e){ alert('Gagal: '+e.message); }
  };

  return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        {onBack&&<button onClick={onBack} style={{background:GL,border:`1px solid ${G}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:GD}}>← Kembali</button>}

          style={{padding:'8px 16px',background:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:13}}>+ Tambah</button>
      </div>

      {showForm && (
        <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:16,boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
          <h4 style={{margin:'0 0 12px',fontSize:14}}>{editId?'✏️ Edit':'➕ Tambah'} User</h4>
          {[['nama','Nama Lengkap *'],['username','Username *'],['password','Password *'],['pin','PIN (4-6 digit)']].map(([k,label])=>(
            <div key={k} style={{marginBottom:8}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>{label}</label>
              <input value={form[k]||''} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={label}
                type={k==='password'?'password':'text'}
                style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:14,boxSizing:'border-box'}}/>
            </div>

          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Role</label>
            <div style={{display:'flex',gap:8}}>
              {[['admin','👑 Admin'],['kasir','🧑‍💼 Kasir']].map(([val,label])=>(
                <button key={val} onClick={()=>setForm(f=>({...f,role:val}))}
                  style={{flex:1,padding:'9px 0',border:`2px solid ${form.role===val?G:'#eee'}`,borderRadius:8,background:form.role===val?GL:'#fff',color:form.role===val?GD:MT,fontWeight:form.role===val?700:500,cursor:'pointer',fontSize:13}}>

                <div style={{fontWeight:700,fontSize:14}}>{u.nama}

                {u.id!==currentUser?.id&&(

  );

// ── GLOBAL DATA SYNC ──────────────────────────────────────────────────────
// Dispatch event ketika ada perubahan data
const notifyDataChanged = (type='all') => {
  window.dispatchEvent(new CustomEvent('kasir:dataChanged', {detail:{type}}));
};

// Hook untuk listen perubahan data
const useDataSync = (callback, deps=[]) => {
  React.useEffect(()=>{
    callback();
    const handler = () => callback();
    window.addEventListener('kasir:dataChanged', handler);
    return () => window.removeEventListener('kasir:dataChanged', handler);
  }, deps);
};

};

function App() {
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [currentUser, setCurrentUser] = useState(()=>getSession());
  const [refreshKey, setRefreshKey]   = useState(0);

  // Listen for data changes globally
  React.useEffect(()=>{
    const handler = () => setRefreshKey(k=>k+1);
    window.addEventListener('kasir:dataChanged', handler);
    return () => window.removeEventListener('kasir:dataChanged', handler);
  },[]);

  // Load toko settings
  useEffect(()=>{
    (async()=>{
      try {
        const settings = await sbGet('app_settings',{order:'key'});
        settings.forEach(s=>{
          if(s.key==='toko_nama')    window.TOKO_NAMA    = s.value;
          if(s.key==='toko_tagline') window.TOKO_TAGLINE = s.value;
          if(s.key==='toko_alamat')  window.TOKO_ALAMAT  = s.value;
          if(s.key==='toko_telp')    window.TOKO_TELP    = s.value;
        if(s.key==='cap_url')       window.TOKO_CAP_URL    = s.value;
        if(s.key==='printer_ukuran') window.PRINTER_UKURAN  = s.value;
        if(s.key==='printer_auto')   window.PRINTER_AUTO    = s.value;
        if(s.key==='struk_footer')   window.STRUK_FOOTER    = s.value;
        if(s.key==='struk_show_logo')window.STRUK_SHOW_LOGO = s.value;
        });
      } catch(e){}
      // Load customers untuk piutang validation
      try {
        const custs = await sbGet('customers',{order:'name'});
        window._customers = custs||[];
      } catch(e){}
    })();
  },[]);

  const handleLogin = (user) => { setCurrentUser(user); setPage(user.role==='kasir'?'transaksi':'dashboard'); };
  const handleLogout = () => { clearSession(); setCurrentUser(null); setPage("dashboard"); };

  // Tampilkan login page kalau belum login
  if(!currentUser) return <LoginPage onLogin={handleLogin}/>;

  const isAdmin = currentUser?.role === 'admin';

  const renderPage = () => {
    // Kasir hanya bisa akses transaksi & dashboard
    if(!isAdmin && !['dashboard','transaksi'].includes(page)) {
      return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60vh',color:MT,gap:12}}>
          <div style={{fontSize:48}}>🔒</div>
          <div style={{fontSize:16,fontWeight:700,color:TX}}>Akses Terbatas</div>
          <div style={{fontSize:13}}>Fitur ini hanya untuk Admin</div>
          <button onClick={()=>setPage('transaksi')} style={{marginTop:8,padding:'10px 20px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>
            Kembali ke Transaksi
          </button>
        </div>
      );
    }
    switch(page) {
      case "dashboard":  return <Dashboard onNavigate={setPage} currentUser={currentUser} refreshKey={refreshKey}/>;
      case "transaksi":  return <Transaksi/>;
      case "manajemen":  return isAdmin ? <ManajemenHub refreshKey={refreshKey}/> : null;
      case "keuangan":   return isAdmin ? <Keuangan refreshKey={refreshKey}/> : null;
      case "laporan":    return <Laporan/>;
      case "ppob":       return <PPOB/>;
      case "absensi":    return <Absensi/>;
      case "shift":      return <Shift/>;
      case "pembelian":  return <Pembelian/>;
      case "scan_nota":  return <ScanNota onBack={()=>setPage('pembelian')} onDataReady={()=>setPage('pembelian')}/>;
      case "pengaturan": return isAdmin ? <Pengaturan currentUser={currentUser}/> : <div style={{padding:32,textAlign:"center",color:MT}}>🔒 Akses Admin Only</div>;
      default:           return <Dashboard onNavigate={setPage} currentUser={currentUser}/>;
    }
  };

  return <div style={{minHeight:"100vh",background:GR,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
    <Sidebar active={page} onNavigate={setPage} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
    <div>
      <TopBar title={PAGE_TITLES[page]} onMenuToggle={()=>setSidebarOpen(o=>!o)}/>
      <main style={{minHeight:"calc(100vh - 60px)",paddingBottom:70}}>{renderPage()}</main>
    </div>
    <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #eee",display:"flex",justifyContent:"space-around",padding:"8px 0",boxShadow:"0 -2px 8px rgba(0,0,0,0.07)",zIndex:20}}>
      {[{id:"dashboard",icon:"🏠",label:"Home"},{id:"transaksi",icon:"🛒",label:"Jual"},{id:"keuangan",icon:"💰",label:"Kas"},{id:"laporan",icon:"📊",label:"Laporan"},{id:"pengaturan",icon:"⚙️",label:"Atur"}].map(item=>(
        <button key={item.id} onClick={()=>setPage(item.id)}
          style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:page===item.id?G:MT,fontWeight:page===item.id?700:400}}>
          <span style={{fontSize:20}}>{item.icon}</span>
          <span style={{fontSize:10}}>{item.label}</span>
        </button>
      ))}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
  <script>
    // Register Service Worker (only if sw.js exists)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // Check if sw.js exists first
          const swCheck = await fetch('/sw.js',{method:'HEAD'}).catch(()=>({ok:false}));
          if(!swCheck.ok) { console.log('[PWA] sw.js not found, skipping SW registration'); return; }
          const reg = await navigator.serviceWorker.register('/sw.js');
          console.log('[PWA] Service Worker registered:', reg.scope);
          
          // Check for updates
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // Ada update tersedia
                if (confirm('Update app tersedia! Reload sekarang?')) {
                  window.location.reload();
                }
              }
            });
          });
        } catch(err) {
          console.warn('[PWA] SW registration failed:', err);
        }
      });
    }

    // Install prompt (Android)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Tampilkan tombol install custom
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'flex';
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const btn = document.getElementById('pwa-install-btn');
      if (btn) btn.style.display = 'none';
      console.log('[PWA] App installed!');
    });

    // Global install function dipanggil dari React
    window.installPWA = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      deferredPrompt = null;
    };
  </script>
</body>
</html>
