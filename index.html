          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Proses</label>
          <select value={action} onChange={e=>setAction(e.target.value)}
            style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
            <option value="refund">💵 Refund</option>
            <option value="tukar_barang">🔄 Tukar Barang</option>
          </select>
        </div>
      </div>
      {total>0&&<div style={{background:'#FFF0F0',borderRadius:8,padding:'8px 12px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontWeight:700,color:RD}}>Total Retur</span>
        <span style={{fontWeight:800,color:RD,fontSize:14}}>{fmt(total)}</span>
      </div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onDone} style={{flex:1,padding:10,background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>Batal</button>
        <button onClick={save} disabled={saving||!total}
          style={{flex:2,padding:10,background:saving||!total?MT:RD,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>
          {saving?'⏳ Menyimpan...':'🔄 Proses Retur'}
        </button>
      </div>
    </div>
  );
}



// ── RETUR FROM INVOICE ────────────────────────────────────────────────────
function ReturFromInvoice() {
  const [invoiceNo, setInvoiceNo]   = useState('');
  const [transaction, setTransaction] = useState(null);
  const [txItems, setTxItems]       = useState([]);
  const [searching, setSearching]   = useState(false);
  const [notFound, setNotFound]     = useState(false);
  const [selectedItems, setSelectedItems] = useState({});
  const [reason, setReason]         = useState('');
  const [action, setAction]         = useState('refund');
  const [saving, setSaving]         = useState(false);
  const [success, setSuccess]       = useState(null);

  const searchInvoice = async() => {
    if(!invoiceNo.trim()) return;
    setSearching(true); setNotFound(false); setTransaction(null); setTxItems([]);
    try {
      const txs = await sbGet('transactions',{eq:{invoice_no:invoiceNo.trim()}});
      if(!txs||txs.length===0){ setNotFound(true); setSearching(false); return; }
      const tx = txs[0];
      setTransaction(tx);
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id}});
      setTxItems(items||[]);
      const init = {};
      items.forEach(i=>{ init[i.id]={checked:false,qty:i.qty,price:i.price}; });
      setSelectedItems(init);
    } catch(e){ setNotFound(true); }
    setSearching(false);
  };

  const toggleItem = (id) => setSelectedItems(p=>({...p,[id]:{...p[id],checked:!p[id].checked}}));
  const updateQtyRetur = (id,val) => setSelectedItems(p=>({...p,[id]:{...p[id],qty:Math.max(1,parseInt(val)||1)}}));
  const totalRetur = txItems.filter(i=>selectedItems[i.id]?.checked).reduce((s,i)=>s+(selectedItems[i.id]?.price||i.price)*(selectedItems[i.id]?.qty||i.qty),0);

  const saveRetur = async() => {
    const returItems = txItems.filter(i=>selectedItems[i.id]?.checked);
    if(returItems.length===0) return alert('Pilih minimal 1 barang!');
    if(!reason) return alert('Alasan retur wajib!');
    setSaving(true);
    try {
      const now = new Date();
      const returnNo = `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
      const ret = await sbInsert('returns',[{
        return_no:returnNo, type:'dari_pelanggan', transaction_id:transaction.id,
        customer:transaction.customer||'Umum', reason, action, total:totalRetur, status:'Selesai',
        notes:`Retur dari invoice ${invoiceNo}`,
      }]);
      const retId = ret[0]?.id;
      if(retId) {
        await sbInsert('return_items', returItems.map(i=>({
          return_id:retId, product_id:i.product_id||null,
          product_name:i.product_name, qty:selectedItems[i.id]?.qty||i.qty,
          price:selectedItems[i.id]?.price||i.price, reason,
        })));
        for(const item of returItems) {
          if(item.product_id) {
            await sbInsert('stock_logs',[{
              product_id:item.product_id, type:'masuk',
              qty:selectedItems[item.id]?.qty||item.qty,
              notes:`Retur dari ${invoiceNo}`,
            }]);
          }
        }
      }
      notifyDataChanged('retur');
      setSuccess(returnNo);
      setTransaction(null); setTxItems([]); setInvoiceNo('');
      setSelectedItems({}); setReason(''); setAction('refund');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🔄 Retur dari Invoice</div>
      {success&&(
        <div style={{background:'#E8F5E9',border:`1px solid ${G}`,borderRadius:10,padding:14,marginBottom:14,textAlign:'center'}}>
          <div style={{fontSize:24,marginBottom:4}}>✅</div>
          <div style={{fontWeight:700,color:GD}}>Retur berhasil!</div>
          <div style={{fontSize:12,color:MT,marginTop:4}}>No: <b>{success}</b></div>
          <button onClick={()=>setSuccess(null)} style={{marginTop:10,padding:'8px 20px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Retur Lagi</button>
        </div>
      )}
      {!success&&(
        <>
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            <input value={invoiceNo} onChange={e=>setInvoiceNo(e.target.value.toUpperCase())}
              placeholder="Nomor invoice (INV-xxx)" onKeyDown={e=>e.key==='Enter'&&searchInvoice()}
              style={{flex:1,padding:'11px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',fontFamily:'monospace'}}
              onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
            <button onClick={searchInvoice} disabled={searching||!invoiceNo.trim()}
              style={{padding:'11px 20px',background:searching?MT:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer'}}>
              {searching?'⏳':'🔍 Cari'}
            </button>
          </div>
          {notFound&&<div style={{textAlign:'center',padding:'20px 0',color:RD}}><div style={{fontSize:32}}>❌</div><div style={{fontWeight:600}}>Invoice tidak ditemukan</div></div>}
          {transaction&&(
            <>
              <div style={{background:'#F5F6FA',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{transaction.invoice_no}</div>
                  <div style={{fontSize:11,color:MT}}>{transaction.customer||'Umum'} · {transaction.created_at?.slice(0,10)}</div>
                </div>
                <div style={{fontWeight:800,color:G}}>{fmt(transaction.total)}</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:MT,marginBottom:6}}>Pilih barang yang diretur:</div>
                {txItems.map(item=>(
                  <div key={item.id} onClick={()=>toggleItem(item.id)}
                    style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:9,marginBottom:5,background:selectedItems[item.id]?.checked?'#E8F5E9':'#F5F6FA',border:`1.5px solid ${selectedItems[item.id]?.checked?G:'#eee'}`,cursor:'pointer'}}>
                    <input type="checkbox" checked={selectedItems[item.id]?.checked||false} onChange={()=>toggleItem(item.id)} style={{width:16,height:16,accentColor:G}} onClick={e=>e.stopPropagation()}/>
                    <div style={{flex:1,fontSize:12,fontWeight:500}}>{item.product_name}</div>
                    <div style={{fontSize:11,color:MT}}>{item.qty}x {fmt(item.price)}</div>
                    {selectedItems[item.id]?.checked&&(
                      <input type="number" min="1" max={item.qty} value={selectedItems[item.id]?.qty}
                        onChange={e=>{e.stopPropagation();updateQtyRetur(item.id,e.target.value);}}
                        onClick={e=>e.stopPropagation()}
                        style={{width:50,padding:'3px 6px',border:`1px solid ${G}`,borderRadius:6,fontSize:12,textAlign:'center'}}/>
                    )}
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                <div>
                  <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Alasan *</label>
                  <select value={reason} onChange={e=>setReason(e.target.value)}
                    style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
                    <option value="">-- Pilih --</option>
                    {['Barang rusak','Barang cacat','Salah produk','Salah ukuran','Kelebihan stok','Lainnya'].map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Proses</label>
                  <select value={action} onChange={e=>setAction(e.target.value)}
                    style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
                    <option value="refund">💵 Refund</option>
                    <option value="tukar_barang">🔄 Tukar Barang</option>
                  </select>
                </div>
              </div>
              {totalRetur>0&&<div style={{background:GL,borderRadius:8,padding:'8px 12px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
                <span style={{fontWeight:700}}>Total Retur</span>
                <span style={{fontWeight:800,color:GD,fontSize:14}}>{fmt(totalRetur)}</span>
              </div>}
              <button onClick={saveRetur} disabled={saving||!totalRetur}
                style={{width:'100%',padding:12,background:saving||!totalRetur?MT:RD,color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:14,cursor:'pointer'}}>
                {saving?'⏳ Menyimpan...':'🔄 Proses Retur'}
              </button>
            </>
          )}
        </>
      )}
    </div>
  );
}


// ── LAPORAN LABA RUGI ─────────────────────────────────────────────────────
function LaporanLabaRugi({period}) {
  const [dataBarang, setDataBarang] = useState([]);
  const [dataPeriode, setDataPeriode] = useState([]);
  const [loading, setLoading]       = useState(true);
  const [activeTab, setActiveTab]   = useState('periode'); // periode | barang

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const [txs, items, prods] = await Promise.all([
          sbGet('transactions',{order:'created_at'}),
          sbGet('transaction_items',{order:'id'}),
          sbGetAll('products',{select:'id,name,buy_price,price',order:'name'}),
        ]);

        const prodMap = {};
        prods.forEach(p=>{ prodMap[p.name]={buy_price:p.buy_price||0, price:p.price||0}; });

        const validTxs = txs.filter(t=>t.created_at>=sinceStr&&t.status==='Lunas');
        const validTxIds = new Set(validTxs.map(t=>t.id));
        const filteredItems = items.filter(i=>validTxIds.has(i.transaction_id));

        // Per barang
        const barangMap = {};
        filteredItems.forEach(i=>{
          const buyPrice = prodMap[i.product_name]?.buy_price || 0;
          if(!barangMap[i.product_name]) barangMap[i.product_name] = {name:i.product_name, qty:0, omset:0, modal:0, laba:0, hasBuyPrice: buyPrice>0};
          barangMap[i.product_name].qty   += i.qty;
          barangMap[i.product_name].omset += i.price * i.qty;
          barangMap[i.product_name].modal += buyPrice * i.qty;
          barangMap[i.product_name].laba  += (i.price - buyPrice) * i.qty;
        });
        setDataBarang(Object.values(barangMap).sort((a,b)=>b.laba-a.laba));

        // Per hari
        const hariMap = {};
        for(let i=days-1;i>=0;i--){
          const d = new Date();
          d.setDate(d.getDate()-i);
          const key = d.toISOString().slice(0,10);
          hariMap[key] = {date:key, omset:0, modal:0, laba:0};
        }
        filteredItems.forEach(i=>{
          const tx = txs.find(t=>t.id===i.transaction_id);
          const key = tx?.created_at?.slice(0,10);
          if(key && hariMap[key]) {
            const buyPrice = prodMap[i.product_name]?.buy_price || 0;
            hariMap[key].omset += i.price * i.qty;
            hariMap[key].modal += buyPrice * i.qty;
            hariMap[key].laba  += (i.price - buyPrice) * i.qty;
          }
        });
        setDataPeriode(Object.values(hariMap));
      } catch(e){ console.error(e); }
      setLoading(false);
    })();
  },[period]);

  const totalOmset = dataBarang.reduce((s,d)=>s+d.omset,0);
  const totalModal  = dataBarang.reduce((s,d)=>s+d.modal,0);
  const totalLaba   = dataBarang.reduce((s,d)=>s+d.laba,0);
  const prodTanpaHargaBeli = dataBarang.filter(d=>!d.hasBuyPrice).length;
  const maxLaba = Math.max(...dataBarang.map(d=>Math.abs(d.laba)),1);
  const maxHariLaba = Math.max(...dataPeriode.map(d=>Math.abs(d.laba)),1);

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>💹 Laporan Laba Rugi ({period} Hari)</div>

      {/* Warning jika ada produk tanpa harga beli */}
      {prodTanpaHargaBeli>0&&(
        <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#7d4e00'}}>
          ⚠️ <b>{prodTanpaHargaBeli} produk</b> belum diisi harga beli — laba tidak akurat. Edit produk di menu Manajemen → Produk.
        </div>
      )}

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
        {[
          {label:'Total Omset',value:fmt(totalOmset),color:'#3498DB',icon:'💰'},
          {label:'Total Modal',value:fmt(totalModal),color:OR,icon:'🏭'},
          {label:'Total Laba',value:fmt(totalLaba),color:totalLaba>=0?G:RD,icon:totalLaba>=0?'📈':'📉'},
        ].map((s,i)=>(
          <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:'10px 12px',borderLeft:`3px solid ${s.color}`}}>
            <div style={{fontSize:10,color:MT}}>{s.icon} {s.label}</div>
            <div style={{fontSize:14,fontWeight:800,color:s.color,marginTop:3}}>{s.value}</div>
            {i===2&&totalOmset>0&&<div style={{fontSize:10,color:MT,marginTop:2}}>Margin: {Math.round(totalLaba/totalOmset*100)}%</div>}
          </div>
        ))}
      </div>

      {/* Tab switch */}
      <div style={{display:'flex',gap:0,background:'#F5F6FA',borderRadius:10,overflow:'hidden',marginBottom:14}}>
        {[['periode','📅 Per Hari'],['barang','🏪 Per Produk']].map(([tab,label])=>(
          <button key={tab} onClick={()=>setActiveTab(tab)}
            style={{flex:1,padding:'9px 0',border:'none',background:activeTab===tab?G:'transparent',color:activeTab===tab?'#fff':MT,fontWeight:activeTab===tab?700:500,cursor:'pointer',fontSize:12,transition:'all 0.15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Per Hari */}
      {activeTab==='periode'&&(
        <div>
          {/* Mini bar chart */}
          {dataPeriode.some(d=>d.laba!==0)&&(
            <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80,marginBottom:14,padding:'0 4px'}}>
              {dataPeriode.map((d,i)=>{
                const h = Math.abs(d.laba)/maxHariLaba*70;
                const isPos = d.laba>=0;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    <div style={{width:'100%',background:isPos?G:RD,borderRadius:'2px 2px 0 0',height:Math.max(h,d.laba!==0?2:1),opacity:d.laba===0?0.2:0.85}}/>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{maxHeight:300,overflowY:'auto'}}>
            {dataPeriode.filter(d=>d.omset>0).length===0
              ? <div style={{textAlign:'center',padding:'24px 0',color:MT}}>Belum ada data penjualan di periode ini</div>
              : dataPeriode.filter(d=>d.omset>0).reverse().map((d,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'#F5F6FA',borderRadius:8,marginBottom:5,borderLeft:`3px solid ${d.laba>=0?G:RD}`}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:12}}>{d.date}</div>
                    <div style={{fontSize:10,color:MT,marginTop:1}}>Omset: {fmt(d.omset)} · Modal: {fmt(d.modal)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:800,fontSize:14,color:d.laba>=0?G:RD}}>{fmt(d.laba)}</div>
                    {d.omset>0&&<div style={{fontSize:10,color:MT}}>{Math.round(d.laba/d.omset*100)}% margin</div>}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* Per Produk */}
      {activeTab==='barang'&&(
        <div style={{maxHeight:400,overflowY:'auto'}}>
          {dataBarang.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:MT}}>Belum ada data</div>
            : dataBarang.map((d,i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {d.name}
                      {!d.hasBuyPrice&&<span style={{fontSize:9,color:OR,marginLeft:4,background:'#FFF3E0',padding:'1px 4px',borderRadius:3}}>Harga beli belum diisi</span>}
                    </div>
                    <div style={{fontSize:10,color:MT,marginTop:1}}>
                      {d.qty} pcs · Omset: {fmt(d.omset)}
                      {d.hasBuyPrice&&` · Modal: ${fmt(d.modal)}`}
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                    <div style={{fontWeight:800,fontSize:13,color:d.laba>=0?G:RD}}>{d.hasBuyPrice?fmt(d.laba):'—'}</div>
                    {d.hasBuyPrice&&d.omset>0&&<div style={{fontSize:10,color:MT}}>{Math.round(d.laba/d.omset*100)}%</div>}
                  </div>
                </div>
                <div style={{height:5,background:'#F5F6FA',borderRadius:3}}>
                  <div style={{height:'100%',background:d.laba>=0?G:RD,borderRadius:3,width:d.hasBuyPrice?`${(Math.abs(d.laba)/maxLaba)*100}%`:'0%',opacity:0.7}}/>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ── RINGKASAN PENJUALAN ────────────────────────────────────────────────────
function RingkasanPenjualan({period, onBack}) {
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [periode, setPeriode] = useState('hari_ini');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo, setCustomTo]     = useState('');

  const today     = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini')      { dari=today; sampai=today; }
      else if(periode==='kemarin')  { dari=yesterday; sampai=yesterday; }
      else if(periode==='minggu')   { dari=new Date(Date.now()-7*86400000).toISOString().slice(0,10); sampai=today; }
      else if(periode==='bulan')    { dari=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10); sampai=today; }
      else if(periode==='custom')   { dari=customFrom; sampai=customTo; }

      const [txs, items, prods, yestTxs] = await Promise.all([
        sbGet('transactions',{order:'created_at',asc:false}),
        sbGet('transaction_items',{order:'id'}),
        sbGetAll('products',{select:'id,stock,buy_price',order:'id'}),
        sbGet('transactions',{order:'created_at',asc:false}),
      ]);

      const filterTx = (txList, d1, d2) => txList.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        return tgl>=d1&&tgl<=d2&&t.status==='Lunas';
      });

      const txPeriode  = filterTx(txs, dari, sampai);
      const txKemarin  = filterTx(txs, yesterday, yesterday);

      const omset      = txPeriode.reduce((s,t)=>s+t.total,0);
      const omsetKem   = txKemarin.reduce((s,t)=>s+t.total,0);
      const jumlahTx   = txPeriode.length;
      const jumlahKem  = txKemarin.length;

      // Keuntungan = omset - HPP (buy_price * qty sold)
      const txIds = new Set(txPeriode.map(t=>t.id));
      const prodMap = {};
      prods.forEach(p=>{ prodMap[p.id]=p.buy_price||0; });
      const hpp = items.filter(i=>txIds.has(i.transaction_id))
        .reduce((s,i)=>s+(prodMap[i.product_id]||0)*i.qty,0);
      const laba = omset - hpp;

      // Sisa modal = total stok * harga beli
      const sisaModal = prods.reduce((s,p)=>s+(p.stock||0)*(p.buy_price||0),0);

      // Per jam
      const jamMap = {};
      for(let h=0;h<24;h++) jamMap[h]={jam:h,tx:0,omset:0};
      txPeriode.forEach(t=>{
        const h = new Date(t.created_at).getHours();
        jamMap[h].tx++;
        jamMap[h].omset+=t.total;
      });

      // Metode bayar
      const metodeMap = {};
      txPeriode.forEach(t=>{
        const m = t.metode_bayar||'Tunai';
        if(!metodeMap[m]) metodeMap[m]={name:m,count:0,total:0};
        metodeMap[m].count++; metodeMap[m].total+=t.total;
      });

      setData({omset,omsetKem,jumlahTx,jumlahKem,laba,hpp,sisaModal,
        jamMap:Object.values(jamMap),
        metode:Object.values(metodeMap),
        dari,sampai});
    } catch(e){ console.error(e); }
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode,customFrom,customTo]);

  const pctVs = (a,b) => b===0?0:Math.round((a-b)/b*100);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📊 Ringkasan Penjualan</h2>
      </div>

      {/* Filter periode */}
      <div style={{background:'#fff',borderRadius:12,padding:12,marginBottom:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:periode==='custom'?10:0}}>
          {[['hari_ini','Hari Ini'],['kemarin','Kemarin'],['minggu','Minggu Ini'],['bulan','Bulan Ini'],['custom','Custom']].map(([val,label])=>(
            <button key={val} onClick={()=>setPeriode(val)}
              style={{padding:'6px 12px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:11,fontWeight:periode===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
        {periode==='custom'&&(
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
              style={{flex:1,padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            <span style={{alignSelf:'center',color:MT}}>s/d</span>
            <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
              style={{flex:1,padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
        )}
      </div>

      {loading ? <Loading/> : !data ? null : (
        <>
          {/* Header */}
          <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',textAlign:'center',borderBottom:`3px solid ${G}`}}>
            <div style={{fontWeight:700,fontSize:13,color:MT,marginBottom:2}}>LAPORAN {periode==='hari_ini'?'HARI INI':periode==='kemarin'?'KEMARIN':'PERIODE'}</div>
            <div style={{fontSize:11,color:MT}}>{data.dari}{data.dari!==data.sampai?` — ${data.sampai}`:''}</div>
          </div>

          {/* 3 stat cards dengan % vs kemarin */}
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
            {[
              {label:'Jml Transaksi',value:data.jumlahTx,prev:data.jumlahKem,unit:'tx',color:TX},
              {label:'Keuntungan',value:data.laba,prev:0,unit:'rp',color:data.laba>=0?G:RD},
              {label:'Pendapatan',value:data.omset,prev:data.omsetKem,unit:'rp',color:G},
            ].map((s,i)=>{
              const pct = pctVs(s.value,s.prev);
              return (
                <div key={i} style={{background:'#fff',borderRadius:10,padding:'12px 16px',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:11,color:MT,marginBottom:4}}>{s.label}</div>
                    <div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.unit==='rp'?fmt(s.value):s.value}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:700,color:pct>=0?G:RD}}>{pct>=0?'+':''}{pct}%</div>
                    <div style={{fontSize:10,color:MT}}>vs kemarin</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Grafik per jam */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>LAPORAN TRANSAKSI PER JAM</div>
            <div style={{fontSize:11,color:MT,marginBottom:12}}>{data.dari}</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80}}>
              {data.jamMap.map((j,i)=>{
                const maxTx = Math.max(...data.jamMap.map(x=>x.tx),1);
                const h = (j.tx/maxTx)*70;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    <div style={{width:'100%',background:j.tx>0?G:'#F5F6FA',borderRadius:'2px 2px 0 0',height:Math.max(h,j.tx>0?3:1)}}/>
                    {i%4===0&&<div style={{fontSize:7,color:MT,marginTop:2}}>{j.jam}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Metode pembayaran */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>METODE PEMBAYARAN</div>
            {data.metode.length===0
              ? <div style={{color:MT,fontSize:12,textAlign:'center',padding:'12px 0'}}>Tidak ada transaksi</div>
              : <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {data.metode.map((m,i)=>(

            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── LAPORAN LABA RUGI DETAIL ───────────────────────────────────────────────
function LaporanLabaRugiDetail({onBack}) {
  const [periode, setPeriode] = useState('bulan');
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [showBeforePiutang, setShowBeforePiutang] = useState(false);

  const today = new Date().toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini') { dari=today; sampai=today; }
      else if(periode==='bulan') {
        dari = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        sampai = today;
      }

      const [txs, items, prods] = await Promise.all([
        sbGet('transactions',{order:'created_at',asc:false}),
        sbGet('transaction_items',{order:'id'}),
        sbGetAll('products',{select:'id,buy_price',order:'id'}),
      ]);

      const prodMap = {};
      prods.forEach(p=>{ prodMap[p.id]=p.buy_price||0; });

      // Filter transaksi periode
      const txPeriode = txs.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(tgl<dari||tgl>sampai) return false;
        return showBeforePiutang ? true : t.status==='Lunas';
      });

      const txIds = new Set(txPeriode.map(t=>t.id));
      const filteredItems = items.filter(i=>txIds.has(i.transaction_id));

      const totalPenjualan = txPeriode.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0);
      const hpp = filteredItems.reduce((s,i)=>s+(prodMap[i.product_id]||0)*i.qty,0);
      const labaBersih = totalPenjualan - hpp;

      // Per hari
      const hariMap = {};
      txPeriode.forEach(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(!hariMap[tgl]) hariMap[tgl]={date:tgl,omset:0,hpp:0,tx:0};
        if(t.status==='Lunas') hariMap[tgl].omset+=t.total;
        hariMap[tgl].tx++;
      });
      filteredItems.forEach(i=>{
        const tx = txPeriode.find(t=>t.id===i.transaction_id);
        if(tx) {
          const tgl = tx.created_at?.slice(0,10);
          if(hariMap[tgl]) hariMap[tgl].hpp+=(prodMap[i.product_id]||0)*i.qty;
        }
      });

      setData({
        dari,sampai,
        totalPenjualan,hpp,labaBersih,
        perHari: Object.values(hariMap).sort((a,b)=>b.date.localeCompare(a.date)),
      });
    } catch(e){}
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode,showBeforePiutang]);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📊 Laporan Laba Rugi</h2>
      </div>

      {/* Filter */}
      <div style={{background:'#fff',borderRadius:12,padding:12,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          {[['hari_ini','Hari Ini'],['bulan','Bulan Ini']].map(([val,label])=>(
            <button key={val} onClick={()=>setPeriode(val)}
              style={{padding:'6px 14px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:12,fontWeight:periode===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12}}>
          <input type="checkbox" checked={showBeforePiutang} onChange={e=>setShowBeforePiutang(e.target.checked)} style={{width:15,height:15,accentColor:G}}/>
          <span>Tampilkan Pemasukan Sebelum Piutang dibayar</span>
        </label>
      </div>

      {loading?<Loading/>:!data?null:(
        <>
          {/* Summary */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pemasukan</div>
                <div style={{fontWeight:800,fontSize:16,color:G,marginTop:2}}>{fmt(data.totalPenjualan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Penjualan</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(data.totalPenjualan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pemasukan Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>Rp 0</div>
              </div>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pengeluaran</div>
                <div style={{fontWeight:800,fontSize:16,color:RD,marginTop:2}}>{fmt(data.hpp)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Harga Pokok Penjualan</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>{fmt(data.hpp)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pengeluaran Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>Rp 0</div>
              </div>
            </div>
            <div style={{background:'#F5F6FA',borderRadius:10,padding:'14px 0',textAlign:'center',borderTop:'1px solid #eee'}}>
              <div style={{fontSize:24,fontWeight:900,color:data.labaBersih>=0?G:RD}}>{fmt(data.labaBersih)}</div>
              <div style={{fontSize:11,color:MT,marginTop:4}}>Laba Bersih</div>
            </div>
          </div>

          <div style={{fontSize:11,color:MT,marginBottom:10}}>*tekan untuk melihat lebih detail</div>

          {/* Per hari */}
          {data.perHari.map((d,i)=>(
            <div key={i} style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:8,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',display:'flex',gap:14,alignItems:'flex-start'}}>
              <div style={{textAlign:'center',flexShrink:0,minWidth:36}}>
                <div style={{fontWeight:900,fontSize:22,lineHeight:1,color:TX}}>{d.date.slice(8)}</div>
                <div style={{fontSize:10,color:MT}}>{new Date(d.date).toLocaleDateString('id-ID',{month:'short'})}</div>
                <div style={{fontSize:10,color:MT}}>{d.date.slice(0,4)}</div>
              </div>
              <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:11}}>
                <div><div style={{color:MT}}>Transaksi</div><div style={{fontWeight:700,color:G}}>{fmt(d.omset)}</div></div>
                <div><div style={{color:MT}}>Pembelian (HPP)</div><div style={{fontWeight:700,color:RD}}>{fmt(d.hpp)}</div></div>
                <div><div style={{color:MT}}>Pemasukan Lain</div><div style={{fontWeight:600}}>Rp 0</div></div>
                <div><div style={{color:MT}}>Pengeluaran Lain</div><div style={{fontWeight:600}}>Rp 0</div></div>
                <div style={{gridColumn:'span 2'}}><span style={{color:MT}}>{d.tx} Transaksi</span></div>
              </div>
              <div style={{color:G,fontSize:18,flexShrink:0}}>›</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function ArusKeuanganDetail({onBack}) {
  const [periode, setPeriode] = useState('bulan');
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);

  const today = new Date().toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini') { dari=today; sampai=today; }
      else {
        dari = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        sampai = today;
      }

      const [txs, pos, debts] = await Promise.all([
        sbGet('transactions',{order:'created_at',asc:false}),
        sbGet('purchase_orders',{order:'created_at',asc:false}),
        sbGet('debts',{order:'created_at',asc:false}),
      ]);

      const filterDate = (list, d1, d2) => list.filter(t=>t.created_at?.slice(0,10)>=d1&&t.created_at?.slice(0,10)<=d2);

      const txPeriode  = filterDate(txs,dari,sampai).filter(t=>t.status==='Lunas');
      const poPeriode  = filterDate(pos,dari,sampai).filter(p=>p.bayar==='Lunas');
      const debtPeriode= filterDate(debts,dari,sampai).filter(d=>d.type==='hutang');

      const totalPemasukan  = txPeriode.reduce((s,t)=>s+t.total,0);
      const totalPengeluaran = poPeriode.reduce((s,p)=>s+p.total,0) + debtPeriode.filter(d=>d.status==='Lunas').reduce((s,d)=>s+d.amount,0);
      const neto = totalPemasukan - totalPengeluaran;

      // Per hari
      const hariMap = {};
      txPeriode.forEach(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(!hariMap[tgl]) hariMap[tgl]={date:tgl,pemasukan:0,pengeluaran:0,tx:0};
        hariMap[tgl].pemasukan+=t.total; hariMap[tgl].tx++;

        const tgl = p.created_at?.slice(0,10);

        hariMap[tgl].pengeluaran+=p.total;
      });

      setData({
        dari,sampai,totalPemasukan,totalPengeluaran,neto,
        perHari: Object.values(hariMap).sort((a,b)=>b.date.localeCompare(a.date)),

    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode]);

        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>💸 Laporan Arus Keuangan</h2>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[['hari_ini','Hari Ini'],['bulan','Bulan Ini']].map(([val,label])=>(
          <button key={val} onClick={()=>setPeriode(val)}
            style={{padding:'6px 14px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:12,fontWeight:periode===val?700:500,cursor:'pointer'}}>
            {label}
          </button>
        ))}
      </div>

      {loading?<Loading/>:!data?null:(
        <>
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pemasukan</div>
                <div style={{fontWeight:800,fontSize:16,color:G,marginTop:2}}>{fmt(data.totalPemasukan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Pemasukan</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(data.totalPemasukan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pemasukan Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>Rp 0</div>
              </div>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pengeluaran</div>
                <div style={{fontWeight:800,fontSize:16,color:RD,marginTop:2}}>{fmt(data.totalPengeluaran)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Pengeluaran</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>{fmt(data.totalPengeluaran)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pengeluaran Lain</div>

function LaporanPengunjung({onBack}) {
  const [data, setData]     = useState([]);

  const [periode, setPeriode] = useState('bulan');

  const today = new Date().toISOString().slice(0,10);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        let dari;
        if(periode==='hari_ini') dari=today;
        else dari=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        const txs = await sbGet('transactions',{order:'created_at',asc:false});
        const filtered = txs.filter(t=>t.created_at?.slice(0,10)>=dari);
        // Group by customer
        const map = {};
        filtered.forEach(t=>{
          const name = t.customer||'Umum (Walk-in)';
          if(!map[name]) map[name]={name,kunjungan:0,total:0,lastVisit:''};
          map[name].kunjungan++;
          map[name].total+=t.total;
          if(t.created_at>map[name].lastVisit) map[name].lastVisit=t.created_at;
        });
        setData(Object.values(map).sort((a,b)=>b.kunjungan-a.kunjungan));
      } catch(e){}
      setLoading(false);

  const totalKunjungan = data.reduce((s,d)=>s+d.kunjungan,0);

// ── SCAN NOTA AI ───────────────────────────────────────────────────────────
function ScanNota({onBack, onDataReady}) {
  const [step, setStep]           = useState('upload');
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [extractedData, setExtractedData] = useState(null);
  const [error, setError]         = useState('');
  const [suppliers, setSuppliers] = useState([]);
  const [saving, setSaving]       = useState(false);
  const [uploadingPhoto, setUploadingPhoto] = useState(false);
  const [photoUrl, setPhotoUrl]   = useState('');
  const [showAddSupplier, setShowAddSupplier] = useState(false);
  const [newSupplier, setNewSupplier] = useState({name:'',phone:'',address:''});
  const [savingSupplier, setSavingSupplier] = useState(false);

  useEffect(()=>{
    sbGet('suppliers',{order:'name'}).then(s=>setSuppliers(s||[])).catch(()=>{});
    // Load products cache untuk matching
    if(!window._cachedProducts||window._cachedProducts.length===0) {
      sbGetAll('products',{order:'name'}).then(p=>{ window._cachedProducts=p||[]; }).catch(()=>{});
    }
  },[]);

  const handleFile = (file) => {
    if(!file) return;
    if(!file.type.startsWith('image/')) return setError('File harus berupa gambar!');
    if(file.size > 10*1024*1024) return setError('Ukuran gambar maksimal 10MB!');
    setImageFile(file); setError('');
    const reader = new FileReader();
    reader.onload = e => setImagePreview(e.target.result);
    reader.readAsDataURL(file);
  };

  // Upload foto ke Supabase Storage
  const uploadFoto = async(file) => {
    setUploadingPhoto(true);
    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      const ext = file.name?.split('.').pop() || 'jpg';
      const filename = `nota-pembelian/${Date.now()}.${ext}`;
      const { data, error } = await sb.storage.from('toko-assets').upload(filename, file, {
        cacheControl: '3600', upsert: false, contentType: file.type
      });
      if(error) throw error;
      const { data: urlData } = sb.storage.from('toko-assets').getPublicUrl(filename);
      setPhotoUrl(urlData.publicUrl);
      return urlData.publicUrl;
    } catch(e) {
      console.error('Upload foto gagal:', e);
      return '';
    } finally { setUploadingPhoto(false); }
  };

  // Tambah supplier baru
  const saveNewSupplier = async() => {
    if(!newSupplier.name.trim()) return alert('Nama supplier wajib!');
    setSavingSupplier(true);
    try {
      const [sup] = await sbInsert('suppliers',[{
        name: newSupplier.name.trim(),
        phone: newSupplier.phone||'',
        address: newSupplier.address||'',
      }]);
      const updated = [...suppliers, sup];
      setSuppliers(updated);
      setExtractedData(p=>({...p, supplier_id: String(sup.id)}));
      setShowAddSupplier(false);
      setNewSupplier({name:'',phone:'',address:''});
      alert(`✅ Supplier "${sup.name}" berhasil ditambahkan!`);
    } catch(e){ alert('Gagal: '+e.message); }
    setSavingSupplier(false);
  };

  const analyzeNota = async() => {
    if(!imageFile) return;
    setStep('loading');
    setError('');
    try {
      // Upload foto dulu ke Supabase
      const fotoUrl = await uploadFoto(imageFile);

      // Convert to base64 for AI
      const base64 = await new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(imageFile);
      });

      // Panggil Netlify Function sebagai proxy (hindari CORS)
      const response = await fetch('/api/analyze-nota', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ base64, mediaType: imageFile.type })
      });

      if(!response.ok) {
        const errData = await response.json().catch(()=>({error:'Server error'}));
        throw new Error(errData.error || `Error ${response.status}`);
      }

      let parsed;
      try {
        const rawText = await response.text();
        // Coba parse JSON
        try {
          parsed = JSON.parse(rawText);
        } catch(jsonErr) {
          // Kalau bukan JSON, coba extract JSON dari text
          const jsonMatch = rawText.match(/[{][\s\S]*[}]/);
          if(jsonMatch) {
            parsed = JSON.parse(jsonMatch[0]);
          } else {
            throw new Error('AI tidak bisa membaca nota ini. Pastikan foto jelas dan terang!');
          }
        }
        if(parsed.error) throw new Error(parsed.error);
      } catch(e) {
        throw new Error('Gagal membaca nota: '+e.message+'. Pastikan foto jelas dan terang!');
      }

      // Normalize
      parsed.items = (parsed.items||[]).map(item=>({
        nama:   (item.nama||'').toUpperCase(),
        qty:    parseInt(item.qty)||1,
        harga:  parseInt(item.harga)||0,
        satuan: (item.satuan||'pcs').toUpperCase(),
        product_id: null,
      }));
      parsed.supplier     = (parsed.supplier||'').toUpperCase();
      parsed.tanggal      = parsed.tanggal||new Date().toISOString().slice(0,10);
      parsed.status_bayar = parsed.status_bayar||'Lunas';
      parsed.total        = parseInt(parsed.total)||parsed.items.reduce((s,i)=>s+i.qty*i.harga,0);
      parsed.catatan      = (parsed.catatan||'').toUpperCase();
      parsed.no_nota      = parsed.no_nota||'';
      parsed.supplier_id  = '';
      parsed.foto_url     = fotoUrl;

      // Auto-match supplier dari daftar

        const match = suppliers.find(s=>
          s.name.toLowerCase().includes(parsed.supplier.toLowerCase()) ||
          parsed.supplier.toLowerCase().includes(s.name.toLowerCase())
        );
        if(match) parsed.supplier_id = String(match.id);
      }

      if(parsed.items?.length>0 && window._cachedProducts?.length>0) {
        try {
          const prodList = window._cachedProducts.map(p=>p.id+'|'+p.name).join('\n');
          const itemList = parsed.items.map((it,i)=>(i+1)+'. '+it.nama).join('\n');

          const matchResp = await fetch('/api/analyze-nota', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              matchMode: true,
              itemList,
              prodList: prodList.slice(0, 8000), // limit token
            })
          });

          if(matchResp.ok) {
            const matchData = await matchResp.json();
            if(matchData.matches) {
              parsed.items = parsed.items.map((it,i)=>{
                const m = matchData.matches[i+1];
                if(m && m.product_id) {

                  if(prod) return {...it, product_id:prod.id, matched_name:prod.name, match_confidence:m.confidence};

                return it;

      }

      setExtractedData(parsed);
      setStep('review');

      await sbInsert('po_items', extractedData.items.map(item=>({

        qty:      item.qty,
        price:    item.harga,

                  🎁 Unit Besar<br/><span style={{fontSize:9,color:MT}}>roll/box/lusin</span>
                </button>
              </div>
              {item.tipe_unit==='besar'&&(
                <div style={{marginTop:4,padding:'5px 8px',background:'#F3E5F5',borderRadius:6,fontSize:10,color:'#8E44AD'}}>
                  ⚠️ Stok dikonversi ke unit kecil saat PO diterima
                </div>
              )}
            </div>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,paddingTop:10,borderTop:`2px solid ${G}`,marginTop:4}}>
          <span>Total</span>
          <span style={{color:G}}>{fmt(extractedData.items.reduce((s,i)=>s+i.qty*i.harga,0))}</span>
        </div>
      </div>

      <button onClick={savePO} disabled={saving||uploadingPhoto}
        style={{width:'100%',padding:14,background:saving||uploadingPhoto?MT:G,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer',marginBottom:16}}>
        {saving?'⏳ Menyimpan...':uploadingPhoto?'⏳ Upload foto...':'💾 Simpan Purchase Order'}
      </button>
    </div>
  );

  // ── LOADING ──
  if(step==='loading') return (
    <div style={{padding:40,textAlign:'center',maxWidth:480,margin:'0 auto'}}>
      <div style={{fontSize:56,marginBottom:16}}>🤖</div>
      <div style={{fontWeight:800,fontSize:18,marginBottom:8}}>AI Sedang Membaca Nota...</div>
      <div style={{color:MT,fontSize:13,marginBottom:8}}>Claude AI menganalisis foto nota pembelian</div>
      {uploadingPhoto&&<div style={{color:OR,fontSize:12,marginBottom:16}}>⏳ Upload foto ke storage...</div>}
      <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:16}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{width:12,height:12,borderRadius:'50%',background:G,opacity:0.3+i*0.35,animation:'pulse 1s infinite'}}/>
        ))}
      </div>
    </div>
  );

  // ── UPLOAD ──
  return (
    <div style={{padding:16,maxWidth:480,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📸 Scan Nota Pembelian</h2>
      </div>

      <div style={{background:'linear-gradient(135deg,#E8F5E9,#F1F8E9)',borderRadius:14,padding:20,marginBottom:14,textAlign:'center',border:`1px solid ${G}30`}}>
        <div style={{fontSize:48,marginBottom:6}}>🤖</div>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Asisten AI Kasir</div>
        <div style={{fontSize:12,color:MT,lineHeight:1.7}}>
          Foto nota → AI baca otomatis → Review & simpan ke PO<br/>
          Foto nota tersimpan otomatis di storage toko
        </div>
      </div>

      {error&&(
        <div style={{background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,color:RD}}>
          ❌ {error}
        </div>
      )}

      {imagePreview&&(
        <div style={{marginBottom:12,position:'relative'}}>
          <img src={imagePreview} alt="Preview" style={{width:'100%',maxHeight:260,objectFit:'contain',borderRadius:12,border:`2px solid ${G}`,background:'#f5f5f5'}}/>
          <button onClick={()=>{setImageFile(null);setImagePreview(null);}}
            style={{position:'absolute',top:8,right:8,background:'rgba(0,0,0,0.55)',border:'none',borderRadius:'50%',width:28,height:28,color:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>
            ✕
          </button>
        </div>
      )}

      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <label style={{flex:1,padding:'16px 8px',background:'#fff',border:`2px dashed ${G}`,borderRadius:12,cursor:'pointer',textAlign:'center',display:'block'}}>
          <input type="file" accept="image/*" capture="environment"
            onChange={e=>handleFile(e.target.files[0])} style={{display:'none'}}/>
          <div style={{fontSize:30,marginBottom:4}}>📷</div>
          <div style={{fontSize:12,fontWeight:600,color:GD}}>Kamera</div>
          <div style={{fontSize:10,color:MT}}>Foto langsung</div>
        </label>
        <label style={{flex:1,padding:'16px 8px',background:'#fff',border:'2px dashed #3498DB',borderRadius:12,cursor:'pointer',textAlign:'center',display:'block'}}>
          <input type="file" accept="image/jpeg,image/png,image/webp,image/jpg,image/*"
            capture={false}
            onChange={e=>{
              const file = e.target.files?.[0];
              if(file) handleFile(file);
              e.target.value = ''; // reset supaya bisa pilih file sama
            }} style={{display:'none'}}/>
          <div style={{fontSize:30,marginBottom:4}}>🖼️</div>
          <div style={{fontSize:12,fontWeight:600,color:'#1976D2'}}>Galeri</div>
          <div style={{fontSize:10,color:MT}}>Pilih foto</div>
        </label>
      </div>

      <div style={{background:'#FFF3E0',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:11,color:'#7d4e00'}}>
        💡 <b>Tips:</b> Foto tegak, cahaya cukup, semua tulisan terbaca jelas
      </div>

      <button onClick={analyzeNota} disabled={!imageFile}
        style={{width:'100%',padding:14,background:!imageFile?MT:G,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:!imageFile?'default':'pointer'}}>
        {!imageFile?'Pilih foto nota dulu...':'🤖 Analisis dengan AI →'}
      </button>
    </div>
  );
}



// ── PEMBELIAN ──────────────────────────────────────────────────────────────
function Pembelian() {
  // View: 'browse' | 'cart' | 'list' | 'detail'
  const [view,       setView]       = useState('list');
  const [products,   setProducts]   = useState([]);
  const [cart,       setCart]       = useState([]); // {product, qty, price, buy_price}
  const [orders,     setOrders]     = useState([]);
  const [selected,   setSelected]   = useState(null);
  const [loading,    setLoading]    = useState(false);
  const [prodLoading,setProdLoading]= useState(false);
  const [search,     setSearch]     = useState('');
  const [activeKat,  setActiveKat]  = useState('Semua');
  const [suppliers,  setSuppliers]  = useState([]);
  const [saving,     setSaving]     = useState(false);

  // Checkout form
  const [form, setForm] = useState({supplier_id:'', bayar:'Lunas', due:'', notes:''});
  const [editPO, setEditPO] = useState(false);
  const [editItems, setEditItems] = useState([]);

  // Load suppliers & orders
  const loadOrders = async() => {
    setLoading(true);
    try {
      const [sups, pos] = await Promise.all([
        sbGet('suppliers',{order:'name'}),
        sbGet('purchase_orders',{order:'created_at',asc:false}),
      ]);
      setSuppliers(sups||[]);
      const withItems = await Promise.all((pos||[]).map(async po=>({
        ...po, items: await sbGet('po_items',{eq:{po_id:po.id}})
      })));
      setOrders(withItems);
    } catch(e){}
    setLoading(false);
  };

  // Load products dengan cache
  const loadProducts = async() => {
    if(window._cachedProducts?.length > 0) {
      setProducts(window._cachedProducts);
      return;
    }
    setProdLoading(true);
    try {
      const data = await sbGetAll('products',{order:'name'});
      window._cachedProducts = data||[];
      setProducts(data||[]);
    } catch(e){}
    setProdLoading(false);
  };

  useEffect(()=>{
    loadOrders();
    loadProducts();
  },[]);

  // Kategori dari produk
  const kategoriList = ['Semua', ...new Set(
    products.map(p=>p.category?.split(' > ')[0]||'Lainnya').filter(Boolean)
  )].slice(0,20);

  // Filter produk
  const filteredProds = products.filter(p=>{
    const matchKat = activeKat==='Semua' || p.category?.startsWith(activeKat);
    const q = search.toLowerCase().trim();
    const matchSearch = !q || q.split(/\s+/).some(w=>p.name.toLowerCase().includes(w));
    return matchKat && matchSearch;
  });

  // Cart helpers
  const addToCart = (prod) => {
    setCart(prev=>{
      const exist = prev.find(i=>i.product.id===prod.id);
      if(exist) return prev.map(i=>i.product.id===prod.id?{...i,qty:i.qty+1}:i);
      return [...prev, {product:prod, qty:1, price:prod.buy_price||0}];
    });
  };
  const updateQty = (prodId, qty) => {
    if(qty<=0) { setCart(prev=>prev.filter(i=>i.product.id!==prodId)); return; }
    setCart(prev=>prev.map(i=>i.product.id===prodId?{...i,qty}:i));
  };
  const updatePrice = (prodId, price) => {
    setCart(prev=>prev.map(i=>i.product.id===prodId?{...i,price:parseInt(price)||0}:i));
  };
  const totalCart = cart.reduce((s,i)=>s+i.price*i.qty, 0);
  const totalQty  = cart.reduce((s,i)=>s+i.qty, 0);

  // Save PO
  const savePO = async() => {
    if(!form.supplier_id) return alert('Pilih supplier dulu!');
    if(cart.length===0) return alert('Keranjang masih kosong!');
    setSaving(true);
    try {
      const sup = suppliers.find(s=>s.id===parseInt(form.supplier_id));
      const [po] = await sbInsert('purchase_orders',[{
        supplier: sup?.name||'',
        supplier_id: parseInt(form.supplier_id),
        status: 'Proses',
        bayar: form.bayar,
        total: totalCart,
        due_date: form.due||null,
        notes: form.notes||'',
      }]);
      await sbInsert('po_items', cart.map(i=>({
        po_id: po.id,
        product_id: i.product.id,
        name: i.product.name,
        qty: i.qty,
        price: i.price,
        subtotal: i.qty * i.price,
      })));
      notifyDataChanged('pembelian');
      setCart([]);
      setForm({supplier_id:'', bayar:'Lunas', due:'', notes:''});
      setView('list');
      loadOrders();
      alert('✅ Purchase Order berhasil dibuat!');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  // Mark received - update stok & harga beli + saran harga jual
  const [priceUpdates, setPriceUpdates] = useState([]); // item yang perlu update harga jual
  const [showPriceModal, setShowPriceModal] = useState(false);
  const [pendingPO, setPendingPO] = useState(null);

  const markReceived = async(po) => {
    if(!confirm(`Tandai PO-${po.id} sudah diterima? Stok akan diupdate otomatis.`)) return;
    try {
      await sbUpdate('purchase_orders', po.id, {status:'Diterima'});
      const updates = [];

      for(const item of po.items||[]) {
        let productId = item.product_id;
        let prod = null;
        const newBuyPrice = item.price ? parseInt(item.price) : 0;

        // Cari by product_id dulu
        if(productId) {
          const prods = await sbGet('products',{eq:{id:productId}});
          if(prods?.length>0) prod = prods[0];
        }

        // Kalau tidak ada product_id, cari by nama produk dengan fuzzy match
        if(!prod && item.name) {
          const byName = await sbGet('products',{order:'name'});
          const q = item.name.toLowerCase().trim();
          const stopWords = ['dan','ke','di','dari','atau','yang','untuk','per','x','no','uk'];
          const itemWords = q.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));

          // Score setiap produk berdasarkan kecocokan kata - lebih pintar
          const scored = byName.map(p=>{
            const pName = p.name.toLowerCase();
            const pWords = pName.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));
            let score = 0;
            if(pName===q) score=100;
            else {
              itemWords.forEach(w=>{ if(pName.includes(w)) score+=20; });
              pWords.forEach(w=>{ if(q.includes(w)) score+=10; });
              if(itemWords[0]&&pWords[0]&&pWords[0].startsWith(itemWords[0])) score+=15;
              itemWords.forEach((w,i)=>{ if(pWords[i]&&pWords[i].includes(w)) score+=5; });
            }
            return {...p, score};
          }).filter(p=>p.score>=20).sort((a,b)=>b.score-a.score);

          if(scored.length>0 && scored[0].score>=20) {
            prod = scored[0];
            productId = scored[0].id;
          }
        }

        if(prod && productId) {
          // Konversi qty dari unit besar ke unit kecil
          const itemUnit = (item.satuan||item.unit||'').toLowerCase();
          const prodUnitBesar = (prod.unit_besar||'').toLowerCase();
          const isUnitBesar = prodUnitBesar && prodUnitBesar!=='pcs' && itemUnit &&
                              (itemUnit===prodUnitBesar || itemUnit.includes(prodUnitBesar) || prodUnitBesar.includes(itemUnit));
          const konversi = isUnitBesar ? (prod.konversi||1) : 1;
          const qtyToAdd = (parseInt(item.qty)||0) * konversi;

          // Harga beli per unit kecil
          const newBuyPricePerUnit = newBuyPrice>0 ? Math.round(newBuyPrice/konversi) : (prod.buy_price||0);
          const newStock = (prod.stock||0) + qtyToAdd;
          await sbUpdate('products', productId, {
            stock: newStock,
            buy_price: newBuyPricePerUnit||prod.buy_price||0,
          });
          await sbInsert('stock_logs',[{
            product_id: productId,
            type: 'masuk',
            qty: parseInt(item.qty)||0,
            notes: `Pembelian dari ${po.supplier} - PO-${po.id}`,
          }]);

          // Cek apakah harga beli berubah & harga jual perlu diupdate
          const oldBuyPrice = prod.buy_price||0;
          const currentSellPrice = prod.price||0;
          if(newBuyPrice>0 && newBuyPrice !== oldBuyPrice) {
            // Saran margin 20%, 30%, 40%
            const saran20 = Math.ceil(newBuyPrice * 1.20 / 100) * 100;
            const saran30 = Math.ceil(newBuyPrice * 1.30 / 100) * 100;
            const saran40 = Math.ceil(newBuyPrice * 1.40 / 100) * 100;
            updates.push({
              productId,
              name: item.name,
              matchedName: prod.name,
              oldBuyPrice, newBuyPrice,
              currentSellPrice,
              saran20, saran30, saran40,
              newSellPrice: saran20, // default markup 20%
              isNew: false,
            });
          }
        } else if(!prod) {
          // Produk belum ada di database
          if(newBuyPrice>0) {
            const saran20 = Math.ceil(newBuyPrice * 1.20 / 100) * 100;
            const saran30 = Math.ceil(newBuyPrice * 1.30 / 100) * 100;
            const saran40 = Math.ceil(newBuyPrice * 1.40 / 100) * 100;
            // Cari kandidat produk yang mungkin cocok
            const allProds = await sbGet('products',{order:'name'});
            const qc = item.name.toLowerCase().trim();
            const stopWordsC = ['dan','ke','di','dari','atau','yang','untuk','per','x'];
            const itemWordsC = qc.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWordsC.includes(w));
            const candidates = allProds.map(p=>{
              const pName = p.name.toLowerCase();
              const pWords = pName.split(/[\s\-\/,]+/).filter(w=>w.length>=2);
              let score = 0;
              if(pName===qc) score=100;
              else {
                itemWordsC.forEach(w=>{ if(pName.includes(w)) score+=20; });
                pWords.forEach(w=>{ if(qc.includes(w)) score+=10; });
                if(itemWordsC[0]&&pWords[0]&&pWords[0].startsWith(itemWordsC[0])) score+=15;
              }
              return {...p,score};
            }).filter(p=>p.score>=20).sort((a,b)=>b.score-a.score).slice(0,5);
            
            updates.push({
              productId: null, name: item.name,
              matchedName: null,
              oldBuyPrice: 0, newBuyPrice,
              currentSellPrice: 0,
              saran20, saran30, saran40,
              newSellPrice: saran20,
              isNew: true,
              candidates, // produk kandidat untuk dipilih manual
            });
          }
        }
      }

      notifyDataChanged('pembelian');
      setSelected(s=>({...s,status:'Diterima'}));
      loadOrders();

      if(updates.length>0) {
        setPriceUpdates(updates);
        setPendingPO(po);
        setShowPriceModal(true);
      } else {
        alert('✅ Stok berhasil diupdate!');
      }
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const savePriceUpdates = async() => {
    try {
      for(const u of priceUpdates) {
        if(u.productId && u.newSellPrice>0) {
          await sbUpdate('products', u.productId, {price: parseInt(u.newSellPrice)});
        }
      }
      setShowPriceModal(false);
      setPriceUpdates([]);
      notifyDataChanged('products');
      alert('✅ Stok & harga jual berhasil diupdate!');
    } catch(e){ alert('Gagal update harga: '+e.message); }
  };

  const sC = {Diterima:G, Proses:OR, Dibatalkan:RD};
  const bC = {Lunas:G, Hutang:OR, Belum:RD};

  // ── MODAL: SARAN HARGA JUAL ──
  if(showPriceModal && priceUpdates.length>0) return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:12,padding:'12px 16px',marginBottom:16,fontSize:13}}>
        <div style={{fontWeight:700,color:OR,marginBottom:4}}>💡 Update Harga Jual</div>
        <div style={{color:'#7d4e00'}}>Harga beli beberapa produk berubah. Sistem menyarankan harga jual baru agar profit tetap terjaga.</div>
      </div>

      {priceUpdates.map((u,i)=>(
        <div key={i} style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{u.name}</div>
          {u.matchedName&&u.matchedName!==u.name&&(
            <div style={{fontSize:11,color:OR,marginBottom:8,background:'#FFF3E0',padding:'4px 8px',borderRadius:6}}>
              ⚠️ Nama di nota: <b>"{u.name}"</b> → dicocokkan ke: <b>"{u.matchedName}"</b>
            </div>
          )}
          {u.isNew
            ? <div>
                <div style={{fontSize:11,color:OR,marginBottom:6,background:'#FFF3E0',padding:'6px 10px',borderRadius:6}}>
                  ⚠️ Produk ini belum ada di database
                </div>
                {u.candidates?.length>0&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:6}}>🔍 Mungkin maksudnya salah satu ini?</div>
                    {u.candidates.map((c,j)=>(
                      <button key={j} onClick={()=>setPriceUpdates(prev=>prev.map((p,k)=>k===i?{...p,productId:c.id,matchedName:c.name,currentSellPrice:c.price||0,isNew:false}:p))}
                        style={{display:'block',width:'100%',padding:'7px 10px',marginBottom:4,background:u.productId===c.id?GL:'#F5F6FA',border:`1.5px solid ${u.productId===c.id?G:'#eee'}`,borderRadius:8,cursor:'pointer',textAlign:'left',fontSize:12}}>
                        <span style={{fontWeight:600,color:u.productId===c.id?GD:TX}}>{c.name}</span>
                        <span style={{color:MT,fontSize:10,marginLeft:6}}>Harga jual: {fmt(c.price||0)}</span>
                      </button>
                    ))}
                    <button onClick={()=>setPriceUpdates(prev=>prev.map((p,k)=>k===i?{...p,productId:null,matchedName:null,isNew:true}:p))}
                      style={{fontSize:11,color:MT,background:'none',border:'none',cursor:'pointer',padding:'4px 0'}}>
                      Tidak ada yang cocok → biarkan sebagai produk baru
                    </button>
                  </div>
                )}
              </div>
            : <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10,fontSize:11}}>
                <div style={{background:'#F5F6FA',borderRadius:8,padding:'6px 10px'}}>
                  <div style={{color:MT}}>Harga Beli Lama</div>
                  <div style={{fontWeight:700,color:MT}}>{fmt(u.oldBuyPrice)}</div>
                </div>
                <div style={{background:'#FFF3E0',borderRadius:8,padding:'6px 10px'}}>
                  <div style={{color:MT}}>Harga Beli Baru</div>
                  <div style={{fontWeight:700,color:OR}}>{fmt(u.newBuyPrice)}</div>
                </div>
                <div style={{background:'#E3F2FD',borderRadius:8,padding:'6px 10px'}}>
                  <div style={{color:MT}}>Harga Jual Saat Ini</div>
                  <div style={{fontWeight:700,color:'#1976D2'}}>{fmt(u.currentSellPrice)}</div>
                </div>
              </div>
          }

          {/* Saran margin */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:6}}>💡 Saran Harga Jual:</div>
            {/* Mark Up */}
            <div style={{fontSize:10,color:MT,fontWeight:600,marginBottom:4}}>📈 Mark Up (dari harga beli):</div>
            <div style={{display:'flex',gap:5,marginBottom:8}}>
              {[
                {label:'MU 20%', value:Math.ceil(u.newBuyPrice*1.20/100)*100},
                {label:'MU 30%', value:Math.ceil(u.newBuyPrice*1.30/100)*100},
                {label:'MU 40%', value:Math.ceil(u.newBuyPrice*1.40/100)*100},
              ].map((s,j)=>(
                <button key={j} onClick={()=>setPriceUpdates(prev=>prev.map((p,k)=>k===i?{...p,newSellPrice:s.value}:p))}
                  style={{flex:1,padding:'6px 4px',border:`1.5px solid ${u.newSellPrice===s.value?G:'#eee'}`,borderRadius:8,background:u.newSellPrice===s.value?GL:'#fff',color:u.newSellPrice===s.value?GD:MT,cursor:'pointer',fontSize:10,fontWeight:u.newSellPrice===s.value?700:500,textAlign:'center'}}>
                  <div style={{fontWeight:700,fontSize:11}}>{fmt(s.value)}</div>
                  <div style={{fontSize:9,color:MT}}>{s.label}</div>
                </button>
              ))}
            </div>
            {/* Margin */}
            <div style={{fontSize:10,color:MT,fontWeight:600,marginBottom:4}}>💹 Margin (dari harga jual):</div>
            <div style={{display:'flex',gap:5}}>
              {[
                {label:'Margin 20%', value:Math.ceil(u.newBuyPrice/(1-0.20)/100)*100},
                {label:'Margin 30%', value:Math.ceil(u.newBuyPrice/(1-0.30)/100)*100},
                {label:'Margin 40%', value:Math.ceil(u.newBuyPrice/(1-0.40)/100)*100},

      {/* List PO */}
      {loading ? <Loading/> : orders.length===0 ? (
        <div style={{textAlign:'center',padding:'40px 0',color:MT,background:'#fff',borderRadius:12}}>
          <div style={{fontSize:40,marginBottom:8}}>📦</div>

      ) : (
        <div style={{background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>

// ── PENGATURAN PRINTER & STRUK ─────────────────────────────────────────────
function PengaturanPrinter({onBack}) {
  const [form, setForm] = useState({
    printer_ukuran:  '58mm',
    printer_auto:    'tanya',
    struk_footer:    'Terima kasih telah berbelanja!',
    struk_show_logo: 'true',
  });
  const [loading, setLoading] = useState(true);
  const [saving,  setSaving]  = useState(false);
  const [preview, setPreview] = useState('thermal');

  const tokoNama    = window.TOKO_NAMA    || 'SURYA LISTRIK';
  const tokoTagline = window.TOKO_TAGLINE || 'Toko Alat Listrik & Bangunan';
  const tokoAlamat  = window.TOKO_ALAMAT  || 'Jl. Contoh No. 1';
  const tokoTelp    = window.TOKO_TELP    || '0812-xxxx-xxxx';
  const capUrl      = window.TOKO_CAP_URL || '';

  useEffect(()=>{
    (async()=>{
      try {
        const settings = await sbGet('app_settings',{order:'key'});
        const map = {};
        settings.forEach(s=>{ map[s.key]=s.value; });
        setForm(f=>({
          ...f,
          printer_ukuran:  map.printer_ukuran  || '58mm',
          printer_auto:    map.printer_auto    || 'tanya',
          struk_footer:    map.struk_footer    || 'Terima kasih telah berbelanja!',
          struk_show_logo: map.struk_show_logo || 'true',
        }));
      } catch(e){}
      setLoading(false);
    })();
  },[]);

  const save = async()=>{
    setSaving(true);
    try {
      for(const [key,value] of Object.entries(form)){
        const existing = await sbGet('app_settings',{eq:{key}});
        if(existing.length>0) await sbUpdate('app_settings',existing[0].id,{value});
        else await sbInsert('app_settings',[{key,value}]);
      }
      // Update global vars
      window.PRINTER_UKURAN  = form.printer_ukuran;
      window.PRINTER_AUTO    = form.printer_auto;
      window.STRUK_FOOTER    = form.struk_footer;
      window.STRUK_SHOW_LOGO = form.struk_show_logo;
      alert('✅ Pengaturan printer berhasil disimpan!');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };
