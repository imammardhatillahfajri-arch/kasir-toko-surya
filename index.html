// ── RINGKASAN PENJUALAN ────────────────────────────────────────────────────
function RingkasanPenjualan({period, onBack}) {
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);
  const [periode, setPeriode] = useState('hari_ini');
  const [customFrom, setCustomFrom] = useState('');
  const [customTo, setCustomTo]     = useState('');

  const today     = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini')      { dari=today; sampai=today; }
      else if(periode==='kemarin')  { dari=yesterday; sampai=yesterday; }
      else if(periode==='minggu')   { dari=new Date(Date.now()-7*86400000).toISOString().slice(0,10); sampai=today; }
      else if(periode==='bulan')    { dari=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10); sampai=today; }
      else if(periode==='custom')   { dari=customFrom; sampai=customTo; }

      const [txs, items, prods, rets, retItems] = await Promise.all([
        sbGetAll('transactions',{order:'created_at',asc:false}),
        sbGetAll('transaction_items',{order:'id'}),
        sbGetAll('products',{select:'id,stock,buy_price',order:'id'}),
        sbGetAll('returns',{order:'created_at',asc:false}).catch(()=>[]),
        sbGetAll('return_items',{order:'id'}).catch(()=>[]),
      ]);

      const filterTx = (txList, d1, d2) => txList.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        return tgl>=d1&&tgl<=d2&&t.status==='Lunas';
      });

      const txPeriode  = filterTx(txs, dari, sampai);
      const txKemarin  = filterTx(txs, yesterday, yesterday);

      // Retur pelanggan = pengurang omset & HPP
      const filterRet = (list,d1,d2)=>list.filter(r=>{
        const tgl = r.created_at?.slice(0,10);
        return tgl>=d1&&tgl<=d2&&r.type!=='ke_supplier';
      });
      const retPeriode = filterRet(rets,dari,sampai);
      const retKemarin = filterRet(rets,yesterday,yesterday);
      const returTotal    = retPeriode.reduce((s,r)=>s+(r.total||0),0);
      const returTotalKem = retKemarin.reduce((s,r)=>s+(r.total||0),0);

      const omset      = txPeriode.reduce((s,t)=>s+t.total,0) - returTotal;
      const omsetKem   = txKemarin.reduce((s,t)=>s+t.total,0) - returTotalKem;
      const jumlahTx   = txPeriode.length;
      const jumlahKem  = txKemarin.length;

      // Keuntungan = omset - HPP (buy_price * qty sold)
      const txIds = new Set(txPeriode.map(t=>t.id));
      const prodMap = {};
      prods.forEach(p=>{ prodMap[p.id]=p.buy_price||0; });
      const retIds = new Set(retPeriode.map(r=>r.id));
      const returHPP = retItems.filter(ri=>retIds.has(ri.return_id))
        .reduce((s,ri)=>s+(prodMap[ri.product_id]||0)*ri.qty,0);
      const hpp = items.filter(i=>txIds.has(i.transaction_id))
        .reduce((s,i)=>s+(prodMap[i.product_id]||0)*i.qty,0) - returHPP;
      const laba = omset - hpp;

      // Sisa modal = total stok * harga beli
      const sisaModal = prods.reduce((s,p)=>s+(p.stock||0)*(p.buy_price||0),0);

      // Per jam
      const jamMap = {};
      for(let h=0;h<24;h++) jamMap[h]={jam:h,tx:0,omset:0};
      txPeriode.forEach(t=>{
        const h = new Date(t.created_at).getHours();
        jamMap[h].tx++;
        jamMap[h].omset+=t.total;
      });

      // Metode bayar
      const metodeMap = {};
      txPeriode.forEach(t=>{
        const m = t.metode_bayar||'Tunai';
        if(!metodeMap[m]) metodeMap[m]={name:m,count:0,total:0};
        metodeMap[m].count++; metodeMap[m].total+=t.total;
      });

      setData({omset,omsetKem,jumlahTx,jumlahKem,laba,hpp,sisaModal,
        jamMap:Object.values(jamMap),
        metode:Object.values(metodeMap),
        dari,sampai});
    } catch(e){ console.error(e); }
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode,customFrom,customTo]);

  const pctVs = (a,b) => b===0?0:Math.round((a-b)/b*100);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📊 Ringkasan Penjualan</h2>
      </div>

      {/* Filter periode */}
      <div style={{background:'#fff',borderRadius:12,padding:12,marginBottom:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:periode==='custom'?10:0}}>
          {[['hari_ini','Hari Ini'],['kemarin','Kemarin'],['minggu','Minggu Ini'],['bulan','Bulan Ini'],['custom','Custom']].map(([val,label])=>(
            <button key={val} onClick={()=>setPeriode(val)}
              style={{padding:'6px 12px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:11,fontWeight:periode===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
        {periode==='custom'&&(
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
              style={{flex:1,padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            <span style={{alignSelf:'center',color:MT}}>s/d</span>
            <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
              style={{flex:1,padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
        )}
      </div>

      {loading ? <Loading/> : !data ? null : (
        <>
          {/* Header */}
          <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',textAlign:'center',borderBottom:`3px solid ${G}`}}>
            <div style={{fontWeight:700,fontSize:13,color:MT,marginBottom:2}}>LAPORAN {periode==='hari_ini'?'HARI INI':periode==='kemarin'?'KEMARIN':'PERIODE'}</div>
            <div style={{fontSize:11,color:MT}}>{data.dari}{data.dari!==data.sampai?` — ${data.sampai}`:''}</div>
          </div>

          {/* 3 stat cards dengan % vs kemarin */}
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
            {[
              {label:'Jml Transaksi',value:data.jumlahTx,prev:data.jumlahKem,unit:'tx',color:TX},
              {label:'Keuntungan',value:data.laba,prev:0,unit:'rp',color:data.laba>=0?G:RD},
              {label:'Pendapatan',value:data.omset,prev:data.omsetKem,unit:'rp',color:G},
            ].map((s,i)=>{
              const pct = pctVs(s.value,s.prev);
              return (
                <div key={i} style={{background:'#fff',borderRadius:10,padding:'12px 16px',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:11,color:MT,marginBottom:4}}>{s.label}</div>
                    <div style={{fontSize:20,fontWeight:800,color:s.color}}>{s.unit==='rp'?fmt(s.value):s.value}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:700,color:pct>=0?G:RD}}>{pct>=0?'+':''}{pct}%</div>
                    <div style={{fontSize:10,color:MT}}>vs kemarin</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Grafik per jam */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>LAPORAN TRANSAKSI PER JAM</div>
            <div style={{fontSize:11,color:MT,marginBottom:12}}>{data.dari}</div>
            <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80}}>
              {data.jamMap.map((j,i)=>{
                const maxTx = Math.max(...data.jamMap.map(x=>x.tx),1);
                const h = (j.tx/maxTx)*70;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    <div style={{width:'100%',background:j.tx>0?G:'#F5F6FA',borderRadius:'2px 2px 0 0',height:Math.max(h,j.tx>0?3:1)}}/>
                    {i%4===0&&<div style={{fontSize:7,color:MT,marginTop:2}}>{j.jam}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Metode pembayaran */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>METODE PEMBAYARAN</div>
            {data.metode.length===0
              ? <div style={{color:MT,fontSize:12,textAlign:'center',padding:'12px 0'}}>Tidak ada transaksi</div>
              : <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {data.metode.map((m,i)=>(
                  <div key={i} style={{flex:'1 1 80px',background:'#F5F6FA',borderRadius:10,padding:'10px 12px',textAlign:'center',border:`1px solid #eee`}}>
                    <div style={{fontSize:11,color:MT,marginBottom:2}}>{m.name}</div>
                    <div style={{fontWeight:800,fontSize:18}}>{m.count}</div>
                    <div style={{fontSize:11,color:G,fontWeight:600}}>{fmt(m.total)}</div>
                  </div>
                ))}
              </div>
            }
          </div>

          {/* Sisa Modal */}
          <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>PERHITUNGAN SISA MODAL</div>
            <div style={{fontSize:11,color:MT,marginBottom:12}}>sisa modal = total (stok × harga beli)</div>
            <div style={{textAlign:'center',background:'#F5F6FA',borderRadius:10,padding:'16px 0'}}>
              <div style={{fontSize:28,fontWeight:900,color:TX}}>{fmt(data.sisaModal)}</div>
              <div style={{fontSize:11,color:MT,marginTop:4}}>Sisa Modal - FIFO Metode</div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ── LAPORAN LABA RUGI DETAIL ───────────────────────────────────────────────
function LaporanLabaRugiDetail({onBack, onOpenInvoice}) {
  const [periode, setPeriode] = useState('bulan');
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [openDay, setOpenDay] = useState(null);
  const [showBeforePiutang, setShowBeforePiutang] = useState(false);

  const today = new Date().toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini') { dari=today; sampai=today; }
      else if(periode==='bulan') {
        dari = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        sampai = today;
      }

      const [txs, items, prods, rets, retItems] = await Promise.all([
        sbGetAll('transactions',{order:'created_at',asc:false}),
        sbGetAll('transaction_items',{order:'id'}),
        sbGetAll('products',{select:'id,buy_price',order:'id'}),
        sbGetAll('returns',{order:'created_at',asc:false}).catch(()=>[]),
        sbGetAll('return_items',{order:'id'}).catch(()=>[]),
      ]);

      const prodMap = {};
      prods.forEach(p=>{ prodMap[p.id]=p.buy_price||0; });

      // Filter transaksi periode
      const txPeriode = txs.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(tgl<dari||tgl>sampai) return false;
        return showBeforePiutang ? true : t.status==='Lunas';
      });

      const txIds = new Set(txPeriode.map(t=>t.id));
      const filteredItems = items.filter(i=>txIds.has(i.transaction_id));

      // Retur pelanggan dalam periode
      const retPeriode = rets.filter(r=>{
        const tgl = r.created_at?.slice(0,10);
        return tgl>=dari&&tgl<=sampai&&r.type!=='ke_supplier';
      });
      const retIdSet = new Set(retPeriode.map(r=>r.id));
      const returTotal = retPeriode.reduce((s,r)=>s+(r.total||0),0);
      const returHPP = retItems.filter(ri=>retIdSet.has(ri.return_id))
        .reduce((s,ri)=>s+(prodMap[ri.product_id]||0)*ri.qty,0);

      const totalPenjualan = txPeriode.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0) - returTotal;
      const hpp = filteredItems.reduce((s,i)=>s+(prodMap[i.product_id]||0)*i.qty,0) - returHPP;
      const labaBersih = totalPenjualan - hpp;

      // Per hari
      const hariMap = {};
      txPeriode.forEach(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(!hariMap[tgl]) hariMap[tgl]={date:tgl,omset:0,hpp:0,tx:0,txList:[]};
        if(t.status==='Lunas') hariMap[tgl].omset+=t.total;
        hariMap[tgl].tx++;
        hariMap[tgl].txList.push({id:t.id,invoice:t.invoice_no||('#'+t.id),customer:t.customer||'Umum',total:t.total,status:t.status,hpp:0});
      });
      filteredItems.forEach(i=>{
        const tx = txPeriode.find(t=>t.id===i.transaction_id);
        if(tx) {
          const tgl = tx.created_at?.slice(0,10);
          if(hariMap[tgl]) {
            const h = (prodMap[i.product_id]||0)*i.qty;
            hariMap[tgl].hpp += h;
            const row = hariMap[tgl].txList.find(x=>x.id===i.transaction_id);
            if(row) row.hpp += h;
          }
        }
      });
      // Retur pelanggan: kurangi angka hari terkait + tampilkan sebagai baris merah
      retPeriode.forEach(r=>{
        const tgl = r.created_at?.slice(0,10);
        if(!hariMap[tgl]) hariMap[tgl]={date:tgl,omset:0,hpp:0,tx:0,txList:[]};
        const hppR = retItems.filter(ri=>ri.return_id===r.id)
          .reduce((s,ri)=>s+(prodMap[ri.product_id]||0)*ri.qty,0);
        hariMap[tgl].omset -= (r.total||0);
        hariMap[tgl].hpp   -= hppR;
        hariMap[tgl].txList.push({
          id:null,
          invoice:'↩️ '+(r.return_no||'RETUR'),
          customer:r.customer||'Retur pelanggan',
          total:-(r.total||0),
          status:'Retur',
          hpp:-hppR,
        });
      });

      setData({
        dari,sampai,
        totalPenjualan,hpp,labaBersih,
        perHari: Object.values(hariMap).sort((a,b)=>b.date.localeCompare(a.date)),
      });
    } catch(e){}
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode,showBeforePiutang]);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📊 Laporan Laba Rugi</h2>
      </div>

      {/* Filter */}
      <div style={{background:'#fff',borderRadius:12,padding:12,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          {[['hari_ini','Hari Ini'],['bulan','Bulan Ini']].map(([val,label])=>(
            <button key={val} onClick={()=>setPeriode(val)}
              style={{padding:'6px 14px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:12,fontWeight:periode===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12}}>
          <input type="checkbox" checked={showBeforePiutang} onChange={e=>setShowBeforePiutang(e.target.checked)} style={{width:15,height:15,accentColor:G}}/>
          <span>Tampilkan Pemasukan Sebelum Piutang dibayar</span>
        </label>
      </div>

      {loading?<Loading/>:!data?null:(
        <>
          {/* Summary */}
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pemasukan</div>
                <div style={{fontWeight:800,fontSize:16,color:G,marginTop:2}}>{fmt(data.totalPenjualan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Penjualan</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(data.totalPenjualan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pemasukan Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>Rp 0</div>
              </div>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pengeluaran</div>
                <div style={{fontWeight:800,fontSize:16,color:RD,marginTop:2}}>{fmt(data.hpp)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Harga Pokok Penjualan</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>{fmt(data.hpp)}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pengeluaran Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>Rp 0</div>
              </div>
            </div>
            <div style={{background:'#F5F6FA',borderRadius:10,padding:'14px 0',textAlign:'center',borderTop:'1px solid #eee'}}>
              <div style={{fontSize:24,fontWeight:900,color:data.labaBersih>=0?G:RD}}>{fmt(data.labaBersih)}</div>
              <div style={{fontSize:11,color:MT,marginTop:4}}>Laba Bersih</div>
            </div>
          </div>

          <div style={{fontSize:11,color:MT,marginBottom:10}}>*tekan untuk melihat lebih detail</div>

          {/* Per hari */}
          {data.perHari.map((d,i)=>{
            const isOpen = openDay===d.date;
            return (
            <div key={i} onClick={()=>setOpenDay(isOpen?null:d.date)}
              style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:8,boxShadow:isOpen?'0 2px 10px rgba(0,0,0,0.12)':'0 1px 4px rgba(0,0,0,0.07)',cursor:'pointer',border:isOpen?`1.5px solid ${G}`:'1.5px solid transparent'}}>
              <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                <div style={{textAlign:'center',flexShrink:0,minWidth:36}}>
                  <div style={{fontWeight:900,fontSize:22,lineHeight:1,color:TX}}>{d.date.slice(8)}</div>
                  <div style={{fontSize:10,color:MT}}>{new Date(d.date).toLocaleDateString('id-ID',{month:'short'})}</div>
                  <div style={{fontSize:10,color:MT}}>{d.date.slice(0,4)}</div>
                </div>
                <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:11}}>
                  <div><div style={{color:MT}}>Transaksi</div><div style={{fontWeight:700,color:G}}>{fmt(d.omset)}</div></div>
                  <div><div style={{color:MT}}>Pembelian (HPP)</div><div style={{fontWeight:700,color:RD}}>{fmt(d.hpp)}</div></div>
                  <div><div style={{color:MT}}>Laba Hari Ini</div><div style={{fontWeight:700,color:(d.omset-d.hpp)>=0?G:RD}}>{fmt(d.omset-d.hpp)}</div></div>
                  <div style={{alignSelf:'end'}}><span style={{color:MT}}>{d.tx} Transaksi</span></div>
                </div>
                <div style={{color:G,fontSize:18,flexShrink:0,transform:isOpen?'rotate(90deg)':'none',transition:'transform 0.15s'}}>›</div>
              </div>
              {isOpen&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed #ddd'}} onClick={e=>e.stopPropagation()}>
                  <div style={{fontSize:11,fontWeight:700,color:MT,marginBottom:6}}>📋 RINCIAN TRANSAKSI</div>
                  {(d.txList||[]).map((t,j)=>(
                    <div key={j} onClick={()=>onOpenInvoice&&onOpenInvoice(t.id)}
                      style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 10px',background:'#F5F6FA',borderRadius:8,marginBottom:4,cursor:onOpenInvoice?'pointer':'default'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:11,fontWeight:700,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.invoice}</div>
                        <div style={{fontSize:10,color:MT}}>{t.customer} · <span style={{color:t.status==='Lunas'?GD:OR,fontWeight:600}}>{t.status}</span></div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                        <div style={{fontSize:11,fontWeight:700}}>{fmt(t.total)}</div>
                        <div style={{fontSize:10,color:(t.total-t.hpp)>=0?GD:RD,fontWeight:600}}>laba {fmt(t.total-t.hpp)}</div>
                      </div>
                      {onOpenInvoice&&<div style={{color:G,fontSize:14,marginLeft:6,flexShrink:0}}>›</div>}
                    </div>
                  ))}
                  {(d.txList||[]).length===0&&<div style={{fontSize:11,color:MT,textAlign:'center',padding:8}}>Tidak ada transaksi</div>}
                </div>
              )}
            </div>
          );})}
        </>
      )}
    </div>
  );
}

// ── ARUS KEUANGAN DETAIL ───────────────────────────────────────────────────
function ArusKeuanganDetail({onBack, onOpenInvoice}) {
  const [periode, setPeriode] = useState('bulan');
  const [data, setData]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [openDay, setOpenDay] = useState(null);

  const today = new Date().toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari, sampai;
      if(periode==='hari_ini') { dari=today; sampai=today; }
      else {
        dari = new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        sampai = today;
      }

      const [txs, pos, debts, pays] = await Promise.all([
        sbGetAll('transactions',{order:'created_at',asc:false}),
        sbGetAll('purchase_orders',{order:'created_at',asc:false}),
        sbGetAll('debts',{order:'created_at',asc:false}),
        sbGetAll('payments',{order:'created_at',asc:false}).catch(()=>null),
      ]);

      const filterDate = (list, d1, d2) => list.filter(t=>t.created_at?.slice(0,10)>=d1&&t.created_at?.slice(0,10)<=d2);

      const txPeriode  = filterDate(txs,dari,sampai).filter(t=>t.status==='Lunas');
      const poPeriode  = filterDate(pos,dari,sampai).filter(p=>p.bayar==='Lunas');
      const debtPeriode= filterDate(debts,dari,sampai).filter(d=>d.type==='hutang');

      // ── Basis pembayaran (akurat): pakai tabel payments kalau tersedia ──
      const payBased = Array.isArray(pays)&&pays.length>0;
      let totalPemasukan, refundKeluar = 0, paysPeriode = [];
      let pemasukanLain = 0, pengeluaranLain = 0;
      if(payBased){
        paysPeriode    = filterDate(pays,dari,sampai);
        totalPemasukan = paysPeriode.filter(p=>p.type==='masuk').reduce((s,p)=>s+(p.amount||0),0);
        refundKeluar   = paysPeriode.filter(p=>p.type==='keluar').reduce((s,p)=>s+(p.amount||0),0);
        // "Lain" = catatan kas manual (tanpa transaksi terkait)
        pemasukanLain   = paysPeriode.filter(p=>p.type==='masuk'&&!p.transaction_id).reduce((s,p)=>s+(p.amount||0),0);
        pengeluaranLain = paysPeriode.filter(p=>p.type==='keluar'&&!p.transaction_id).reduce((s,p)=>s+(p.amount||0),0);
      } else {
        // Fallback lama: basis status transaksi (kurang akurat untuk piutang/cicilan)
        totalPemasukan = txPeriode.reduce((s,t)=>s+t.total,0);
      }
      const totalPengeluaran = poPeriode.reduce((s,p)=>s+p.total,0) + debtPeriode.filter(d=>d.status==='Lunas').reduce((s,d)=>s+d.amount,0) + refundKeluar;
      const neto = totalPemasukan - totalPengeluaran;

      // Per hari (dengan rincian per item)
      const hariMap = {};
      const ensureDay = tgl => {
        if(!hariMap[tgl]) hariMap[tgl]={date:tgl,pemasukan:0,pengeluaran:0,tx:0,masukList:[],keluarList:[]};
        return hariMap[tgl];
      };
      if(payBased){
        paysPeriode.forEach(p=>{
          const d = ensureDay(p.created_at?.slice(0,10));
          if(p.type==='masuk'){
            d.pemasukan+=(p.amount||0); d.tx++;
            d.masukList.push({label:p.note||'Pemasukan', amount:p.amount||0, method:p.method, txId:p.transaction_id||null});
          } else {
            d.pengeluaran+=(p.amount||0);
            d.keluarList.push({label:p.note||'Pengeluaran', amount:p.amount||0, txId:p.transaction_id||null});
          }
        });
      } else {
        txPeriode.forEach(t=>{
          const d = ensureDay(t.created_at?.slice(0,10));
          d.pemasukan+=t.total; d.tx++;
          d.masukList.push({label:`Penjualan ${t.invoice_no||('#'+t.id)}${t.customer&&t.customer!=='Umum'?' · '+t.customer:''}`, amount:t.total, txId:t.id});
        });
      }
      poPeriode.forEach(p=>{
        const d = ensureDay(p.created_at?.slice(0,10));
        d.pengeluaran+=p.total;
        d.keluarList.push({label:`Pembelian PO-${p.id}${p.supplier?' · '+p.supplier:''}`, amount:p.total});
      });
      debtPeriode.filter(db=>db.status==='Lunas').forEach(db=>{
        const d = ensureDay(db.created_at?.slice(0,10));
        d.pengeluaran+=(db.amount||0);
        d.keluarList.push({label:db.description||`Hutang ${db.party_name||''}`, amount:db.amount||0});
      });

      setData({
        dari,sampai,totalPemasukan,totalPengeluaran,neto,
        pemasukanLain,pengeluaranLain,
        perHari: Object.values(hariMap).sort((a,b)=>b.date.localeCompare(a.date)),
      });
    } catch(e){}
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode]);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>💸 Laporan Arus Keuangan</h2>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[['hari_ini','Hari Ini'],['bulan','Bulan Ini']].map(([val,label])=>(
          <button key={val} onClick={()=>setPeriode(val)}
            style={{padding:'6px 14px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:12,fontWeight:periode===val?700:500,cursor:'pointer'}}>
            {label}
          </button>
        ))}
      </div>

      {loading?<Loading/>:!data?null:(
        <>
          <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pemasukan</div>
                <div style={{fontWeight:800,fontSize:16,color:G,marginTop:2}}>{fmt(data.totalPemasukan)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Pemasukan Penjualan</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(data.totalPemasukan-(data.pemasukanLain||0))}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pemasukan Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(data.pemasukanLain||0)}</div>
              </div>
              <div>
                <div style={{fontSize:11,color:MT}}>Total Pengeluaran</div>
                <div style={{fontWeight:800,fontSize:16,color:RD,marginTop:2}}>{fmt(data.totalPengeluaran)}</div>
                <div style={{fontSize:11,color:MT,marginTop:6}}>Pengeluaran Usaha</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>{fmt(data.totalPengeluaran-(data.pengeluaranLain||0))}</div>
                <div style={{fontSize:11,color:MT,marginTop:4}}>Pengeluaran Lain</div>
                <div style={{fontWeight:700,fontSize:13,color:RD}}>{fmt(data.pengeluaranLain||0)}</div>
              </div>
            </div>
            <div style={{background:'#F5F6FA',borderRadius:10,padding:'14px 0',textAlign:'center'}}>
              <div style={{fontSize:24,fontWeight:900,color:(data.neto||0)>=0?G:RD}}>{fmt(data.neto)}</div>
              <div style={{fontSize:11,color:MT,marginTop:4}}>Pendapatan Neto</div>
            </div>
          </div>

          <div style={{fontSize:11,color:MT,marginBottom:10}}>*tekan untuk melihat lebih detail</div>

          {data.perHari.map((d,i)=>{
            const isOpen = openDay===d.date;
            return (
            <div key={i} onClick={()=>setOpenDay(isOpen?null:d.date)}
              style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:8,boxShadow:isOpen?'0 2px 10px rgba(0,0,0,0.12)':'0 1px 4px rgba(0,0,0,0.07)',cursor:'pointer',border:isOpen?`1.5px solid ${G}`:'1.5px solid transparent'}}>
              <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                <div style={{textAlign:'center',flexShrink:0,minWidth:36}}>
                  <div style={{fontWeight:900,fontSize:22,lineHeight:1,color:TX}}>{d.date.slice(8)}</div>
                  <div style={{fontSize:10,color:MT}}>{new Date(d.date).toLocaleDateString('id-ID',{month:'short'})}</div>
                  <div style={{fontSize:10,color:MT}}>{d.date.slice(0,4)}</div>
                </div>
                <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:4,fontSize:11}}>
                  <div><div style={{color:MT}}>Pemasukan</div><div style={{fontWeight:700,color:G}}>{fmt(d.pemasukan)}</div></div>
                  <div><div style={{color:MT}}>Pengeluaran</div><div style={{fontWeight:700,color:RD}}>{fmt(d.pengeluaran)}</div></div>
                  <div><div style={{color:MT}}>Neto</div><div style={{fontWeight:700,color:(d.pemasukan-d.pengeluaran)>=0?G:RD}}>{fmt(d.pemasukan-d.pengeluaran)}</div></div>
                  <div style={{alignSelf:'end'}}><span style={{color:MT}}>{d.tx} Transaksi</span></div>
                </div>
                <div style={{color:G,fontSize:18,flexShrink:0,transform:isOpen?'rotate(90deg)':'none',transition:'transform 0.15s'}}>›</div>
              </div>
              {isOpen&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed #ddd'}} onClick={e=>e.stopPropagation()}>
                  {(d.masukList||[]).length>0&&(
                    <>
                      <div style={{fontSize:11,fontWeight:700,color:GD,marginBottom:6}}>💰 UANG MASUK</div>
                      {d.masukList.map((m,j)=>(
                        <div key={j} onClick={()=>m.txId&&onOpenInvoice&&onOpenInvoice(m.txId)}
                          style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 10px',background:GL,borderRadius:8,marginBottom:4,cursor:m.txId&&onOpenInvoice?'pointer':'default'}}>
                          <div style={{fontSize:11,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.label}{m.method?<span style={{color:MT}}> · {m.method}</span>:null}</div>
                          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
                            <span style={{fontSize:11,fontWeight:700,color:GD}}>+{fmt(m.amount)}</span>
                            {m.txId&&onOpenInvoice&&<span style={{color:GD,fontSize:13}}>›</span>}
                          </div>
                        </div>
                      ))}
                    </>
                  )}
                  {(d.keluarList||[]).length>0&&(
                    <>
                      <div style={{fontSize:11,fontWeight:700,color:RD,marginBottom:6,marginTop:(d.masukList||[]).length>0?8:0}}>💸 UANG KELUAR</div>
                      {d.keluarList.map((k,j)=>(
                        <div key={j} onClick={()=>k.txId&&onOpenInvoice&&onOpenInvoice(k.txId)}
                          style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 10px',background:'#FFF0F0',borderRadius:8,marginBottom:4,cursor:k.txId&&onOpenInvoice?'pointer':'default'}}>
                          <div style={{fontSize:11,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{k.label}</div>
                          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
                            <span style={{fontSize:11,fontWeight:700,color:RD}}>-{fmt(k.amount)}</span>
                            {k.txId&&onOpenInvoice&&<span style={{color:RD,fontSize:13}}>›</span>}
                          </div>
                        </div>
                      ))}
                    </>
                  )}
                  {(d.masukList||[]).length===0&&(d.keluarList||[]).length===0&&(
                    <div style={{fontSize:11,color:MT,textAlign:'center',padding:8}}>Tidak ada rincian</div>
                  )}
                </div>
              )}
            </div>
          );})}
        </>
      )}
    </div>
  );
}

// ── LAPORAN PEMBELIAN ──────────────────────────────────────────────────────
function LaporanPembelian({onBack}) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [periode, setPeriode] = useState('bulan');
  const [selected, setSelected] = useState(null);
  const [poItems, setPoItems] = useState([]);
  const [returSupplier, setReturSupplier] = useState([]);
  const [showReturList, setShowReturList] = useState(false);

  const today = new Date().toISOString().slice(0,10);

  const load = async() => {
    setLoading(true);
    try {
      let dari;
      if(periode==='hari_ini') dari=today;
      else dari=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
      const pos = await sbGetAll('purchase_orders',{order:'created_at',asc:false});
      const filtered = pos.filter(p=>p.created_at?.slice(0,10)>=dari);
      const withItems = await Promise.all(filtered.map(async po=>({
        ...po, items: await sbGet('po_items',{eq:{po_id:po.id}})
      })));
      setOrders(withItems);
      // Retur ke supplier: dari tabel returns + riwayat revisi PO (tipe retur)
      try {
        const rets = await sbGetAll('returns',{order:'created_at',asc:false});
        const fromReturns = rets.filter(r=>r.type==='ke_supplier'&&r.created_at?.slice(0,10)>=dari)
          .map(r=>({tanggal:r.created_at?.slice(0,10), ref:r.return_no, supplier:r.supplier||'-', alasan:r.reason||'-', total:r.total||0, po:null}));
        const fromRevisi = [];
        pos.forEach(po=>{
          (Array.isArray(po.revisions)?po.revisions:[]).forEach(rev=>{
            if(rev.tipe==='retur'&&rev.tanggal?.slice(0,10)>=dari){
              fromRevisi.push({
                tanggal: rev.tanggal?.slice(0,10),
                ref: 'PO-'+po.id,
                supplier: po.supplier||'-',
                alasan: rev.catatan||'-',
                total: rev.totalRetur||((rev.totalLama||0)-(rev.totalBaru||0)),
                po: withItems.find(w=>w.id===po.id)||po,
              });
            }
          });
        });
        setReturSupplier([...fromReturns,...fromRevisi].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||'')));
      } catch(e){ setReturSupplier([]); }
    } catch(e){}
    setLoading(false);
  };

  useEffect(()=>{ load(); },[periode]);

  const totalBeli = orders.reduce((s,o)=>s+(o.total||0),0);
  const sC = {Diterima:G, Proses:OR, Dibatalkan:RD};

  if(selected) return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <div style={{fontWeight:700,fontSize:15}}>Detail PO-{selected.id}</div>
      </div>
      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12,fontSize:12}}>
          <div><div style={{color:MT}}>Supplier</div><div style={{fontWeight:700}}>{selected.supplier}</div></div>
          <div><div style={{color:MT}}>Status</div><div style={{fontWeight:700,color:sC[selected.status]}}>{selected.status}</div></div>
          <div><div style={{color:MT}}>Tanggal</div><div style={{fontWeight:600}}>{selected.created_at?.slice(0,10)}</div></div>
          <div><div style={{color:MT}}>Pembayaran</div><div style={{fontWeight:600}}>{selected.bayar}</div></div>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr style={{background:'#F5F6FA'}}>
            <th style={{padding:'6px 8px',textAlign:'left',color:MT,fontWeight:600}}>Produk</th>
            <th style={{padding:'6px 8px',textAlign:'center',color:MT,fontWeight:600}}>Qty</th>
            <th style={{padding:'6px 8px',textAlign:'right',color:MT,fontWeight:600}}>Harga</th>
            <th style={{padding:'6px 8px',textAlign:'right',color:MT,fontWeight:600}}>Total</th>
          </tr></thead>
          <tbody>
            {(selected.items||[]).map((item,i)=>(
              <tr key={i} style={{borderBottom:'1px solid #f5f5f5'}}>
                <td style={{padding:'6px 8px',fontWeight:500}}>{item.name}</td>
                <td style={{padding:'6px 8px',textAlign:'center'}}>{item.qty} {item.satuan||'pcs'}</td>
                <td style={{padding:'6px 8px',textAlign:'right'}}>{fmt(item.price)}</td>
                <td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:G}}>{fmt(item.qty*item.price)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,paddingTop:10,borderTop:`2px solid ${G}`,marginTop:8}}>
          <span>Total</span><span style={{color:G}}>{fmt(selected.total)}</span>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>📦 Laporan Pembelian</h2>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[['hari_ini','Hari Ini'],['bulan','Bulan Ini']].map(([val,label])=>(
          <button key={val} onClick={()=>setPeriode(val)}
            style={{padding:'6px 14px',border:`1.5px solid ${periode===val?G:'#eee'}`,borderRadius:16,background:periode===val?G:'#fff',color:periode===val?'#fff':MT,fontSize:12,fontWeight:periode===val?700:500,cursor:'pointer'}}>
            {label}
          </button>
        ))}
      </div>

      <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',display:'flex',justifyContent:'space-between'}}>
        <div><div style={{fontSize:11,color:MT}}>Total Pembelian</div><div style={{fontWeight:800,fontSize:18,color:RD,marginTop:2}}>{fmt(totalBeli)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:11,color:MT}}>Retur ke Supplier</div><div style={{fontWeight:800,fontSize:18,color:'#8E44AD',marginTop:2}}>{fmt(returSupplier.reduce((s,r)=>s+(r.total||0),0))}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:11,color:MT}}>Jumlah PO</div><div style={{fontWeight:800,fontSize:18,marginTop:2}}>{orders.length}</div></div>
      </div>

      {/* Laporan Retur ke Supplier */}
      {returSupplier.length>0&&(
        <div style={{background:'#fff',borderRadius:12,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden'}}>
          <div onClick={()=>setShowReturList(v=>!v)}
            style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',borderLeft:'4px solid #8E44AD'}}>
            <div style={{fontWeight:800,fontSize:13,color:'#8E44AD'}}>↩️ Laporan Retur ke Supplier ({returSupplier.length})</div>
            <span style={{color:'#8E44AD',fontSize:15,transform:showReturList?'rotate(90deg)':'none',transition:'transform 0.15s'}}>›</span>
          </div>
          {showReturList&&(
            <div style={{padding:'0 16px 12px'}}>
              {returSupplier.map((r,i)=>(
                <div key={i} onClick={()=>r.po&&setSelected(r.po)}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'#FAF5FF',borderRadius:8,marginBottom:6,cursor:r.po?'pointer':'default'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace'}}>{r.ref}</div>
                    <div style={{fontSize:10,color:MT}}>{r.tanggal} · {r.supplier} · {r.alasan}</div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
                    <span style={{fontWeight:800,fontSize:12,color:'#8E44AD'}}>-{fmt(r.total||0)}</span>
                    {r.po&&<span style={{color:'#8E44AD',fontSize:13}}>›</span>}
                  </div>
                </div>
              ))}
              <div style={{fontSize:10,color:MT,marginTop:4}}>Ketuk baris PO untuk membuka detailnya</div>
            </div>
          )}
        </div>
      )}

      {loading?<Loading/>:orders.length===0
        ?<div style={{textAlign:'center',padding:'32px 0',color:MT,background:'#fff',borderRadius:12}}><div style={{fontSize:36}}>📦</div><div>Tidak ada pembelian</div></div>
        :orders.map((o,i)=>(
          <div key={o.id} onClick={()=>setSelected(o)}
            style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:8,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',cursor:'pointer',display:'flex',gap:14,alignItems:'flex-start'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F5F6FA'}
            onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
            <div style={{textAlign:'center',flexShrink:0,minWidth:36}}>
              <div style={{fontWeight:900,fontSize:22,lineHeight:1}}>{o.created_at?.slice(8,10)}</div>
              <div style={{fontSize:10,color:MT}}>{new Date(o.created_at).toLocaleDateString('id-ID',{month:'short'})}</div>
              <div style={{fontSize:10,color:MT}}>{o.created_at?.slice(0,4)}</div>
            </div>
            <div style={{flex:1,fontSize:11}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{o.supplier}</div>
              <div style={{color:MT}}>PO-{o.id} · {o.items?.length||0} item · <span style={{color:sC[o.status]}}>{o.status}</span></div>
              <div style={{color:MT,marginTop:2}}>Bayar: {o.bayar}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontWeight:800,fontSize:14,color:RD}}>{fmt(o.total)}</div>
              <div style={{color:G,fontSize:16}}>›</div>
            </div>
          </div>
        ))
      }
    </div>
  );
}

// ── LAPORAN PENGUNJUNG ─────────────────────────────────────────────────────
function LaporanPengunjung({onBack}) {
  const [data, setData]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [periode, setPeriode] = useState('bulan');

  const today = new Date().toISOString().slice(0,10);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        let dari;
        if(periode==='hari_ini') dari=today;
        else dari=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
        const txs = await sbGetAll('transactions',{order:'created_at',asc:false});
        const filtered = txs.filter(t=>t.created_at?.slice(0,10)>=dari);
        // Group by customer
        const map = {};
        filtered.forEach(t=>{
          const name = t.customer||'Umum (Walk-in)';
          if(!map[name]) map[name]={name,kunjungan:0,total:0,lastVisit:''};
          map[name].kunjungan++;
          map[name].total+=t.total;
          if(t.created_at>map[name].lastVisit) map[name].lastVisit=t.created_at;
        });
        setData(Object.values(map).sort((a,b)=>b.kunjungan-a.kunjungan));
      } catch(e){}
      setLoading(false);
    })();
  },[periode]);

  const totalKunjungan = data.reduce((s,d)=>s+d.kunjungan,0);

  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>

            <span>#</span><span>Pelanggan</span><span style={{textAlign:'center'}}>Kunjungan</span><span style={{textAlign:'right'}}>Total Belanja</span>
          </div>

            <div key={i} style={{display:'grid',gridTemplateColumns:'auto 1fr auto auto',gap:8,padding:'10px 14px',borderBottom:'1px solid #f5f5f5',fontSize:12,alignItems:'center'}}>

}

// ── SCAN NOTA AI ───────────────────────────────────────────────────────────
function ScanNota({onBack, onDataReady}) {
  const [step, setStep]           = useState('upload');
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [extractedData, setExtractedData] = useState(null);
  const [error, setError]         = useState('');
  const [suppliers, setSuppliers] = useState([]);
  const [saving, setSaving]       = useState(false);
  const [uploadingPhoto, setUploadingPhoto] = useState(false);
  const [photoUrl, setPhotoUrl]   = useState('');
  const [showAddSupplier, setShowAddSupplier] = useState(false);
  const [newSupplier, setNewSupplier] = useState({name:'',phone:'',address:''});
  const [savingSupplier, setSavingSupplier] = useState(false);
  const [showTambahProduk, setShowTambahProduk] = useState(null); // index item yang lagi ditambah jadi produk baru

  useEffect(()=>{
    sbGet('suppliers',{order:'name'}).then(s=>setSuppliers(s||[])).catch(()=>{});
    // Load products cache untuk matching
    if(!window._cachedProducts||window._cachedProducts.length===0) {
      sbGetAll('products',{order:'name'}).then(p=>{
        window._cachedProducts=p||[];
        console.log('[ScanNota] Products loaded:', p?.length);
      }).catch(e=>console.error('[ScanNota] Cache error:', e));
    } else {
      console.log('[ScanNota] Products cache hit:', window._cachedProducts.length);
    }
  },[]);

  const handleFile = (file) => {
    if(!file) return;
    if(!file.type.startsWith('image/')) return setError('File harus berupa gambar!');
    if(file.size > 10*1024*1024) return setError('Ukuran gambar maksimal 10MB!');
    setImageFile(file); setError('');
    const reader = new FileReader();
    reader.onload = e => setImagePreview(e.target.result);
    reader.readAsDataURL(file);
  };

  // Upload foto ke Supabase Storage
  const uploadFoto = async(file) => {
    setUploadingPhoto(true);
    try {
      const sb = window.supabase.createClient(SB_URL, SB_KEY);
      const ext = file.name?.split('.').pop() || 'jpg';
      const filename = `nota-pembelian/${Date.now()}.${ext}`;
      const { data, error } = await sb.storage.from('toko-assets').upload(filename, file, {
        cacheControl: '3600', upsert: false, contentType: file.type
      });
      if(error) throw error;
      const { data: urlData } = sb.storage.from('toko-assets').getPublicUrl(filename);
      setPhotoUrl(urlData.publicUrl);
      return urlData.publicUrl;
    } catch(e) {
      console.error('Upload foto gagal:', e);
      return '';
    } finally { setUploadingPhoto(false); }
  };

  // Tambah supplier baru
  const saveNewSupplier = async() => {
    if(!newSupplier.name.trim()) return alert('Nama supplier wajib!');
    setSavingSupplier(true);
    try {
      const [sup] = await sbInsert('suppliers',[{
        name: newSupplier.name.trim(),
        phone: newSupplier.phone||'',
        address: newSupplier.address||'',
      }]);
      const updated = [...suppliers, sup];
      setSuppliers(updated);
      setExtractedData(p=>({...p, supplier_id: String(sup.id)}));
      setShowAddSupplier(false);
      setNewSupplier({name:'',phone:'',address:''});
      alert(`✅ Supplier "${sup.name}" berhasil ditambahkan!`);
    } catch(e){ alert('Gagal: '+e.message); }
    setSavingSupplier(false);
  };

  const analyzeNota = async() => {
    if(!imageFile) return;
    setStep('loading');
    setError('');
    try {
      // Upload foto dulu ke Supabase
      const fotoUrl = await uploadFoto(imageFile);

      // Convert to base64 for AI
      const base64 = await new Promise((res,rej)=>{
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(imageFile);
      });

      // Panggil Netlify Function sebagai proxy (hindari CORS)
      const response = await fetch('/api/analyze-nota', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ base64, mediaType: imageFile.type })
      });

      if(!response.ok) {
        const errData = await response.json().catch(()=>({error:'Server error'}));
        throw new Error(errData.error || `Error ${response.status}`);
      }

      let parsed;
      try {
        const rawText = await response.text();
        // Coba parse JSON
        try {
          parsed = JSON.parse(rawText);
        } catch(jsonErr) {
          // Kalau bukan JSON, coba extract JSON dari text
          const jsonMatch = rawText.match(/[{][\s\S]*[}]/);
          if(jsonMatch) {
            parsed = JSON.parse(jsonMatch[0]);
          } else {
            throw new Error('AI tidak bisa membaca nota ini. Pastikan foto jelas dan terang!');
          }
        }
        if(parsed.error) throw new Error(parsed.error);
      } catch(e) {
        throw new Error('Gagal membaca nota: '+e.message+'. Pastikan foto jelas dan terang!');
      }

      // Normalize
      parsed.items = (parsed.items||[]).map(item=>({
        nama:   (item.nama||'').toUpperCase(),
        qty:    parseInt(item.qty)||1,
        harga:  parseInt(item.harga)||0,
        satuan: (item.satuan||'pcs').toUpperCase(),
        product_id: null,
      }));
      parsed.supplier     = (parsed.supplier||'').toUpperCase();
      parsed.tanggal      = parsed.tanggal||new Date().toISOString().slice(0,10);
      parsed.status_bayar = parsed.status_bayar||'Lunas';
      parsed.total        = parseInt(parsed.total)||parsed.items.reduce((s,i)=>s+i.qty*i.harga,0);
      parsed.catatan      = (parsed.catatan||'').toUpperCase();
      parsed.no_nota      = parsed.no_nota||'';
      parsed.supplier_id  = '';
      parsed.foto_url     = fotoUrl;

      // Auto-match supplier dari daftar
      if(parsed.supplier) {
        const match = suppliers.find(s=>
          s.name.toLowerCase().includes(parsed.supplier.toLowerCase()) ||
          parsed.supplier.toLowerCase().includes(s.name.toLowerCase())
        );
        if(match) parsed.supplier_id = String(match.id);
      }

      // AI Product Matching — 1 call untuk semua item
      if(parsed.items?.length>0 && window._cachedProducts?.length>0) {
        try {
          const prodList = window._cachedProducts.map(p=>p.id+'|'+p.name).join('\n');
          const itemList = parsed.items.map((it,i)=>(i+1)+'. '+it.nama).join('\n');

          const matchResp = await fetch('/api/analyze-nota', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              matchMode: true,
              itemList,
              prodList: prodList.slice(0, 8000), // limit token
            })
          });

          if(matchResp.ok) {
            const matchData = await matchResp.json();
            if(matchData.matches) {
              parsed.items = parsed.items.map((it,i)=>{
                const m = matchData.matches[i+1];
                if(m && m.product_id) {
                  const prod = window._cachedProducts.find(p=>p.id===parseInt(m.product_id));
                  if(prod) return {...it, product_id:prod.id, matched_name:prod.name, match_confidence:m.confidence};
                }
                return it;
              });
            }
          }
        } catch(e){ console.log('AI match failed, using fuzzy:', e.message); }
      }

      setExtractedData(parsed);
      setStep('review');
    } catch(e) {
      setError(e.message||'Gagal menganalisis nota');
      setStep('upload');
    }
  };

  const savePO = async() => {
    if(!extractedData.supplier && !extractedData.supplier_id) return alert('Nama supplier wajib!');
    if(extractedData.items.length===0) return alert('Tidak ada item barang!');
    setSaving(true);
    try {
      const sup = suppliers.find(s=>s.id===parseInt(extractedData.supplier_id));
      // Subtotal per item SUDAH dikurangi diskon berjenjang per barang
      const itemSubtotals = extractedData.items.map(i=>{
        const raw = i.qty*i.harga;
        return raw - applyTieredDiskon(raw, i.diskon_persen||'0');
      });
      const subtotalCalc   = itemSubtotals.reduce((s,v)=>s+v,0);
      const diskonNotaStr  = extractedData.diskon_persen_nota ?? '0';
      const ppnPersen      = extractedData.ppn_persen||0;
      const potonganRp     = parseInt(extractedData.potongan_nominal)||0;
      const diskonNominal  = Math.round(applyTieredDiskon(subtotalCalc, diskonNotaStr));
      const afterDiskon    = subtotalCalc - diskonNominal;
      const ppnNominal     = Math.round(afterDiskon*(ppnPersen/100));
      const totalCalc      = Math.max(0, afterDiskon + ppnNominal - potonganRp);
      const [po] = await sbInsert('purchase_orders',[{
        supplier:    sup?.name || extractedData.supplier,
        supplier_id: parseInt(extractedData.supplier_id)||null,
        status:      'Proses',
        bayar:       extractedData.status_bayar,
        total:       totalCalc,
        diskon_persen: diskonNotaStr,
        ppn_persen:    ppnPersen,
        potongan_nominal: potonganRp,
        due_date:    extractedData.due_date||null,
        created_at:  extractedData.tanggal ? extractedData.tanggal+'T09:00:00' : undefined,
        notes:       [
          extractedData.no_nota?`No. Nota: ${extractedData.no_nota}`:'',
          extractedData.catatan||'',
          extractedData.foto_url?`Foto nota: ${extractedData.foto_url}`:'',
          'Via Scan Nota AI',
        ].filter(Boolean).join(' | '),
      }]);
      await sbInsert('po_items', extractedData.items.map(item=>({
        po_id:    po.id,
        name:     item.nama,
        qty:      item.qty,
        price:    item.harga,
        subtotal: item.qty*item.harga - applyTieredDiskon(item.qty*item.harga, item.diskon_persen||'0'),
        diskon_persen: item.diskon_persen||'0',
        product_id: item.product_id||null,
        satuan:   item.tipe_unit==='besar'
                    ? (item.satuan||'unit besar')
                    : (item.satuan||'pcs'),
      })));
      notifyDataChanged('pembelian');
      setStep('done');
      if(onDataReady) onDataReady(po);
    } catch(e){ alert('Gagal simpan: '+e.message); }
    setSaving(false);
  };

  // ── DONE ──
  if(step==='done') return (
    <div style={{padding:32,textAlign:'center',maxWidth:480,margin:'0 auto'}}>
      <div style={{fontSize:64,marginBottom:16}}>✅</div>
      <div style={{fontWeight:800,fontSize:20,marginBottom:8}}>Nota Berhasil Diproses!</div>
      <div style={{color:MT,fontSize:13,marginBottom:8}}>Purchase Order sudah dibuat & tersimpan.</div>
      {photoUrl&&<div style={{fontSize:11,color:G,marginBottom:20}}>📎 Foto nota tersimpan di storage toko</div>}
      <div style={{display:'flex',gap:10}}>
        <button onClick={()=>{setStep('upload');setImageFile(null);setImagePreview(null);setExtractedData(null);setPhotoUrl('');}}
          style={{flex:1,padding:13,background:GL,border:`1px solid ${G}`,borderRadius:12,fontWeight:700,cursor:'pointer',color:GD}}>
          📸 Scan Lagi
        </button>
        <button onClick={onBack}
          style={{flex:1,padding:13,background:G,color:'#fff',border:'none',borderRadius:12,fontWeight:700,cursor:'pointer'}}>
          Selesai →
        </button>
      </div>
    </div>
  );

  // ── REVIEW ──
  if(step==='review'&&extractedData) return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      {showTambahProduk!==null&&(
        <TambahProdukBaruModal
          initialName={extractedData.items[showTambahProduk]?.nama||''}
          initialHarga={extractedData.items[showTambahProduk]?.harga||0}
          allProducts={window._cachedProducts||[]}
          onClose={()=>setShowTambahProduk(null)}
          onCreated={(newProd)=>{
            const idx = showTambahProduk;
            setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===idx?{...it,product_id:newProd.id,nama:newProd.name}:it)}));
            setShowTambahProduk(null);
            alert('✅ Produk baru berhasil ditambahkan!');
          }}
        />
      )}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <button onClick={()=>setStep('upload')} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
        <h2 style={{margin:0,fontSize:17,fontWeight:800}}>🤖 Review Hasil Scan</h2>
      </div>

      <div style={{background:'#E8F5E9',border:`1px solid ${G}`,borderRadius:10,padding:'10px 14px',marginBottom:12,fontSize:12,color:'#1b5e20',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span>✅</span>
        <span>AI berhasil membaca nota! Periksa dan edit data sebelum disimpan.</span>
        {uploadingPhoto&&<span style={{color:OR}}>⏳ Upload foto...</span>}
        {photoUrl&&!uploadingPhoto&&<span style={{color:G}}>📎 Foto tersimpan!</span>}
        {extractedData?.items?.some(i=>i.product_id)&&(
          <span style={{color:'#1976D2'}}>🤖 AI cocokkan {extractedData.items.filter(i=>i.product_id).length} produk</span>
        )}

                style={{flex:1,padding:'10px 6px',background:extractedData.status_bayar===opt.val?opt.bg:'#F5F6FA',
                  border:`2px solid ${extractedData.status_bayar===opt.val?opt.color:'#eee'}`,
                  borderRadius:10,cursor:'pointer',textAlign:'center'}}>
                <div style={{fontSize:18}}>{opt.icon}</div>
                <div style={{fontSize:10,fontWeight:700,color:extractedData.status_bayar===opt.val?opt.color:MT,marginTop:2}}>{opt.label}</div>
              </button>
            ))}
          </div>
          {extractedData.status_bayar==='Hutang'&&(
            <div style={{fontSize:11,color:OR,marginTop:6,padding:'6px 10px',background:'#FFF3E0',borderRadius:7}}>
              ⏳ Nota ini akan dicatat sebagai hutang ke supplier

          )}
        </div>
      </div>

      {/* Items */}
      <div style={{background:'#fff',borderRadius:12,padding:16,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13}}>🛒 Daftar Barang ({extractedData.items.length})</div>
          <button onClick={()=>setExtractedData(p=>({...p,items:[...p.items,{nama:'',qty:1,harga:0,satuan:'pcs',product_id:null}]}))}
            style={{padding:'5px 12px',background:GL,border:`1px solid ${G}`,borderRadius:8,cursor:'pointer',color:GD,fontWeight:700,fontSize:12}}>
            + Item
          </button>
        </div>
        {extractedData.items.map((item,i)=>(
          <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:10,marginBottom:8}}>
            <div style={{display:'flex',gap:6,marginBottom:6}}>
              <input value={item.nama}
                onChange={e=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,nama:e.target.value,product_id:null,matched:false}:it)}))}
                placeholder="Nama barang"
                style={{flex:1,padding:'7px 10px',border:`1.5px solid ${item.product_id?G:'#eee'}`,borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
              <button onClick={()=>setExtractedData(p=>({...p,items:p.items.filter((_,j)=>j!==i)}))}
                style={{padding:'7px 10px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,cursor:'pointer',color:RD,fontSize:12,flexShrink:0}}>🗑️</button>
            </div>

            {/* Match ke produk database */}
            {item.product_id && item.match_confidence && (
              <div style={{fontSize:10,marginBottom:4,padding:'3px 8px',borderRadius:6,display:'inline-block',
                background:item.match_confidence==='high'?GL:item.match_confidence==='medium'?'#FFF3E0':'#F5F6FA',
                color:item.match_confidence==='high'?GD:item.match_confidence==='medium'?OR:MT}}>
                🤖 AI Match: {item.match_confidence==='high'?'Sangat Yakin ✅':item.match_confidence==='medium'?'Kemungkinan Besar ⚡':'Perkiraan 🤔'}
                {item.matched_name&&` → "${item.matched_name}"`}
              </div>
            )}
            {!item.product_id ? (
              <div style={{marginBottom:8}}>
                <div style={{fontSize:10,color:MT,fontWeight:600,marginBottom:4}}>🔍 Cocokkan ke produk di database:</div>
                <select onChange={e=>{
                  const val = e.target.value;
                  if(!val) return;
                  const prod = (window._cachedProducts||[]).find(p=>p.id===parseInt(val));
                  // Harga beli TETAP dari nota, tidak diganti dari database
                  if(prod) setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,product_id:prod.id,nama:prod.name}:it)}));
                }}
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff',marginBottom:4}}>
                  <option value="">-- Pilih produk yang cocok --</option>
                  {(window._cachedProducts||[])
                    .map(p=>{
                      const q = (item.nama||'').toLowerCase().trim();
                      const pName = p.name.toLowerCase();
                      // Kata-kata dari query (min 2 karakter, skip kata umum)
                      const stopWords = ['dan','ke','di','dari','atau','yang','untuk','per','x','no','uk'];
                      const qWords = q.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));
                      const pWords = pName.split(/[\s\-\/,]+/).filter(w=>w.length>=2&&!stopWords.includes(w));
                      
                      let score = 0;
                      // Exact match = tertinggi
                      if(pName===q) score+=100;
                      // Setiap kata query yang ada di nama produk
                      qWords.forEach(w=>{ if(pName.includes(w)) score+=20; });
                      // Setiap kata produk yang ada di query
                      pWords.forEach(w=>{ if(q.includes(w)) score+=10; });
                      // Bonus kalau kata pertama sama
                      if(qWords[0]&&pWords[0]&&pWords[0].startsWith(qWords[0])) score+=15;
                      // Bonus kalau urutan kata sama
                      qWords.forEach((w,i)=>{ if(pWords[i]&&pWords[i].includes(w)) score+=5; });
                      
                      return {...p, score};
                    })
                    .filter(p=>p.score>=20)
                    .sort((a,b)=>b.score-a.score)
                    .slice(0,10)
                    .map(p=>(
                      <option key={p.id} value={p.id}>
                        {p.name} · Stok:{p.stock} · Beli:{fmt(p.buy_price||0)}
                      </option>
                    ))
                  }
                </select>
                <div style={{fontSize:10,color:OR,marginBottom:4}}>⚠️ Belum dicocokkan — stok tidak akan terupdate saat diterima</div>
                <button onClick={()=>setShowTambahProduk(i)}
                  style={{width:'100%',padding:'7px 0',background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:8,cursor:'pointer',color:'#1976D2',fontWeight:700,fontSize:11}}>
                  ➕ Tambah sebagai Produk Baru
                </button>
              </div>
            ) : (
              <div style={{marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',background:GL,borderRadius:8,padding:'5px 10px'}}>
                <div style={{fontSize:11,color:GD,fontWeight:600}}>✅ Cocok dengan produk di database</div>
                <button onClick={()=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,product_id:null}:it)}))}
                  style={{fontSize:10,color:MT,background:'none',border:'none',cursor:'pointer'}}>Batalkan</button>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 80px',gap:6}}>
              <div>
                <label style={{fontSize:10,color:MT,fontWeight:600,display:'block',marginBottom:2}}>Harga Beli (Rp)</label>
                <input type="number" value={item.harga}
                  onChange={e=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,harga:parseInt(e.target.value)||0}:it)}))}
                  style={{width:'100%',padding:'6px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:MT,fontWeight:600,display:'block',marginBottom:2}}>Qty</label>
                <input type="number" value={item.qty}
                  onChange={e=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,qty:parseInt(e.target.value)||0}:it)}))}
                  style={{width:'100%',padding:'6px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,textAlign:'center',boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:OR,fontWeight:600,display:'block',marginBottom:2}}>Diskon (%)</label>
                <input type="text" value={item.diskon_persen||'0'} placeholder="mis. 5+5"
                  onChange={e=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,diskon_persen:e.target.value}:it)}))}
                  style={{width:'100%',padding:'6px 8px',border:`1.5px solid ${OR}66`,borderRadius:7,fontSize:12,textAlign:'center',boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:MT,fontWeight:600,display:'block',marginBottom:2}}>Satuan</label>
                <input value={item.satuan}
                  onChange={e=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,satuan:e.target.value}:it)}))}
                  style={{width:'100%',padding:'6px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:12,boxSizing:'border-box'}}/>
              </div>
            </div>
            {effectiveDiskonPct(item.diskon_persen)!==null&&(
              <div style={{fontSize:10,color:OR,marginTop:3}}>
                {item.diskon_persen} = efektif {effectiveDiskonPct(item.diskon_persen).toFixed(2)}% (bukan {parseTieredDiskon(item.diskon_persen).reduce((a,b)=>a+b,0)}% flat)
              </div>
            )}
            <div style={{fontSize:11,color:GD,fontWeight:700,textAlign:'right',marginTop:5}}>
              {applyTieredDiskon(item.qty*item.harga,item.diskon_persen||'0')>0&&<span style={{color:MT,textDecoration:'line-through',fontWeight:500,marginRight:6}}>{fmt(item.qty*item.harga)}</span>}
              {fmt(item.qty*item.harga - applyTieredDiskon(item.qty*item.harga,item.diskon_persen||'0'))}
            </div>
            {/* Pilihan unit besar/kecil */}
            <div style={{marginTop:8}}>
              <label style={{fontSize:10,color:MT,fontWeight:600,display:'block',marginBottom:4}}>📦 Tipe Unit dari Supplier</label>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,tipe_unit:'kecil'}:it)}))}
                  style={{flex:1,padding:'7px 4px',border:`1.5px solid ${(item.tipe_unit||'kecil')==='kecil'?G:'#eee'}`,borderRadius:8,background:(item.tipe_unit||'kecil')==='kecil'?GL:'#fff',color:(item.tipe_unit||'kecil')==='kecil'?GD:MT,cursor:'pointer',fontSize:11,fontWeight:(item.tipe_unit||'kecil')==='kecil'?700:500,textAlign:'center'}}>
                  📦 Unit Kecil<br/><span style={{fontSize:9,color:MT}}>pcs/meter</span>
                </button>
                <button onClick={()=>setExtractedData(p=>({...p,items:p.items.map((it,j)=>j===i?{...it,tipe_unit:'besar'}:it)}))}
                  style={{flex:1,padding:'7px 4px',border:`1.5px solid ${item.tipe_unit==='besar'?'#8E44AD':'#eee'}`,borderRadius:8,background:item.tipe_unit==='besar'?'#F3E5F5':'#fff',color:item.tipe_unit==='besar'?'#8E44AD':MT,cursor:'pointer',fontSize:11,fontWeight:item.tipe_unit==='besar'?700:500,textAlign:'center'}}>
                  🎁 Unit Besar<br/><span style={{fontSize:9,color:MT}}>roll/box/lusin</span>
                </button>
              </div>
              {item.tipe_unit==='besar'&&(
                <div style={{marginTop:4,padding:'5px 8px',background:'#F3E5F5',borderRadius:6,fontSize:10,color:'#8E44AD'}}>
                  ⚠️ Stok dikonversi ke unit kecil saat PO diterima
                </div>
              )}
            </div>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:MT,paddingTop:10,borderTop:'1px solid #eee',marginTop:4}}>
          <span>Subtotal (setelah diskon per-item)</span>
          <span>{fmt(extractedData.items.reduce((s,i)=>s+(i.qty*i.harga - applyTieredDiskon(i.qty*i.harga,i.diskon_persen||'0')),0))}</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:8}}>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>💸 Diskon Nota (%)</label>
            <input type="text" value={extractedData.diskon_persen_nota||'0'} placeholder="mis. 5+5"
              onChange={e=>setExtractedData(p=>({...p,diskon_persen_nota:e.target.value}))}
              style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>🧾 PPN (%)</label>
            <input type="number" min="0" max="100" value={extractedData.ppn_persen||0}
              onChange={e=>setExtractedData(p=>({...p,ppn_persen:parseFloat(e.target.value)||0}))}
              style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
          </div>
        </div>
        <div style={{marginTop:8}}>
          <label style={{fontSize:11,color:'#8E44AD',fontWeight:600,display:'block',marginBottom:4}}>➖ Potongan Tambahan (Rp) — opsional</label>
          <input type="number" min="0" value={extractedData.potongan_nominal||0} placeholder="0"
            onChange={e=>setExtractedData(p=>({...p,potongan_nominal:parseInt(e.target.value)||0}))}
            style={{width:'100%',padding:'9px 10px',border:'1.5px solid #8E44AD66',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
        </div>
        {(()=>{
          const subAfterItem = extractedData.items.reduce((s,i)=>s+(i.qty*i.harga - applyTieredDiskon(i.qty*i.harga,i.diskon_persen||'0')),0);
          const diskonNotaNom = applyTieredDiskon(subAfterItem, extractedData.diskon_persen_nota||'0');
          const effNota = effectiveDiskonPct(extractedData.diskon_persen_nota);
          return diskonNotaNom>0 ? (
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:RD,marginTop:6}}>
              <span>Diskon Nota ({extractedData.diskon_persen_nota}{effNota!==null?`, efektif ${effNota.toFixed(2)}%`:'%'})</span>
              <span>-{fmt(diskonNotaNom)}</span>
            </div>
          ) : null;
        })()}
        {(extractedData.ppn_persen>0)&&(()=>{
          const subAfterItem = extractedData.items.reduce((s,i)=>s+(i.qty*i.harga - applyTieredDiskon(i.qty*i.harga,i.diskon_persen||'0')),0);
          const diskonNotaNom = applyTieredDiskon(subAfterItem, extractedData.diskon_persen_nota||'0');
          const ppnNom = Math.round((subAfterItem-diskonNotaNom)*(extractedData.ppn_persen/100));
          return (
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:MT,marginTop:4}}>
              <span>PPN ({extractedData.ppn_persen}%)</span>
              <span>+{fmt(ppnNom)}</span>
            </div>
          );
        })()}
        {(extractedData.potongan_nominal>0)&&(
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#8E44AD',marginTop:4}}>
            <span>Potongan Tambahan</span>
            <span>-{fmt(extractedData.potongan_nominal)}</span>
          </div>
        )}
        <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,paddingTop:10,borderTop:`2px solid ${G}`,marginTop:8}}>
          <span>Total</span>
          <span style={{color:G}}>{fmt((()=>{
            const subAfterItem = extractedData.items.reduce((s,i)=>s+(i.qty*i.harga - applyTieredDiskon(i.qty*i.harga,i.diskon_persen||'0')),0);
            const diskonNotaNom = applyTieredDiskon(subAfterItem, extractedData.diskon_persen_nota||'0');
            const afterDiskon = subAfterItem - diskonNotaNom;
            const ppnNom = Math.round(afterDiskon*((extractedData.ppn_persen||0)/100));
            return Math.max(0, afterDiskon + ppnNom - (parseInt(extractedData.potongan_nominal)||0));
          })())}</span>
        </div>
      </div>

      <button onClick={savePO} disabled={saving||uploadingPhoto}
        style={{width:'100%',padding:14,background:saving||uploadingPhoto?MT:G,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer',marginBottom:16}}>
        {saving?'⏳ Menyimpan...':uploadingPhoto?'⏳ Upload foto...':'💾 Simpan Purchase Order'}
      </button>
    </div>
  );

  // ── LOADING ──
  if(step==='loading') return (
