function Transaksi({onGotoProduct}={}) {
  const [products, setProducts] = useState([]);
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [favoritProducts, setFavoritProducts] = useState([]);
  const [showFavorit, setShowFavorit] = useState(true);
  const [listening, setListening] = useState(false);
  const [activeCat, setActiveCat] = useState('Semua');
  const [loading, setLoading] = useState(true);
  const [bypassStok, setBypassStok] = useState(false); // mode bypass stok
  const [error, setError] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try {
      const prods = await sbGetAll('products',{order:'name'});
      setProducts(prods);
      try {
        const units = await sbGet('product_units',{select:'product_id',order:'id'});
        const counts = {};
        units.forEach(u=>{ counts[u.product_id]=(counts[u.product_id]||0)+1; });
        setProductUnits(counts);
      } catch(e){}
    } 
    catch(e){ setError(e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  // Load products sekali saja saat komponen mount
  useEffect(()=>{
    setProducts([]); // reset dulu
    sbGetAll('products',{order:'name'}).then(p=>{
      const sorted = (p||[]).sort((a,b)=>a.name.localeCompare(b.name));
      setProducts(sorted);
      loadFavoritProducts(sorted);
    }).catch(()=>{});
  },[]);

  const [allVariants, setAllVariants] = useState({});

  useEffect(()=>{
    if(!products.length) return;
    (async()=>{
      try {
        const [units, variants] = await Promise.all([
          sbGet('product_units',{order:'id'}),
          sbGet('product_variants',{order:'id'}),
        ]);
        const groupedU = {};
        units.forEach(u=>{ if(!groupedU[u.product_id]) groupedU[u.product_id]=[]; groupedU[u.product_id].push(u); });
        setAllUnits(groupedU);
        const groupedV = {};
        variants.forEach(v=>{ if(!groupedV[v.product_id]) groupedV[v.product_id]=[]; groupedV[v.product_id].push(v); });
        setAllVariants(groupedV);
      } catch(e){}
    })();
  },[products]);

  // 3-level category: Utama > Sub > Brand
  const [activeSub, setActiveSub] = useState('Semua');
  const [activeBrand, setActiveBrand] = useState('Semua');

  const getMain  = (cat) => (cat||'').split(' > ')[0] || '';
  const getSub   = (cat) => (cat||'').split(' > ')[1] || '';
  const getBrand = (cat) => (cat||'').split(' > ')[2] || '';

  // Level 1: Kategori Utama
  const mainCats = [...new Set(products.map(p=>getMain(p.category)).filter(Boolean))].sort();
  // Level 2: Sub dari main yang dipilih
  const subCats = activeCat==='Semua'
    ? [...new Set(products.map(p=>getSub(p.category)).filter(Boolean))].sort()
    : [...new Set(products.filter(p=>getMain(p.category)===activeCat).map(p=>getSub(p.category)).filter(Boolean))].sort();
  // Level 3: Brand dari sub yang dipilih (hanya tampil jika sub dipilih)
  const brandCats = activeSub==='Semua'
    ? []
    : [...new Set(products.filter(p=>getMain(p.category)===activeCat&&getSub(p.category)===activeSub).map(p=>getBrand(p.category)).filter(Boolean))].sort();
  const [unitSelector, setUnitSelector] = useState(null);
  const [allUnits, setAllUnits] = useState({});
  const [showScanner, setShowScanner] = useState(false);
  const [showMobileCart, setShowMobileCart] = useState(false);
  const [showTransaksiTambahan, setShowTransaksiTambahan] = useState(false);
  const [showTambahProdukKasir, setShowTambahProdukKasir] = useState(false);
  const longPressTimer = React.useRef(null);
  const longPressFired = React.useRef(false);
  const startLongPress = (fn) => {
    longPressFired.current = false;
    longPressTimer.current = setTimeout(()=>{ longPressFired.current = true; fn(); }, 550);
  };
  const cancelLongPress = () => { if(longPressTimer.current) clearTimeout(longPressTimer.current); };

  const filtered = products.filter(p=>{
    if(p.tampilkan_transaksi===false) return false;
    const matchSearch = smartMatch(search, p.name, p.category||'');
    const matchMain   = activeCat==='Semua'   || getMain(p.category)===activeCat;
    const matchSub    = activeSub==='Semua'   || getSub(p.category)===activeSub;
    const matchBrand  = activeSub==='Semua'   || activeBrand==='Semua' || getBrand(p.category)===activeBrand;
    // Search selalu ikut filter kategori yang aktif
    return matchSearch && matchMain && matchSub && matchBrand;
  }).sort((a,b)=>search?smartScore(search,b.name)-smartScore(search,a.name):0);

  const addToCartDirect = (product, unit, price) => {
    const cartKey = product.id+'_'+unit;
    setCart(prev=>{
      // Guard stok: total kebutuhan semua baris produk ini + 1 unit baru
      if(!bypassStok && product.id && product.pakai_stok!==false){
        const per   = product._unitBesar?(product._konversi||1):1;
        const sudah = prev.reduce((s,i)=>i.id===product.id?s+(parseQty(i.qty)*(i._unitBesar?(i._konversi||1):1)):s,0);
        if(sudah+per>(product.stock||0)){
          alert(`❌ Stok tidak cukup!\n${product.name}\nStok tersisa: ${product.stock||0} ${product.unit_kecil||'pcs'}${sudah>0?`\nSudah di keranjang: ${sudah}`:''}`);
          return prev;
        }
      }
      const ex=prev.find(i=>i.cartKey===cartKey);
      if(ex) return prev.map(i=>i.cartKey===cartKey?{...i,qty:i.qty+1}:i);
      return [...prev,{...product,cartKey,unit,price,qty:1}];
    });
    setUnitSelector(null);
  };
  const addToCart = (p) => {
    const units    = allUnits[p.id]    || [];
    const variants = allVariants[p.id] || [];
    if(variants.length>0) {
      setUnitSelector({product:p, units, variants, mode:'variant'});
    } else if(units.length>0) {
      setUnitSelector({product:p, units, variants:[], mode:'unit'});
    } else {
      addToCartDirect(p,'Pcs',p.price);
    }
  };
  const updateQty   = (cartKey,d)        => setCart(prev=>{
    if(d>0&&!bypassStok){
      const it = prev.find(i=>(i.cartKey||i.id+'_Pcs')===cartKey);
      if(it&&it.id&&it.pakai_stok!==false){
        const per   = it._unitBesar?(it._konversi||1):1;
        const sudah = prev.reduce((s,i)=>i.id===it.id?s+(parseQty(i.qty)*(i._unitBesar?(i._konversi||1):1)):s,0);
        if(sudah+per>(it.stock||0)){
          alert(`❌ Stok ${it.name} tidak cukup!\nStok tersisa: ${it.stock||0}, di keranjang sudah: ${sudah}`);
          return prev;
        }
      }
    }
    return prev.map(i=>(i.cartKey||i.id+'_Pcs')===cartKey?{...i,qty:i.qty+d}:i).filter(i=>i.qty>0);
  });
  const updatePrice = (cartKey,newPrice) => setCart(prev=>prev.map(i=>(i.cartKey||i.id)===cartKey?{...i,price:newPrice}:i));
  const clearCart = () => { setCart([]); };
  const getQty = (id) => cart.filter(i=>i.id===id).reduce((s,i)=>s+i.qty,0);

  // ── Produk Favorit/Terlaris — dihitung dari riwayat penjualan terbaru ──
  const loadFavoritProducts = async(prodList) => {
    try {
      const cached = window._favoritCache;
      if(cached && Date.now()-cached.at < 30*60*1000) { setFavoritProducts(cached.list); return; }
      const items = await sbGet('transaction_items',{order:'id',asc:false,limit:3000});
      const freq = {};
      (items||[]).forEach(it=>{
        if(!it.product_id) return;
        freq[it.product_id] = (freq[it.product_id]||0) + (parseQty(it.qty)||0);
      });
      const topIds = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([id])=>parseInt(id));
      const list = topIds.map(id=>(prodList||products).find(p=>p.id===id)).filter(Boolean);
      window._favoritCache = {list, at: Date.now()};
      setFavoritProducts(list);
    } catch(e){ setFavoritProducts([]); }
  };
  const totalItems = cart.reduce((s,i)=>s+i.qty, 0);
  const totalHarga = cart.reduce((s,i)=>s+i.price*i.qty, 0);

  const handleBarcode = (code) => {
    setShowScanner(false);
    if(!code) return;
    // Cari produk berdasarkan barcode atau nama
    const found = products.find(p =>
      p.barcode === code ||
      p.barcode === code.trim() ||
      p.name.toLowerCase().includes(code.toLowerCase())
    );
    if(found) {
      addToCart(found);
      // Feedback visual
      setSearch('');
    } else {
      // Tidak ketemu - set ke search bar
      setSearch(code);
      alert(`Barcode "${code}" tidak ditemukan di database!`);
    }
  };

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  return (
    <>
    {/* Barcode Scanner */}
    {showScanner && <BarcodeScanner onDetected={handleBarcode} onClose={()=>setShowScanner(false)}/>}
    {showTransaksiTambahan && (
      <TransaksiTambahanModal
        onClose={()=>setShowTransaksiTambahan(false)}
        onAdd={(item)=>{
          setCart(prev=>[...prev, item]);
          setShowTransaksiTambahan(false);
        }}
      />
    )}
    {showTambahProdukKasir && (
      <TambahProdukBaruModal
        initialName={search}
        allProducts={window._cachedProducts||products||[]}
        onClose={()=>setShowTambahProdukKasir(false)}
        onCreated={(newProd)=>{
          setProducts(prev=>[...prev, newProd].sort((a,b)=>a.name.localeCompare(b.name)));
          setShowTambahProdukKasir(false);
          setSearch('');
          addToCart(newProd);
        }}
      />
    )}
    {/* Unit Selector Modal */}
    {unitSelector && (
      <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setUnitSelector(null)}>
        <div style={{background:'#fff',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,padding:'20px 16px 36px'}} onClick={e=>e.stopPropagation()}>
          <div style={{width:40,height:4,background:'#eee',borderRadius:2,margin:'0 auto 16px'}}/>
          <div style={{fontWeight:800,fontSize:15,marginBottom:4,color:TX}}>{unitSelector.product.name}</div>
          <div style={{fontSize:12,color:MT,marginBottom:14}}>{unitSelector.mode==='variant'?'Pilih varian produk:':'Pilih satuan pembelian:'}</div>
          {/* Mode: Varian */}
          {unitSelector.mode==='variant' ? (
            <>
              {unitSelector.variants.map(v=>(
                <button key={v.id} onClick={()=>addToCartDirect({...unitSelector.product,name:`${unitSelector.product.name} - ${v.name}`,stock:v.stock||unitSelector.product.stock}, 'Pcs', v.price||unitSelector.product.price)}
                  style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:'#F0F8FF',border:'2px solid #3498DB',borderRadius:12,cursor:'pointer',marginBottom:8}}>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontWeight:700,fontSize:14,color:TX}}>{v.name}</div>
                    <div style={{fontSize:12,color:MT,marginTop:2}}>Stok: {v.stock||unitSelector.product.stock}</div>
                  </div>
                  <div style={{fontWeight:800,fontSize:16,color:'#3498DB'}}>{fmt(v.price||unitSelector.product.price)}</div>
                </button>
              ))}
              {/* Juga tampilkan satuan kalau ada */}
              {unitSelector.units.length>0&&<div style={{fontSize:11,color:MT,marginTop:4,marginBottom:8,textAlign:'center'}}>── atau pilih satuan ──</div>}
              {(unitSelector.units||[]).filter(u=>u&&u.id).map(u=>(
                <button key={u.id} onClick={()=>addToCartDirect((u.ratio&&u.ratio>1)?{...unitSelector.product,_unitBesar:true,_konversi:u.ratio}:unitSelector.product,u.unit_name,u.price)}
                  style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'#F8F0FF',border:'2px solid #8E44AD',borderRadius:12,cursor:'pointer',marginBottom:8}}>
                  <div style={{fontWeight:700,fontSize:13,color:TX}}>{u.unit_name}</div>
                  <div style={{fontWeight:800,fontSize:14,color:'#8E44AD'}}>{fmt(u.price)}</div>
                </button>
              ))}
            </>
          ) : (
            <>
              {/* Mode: Multi Satuan - Dynamic dari product fields */}
              <div style={{marginBottom:10,padding:'8px 12px',background:'#F5F6FA',borderRadius:8,fontSize:11,color:MT}}>
                📦 Stok: <b>{unitSelector.product?.stock||0} {unitSelector.product?.unit_kecil||'pcs'}</b>
                {(unitSelector.product?.konversi||1)>1&&(
                  <span> = <b>{Math.floor((unitSelector.product?.stock||0)/(unitSelector.product?.konversi||1))} {unitSelector.product?.unit_besar}</b></span>
                )}
              </div>

              {/* Unit Kecil (Eceran) */}
              <button onClick={()=>addToCartDirect(unitSelector.product, unitSelector.product?.unit_kecil||'Pcs', unitSelector.product?.price)}
                style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:GL,border:`2px solid ${G}`,borderRadius:12,cursor:'pointer',marginBottom:8}}>
                <div style={{textAlign:'left'}}>
                  <div style={{fontWeight:700,fontSize:14,color:TX}}>
                    {unitSelector.product?.unit_kecil||'Pcs'}
                    <span style={{fontSize:10,background:G,color:'#fff',borderRadius:4,padding:'2px 6px',marginLeft:6}}>ECERAN</span>
                  </div>
                  <div style={{fontSize:12,color:MT,marginTop:2}}>Satuan kecil / eceran</div>
                </div>
                <div style={{fontWeight:800,fontSize:16,color:GD}}>{fmt(unitSelector.product?.price||0)}</div>
              </button>

              {/* Unit Besar - hanya tampil kalau ada konversi */}
              {(unitSelector.product?.konversi||1)>1 && unitSelector.product?.harga_besar>0 && (
                <button onClick={()=>{
                  // Saat jual unit besar, kurangi stok sesuai konversi
                  const prod = {...unitSelector.product};
                  addToCartDirect(
                    {...prod, _unitBesar: true, _konversi: prod.konversi},
                    prod.unit_besar,
                    prod.harga_besar
                  );
                }}
                  style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:'#F8F0FF',border:'2px solid #8E44AD',borderRadius:12,cursor:'pointer',marginBottom:8}}>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontWeight:700,fontSize:14,color:'#8E44AD'}}>
                      {unitSelector.product?.unit_besar}
                      <span style={{fontSize:10,background:'#8E44AD',color:'#fff',borderRadius:4,padding:'2px 6px',marginLeft:6}}>GROSIR</span>
                    </div>
                    <div style={{fontSize:12,color:MT,marginTop:2}}>
                      1 {unitSelector.product?.unit_besar} = {unitSelector.product?.konversi} {unitSelector.product?.unit_kecil||'pcs'}
                    </div>
                  </div>
                  <div style={{fontWeight:800,fontSize:16,color:'#8E44AD'}}>{fmt(unitSelector.product?.harga_besar||0)}</div>
                </button>
              )}

              {/* Unit tambahan dari tabel product_units */}
              {(unitSelector.units||[]).filter(u=>u&&u.id).map(u=>(
                <button key={u.id} onClick={()=>addToCartDirect((u.ratio&&u.ratio>1)?{...unitSelector.product,_unitBesar:true,_konversi:u.ratio}:unitSelector.product,u.unit_name,u.price)}
                  style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px',background:'#F8F0FF',border:'2px solid #8E44AD',borderRadius:12,cursor:'pointer',marginBottom:8}}>
                  <div style={{textAlign:'left'}}>
                    <div style={{fontWeight:700,fontSize:14,color:TX}}>{u.unit_name}</div>
                    <div style={{fontSize:12,color:MT,marginTop:2}}>{u.ratio&&u.ratio>1?`1 ${u.unit_name} = ${u.ratio} pcs`:'Satuan alternatif'}</div>
                  </div>
                  <div style={{fontWeight:800,fontSize:16,color:'#8E44AD'}}>{fmt(u.price)}</div>
                </button>
              ))}
            </>
          )}
          <button onClick={()=>setUnitSelector(null)} style={{width:'100%',padding:13,background:'#eee',border:'none',borderRadius:12,fontWeight:700,cursor:'pointer',fontSize:14,marginTop:4}}>Batal</button>
        </div>
      </div>
    )}
    <div className='split-layout' style={{display:'flex',height:'calc(100vh - 60px)',overflow:'hidden',background:GR}}>

      {/* ── KIRI: List Produk ─────────────────────────────────────────── */}
      <div className='panel-kiri-full' style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRight:'2px solid #eee',minWidth:0}}>

        {/* Search */}
        <div style={{background:'#fff',padding:'10px 12px',borderBottom:'1px solid #eee',flexShrink:0}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{position:'relative',flex:1}}>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:15,color:'#aaa'}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Cari nama atau kode produk..."
                style={{width:'100%',padding:'9px 32px 9px 32px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',background:'#F5F6FA',boxSizing:'border-box'}}
                onFocus={e=>{e.target.style.borderColor=G;e.target.style.background='#fff';}}
                onBlur={e=>{e.target.style.borderColor='#eee';e.target.style.background='#F5F6FA';}}
              />
              {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:16,color:'#aaa'}}>×</button>}
            </div>
            <button onClick={()=>setShowTransaksiTambahan(true)}
              title="Transaksi Tambahan"
              style={{width:42,height:42,borderRadius:10,background:'#F5F6FA',border:'1.5px solid #eee',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:22,fontWeight:700,color:TX}}>
              +
            </button>
            <button onClick={()=>setShowScanner(true)}
              title="Scan Barcode"
              style={{width:42,height:42,borderRadius:10,background:G,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 2px 8px rgba(46,204,113,0.3)',padding:6}}>
              <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
                <rect x="1" y="1" width="2" height="10"/><rect x="4" y="1" width="1" height="10"/>
                <rect x="6" y="1" width="2" height="10"/><rect x="9" y="1" width="1" height="10"/>
                <rect x="11" y="1" width="3" height="10"/><rect x="15" y="1" width="1" height="10"/>
                <rect x="17" y="1" width="2" height="10"/><rect x="20" y="1" width="1" height="10"/>
                <rect x="22" y="1" width="1" height="10"/>
                <rect x="1" y="13" width="2" height="10"/><rect x="4" y="13" width="1" height="10"/>
                <rect x="6" y="13" width="2" height="10"/><rect x="9" y="13" width="1" height="10"/>
                <rect x="11" y="13" width="3" height="10"/><rect x="15" y="13" width="1" height="10"/>
                <rect x="17" y="13" width="2" height="10"/><rect x="20" y="13" width="1" height="10"/>
                <rect x="22" y="13" width="1" height="10"/>
              </svg>
            </button>
            {/* Voice Search */}
            {(window.SpeechRecognition||window.webkitSpeechRecognition)&&(
              <button onClick={()=>{
                  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
                  const rec = new SR();
                  rec.lang = 'id-ID';
                  rec.interimResults = false;
                  rec.maxAlternatives = 1;
                  rec.onstart = ()=>setListening(true);
                  rec.onend = ()=>setListening(false);
                  rec.onerror = ()=>setListening(false);
                  rec.onresult = (e)=>{ setSearch(e.results[0][0].transcript); };
                  rec.start();
                }}
                title="Cari pakai suara"
                style={{width:42,height:42,borderRadius:10,background:listening?RD:'#F5F6FA',border:`1.5px solid ${listening?RD:'#eee'}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:18,animation:listening?'pulse 1s infinite':'none'}}>
                {listening?'🔴':'🎤'}
              </button>
            )}
            {/* Bypass Stok Toggle */}
            <button onClick={()=>{
              if(!bypassStok){if(!confirm('⚠️ Aktifkan bypass stok?\nStok tidak akan dicek. Gunakan jika stok belum terupdate!')) return;}
              setBypassStok(v=>!v);
            }} title={bypassStok?'Bypass stok AKTIF':'Bypass stok nonaktif'}
              style={{width:42,height:42,borderRadius:10,background:bypassStok?OR:'#F5F6FA',border:`1.5px solid ${bypassStok?OR:'#eee'}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:16}}>
              {bypassStok?'🔓':'🔒'}
            </button>
          </div>
        </div>

        {/* Category Pills — Level 1: Utama */}
        <div style={{background:'#fff',borderBottom:'1px solid #f0f0f0',padding:'7px 12px',overflowX:'auto',display:'flex',gap:6,scrollbarWidth:'none',flexShrink:0}}>
          {['Semua',...mainCats].map(cat=>{
            const isActive=activeCat===cat;
            const icon=cat==='Semua'?'🏪':cat==='Instalasi Listrik'?'⚡':'🏗️';
            return (
              <button key={cat} onClick={()=>{setActiveCat(cat);setActiveSub('Semua');setActiveBrand('Semua');}}
                style={{flexShrink:0,padding:'6px 14px',border:`1.5px solid ${isActive?G:'#e0e0e0'}`,borderRadius:20,background:isActive?G:'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                {icon} {cat}
              </button>
            );
          })}
        </div>

        {/* Category Pills — Level 2: Sub Kategori */}
        <div style={{background:'#FAFAFA',borderBottom:'1px solid #f0f0f0',padding:'6px 12px',overflowX:'auto',display:'flex',gap:6,scrollbarWidth:'none',flexShrink:0}}>
          {['Semua',...subCats].map(cat=>{
            const isActive=activeSub===cat;
            const icon=cat==='Semua'?'📋':CAT_ICONS[cat]||'📦';
            return (
              <button key={cat} onClick={()=>{setActiveSub(cat);setActiveBrand('Semua');}}
                style={{flexShrink:0,padding:'5px 12px',border:`1.5px solid ${isActive?'#3498DB':'#e0e0e0'}`,borderRadius:20,background:isActive?'#3498DB':'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:11,cursor:'pointer',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                {icon} {cat}
              </button>
            );
          })}
        </div>

        {/* Category Pills — Level 3: Brand (hanya muncul kalau sub dipilih & ada brand) */}
        {activeSub!=='Semua' && brandCats.length>1 && (
          <div style={{background:'#F5F5F5',borderBottom:'1px solid #eee',padding:'5px 12px',overflowX:'auto',display:'flex',gap:6,scrollbarWidth:'none',flexShrink:0}}>
            {['Semua',...brandCats].map(brand=>{
              const isActive=activeBrand===brand;
              return (
                <button key={brand} onClick={()=>setActiveBrand(brand)}
                  style={{flexShrink:0,padding:'4px 10px',border:`1.5px solid ${isActive?OR:'#ddd'}`,borderRadius:20,background:isActive?OR:'#fff',color:isActive?'#fff':TX,fontWeight:isActive?700:500,fontSize:10,cursor:'pointer',whiteSpace:'nowrap'}}>
                  🏷️ {brand}
                </button>
              );
            })}
          </div>
        )}

        {/* Grid Favorit/Terlaris — tampil kalau belum ada filter aktif */}
        {showFavorit && favoritProducts.length>0 && !search && activeCat==='Semua' && (
          <div style={{background:'#fff',borderBottom:'6px solid #F5F6FA',padding:'10px 12px',flexShrink:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:800,color:OR}}>⭐ Favorit / Terlaris</div>
              <button onClick={()=>setShowFavorit(false)} style={{background:'none',border:'none',color:MT,fontSize:11,cursor:'pointer'}}>Sembunyikan</button>
            </div>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
              {favoritProducts.map(p=>(
                <button key={p.id} onClick={()=>{
                    if(p.stock<=0&&!bypassStok) return alert('Stok habis! Aktifkan bypass stok di panel kanan untuk tetap menjual.');
                    addToCart(p);
                  }}
                  style={{flexShrink:0,width:104,padding:'10px 8px',background:'#FFF8E1',border:`1.5px solid #F9A825`,borderRadius:12,cursor:'pointer',textAlign:'left'}}>
                  <div style={{fontSize:11,fontWeight:700,color:TX,lineHeight:1.3,minHeight:28,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{p.name}</div>
                  <div style={{fontSize:11,fontWeight:800,color:GD,marginTop:4}}>{fmt(p.price)}</div>
                  <div style={{fontSize:9,color:MT,marginTop:1}}>sisa {p.stock}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        {!showFavorit && favoritProducts.length>0 && !search && activeCat==='Semua' && (
          <div style={{background:'#fff',borderBottom:'1px solid #f0f0f0',padding:'4px 12px',flexShrink:0,textAlign:'right'}}>
            <button onClick={()=>setShowFavorit(true)} style={{background:'none',border:'none',color:OR,fontSize:11,fontWeight:700,cursor:'pointer'}}>⭐ Tampilkan Favorit</button>
          </div>
        )}

        {/* Product List */}
        <div style={{flex:1,overflowY:'auto'}}>
          {loading?<Loading/>:filtered.length===0
            ?<div style={{textAlign:'center',padding:'48px 0',color:MT}}>
                <div style={{fontSize:36,marginBottom:10}}>🔍</div>
                <div style={{marginBottom:14}}>Produk tidak ditemukan</div>
                {search&&(
                  <button onClick={()=>setShowTambahProdukKasir(true)}
                    style={{padding:'10px 20px',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,fontSize:13,cursor:'pointer'}}>
                    ➕ Tambah "{search}" sebagai Produk Baru
                  </button>
                )}
              </div>
            :filtered.map((p,i)=>{
              const qty=getQty(p.id);
              const sub=(p.category||'').split(' > ')[1]||'';
              return (
                <div key={p.id} style={{background:'#fff',borderBottom:'1px solid #f0f0f0',padding:'10px 12px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background=GL}
                  onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                  {/* Icon */}
                  <div style={{width:44,height:44,borderRadius:10,background:'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0,border:'1px solid #eee'}}>
                    {CAT_ICONS[sub]||'📦'}
                  </div>
                  {/* Info — klik untuk tambah */}
                  <div style={{flex:1,minWidth:0}}
                    onClick={()=>{
                      if(longPressFired.current){ longPressFired.current=false; return; }
                      if(p.stock<=0&&!bypassStok) return alert('Stok habis! Aktifkan bypass stok di panel kanan untuk tetap menjual.');
                      addToCart(p);
                    }}
                    onMouseDown={()=>startLongPress(()=>onGotoProduct&&onGotoProduct(p.id))}
                    onMouseUp={cancelLongPress}
                    onMouseLeave={cancelLongPress}
                    onTouchStart={()=>startLongPress(()=>onGotoProduct&&onGotoProduct(p.id))}
                    onTouchEnd={cancelLongPress}
                    onTouchMove={cancelLongPress}>
                    <div style={{fontSize:13,fontWeight:700,color:TX,lineHeight:1.3}}>{p.name}</div>
                    <div style={{fontSize:12,marginTop:2}}>
                      <span style={{color:MT}}>sisa {p.stock} · </span>
                      <span style={{color:GD,fontWeight:700}}>{fmt(p.price)}</span>
                    </div>
                    <div style={{fontSize:10,color:'#bbb',marginTop:1}}>{getSub(p.category)}{getBrand(p.category)&&getBrand(p.category)!=='Umum'?` · ${getBrand(p.category)}`:''}</div>
                  </div>
                  {/* Qty Control */}
                  <div style={{flexShrink:0}}>
                    {qty===0
                      ? <button onClick={()=>{
                            if(p.stock<=0&&!bypassStok) return alert('Stok habis!');
                            addToCart(p);
                          }}
                          style={{width:34,height:34,borderRadius:'50%',background:p.stock<=0&&!bypassStok?MT:G,border:'none',color:'#fff',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,boxShadow:'0 2px 6px rgba(46,204,113,0.35)'}}>+</button>
                      : <div style={{display:'flex',alignItems:'center',gap:5}}>
                          <button onClick={()=>updateQty((cart.find(i=>i.id===p.id)?.cartKey||p.id+'_Pcs'),-1)} style={{width:28,height:28,borderRadius:'50%',background:'#fff',border:`2px solid ${G}`,color:G,fontSize:16,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                          <span style={{minWidth:22,textAlign:'center',fontWeight:800,fontSize:14,color:TX}}>{qty}</span>
                          <button onClick={()=>{
                              if(p.stock<=0&&!bypassStok) return;
                              addToCart(p);
                            }} style={{width:28,height:28,borderRadius:'50%',background:G,border:'none',color:'#fff',fontSize:16,cursor:'pointer',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                        </div>
                    }
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>

      {/* ── MOBILE: Tombol Keranjang Floating ── */}
      {totalItems > 0 && (
        <div className='mobile-only' style={{position:'fixed',bottom:70,left:16,right:16,zIndex:50}}>
          <button onClick={()=>setShowMobileCart(true)}
            style={{width:'100%',padding:'14px 20px',background:G,color:'#fff',border:'none',borderRadius:16,fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 4px 20px rgba(46,204,113,0.5)'}}>
            <div style={{background:'rgba(255,255,255,0.25)',borderRadius:10,padding:'4px 12px',fontWeight:800}}>
              {totalItems} Barang
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span>{fmt(totalHarga)}</span>
              <span style={{fontSize:20}}>›</span>
            </div>
          </button>
        </div>
      )}

      {/* ── MOBILE: Bottom Sheet Keranjang ── */}
      {showMobileCart && (
        <div className='mobile-only' style={{position:'fixed',inset:0,zIndex:100,display:'flex',flexDirection:'column'}}>
          <div style={{flex:1,background:'rgba(0,0,0,0.5)'}} onClick={()=>setShowMobileCart(false)}/>
          <div style={{background:'#fff',borderRadius:'20px 20px 0 0',maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'12px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div style={{fontWeight:700,fontSize:15}}>🛒 Keranjang <span style={{background:G,color:'#fff',borderRadius:10,padding:'2px 8px',fontSize:12,marginLeft:4}}>{totalItems}</span></div>
              <button onClick={()=>setShowMobileCart(false)} style={{background:'#eee',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:16,fontWeight:700}}>×</button>
            </div>
            <div style={{flex:1,overflowY:'auto'}}>
              <PanelKanan cart={cart} setCart={setCart} updateQty={updateQty} updatePrice={updatePrice} clearCart={()=>{clearCart();setShowMobileCart(false);}} reload={load} onSuccess={()=>setShowMobileCart(false)} bypassStok={bypassStok} onBypassChange={setBypassStok}/>
            </div>
          </div>
        </div>
      )}

      {/* ── KANAN: Keranjang + Bayar ──────────────────────────────────── */}
      <div className='panel-kanan-desktop' style={{width:340,flexShrink:0,background:'#fff',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <PanelKanan
          cart={cart}
          setCart={setCart}
          updateQty={updateQty}
          updatePrice={updatePrice}
          clearCart={clearCart}
          reload={load}
          onSuccess={()=>{}}
          bypassStok={bypassStok}
          onBypassChange={setBypassStok}
        />
      </div>
    </div>
    </>
  );
}



// ── VARIANT MODAL ──────────────────────────────────────────────────────────
function VariantModal({product, onClose, onSaved}) {
  const [variants, setVariants] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    attr1_name: 'Panjang', attr1_val: '',   // misal: Panjang, 50m
    attr2_name: 'Warna',   attr2_val: '',   // misal: Warna, Merah
    price: '', stock: '', barcode: ''
  });
  // Nama atribut bisa diubah
  const [attr1, setAttr1] = useState('Panjang');
  const [attr2, setAttr2] = useState('Warna');
  const [useAttr2, setUseAttr2] = useState(true);

  const loadVariants = async() => {
    setLoading(true);
    try {
      const data = await sbGet('product_variants', {eq:{product_id:product.id}, order:'id'});
      setVariants(data);
    } catch(e){}
    setLoading(false);
  };
  useEffect(()=>{ loadVariants(); },[]);

  const addVariant = async() => {
    if(!form.attr1_val) return alert(`${attr1} wajib diisi!`);
    if(!form.price) return alert('Harga wajib diisi!');
    setSaving(true);
    try {
      const variantName = useAttr2 && form.attr2_val
        ? `${form.attr1_val} - ${form.attr2_val}`
        : form.attr1_val;
      await sbInsert('product_variants', [{
        product_id: product.id,
        name: variantName,
        price: parseInt(form.price),
        stock: parseInt(form.stock||0),
        barcode: form.barcode||'',
      }]);
      setForm({attr1_name:attr1, attr1_val:'', attr2_name:attr2, attr2_val:'', price:'', stock:'', barcode:''});
      await loadVariants();
      onSaved();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const deleteVariant = async(id) => {
    if(!confirm('Hapus varian ini?')) return;
    try { await sbDelete('product_variants', id); await loadVariants(); onSaved(); }
    catch(e){ alert('Gagal: '+e.message); }
  };

  // Quick fill buttons untuk atribut umum
  const ATTR1_OPTS = ['Panjang', 'Ukuran', 'Kapasitas', 'Tipe', 'Model'];
  const ATTR2_OPTS = ['Warna', 'Material', 'Grade', 'Merk'];
  const VAL1_OPTS = {
    'Panjang': ['25m','50m','100m','150m','200m','250m','300m'],
    'Ukuran': ['S','M','L','XL','1/2"','3/4"','1"','1.5"','2"','3"','4"'],
    'Kapasitas': ['125W','250W','500W','1000W','1/2 HP','3/4 HP','1 HP'],
    'Tipe': ['Type A','Type B','Type C'],
    'Model': [],
  };
  const VAL2_OPTS = {
    'Warna': ['Merah','Hitam','Kuning','Biru','Putih','Hijau','Abu-abu','Orange','Coklat'],
    'Material': ['PVC','Galvanis','Stainless','Besi','Aluminium','Kuningan'],
    'Grade': ['SNI','Non SNI','Premium','Standard'],
    'Merk': [],
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'16px 16px 0 0',width:'100%',maxWidth:520,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        
        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:TX}}>🎨 Kelola Varian</div>
            <div style={{fontSize:12,color:MT,marginTop:2}}>{product.name}</div>
          </div>
          <button onClick={onClose} style={{background:'#eee',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:18,fontWeight:700}}>×</button>
        </div>

        <div style={{overflowY:'auto',flex:1,padding:16}}>

          {/* Daftar Varian yang sudah ada */}
          {loading ? <Loading/> : variants.length===0
            ? <div style={{textAlign:'center',padding:'16px 0',color:MT,fontSize:13}}>Belum ada varian. Tambah di bawah!</div>
            : <div style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:MT,marginBottom:8}}>VARIAN TERSEDIA ({variants.length})</div>
                {variants.map(v=>(
                  <div key={v.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'#F8F0FF',borderRadius:10,marginBottom:6,border:'1.5px solid #8E44AD'}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:TX}}>{v.name}</div>
                      <div style={{fontSize:12,color:MT,marginTop:2}}>
                        <span style={{color:GD,fontWeight:700}}>{fmt(v.price)}</span>
                        <span style={{marginLeft:8}}>Stok: <span style={{color:v.stock<5?RD:MT,fontWeight:600}}>{v.stock}</span></span>
                        {v.barcode&&<span style={{marginLeft:8,color:'#bbb'}}>{v.barcode}</span>}
                      </div>
                    </div>
                    <button onClick={()=>deleteVariant(v.id)} style={{padding:'5px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:6,cursor:'pointer',fontSize:13,color:RD}}>🗑️</button>
                  </div>
                ))}
              </div>
          }

          {/* Form Tambah Varian */}
          <div style={{background:'#F5F6FA',borderRadius:12,padding:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:TX}}>➕ Tambah Varian Baru</div>

            {/* Pilih nama atribut */}
            <div style={{marginBottom:10}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:4,display:'block'}}>Atribut 1 (Wajib)</label>
              <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                {ATTR1_OPTS.map(opt=>(
                  <button key={opt} onClick={()=>setAttr1(opt)}
                    style={{padding:'4px 10px',border:`1.5px solid ${attr1===opt?'#8E44AD':'#ddd'}`,borderRadius:16,background:attr1===opt?'#F3E5F5':'#fff',color:attr1===opt?'#7B1FA2':TX,fontSize:11,fontWeight:attr1===opt?700:500,cursor:'pointer'}}>
                    {opt}
                  </button>
                ))}
              </div>
              <input value={form.attr1_val} onChange={e=>setForm(f=>({...f,attr1_val:e.target.value}))}
                placeholder={`Nilai ${attr1} (contoh: 50m, 1x1.5mm...)`}
                style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              {/* Quick values */}
              {VAL1_OPTS[attr1]?.length>0 && (
                <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                  {VAL1_OPTS[attr1].map(v=>(
                    <button key={v} onClick={()=>setForm(f=>({...f,attr1_val:v}))}
                      style={{padding:'3px 8px',border:`1px solid ${form.attr1_val===v?'#8E44AD':'#ddd'}`,borderRadius:12,background:form.attr1_val===v?'#F3E5F5':'#fff',fontSize:10,cursor:'pointer',color:form.attr1_val===v?'#7B1FA2':TX}}>
                      {v}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Atribut 2 (Opsional) */}
            <div style={{marginBottom:10}}>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:MT,fontWeight:600,marginBottom:4,cursor:'pointer'}}>
                <input type="checkbox" checked={useAttr2} onChange={e=>setUseAttr2(e.target.checked)} style={{width:14,height:14}}/>
                Atribut 2 (Opsional)
              </label>
              {useAttr2 && (
                <>
                  <div style={{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}}>
                    {ATTR2_OPTS.map(opt=>(
                      <button key={opt} onClick={()=>setAttr2(opt)}
                        style={{padding:'4px 10px',border:`1.5px solid ${attr2===opt?'#3498DB':'#ddd'}`,borderRadius:16,background:attr2===opt?'#E3F2FD':'#fff',color:attr2===opt?'#1976D2':TX,fontSize:11,fontWeight:attr2===opt?700:500,cursor:'pointer'}}>
                        {opt}
                      </button>
                    ))}
                  </div>
                  <input value={form.attr2_val} onChange={e=>setForm(f=>({...f,attr2_val:e.target.value}))}
                    placeholder={`Nilai ${attr2} (contoh: Merah, Hitam...)`}
                    style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                  {VAL2_OPTS[attr2]?.length>0 && (
                    <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
                      {VAL2_OPTS[attr2].map(v=>(
                        <button key={v} onClick={()=>setForm(f=>({...f,attr2_val:v}))}
                          style={{padding:'3px 8px',border:`1px solid ${form.attr2_val===v?'#3498DB':'#ddd'}`,borderRadius:12,background:form.attr2_val===v?'#E3F2FD':'#fff',fontSize:10,cursor:'pointer',color:form.attr2_val===v?'#1976D2':TX}}>
                          {v}
                        </button>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>

            {/* Preview nama varian */}
            {form.attr1_val && (
              <div style={{background:'#fff',borderRadius:8,padding:'8px 12px',marginBottom:10,border:`1px solid #8E44AD`,fontSize:12}}>
                🎨 Nama varian: <b style={{color:'#7B1FA2'}}>
                  {useAttr2&&form.attr2_val ? `${form.attr1_val} - ${form.attr2_val}` : form.attr1_val}
                </b>
              </div>
            )}

            {/* Harga & Stok */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Harga *</label>
                <input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}
                  placeholder="Rp" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Stok Awal</label>
                <input value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}
                  placeholder="0" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Barcode (opsional)</label>
              <input value={form.barcode} onChange={e=>setForm(f=>({...f,barcode:e.target.value}))}
                placeholder="Scan atau ketik barcode..."
                style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
            </div>

            <button onClick={addVariant} disabled={saving||!form.attr1_val||!form.price}
              style={{width:'100%',padding:11,background:saving||!form.attr1_val||!form.price?'#ccc':'#8E44AD',color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14}}>
              {saving?'Menyimpan...':'💾 Simpan Varian'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── UNIT MODAL ─────────────────────────────────────────────────────────────
function UnitModal({product, onClose, onSaved}) {
  const [units, setUnits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [form, setForm] = useState({unit_name:'',price:'',ratio:'1',is_default:false,base_unit:''});
  const [saving, setSaving] = useState(false);

  const loadUnits = async() => {
    setLoading(true);
    try { setUnits(await sbGet('product_units',{eq:{product_id:product.id},order:'id'})); }
    catch(e){}
    setLoading(false);
  };
  useEffect(()=>{loadUnits();},[]);

  const addUnit = async() => {
    if(!form.unit_name||!form.price) return alert('Nama satuan & harga wajib!');
    setSaving(true);
    try {
      // Kalau ada base_unit, simpan di nama: "Roll (50 Meter)"
      const unitLabel = form.base_unit && form.ratio > 1
        ? `${form.unit_name} (${form.ratio} ${form.base_unit})`
        : form.unit_name;
      await sbInsert('product_units',[{
        product_id: product.id,
        unit_name: unitLabel,
        price: parseInt(form.price),
        ratio: parseFloat(form.ratio||1),
        is_default: form.is_default
      }]);
      setForm({unit_name:'',price:'',ratio:'1',is_default:false,base_unit:''});
      await loadUnits(); onSaved();
    } catch(e){alert('Gagal: '+e.message);}
    setSaving(false);
  };

  const deleteUnit = async(id) => {
    if(!confirm('Hapus satuan ini?')) return;
    try { await sbDelete('product_units',id); await loadUnits(); onSaved(); }
    catch(e){alert('Gagal: '+e.message);}
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'16px 16px 0 0',width:'100%',maxWidth:500,maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>⚖️ Multi Satuan</div>
            <div style={{fontSize:12,color:MT,marginTop:2}}>{product.name}</div>
          </div>
          <button onClick={onClose} style={{background:'#eee',border:'none',borderRadius:'50%',width:32,height:32,cursor:'pointer',fontSize:18,fontWeight:700}}>×</button>
        </div>
        <div style={{overflowY:'auto',flex:1,padding:16}}>
          {loading ? <Loading/> : units.length===0
            ? <div style={{textAlign:'center',padding:'20px 0',color:MT,fontSize:13}}>Belum ada satuan. Tambah di bawah!</div>
            : (units||[]).filter(u=>u&&u.id).map(u=>(
              <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:u.is_default?GL:'#F9F9F9',borderRadius:10,marginBottom:8,border:`1.5px solid ${u.is_default?G:'#eee'}`}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{u.unit_name} {u.is_default&&<span style={{fontSize:10,background:G,color:'#fff',borderRadius:4,padding:'1px 6px'}}>DEFAULT</span>}</div>
                  <div style={{fontSize:12,color:GD,marginTop:2}}>{fmt(u.price)} / {u.unit_name}</div>
                  {u.ratio>1&&<div style={{fontSize:11,color:MT}}>1 {u.unit_name} = {u.ratio} pcs</div>}
                </div>
                <button onClick={()=>deleteUnit(u.id)} style={{padding:'5px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:6,cursor:'pointer',fontSize:13,color:RD}}>🗑️</button>
              </div>
            ))
          }
          <div style={{background:'#F5F6FA',borderRadius:12,padding:14,marginTop:8}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:TX}}>➕ Tambah Satuan Baru</div>

            {/* Baris 1: Nama Satuan & Harga */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Nama Satuan *</label>
                <input value={form.unit_name} onChange={e=>setForm(f=>({...f,unit_name:e.target.value}))}
                  placeholder="Roll, Box, Pak, Lusin..."

              </div>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Harga *</label>
                <input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))}
                  placeholder="Rp" type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            {/* Baris 2: Jumlah Isi & Satuan Terkecil */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Jumlah Isi</label>
                <input value={form.ratio} onChange={e=>setForm(f=>({...f,ratio:e.target.value}))}
                  placeholder="contoh: 50, 100, 12..." type="number"
                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:MT,fontWeight:600,marginBottom:3,display:'block'}}>Satuan Terkecil</label>
                <input value={form.base_unit||''} onChange={e=>setForm(f=>({...f,base_unit:e.target.value}))}

                  style={{width:'100%',padding:'9px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            </div>

            {/* Preview */}
            {form.unit_name && form.price && (
              <div style={{background:'#fff',borderRadius:8,padding:'9px 12px',marginBottom:10,fontSize:12,border:`1px solid ${G}`}}>
                💡 <b>1 {form.unit_name}</b>
                {form.ratio>1 ? ` = ${form.ratio} ${form.base_unit||'pcs'}` : ''}
                {' → '}<b style={{color:GD}}>Rp {parseInt(form.price||0).toLocaleString('id-ID')}</b>
                {form.ratio>1&&form.price ? ` (Rp ${Math.round(parseInt(form.price)/parseInt(form.ratio)).toLocaleString('id-ID')} / ${form.base_unit||'pcs'})` : ''}
              </div>
            )}

            {/* Default checkbox */}
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,marginBottom:10,padding:'8px 10px',background:'#fff',borderRadius:8,border:'1px solid #eee'}}>
              <input type="checkbox" checked={form.is_default} onChange={e=>setForm(f=>({...f,is_default:e.target.checked}))} style={{width:16,height:16}}/>
              <div>
                <div style={{fontWeight:600,color:TX}}>Jadikan Satuan Default</div>
                <div style={{fontSize:11,color:MT}}>Satuan ini yang pertama muncul saat transaksi</div>
              </div>
            </label>

            <button onClick={addUnit} disabled={saving||!form.unit_name||!form.price}
              style={{width:'100%',padding:11,background:saving||!form.unit_name||!form.price?'#ccc':G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14}}>
              {saving?'Menyimpan...':'💾 Simpan Satuan'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── MANAJEMEN ──────────────────────────────────────────────────────────────
function Manajemen({initialProductId, onConsumeTarget}={}) {
  const [view, setView] = useState('list'); // list | detail | edit
  const [products, setProducts] = useState([]);
  const [search, setSearch] = useState("");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [showNotif, setShowNotif] = useState(false);
  const [notifFilter, setNotifFilter] = useState(null); // 'habis' | 'menipis' | null
  const [showManStok, setShowManStok] = useState(false);
  const [unitProduct, setUnitProduct] = useState(null);
  const [variantProduct, setVariantProduct] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true); setError(null);
    try { setProducts(await sbGetAll("products",{order:"name"})); }
    catch(e) { setError(e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  // Deep-link dari halaman lain (mis. long-press produk di Kasir) → langsung buka Edit
  useEffect(()=>{
    if(initialProductId && products.length>0) {
      const p = products.find(x=>x.id===initialProductId);
      if(p) { setSelectedProduct(p); setView('edit'); }
      onConsumeTarget&&onConsumeTarget();
    }
  },[initialProductId, products]);

  const stokHabisList   = products.filter(p=>p.pakai_stok!==false && (p.stock||0)<=0);
  const stokMenipisList = products.filter(p=>p.pakai_stok!==false && (p.stok_minimum||0)>0 && (p.stock||0)>0 && (p.stock||0)<=p.stok_minimum);

  let baseList = products;
  if(notifFilter==='habis') baseList = stokHabisList;
  else if(notifFilter==='menipis') baseList = stokMenipisList;
  const filtered = baseList.filter(p=>smartMatch(search, p.name, p.category||''));

  const refreshSelected = async(id) => {
    try { const r = await sbGet('products',{eq:{id}}); if(r?.[0]) setSelectedProduct(r[0]); } catch(e){}
  };

  const del = async(id) => {
    if(!confirm("Hapus produk ini?")) return;
    try { await sbDelete("products",id); setView('list'); setSelectedProduct(null); load(); }
    catch(e) { alert("Gagal: "+e.message); }
  };

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  // ── VIEW: EDIT ──
  if(view==='edit') return (
    <EditBarangView
      product={selectedProduct}
      onBack={()=>setView(selectedProduct?'detail':'list')}
      onSaved={async(id)=>{ await load(); await refreshSelected(id); setView('detail'); }}
      onOpenUnit={(p)=>setUnitProduct(p)}
      onOpenVariant={(p)=>setVariantProduct(p)}
    />
  );

  // ── VIEW: DETAIL ──
  if(view==='detail' && selectedProduct) return (
    <>
      {showManStok && (
        <ManStokModal product={selectedProduct} onClose={()=>setShowManStok(false)}
          onSaved={async()=>{ await load(); await refreshSelected(selectedProduct.id); setShowManStok(false); }}/>
      )}
      <BarangDetailView
        product={selectedProduct}
        onBack={()=>{setView('list');load();}}
        onManStok={()=>setShowManStok(true)}
        onDelete={()=>del(selectedProduct.id)}
        onEdit={()=>setView('edit')}
        onStockDetail={()=>setView('stockDetail')}
        onPelanggan={()=>setView('pelanggan')}
        onSupplier={()=>setView('supplier')}
      />
    </>
  );

  if(view==='stockDetail' && selectedProduct) return <DetailSisaStokView product={selectedProduct} onBack={()=>setView('detail')} onRefresh={()=>refreshSelected(selectedProduct.id)}/>;
  if(view==='pelanggan' && selectedProduct)   return <PelangganBarangView product={selectedProduct} onBack={()=>setView('detail')}/>;
  if(view==='supplier' && selectedProduct)    return <SupplierBarangView product={selectedProduct} onBack={()=>setView('detail')}/>;

  // ── VIEW: LIST (default) ──
  return <>
    {unitProduct && <UnitModal product={unitProduct} onClose={()=>setUnitProduct(null)} onSaved={load}/>}
    {variantProduct && <VariantModal product={variantProduct} onClose={()=>setVariantProduct(null)} onSaved={load}/>}
    {showNotif && (

      </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:notifFilter==='habis'?'#FFF0F0':'#FFF3D6',border:`1.5px solid ${notifFilter==='habis'?RD:OR}`,borderRadius:10,padding:'9px 14px',marginBottom:12,fontSize:12,fontWeight:700,color:notifFilter==='habis'?RD:OR}}>

        </div>
      )}
      <button onClick={()=>{setSelectedProduct(null);setView('edit');}}
        style={{width:'100%',padding:"11px 0",background:G,color:"#fff",border:"none",borderRadius:10,fontWeight:700,cursor:"pointer",marginBottom:14,fontSize:14}}>
        + Tambah Barang

          {filtered.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:MT}}>Tidak ada barang ditemukan.</div>}
          {filtered.map((p,i)=>{
            const lowStock = (p.stok_minimum||0)>0 && p.stock>0 && p.stock<=p.stok_minimum;
            const habis = p.pakai_stok!==false && (p.stock||0)<=0;
            return (
              <div key={p.id} onClick={()=>{setSelectedProduct(p);setView('detail');}}
                style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:i<filtered.length-1?"1px solid #f0f0f0":"none",cursor:'pointer',background:p.tampilkan_transaksi===false?'#FAFAFA':'#fff'}}>
                <div style={{width:44,height:44,borderRadius:10,background:'#F5F6FA',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,overflow:'hidden'}}>
                  {p.foto_url ? <img src={p.foto_url} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : (CAT_ICONS[(p.category||'').split(' > ')[1]]||'📦')}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    {p.name}
                    {habis&&<span style={{fontSize:9,fontWeight:700,color:RD,background:'#FFF0F0',borderRadius:5,padding:'1px 6px'}}>Stok Habis</span>}
                    {!habis&&lowStock&&<span style={{fontSize:9,fontWeight:700,color:OR,background:'#FFF3D6',borderRadius:5,padding:'1px 6px'}}>Stok Menipis</span>}
                    {p.tampilkan_transaksi===false&&<span style={{fontSize:9,fontWeight:700,color:MT,background:'#eee',borderRadius:5,padding:'1px 6px'}}>Disembunyikan</span>}
                  </div>
                  {p.barcode&&<div style={{fontSize:11,color:MT,marginTop:1}}>{p.barcode}</div>}
                  {p.buy_price>0&&(
                    <div style={{display:'inline-block',fontSize:10,color:MT,background:'#F5F6FA',borderRadius:5,padding:'2px 7px',marginTop:4}}>
                      Hrg Dasar {fmt(p.buy_price)}
                    </div>
                  )}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontWeight:700,color:G}}>{fmt(p.price)}</div>
                  <div style={{fontSize:12,color:habis?RD:lowStock?OR:MT,fontWeight:(habis||lowStock)?700:400}}>Stok: {p.stock}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  </>;
}

// ── Modal Manajemen Stok: Tambah/Kurangi stok terkontrol (bukan timpa angka) ─
function ManStokModal({product, onClose, onSaved}) {
  const [tipe, setTipe] = useState('tambah'); // tambah | kurangi
  const [jumlah, setJumlah] = useState('');
  const [hargaDasar, setHargaDasar] = useState(product.buy_price||0);
  const [tanggal, setTanggal] = useState(new Date().toISOString().slice(0,10));
  const [keterangan, setKeterangan] = useState('');
  const [saving, setSaving] = useState(false);

  const simpan = async() => {
    const qty = parseFloat(String(jumlah).replace(',','.'))||0;
    if(qty<=0) return alert('Isi jumlah dulu!');
    setSaving(true);
    try {
      if(tipe==='tambah') {
        await sbUpdate('products', product.id, {
          stock: (product.stock||0)+qty,
          buy_price: parseInt(hargaDasar)||product.buy_price||0,
        });
        await sbInsert('stock_batches',[{
          product_id: product.id, qty_awal: qty, qty_sisa: qty,
          buy_price: parseInt(hargaDasar)||product.buy_price||0,
          tanggal_masuk: tanggal,
        }]);
        await sbInsert('stock_logs',[{product_id:product.id, type:'masuk', qty, notes:keterangan||'Penyesuaian stok manual'}]);
      } else {
        await stokKeluar(product.id, qty, keterangan||'Penyesuaian stok manual (kurangi)');
      }
      onSaved();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2100,display:'flex',alignItems:'flex-end',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#fff',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,padding:20,maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:16}}>📊 Manajemen Stok</div>
          <button onClick={onClose} style={{background:'#eee',border:'none',borderRadius:'50%',width:28,height:28,cursor:'pointer',fontWeight:700}}>×</button>
        </div>

        <div style={{background:'#F5F6FA',borderRadius:10,padding:'10px 14px',marginBottom:14,textAlign:'center'}}>
          <div style={{fontSize:11,color:MT}}>Stok Saat Ini</div>
          <div style={{fontWeight:800,fontSize:20}}>{product.stock} {product.unit_kecil||'pcs'}</div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[['tambah','➕ Tambah',G,GL],['kurangi','➖ Kurangi',RD,'#FFF0F0']].map(([val,label,col,bg])=>(
            <button key={val} onClick={()=>setTipe(val)}
              style={{flex:1,padding:11,border:`2px solid ${tipe===val?col:'#eee'}`,borderRadius:10,background:tipe===val?bg:'#fff',color:tipe===val?col:MT,fontWeight:tipe===val?800:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>

        <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Tanggal</label>
        <input type="date" value={tanggal} onChange={e=>setTanggal(e.target.value)}
          style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box',marginBottom:10}}/>

        <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Jumlah *</label>
        <input value={jumlah} onChange={e=>setJumlah(e.target.value.replace(/[^0-9,]/g,''))} placeholder="0" inputMode="decimal"
          style={{width:'100%',padding:'10px 12px',border:`1.5px solid ${tipe==='tambah'?G:RD}`,borderRadius:8,fontSize:14,fontWeight:700,boxSizing:'border-box',marginBottom:10}}/>

        {tipe==='tambah'&&(
          <>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Harga Dasar (Rp)</label>
            <input type="number" value={hargaDasar} onChange={e=>setHargaDasar(e.target.value)}
              style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:14,boxSizing:'border-box',marginBottom:10}}/>
          </>
        )}

        <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Keterangan</label>
        <input value={keterangan} onChange={e=>setKeterangan(e.target.value)} placeholder="mis. Koreksi stok opname, barang rusak, dll"
          style={{width:'100%',padding:'10px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box',marginBottom:6}}/>
        <div style={{fontSize:10,color:MT,marginBottom:16}}>
          💡 Buat penambahan stok dari pembelian supplier, disarankan lewat menu <b>Pembelian</b> supaya tercatat juga di keuangan. Fitur ini cocok buat koreksi/opname.
        </div>

        <div style={{display:'flex',gap:8}}>
          <button onClick={onClose} disabled={saving} style={{flex:1,padding:12,background:'#eee',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer'}}>Batal</button>
          <button onClick={simpan} disabled={saving}
            style={{flex:2,padding:12,background:saving?MT:(tipe==='tambah'?G:RD),color:'#fff',border:'none',borderRadius:10,fontWeight:800,cursor:'pointer'}}>
            {saving?'⏳ Menyimpan...':'💾 Simpan'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Halaman Detail Sisa Stok — pecahan batch FIFO per barang ────────────────
function DetailSisaStokView({product, onBack, onRefresh}) {
  const [batches, setBatches] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const b = await sbGet('stock_batches',{eq:{product_id:product.id},order:'tanggal_masuk',asc:false});
      setBatches((b||[]).filter(x=>x.qty_sisa>0));
    } catch(e){ setBatches([]); }
    setLoading(false);
  },[product.id]);
  useEffect(()=>{load();},[load]);

  const sisaModal = batches.reduce((s,b)=>s+(b.qty_sisa||0)*(b.buy_price||0),0);
  const hargaTerakhir = batches[0]?.buy_price || product.buy_price || 0;

  const hapusBatch = async(b) => {
    if(!confirm(`Hapus batch ini (sisa ${b.qty_sisa} ${product.unit_kecil||'pcs'})?\nStok produk akan ikut berkurang.`)) return;
    try {
      const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      await sbc.from('stock_batches').delete().eq('id', b.id);
      await sbUpdate('products', product.id, {stock: Math.max(0,(product.stock||0)-b.qty_sisa)});
      await sbInsert('stock_logs',[{product_id:product.id, type:'keluar', qty:b.qty_sisa, notes:'Hapus batch stok (koreksi)'}]);
      load(); onRefresh&&onRefresh();
    } catch(e){ alert('Gagal: '+e.message); }
  };

  return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:22,padding:0}}>←</button>
        <div style={{fontWeight:800,fontSize:16}}>Detail Sisa Stok</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{product.name}</div>
      <div style={{fontSize:11,color:MT,marginBottom:16}}>{product.barcode||'-'} · Sisa Stok: {product.stock} {product.unit_kecil||'pcs'}</div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT,marginBottom:4}}>Harga Beli Terakhir</div>
          <div style={{fontWeight:800,fontSize:15}}>{fmt(hargaTerakhir)}</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 2px 8px rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:11,color:MT,marginBottom:4}}>Sisa Modal</div>
          <div style={{fontWeight:800,fontSize:15,color:GD}}>{fmt(sisaModal)}</div>
        </div>
      </div>

      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>Rincian Batch (FIFO)</div>
      {loading ? <Loading/> : batches.length===0 ? (
        <div style={{textAlign:'center',color:MT,fontSize:13,padding:24,background:'#fff',borderRadius:12}}>Belum ada batch stok tercatat.</div>
      ) : batches.map(b=>(
        <div key={b.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{b.tanggal_masuk}</div>
            <div style={{fontSize:11,color:MT,marginTop:2}}>Sisa {b.qty_sisa} / {b.qty_awal} {product.unit_kecil||'pcs'}</div>
            <div style={{fontSize:11,color:GD,fontWeight:600,marginTop:1}}>Harga Dasar: {fmt(b.buy_price||0)}</div>
          </div>
          <button onClick={()=>hapusBatch(b)} style={{background:'none',border:'none',color:RD,cursor:'pointer',fontSize:16}}>🗑️</button>
        </div>
      ))}
    </div>
  );
}

// ── Halaman Pelanggan yang pernah beli barang ini ───────────────────────────
function PelangganBarangView({product, onBack}) {
  const [loading, setLoading] = useState(true);
  const [rows, setRows] = useState([]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const items = await sbGet('transaction_items',{eq:{product_id:product.id},order:'id',asc:false,limit:500});
        const txIds = [...new Set((items||[]).map(i=>i.transaction_id).filter(Boolean))];
        const allTx = await sbGetAll('transactions',{order:'created_at',asc:false});
        const txMap = {}; allTx.forEach(t=>{txMap[t.id]=t;});
        const byCustomer = {};
        (items||[]).forEach(it=>{
          const tx = txMap[it.transaction_id];
          const name = tx?.customer || 'Umum';
          if(!byCustomer[name]) byCustomer[name] = {name, qty:0, total:0, count:0, lastDate:null};
          byCustomer[name].qty += parseQty(it.qty)||0;
          byCustomer[name].total += (it.qty||0)*(it.price||0);
          byCustomer[name].count += 1;
          const d = tx?.created_at?.slice(0,10);
          if(d && (!byCustomer[name].lastDate || d>byCustomer[name].lastDate)) byCustomer[name].lastDate = d;
        });
        setRows(Object.values(byCustomer).sort((a,b)=>b.qty-a.qty));
      } catch(e){ setRows([]); }
      setLoading(false);
    })();
  },[product.id]);

  return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:22,padding:0}}>←</button>
        <div style={{fontWeight:800,fontSize:16}}>👥 Pelanggan</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,marginBottom:14}}>{product.name}</div>
      {loading?<Loading/>:rows.length===0?(
        <div style={{textAlign:'center',color:MT,fontSize:13,padding:24,background:'#fff',borderRadius:12}}>Belum ada riwayat penjualan barang ini.</div>
      ):rows.map(r=>(
        <div key={r.name} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,color:MT,marginTop:2}}>{r.count}x transaksi · terakhir {r.lastDate||'-'}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:800,fontSize:14,color:G}}>{r.qty} {product.unit_kecil||'pcs'}</div>
            <div style={{fontSize:11,color:MT}}>{fmt(r.total)}</div>

  );
}

// ── Halaman Supplier yang pernah menyuplai barang ini ───────────────────────
function SupplierBarangView({product, onBack}) {
  const [loading, setLoading] = useState(true);
  const [rows, setRows] = useState([]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const items = await sbGet('po_items',{eq:{product_id:product.id},order:'id',asc:false,limit:500});
        const allPO = await sbGetAll('purchase_orders',{order:'created_at',asc:false});
        const poMap = {}; allPO.forEach(po=>{poMap[po.id]=po;});
        const bySupplier = {};
        (items||[]).forEach(it=>{
          const po = poMap[it.po_id];
          const name = po?.supplier || 'Tidak diketahui';
          if(!bySupplier[name]) bySupplier[name] = {name, qty:0, total:0, count:0, lastDate:null, lastPrice:0};
          bySupplier[name].qty += parseInt(it.qty)||0;
          bySupplier[name].total += (it.qty||0)*(it.price||0);
          bySupplier[name].count += 1;
          const d = po?.created_at?.slice(0,10);
          if(d && (!bySupplier[name].lastDate || d>bySupplier[name].lastDate)) { bySupplier[name].lastDate = d; bySupplier[name].lastPrice = it.price||0; }
        });
        setRows(Object.values(bySupplier).sort((a,b)=>b.qty-a.qty));
      } catch(e){ setRows([]); }
      setLoading(false);
    })();
  },[product.id]);

  return (
    <div style={{padding:16,maxWidth:600,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:22,padding:0}}>←</button>
        <div style={{fontWeight:800,fontSize:16}}>🏭 Supplier</div>
      </div>
      <div style={{fontSize:13,fontWeight:700,marginBottom:14}}>{product.name}</div>
      {loading?<Loading/>:rows.length===0?(
        <div style={{textAlign:'center',color:MT,fontSize:13,padding:24,background:'#fff',borderRadius:12}}>Belum ada riwayat pembelian barang ini.</div>
      ):rows.map(r=>(
        <div key={r.name} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>{r.name}</div>
            <div style={{fontSize:11,color:MT,marginTop:2}}>{r.count}x PO · terakhir {r.lastDate||'-'}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:800,fontSize:14,color:'#8E44AD'}}>{r.qty} {product.unit_kecil||'pcs'}</div>
            <div style={{fontSize:11,color:MT}}>Terakhir: {fmt(r.lastPrice)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

    unit_kecil:product?.unit_kecil||"", unit_besar:product?.unit_besar||"", konversi:product?.konversi??"",
    harga_besar:product?.harga_besar??"", pakai_stok:product?.pakai_stok!==false,
    barcode:product?.barcode||"", stok_minimum:product?.stok_minimum??"", letak_rak:product?.letak_rak||"",
    keterangan:product?.keterangan||"", diskon_persen:product?.diskon_persen??"0",
    diskon_tipe:product?.diskon_tipe||"persen", tampilkan_transaksi:product?.tampilkan_transaksi!==false,
    berat:product?.berat??"", foto_url:product?.foto_url||"",

    setUploadingPhoto(true);
    try {
      const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      const ext = file.name?.split('.').pop() || 'jpg';
      const filename = `produk/${Date.now()}.${ext}`;
      const { error } = await sbc.storage.from('toko-assets').upload(filename, file, {cacheControl:'3600', upsert:false, contentType:file.type});
      if(error) throw error;
      const { data: urlData } = sbc.storage.from('toko-assets').getPublicUrl(filename);
      setForm(p=>({...p, foto_url: urlData.publicUrl}));

// ── MANAJEMEN STOK ─────────────────────────────────────────────────────────
function ManajemenStok() {
  const [products, setProducts] = useState([]);
  const [logs, setLogs] = useState([]);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({product_id:'', type:'masuk', qty:'', notes:''});
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  const load = useCallback(async() => {
    setLoading(true); setError(null);
    try {
      const [prods, lg] = await Promise.all([
        sbGetAll('products', {order:'name'}),
        sbGet('stock_logs', {order:'created_at', asc:false, limit:50}),
      ]);
      setProducts(prods); setLogs(lg);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);
  useEffect(()=>{load();},[load]);

  const filtered = products.filter(p => smartMatch(search, p.name, p.category||''));

  const saveLog = async() => {
    if(!form.product_id || !form.qty) return alert('Pilih produk & isi qty!');
    setSaving(true);
    try {
      const product = products.find(p => p.id === parseInt(form.product_id));
      const qty = parseInt(form.qty);
      const stockBefore = product.stock;
      const stockAfter = form.type === 'masuk' || form.type === 'retur'
        ? stockBefore + qty
        : form.type === 'opname' ? qty
        : Math.max(0, stockBefore - qty);

      await sbInsert('stock_logs', [{
        product_id: product.id,
        type: form.type,
        qty,
        stock_before: stockBefore,
        stock_after: stockAfter,
        notes: form.notes,
      }]);
      await sbUpdate('products', product.id, {stock: stockAfter});
      setForm({product_id:'', type:'masuk', qty:'', notes:''});
      setShowForm(false);
      await load();
    } catch(e) { alert('Gagal: ' + e.message); }
    setSaving(false);
  };

  const typeColor = {masuk:G, keluar:RD, opname:'#3498DB', retur:OR};
  const typeIcon  = {masuk:'📥', keluar:'📤', opname:'📋', retur:'🔄'};

  if(error) return <ErrBox msg={error} onRetry={load}/>;

  return (
    <div style={{padding:16, maxWidth:900, margin:'0 auto'}}>
      <div style={{display:'flex', gap:10, marginBottom:16}}>

        </button>
      </div>
