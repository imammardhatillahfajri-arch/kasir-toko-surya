  const [showDropdown, setShowDropdown] = React.useState(false);

  const filtered = React.useMemo(()=>{
    if(!search||search.length<2) return [];
    const q = search.toLowerCase();
    return (window._cachedProducts||products)
      .filter(p=>p.name.toLowerCase().includes(q))
      .slice(0,8);
  },[search, products]);

  return (
    <div>
      {/* Search input */}
      <div style={{position:'relative',marginBottom:8}}>
        <input
          value={search}
          onChange={e=>{ setSearch(e.target.value); setShowDropdown(true); }}
          onFocus={()=>setShowDropdown(true)}
          placeholder="🔍 Cari produk..."
          style={{width:'100%',padding:'9px 12px',border:`1.5px solid ${item.product_id?G:'#eee'}`,borderRadius:8,fontSize:13,boxSizing:'border-box'}}
        />
        {item.product_id&&<div style={{fontSize:10,color:GD,fontWeight:600,marginTop:3}}>✅ {item.product_name}</div>}
        {showDropdown&&filtered.length>0&&(
          <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1.5px solid '+G,borderRadius:8,zIndex:99,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',maxHeight:200,overflowY:'auto'}}>
            {filtered.map(p=>(
              <div key={p.id} onClick={()=>{ onSelect(p); setSearch(p.name); setShowDropdown(false); }}
                style={{padding:'10px 12px',cursor:'pointer',borderBottom:'1px solid #f5f5f5',fontSize:13}}>
                <div style={{fontWeight:600,color:TX}}>{p.name}</div>
                <div style={{fontSize:11,color:MT}}>Stok: {p.stock} · Harga: {fmt(p.price)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Qty & Harga */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Qty</label>
          <div style={{display:'flex',alignItems:'center',gap:4}}>
            <button onClick={()=>onQtyChange(Math.max(0.01,Math.round((parseQty(item.qty)-1)*100)/100))}
              style={{width:28,height:28,borderRadius:'50%',background:'#eee',border:'none',cursor:'pointer',fontSize:16,fontWeight:700,flexShrink:0}}>−</button>
            <input value={item.qty} onChange={e=>onQtyChange(e.target.value.replace(/[^0-9,]/g,''))}
              onBlur={e=>onQtyChange(parseQty(item.qty)>0?parseQty(item.qty):1)}
              type="text" inputMode="decimal"
              style={{flex:1,padding:'5px 4px',border:'1.5px solid #eee',borderRadius:7,fontSize:13,textAlign:'center',boxSizing:'border-box'}}/>
            <button onClick={()=>onQtyChange(Math.round((parseQty(item.qty)+1)*100)/100)}
              style={{width:28,height:28,borderRadius:'50%',background:GL,border:`1px solid ${G}`,cursor:'pointer',fontSize:16,color:GD,fontWeight:700,flexShrink:0}}>+</button>
          </div>
        </div>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Harga Jual</label>
          <input value={item.price} onChange={e=>onPriceChange(e.target.value)}
            type="number" placeholder="Harga"
            style={{width:'100%',padding:'7px 8px',border:'1.5px solid #eee',borderRadius:7,fontSize:13,boxSizing:'border-box'}}/>
        </div>
      </div>

      {/* Subtotal & Hapus */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:12,color:GD,fontWeight:700}}>
          Subtotal: {fmt(Math.round(parseQty(item.qty)*(parseInt(item.price)||0)))}
        </span>
        <button onClick={onRemove}
          style={{padding:'5px 12px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:7,cursor:'pointer',color:RD,fontSize:12,fontWeight:600}}>
          🗑️ Hapus
        </button>
      </div>
    </div>
  );
}

function LaporanPenjualan({initialTxId, onConsumeTarget}={}) {
  const today = new Date().toISOString().slice(0,10);
  const [filter, setFilter]         = useState({dari: today, sampai: today, status:'', search:''});
  const [transactions, setTrans]    = useState([]);
  const [loading, setLoading]       = useState(false);
  const [selected, setSelected]     = useState(null); // transaksi yang diklik
  const [txItems, setTxItems]       = useState([]);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [editMode, setEditMode]     = useState(false);
  const [editForm, setEditForm]     = useState({});
  const [editItems, setEditItems]   = useState([]);
  const [products, setProducts]     = useState([]);
  const [saving, setSaving]         = useState(false);
  const [showReturForm, setShowReturForm] = useState(false);
  const [showStruk, setShowStruk]   = useState(false);
  const [payModal, setPayModal]     = useState(null); // opsi bayar saat total edit > dibayar

  // Deep-link: buka langsung detail invoice dari laporan lain
  useEffect(()=>{
    if(!initialTxId) return;
    (async()=>{
      try {
        const r = await sbGet('transactions',{eq:{id:initialTxId}});
        const tx = r?.[0];
        if(tx){
          const tgl = tx.created_at?.slice(0,10)||today;
          setFilter(f=>({...f, dari:tgl, sampai:tgl}));
          setTrans([tx]);
          openDetail(tx);
        }
      } catch(e){}
      onConsumeTarget&&onConsumeTarget();
    })();
  },[initialTxId]);

  const loadProducts = async() => {
    if(products.length>0) return;
    try { setProducts(await sbGetAll('products',{order:'name'})); } catch(e){}
  };

  const [totalRetur, setTotalRetur] = useState(0);
  const [retMap, setRetMap] = useState({}); // transaction_id -> {total, list:[retur]}
  const [returList, setReturList] = useState([]); // daftar retur dalam periode
  const [showReturList, setShowReturList] = useState(false);

  // Buka detail invoice dari daftar retur (fetch kalau di luar hasil filter)
  const openReturInvoice = async(txId) => {
    if(!txId) return;
    let tx = transactions.find(t=>t.id===txId);
    if(!tx){
      try {
        const r = await sbGet('transactions',{eq:{id:txId}});
        tx = r?.[0];
        if(tx) setTrans(prev=>[tx,...prev]);
      } catch(e){}
    }
    if(tx) openDetail(tx);
  };

  const search = async() => {
    if(!filter.dari||!filter.sampai) return alert('Pilih tanggal terlebih dahulu!');
    setLoading(true); setSelected(null); setEditMode(false);
    try {
      // Retur pelanggan: pengurang omset + penanda per invoice
      try {
        const rets = await sbGetAll('returns',{order:'created_at',asc:false});
        const custRets = rets.filter(r=>r.type!=='ke_supplier');
        setTotalRetur(custRets.filter(r=>{
          const tgl = r.created_at?.slice(0,10);
          return tgl>=filter.dari&&tgl<=filter.sampai;
        }).reduce((s,r)=>s+(r.total||0),0));
        // Peta retur per transaksi (semua periode, biar invoice lama pun bertanda)
        const m = {};
        custRets.forEach(r=>{
          if(!r.transaction_id) return;
          if(!m[r.transaction_id]) m[r.transaction_id]={total:0,list:[]};
          m[r.transaction_id].total += (r.total||0);
          m[r.transaction_id].list.push(r);
        });
        setRetMap(m);
        setReturList(custRets.filter(r=>{
          const tgl = r.created_at?.slice(0,10);
          return tgl>=filter.dari&&tgl<=filter.sampai;
        }));
      } catch(e){ setTotalRetur(0); setRetMap({}); setReturList([]); }
      const all = await sbGetAll('transactions',{order:'created_at',asc:false});
      const filtered = all.filter(t=>{
        const tgl = t.created_at?.slice(0,10);
        if(tgl < filter.dari || tgl > filter.sampai) return false;
        if(filter.status && t.status !== filter.status) return false;
        if(filter.search && !t.invoice_no?.toLowerCase().includes(filter.search.toLowerCase()) &&
           !t.customer?.toLowerCase().includes(filter.search.toLowerCase())) return false;
        return true;
      });
      setTrans(filtered);
    } catch(e){}
    setLoading(false);
  };

  const openDetail = async(tx) => {
    setSelected(tx); setEditMode(false); setShowReturForm(false); setShowStruk(false);
    setLoadingDetail(true);
    try {
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id},order:'id'});
      setTxItems(items||[]);
      setEditForm({
        customer: tx.customer||'',
        metode_bayar: tx.metode_bayar||'Tunai',
        status: tx.status||'Lunas',
        paid: tx.paid||tx.total,
      });
      setEditItems((items||[]).map(i=>({...i})));
    } catch(e){}
    setLoadingDetail(false);
    await loadProducts();
  };

  const addEditItem = () => setEditItems(prev=>[...prev,{id:'new_'+Date.now(),product_id:null,product_name:'',qty:1,price:0}]);
  const removeEditItem = (id) => setEditItems(prev=>prev.filter(i=>i.id!==id));
  const updateEditItem = (id,field,val) => setEditItems(prev=>prev.map(i=>i.id===id?{...i,[field]:val}:i));
  const selectEditProduct = (id,productId) => {
    const prod = products.find(p=>p.id===parseInt(productId));
    if(prod) {
      updateEditItem(id,'product_name',prod.name);
      updateEditItem(id,'price',prod.price);
      updateEditItem(id,'product_id',prod.id);
    }
  };

  const editTotal = editItems.reduce((s,i)=>s+(parseInt(i.price)||0)*parseQty(i.qty),0);

  const saveEdit = async() => {
    if(editItems.some(i=>!i.product_name||!i.qty||!i.price)) return alert('Lengkapi semua item!');
    const paidNow = parseInt(editForm.paid)||0;
    // ── Kurang bayar? Tanya dulu: bayar sekarang atau jadikan piutang ──
    if(paidNow < editTotal) {
      const defDue = new Date(Date.now()+7*86400000).toISOString().slice(0,10);
      setPayModal({
        kekurangan: editTotal - paidNow,
        tambahan:   String(editTotal - paidNow),
        dueDate:    selected.due_date || defDue,
      });
      return;
    }
    // ── Dibayar cukup → Lunas, kembalian dihitung normal (tidak pernah minus) ──
    doSaveEdit({ status:'Lunas', paid:paidNow, change:paidNow-editTotal, due_date:null });
  };

  const doSaveEdit = async({status, paid, change, due_date, bayarMasuk=0}) => {
    setSaving(true);
    try {
      // Update transaksi
      await sbUpdate('transactions', selected.id, {
        customer: editForm.customer,
        status,
        total: editTotal,
        paid,
        change,
        due_date,
      });
      // Catat kas masuk kalau ada pembayaran tambahan diterima saat revisi
      if(bayarMasuk>0) await catatPembayaran({transaction_id:selected.id, amount:bayarMasuk, note:`Pembayaran revisi ${selected.invoice_no||('#'+selected.id)}`});

      // Hapus items lama & insert baru
      // Supabase: delete where transaction_id
      const sb = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      await sb.from('transaction_items').delete().eq('transaction_id', selected.id);
      await sbInsert('transaction_items', editItems.map(i=>({
        transaction_id: selected.id,
        product_id: i.product_id||null,
        product_name: i.product_name,
        qty: parseQty(i.qty),
        price: parseInt(i.price),
        subtotal: Math.round(parseQty(i.qty)*(parseInt(i.price)||0)),
        satuan: i.satuan||'pcs',
      })));

      // ── Sesuaikan stok sesuai perubahan item ──
      const keyOf = it=>it.product_id?('p'+it.product_id):null;
      const oldQty={}, newQty={}, metaP={};
      txItems.forEach(it=>{const k=keyOf(it); if(k){oldQty[k]=(oldQty[k]||0)+parseQty(it.qty); metaP[k]=it;}});
      editItems.forEach(it=>{const k=keyOf(it); if(k){newQty[k]=(newQty[k]||0)+parseQty(it.qty); metaP[k]=it;}});
      for(const k of Object.keys({...oldQty,...newQty})){
        const d=(newQty[k]||0)-(oldQty[k]||0);
        if(d>0)      await stokKeluar(metaP[k].product_id, d,  `Revisi ${selected.invoice_no||('#'+selected.id)}`);
        else if(d<0) await stokMasuk(metaP[k].product_id, -d, `Revisi ${selected.invoice_no||('#'+selected.id)}`);
      }

      // Refresh - update semua state dengan data terbaru
      const updatedTx = {
        ...selected,
        customer: editForm.customer,
        status,
        total:    editTotal,
        paid,
        change,
        due_date,
      };
      setSelected(updatedTx);
      setEditForm(f=>({...f, status, paid}));
      setTxItems(editItems.map(i=>({
        ...i,
        qty:   parseQty(i.qty),
        price: parseInt(i.price),
        subtotal: Math.round(parseQty(i.qty)*(parseInt(i.price)||0)),
      })));
      setEditMode(false);
      setPayModal(null);
      setTrans(prev=>prev.map(t=>t.id===selected.id?updatedTx:t));
      // Tawarkan cetak ulang
      notifyDataChanged('transaction');
      const msg = status==='Piutang'
        ? `✅ Transaksi diupdate & dicatat sebagai PIUTANG.\nUang muka: ${fmt(paid)}\nSisa tagihan: ${fmt(editTotal-paid)}\nJatuh tempo: ${due_date||'-'}\n\nCetak ulang faktur terbaru?`
        : `✅ Transaksi berhasil diupdate (LUNAS).${change>0?`\nKembalian: ${fmt(change)}`:''}\n\nCetak ulang faktur terbaru?`;
      if(window.confirm(msg)) {
        setShowStruk(true);
      }
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const totalOmset = transactions.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0);
  const totalPiutang = transactions.filter(t=>t.status==='Piutang').reduce((s,t)=>s+(t.total-(t.paid||0)),0);

  return (
    <div style={{padding:16,maxWidth:1100,margin:'0 auto'}}>
      <div style={{fontWeight:800,fontSize:17,marginBottom:14}}>📋 Laporan Penjualan</div>

      {/* Filter */}
      <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr auto',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Dari Tanggal</label>
            <input type="date" value={filter.dari} onChange={e=>setFilter(f=>({...f,dari:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Sampai Tanggal</label>
            <input type="date" value={filter.sampai} onChange={e=>setFilter(f=>({...f,sampai:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Status</label>
            <select value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
              <option value="">Semua Status</option>
              <option value="Lunas">Lunas</option>
              <option value="Piutang">Piutang</option>
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:4}}>Cari Invoice/Pelanggan</label>
            <input value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))}
              placeholder="INV-xxx atau nama..." onKeyDown={e=>e.key==='Enter'&&search()}
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>
          <button onClick={search} disabled={loading}
            style={{padding:'9px 20px',background:loading?MT:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer',fontSize:14,whiteSpace:'nowrap'}}>
            {loading?'⏳':'🔍 Tampilkan'}
          </button>
        </div>

        {/* Quick filter buttons */}
        <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
          {[
            ['Hari Ini', ()=>{const t=new Date().toISOString().slice(0,10);setFilter(f=>({...f,dari:t,sampai:t}));}],
            ['Minggu Ini', ()=>{const t=new Date();const d=new Date(t);d.setDate(t.getDate()-t.getDay());setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:t.toISOString().slice(0,10)}));}],
            ['Bulan Ini', ()=>{const t=new Date();const d=new Date(t.getFullYear(),t.getMonth(),1);setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:t.toISOString().slice(0,10)}));}],
            ['Bulan Lalu', ()=>{const t=new Date();const d=new Date(t.getFullYear(),t.getMonth()-1,1);const e=new Date(t.getFullYear(),t.getMonth(),0);setFilter(f=>({...f,dari:d.toISOString().slice(0,10),sampai:e.toISOString().slice(0,10)}));}],
          ].map(([label,fn])=>(
            <button key={label} onClick={()=>{fn();setTimeout(search,100);}}
              style={{padding:'5px 12px',background:'#F5F6FA',border:'1px solid #eee',borderRadius:16,cursor:'pointer',fontSize:11,color:MT,fontWeight:500}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {transactions.length>0&&(
        <>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
            {[
              {label:'Total Transaksi',value:transactions.length+' tx',color:'#3498DB'},
              {label:totalRetur>0?'Omset Neto':'Total Omset',value:fmt(totalOmset-totalRetur),color:G,sub:totalRetur>0?`Bruto ${fmt(totalOmset)} − Retur ${fmt(totalRetur)}`:null},
              {label:'Total Piutang',value:fmt(totalPiutang),color:OR},
            ].map((s,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:10,padding:'10px 14px',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',borderLeft:`3px solid ${s.color}`}}>
                <div style={{fontSize:11,color:MT}}>{s.label}</div>
                <div style={{fontSize:16,fontWeight:800,color:s.color,marginTop:2}}>{s.value}</div>
                {s.sub&&<div style={{fontSize:10,color:MT,marginTop:2}}>{s.sub}</div>}
              </div>
            ))}
          </div>

          {/* Mobile: jika ada selected → fullscreen detail */}
          {selected&&(
            <div style={{display:'block'}}>
              <style>{`@media(min-width:700px){.laporan-mobile-back{display:none!important}}`}</style>
              <button className="laporan-mobile-back" onClick={()=>setSelected(null)}
                style={{background:'none',border:'none',color:G,fontWeight:700,fontSize:14,cursor:'pointer',padding:'0 0 12px 0',display:'block'}}>
                ← Kembali ke Daftar
              </button>
            </div>
          )}

          {/* Laporan Retur periode ini */}
          {returList.length>0&&(
            <div style={{background:'#fff',borderRadius:12,marginBottom:14,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden'}}>
              <div onClick={()=>setShowReturList(v=>!v)}
                style={{padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',borderLeft:`4px solid ${RD}`}}>
                <div style={{fontWeight:800,fontSize:13,color:RD}}>↩️ Laporan Retur Penjualan ({returList.length}) — total {fmt(returList.reduce((s,r)=>s+(r.total||0),0))}</div>
                <span style={{color:RD,fontSize:15,transform:showReturList?'rotate(90deg)':'none',transition:'transform 0.15s'}}>›</span>
              </div>
              {showReturList&&(
                <div style={{padding:'0 16px 12px'}}>
                  {returList.map((r,i)=>(
                    <div key={i} onClick={()=>openReturInvoice(r.transaction_id)}
                      style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'#FFF7F7',borderRadius:8,marginBottom:6,cursor:r.transaction_id?'pointer':'default'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace'}}>{r.return_no}</div>
                        <div style={{fontSize:10,color:MT}}>
                          {r.created_at?.slice(0,10)} · {r.customer||'Umum'} · {r.reason||'-'}
                          {r.action==='refund'?' · 💵 Refund':r.action==='tukar'?' · 🔄 Tukar':''}
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0,marginLeft:8}}>
                        <span style={{fontWeight:800,fontSize:12,color:RD}}>-{fmt(r.total||0)}</span>
                        {r.transaction_id&&<span style={{color:RD,fontSize:13}}>›</span>}
                      </div>
                    </div>
                  ))}
                  <div style={{fontSize:10,color:MT,marginTop:4}}>Ketuk baris untuk membuka invoice asalnya</div>
                </div>
              )}
            </div>
          )}

          {/* Layout 2 kolom: List kiri, Detail kanan */}
          <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>

            {/* List transaksi - hide on mobile when detail selected */}
            <div style={{flex:'0 0 340px',background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden',maxHeight:'70vh',display:'flex',flexDirection:'column'}}
              className={selected?'hide-on-mobile':''}>
              <div style={{padding:'10px 14px',borderBottom:'1px solid #eee',fontWeight:700,fontSize:13,color:MT,flexShrink:0}}>
                {transactions.length} Transaksi
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {transactions.map(tx=>(
                  <div key={tx.id} onClick={()=>openDetail(tx)}
                    style={{padding:'10px 14px',borderBottom:'1px solid #f5f5f5',cursor:'pointer',background:selected?.id===tx.id?GL:'#fff',borderLeft:selected?.id===tx.id?`3px solid ${G}`:'3px solid transparent'}}
                    onMouseEnter={e=>e.currentTarget.style.background=selected?.id===tx.id?GL:'#F5F6FA'}
                    onMouseLeave={e=>e.currentTarget.style.background=selected?.id===tx.id?GL:'#fff'}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:12,color:TX,fontFamily:'monospace'}}>{tx.invoice_no}</div>
                        <div style={{fontSize:11,color:MT,marginTop:1}}>{tx.customer||'Umum'}</div>
                        <div style={{fontSize:10,color:MT}}>{tx.created_at?.slice(0,10)} · {tx.created_at?.slice(11,16)}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:G}}>{fmt(tx.total)}</div>
                        <div style={{fontSize:10,fontWeight:600,color:tx.status==='Lunas'?GD:OR,marginTop:2}}>{tx.status}</div>
                        {retMap[tx.id]&&(
                          <div style={{fontSize:9,fontWeight:700,color:RD,background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:5,padding:'1px 6px',marginTop:3,display:'inline-block'}}>
                            ↩️ {retMap[tx.id].total>=tx.total?'RETUR PENUH':`Retur ${fmt(retMap[tx.id].total)}`}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Detail transaksi */}
            {selected&&(
              <div style={{flex:1,background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden',minWidth:0}}>
                {loadingDetail ? <div style={{padding:20}}><Loading/></div> : (
                  <>
                    {/* Header detail */}
                    <div style={{padding:'12px 16px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F5F6FA'}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,fontFamily:'monospace'}}>
                          {selected.invoice_no}
                          {retMap[selected.id]&&(
                            <span style={{fontSize:10,fontWeight:800,color:'#fff',background:RD,borderRadius:5,padding:'2px 8px',marginLeft:8,verticalAlign:'middle',fontFamily:'inherit'}}>
                              ↩️ {retMap[selected.id].total>=selected.total?'RETUR PENUH':'ADA RETUR'}
                            </span>
                          )}
                        </div>
                        <div style={{fontSize:11,color:MT,marginTop:2}}>{selected.created_at?.slice(0,10)} · {selected.customer||'Umum'}</div>
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        {!editMode&&!showReturForm&&(
                          <>
                            <button onClick={()=>{setEditMode(true);setShowReturForm(false);}}
                              style={{padding:'6px 12px',background:'#E3F2FD',border:'1px solid #3498DB',borderRadius:8,cursor:'pointer',fontSize:12,color:'#1976D2',fontWeight:600}}>
                              ✏️ Edit
                            </button>
                            <button onClick={()=>{setShowReturForm(true);setEditMode(false);}}
                              style={{padding:'6px 12px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,cursor:'pointer',fontSize:12,color:RD,fontWeight:600}}>
                              🔄 Retur
                            </button>
                            <button onClick={()=>{setShowStruk(true);setEditMode(false);setShowReturForm(false);}}
                              style={{padding:'6px 12px',background:GL,border:`1px solid ${G}`,borderRadius:8,cursor:'pointer',fontSize:12,color:GD,fontWeight:600}}>
                              🖨️ Cetak Ulang
                            </button>
                          </>
                        )}
                        {editMode&&(
                          <>
                            <button onClick={saveEdit} disabled={saving}
                              style={{padding:'6px 14px',background:saving?MT:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontSize:12,fontWeight:700}}>
                              {saving?'⏳':'💾 Simpan'}
                            </button>
                            <button onClick={()=>setEditMode(false)}
                              style={{padding:'6px 12px',background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontSize:12}}>
                              Batal
                            </button>
                          </>
                        )}
                        {showReturForm&&(
                          <button onClick={()=>setShowReturForm(false)}
                            style={{padding:'6px 12px',background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontSize:12}}>
                            ← Kembali
                          </button>
                        )}
                      </div>
                    </div>

                    <div style={{padding:16,maxHeight:'60vh',overflowY:'auto'}}>
                      {!editMode&&!showReturForm&&(
                        <>
                          {/* Riwayat retur invoice ini */}
                          {retMap[selected.id]&&(
                            <div style={{background:'#FFF0F0',border:`1.5px solid ${RD}`,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
                              <div style={{fontWeight:800,fontSize:12,color:RD,marginBottom:6}}>
                                ↩️ INVOICE INI MEMILIKI RETUR — total {fmt(retMap[selected.id].total)}
                                {retMap[selected.id].total>=selected.total?' (retur penuh, seluruh barang dikembalikan)':''}
                              </div>
                              {retMap[selected.id].list.map((r,ri)=>(
                                <div key={ri} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,padding:'4px 0',borderTop:ri>0?'1px dashed #f3caca':'none'}}>
                                  <div style={{flex:1,minWidth:0}}>
                                    <span style={{fontFamily:'monospace',fontWeight:700}}>{r.return_no}</span>
                                    <span style={{color:MT}}> · {r.created_at?.slice(0,10)} · {r.reason||'-'}{r.action==='refund'?' · 💵 Refund':r.action==='tukar'?' · 🔄 Tukar barang':''}</span>
                                  </div>
                                  <span style={{fontWeight:700,color:RD,flexShrink:0,marginLeft:8}}>-{fmt(r.total||0)}</span>
                                </div>
                              ))}
                              <div style={{fontSize:10,color:MT,marginTop:6}}>Nilai transaksi di bawah adalah nilai asli sebelum retur. Omset & laba di laporan sudah otomatis dikurangi.</div>
                            </div>
                          )}
                          {/* Info transaksi */}
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                            {[
                              {label:'Total',value:fmt(selected.total),color:G},
                              {label:'Status',value:selected.status,color:selected.status==='Lunas'?GD:OR},
                              {label:'Dibayar',value:fmt(selected.paid||0),color:TX},
                              {label:'Kembalian',value:fmt(selected.change||0),color:TX},
                            ].map((s,i)=>(
                              <div key={i} style={{background:'#F5F6FA',borderRadius:8,padding:'8px 12px'}}>
                                <div style={{fontSize:10,color:MT}}>{s.label}</div>
                                <div style={{fontWeight:700,color:s.color,fontSize:14}}>{s.value}</div>
                              </div>
                            ))}
                          </div>
                          {/* Items */}
                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                            <thead>
                              <tr style={{background:'#F5F6FA'}}>
                                <th style={{padding:'6px 8px',textAlign:'left',fontWeight:600,color:MT}}>Produk</th>
                                <th style={{padding:'6px 8px',textAlign:'center',fontWeight:600,color:MT}}>Qty</th>
                                <th style={{padding:'6px 8px',textAlign:'right',fontWeight:600,color:MT}}>Harga</th>
                                <th style={{padding:'6px 8px',textAlign:'right',fontWeight:600,color:MT}}>Subtotal</th>
                              </tr>
                            </thead>
                            <tbody>
                              {txItems.map((item,i)=>(
                                <tr key={i} style={{borderBottom:'1px solid #f5f5f5'}}>
                                  <td style={{padding:'6px 8px',fontWeight:500}}>{item.product_name}</td>
                                  <td style={{padding:'6px 8px',textAlign:'center'}}>{item.qty} {item.satuan||'pcs'}</td>
                                  <td style={{padding:'6px 8px',textAlign:'right'}}>{fmt(item.price)}</td>
                                  <td style={{padding:'6px 8px',textAlign:'right',fontWeight:700,color:G}}>{fmt(item.price*item.qty)}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </>
                      )}

                      {/* Edit Mode */}
                      {editMode&&(
                        <div>
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
                            <div>
                              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Nama Pelanggan</label>
                              <input value={editForm.customer} onChange={e=>setEditForm(f=>({...f,customer:e.target.value}))}
                                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
                            </div>
                            <div>
                              <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Status</label>
                              <select value={editForm.status} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))}
                                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                                <option value="Lunas">Lunas</option>
                                <option value="Piutang">Piutang</option>
                              </select>
                            </div>
                          </div>

                          {/* Edit items */}
                          <div style={{marginBottom:10}}>
                            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                              <label style={{fontSize:11,color:MT,fontWeight:600}}>Item Transaksi</label>
                              <button onClick={addEditItem} style={{padding:'3px 10px',background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:'pointer',fontSize:11,color:GD,fontWeight:600}}>+ Item</button>
                            </div>
                            {editItems.map((item,ii)=>(
                              <div key={item.id||ii} style={{background:'#F5F6FA',borderRadius:12,padding:12,marginBottom:8,border:`1.5px solid ${item.product_id?G:'#eee'}`}}>
                                {/* Search produk - pakai input search */}
                                <EditItemRow
                                  item={item}
                                  products={products}
                                  onSelect={(prod)=>{
                                    updateEditItem(item.id,'product_name',prod.name);
                                    updateEditItem(item.id,'price',prod.price);
                                    updateEditItem(item.id,'product_id',prod.id);
                                  }}

// ── RETUR INLINE (di dalam detail transaksi) ───────────────────────────────
function ReturInlineForm({transaction, txItems, onDone}) {
  const [selectedItems, setSelectedItems] = useState(()=>{
    const init = {};
    txItems.forEach(i=>{ init[i.id]={checked:false,qty:i.qty,price:i.price}; });
    return init;
  });
  const [reason, setReason]   = useState('');
  const [action, setAction]   = useState('refund');
  const [saving, setSaving]   = useState(false);
  const [done, setDone]       = useState(false);
  const [returnNo, setReturnNo] = useState('');

  const toggle = (id) => setSelectedItems(p=>({...p,[id]:{...p[id],checked:!p[id].checked}}));
  const updateQty = (id,v) => setSelectedItems(p=>({...p,[id]:{...p[id],qty:Math.max(1,parseInt(v)||1)}}));
  const total = txItems.filter(i=>selectedItems[i.id]?.checked).reduce((s,i)=>s+(selectedItems[i.id]?.price||i.price)*(selectedItems[i.id]?.qty||i.qty),0);

  const save = async() => {
    const items = txItems.filter(i=>selectedItems[i.id]?.checked);
    if(!items.length) return alert('Pilih minimal 1 barang!');
    if(!reason) return alert('Pilih alasan retur!');
    setSaving(true);
    try {
      const now = new Date();
      const no = `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
      const ret = await sbInsert('returns',[{
        return_no:no, type:'dari_pelanggan',
        transaction_id:transaction.id,
        customer:transaction.customer||'Umum',
        reason, action, total, status:'Selesai',
        notes:`Retur dari ${transaction.invoice_no}`,
      }]);
      const retId = ret[0]?.id;
      if(retId) {
        await sbInsert('return_items', items.map(i=>({
          return_id:retId, product_id:i.product_id||null,
          product_name:i.product_name,
          satuan:i.satuan||'pcs',
          qty:selectedItems[i.id]?.qty||i.qty,
          price:selectedItems[i.id]?.price||i.price,
          reason,
        })));
        // Kembalikan stok — barang rusak/cacat tidak masuk stok jual
        const layakJual = !/rusak|cacat/i.test(reason);
        for(const item of items){
          if(!item.product_id) continue;
          const qtyR = selectedItems[item.id]?.qty||item.qty;
          if(layakJual) {
            await stokMasuk(item.product_id, qtyR, `Retur dari ${transaction.invoice_no}`);
          } else {
            await sbInsert('stock_logs',[{
              product_id:item.product_id, type:'masuk', qty:0,
              notes:`Retur ${qtyR} pcs (${reason} — tidak masuk stok jual) dari ${transaction.invoice_no}`,
            }]).catch(()=>{});
          }
        }
      }
      // Catat kas keluar kalau refund uang ke pelanggan
      if(action==='refund') await catatPembayaran({transaction_id:transaction.id, type:'keluar', amount:total, note:`Refund retur ${no} (${transaction.invoice_no})`});
      setReturnNo(no); setDone(true);
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  if(done) return (
    <div style={{textAlign:'center',padding:'24px 0'}}>
      <div style={{fontSize:40,marginBottom:8}}>✅</div>
      <div style={{fontWeight:700,color:GD,fontSize:16}}>Retur Berhasil!</div>
      <div style={{fontSize:12,color:MT,marginTop:4}}>No. Retur: <b>{returnNo}</b></div>
      <div style={{fontSize:11,color:MT,marginTop:2}}>Total: {fmt(total)} · {action==='refund'?'💵 Refund':'🔄 Tukar Barang'}</div>
      <button onClick={onDone} style={{marginTop:14,padding:'9px 24px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Selesai</button>
    </div>
  );

  return (
    <div>
      <div style={{fontWeight:700,fontSize:14,color:RD,marginBottom:12}}>🔄 Form Retur</div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:6}}>Pilih barang yang diretur:</div>
        {txItems.map(item=>(
          <div key={item.id} onClick={()=>toggle(item.id)}
            style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:8,marginBottom:4,background:selectedItems[item.id]?.checked?'#FFF0F0':'#F5F6FA',border:`1px solid ${selectedItems[item.id]?.checked?RD:'#eee'}`,cursor:'pointer'}}>
            <input type="checkbox" checked={selectedItems[item.id]?.checked||false} onChange={()=>toggle(item.id)} style={{width:16,height:16,accentColor:RD}} onClick={e=>e.stopPropagation()}/>
            <div style={{flex:1,fontSize:12,fontWeight:500}}>{item.product_name}</div>
            <div style={{fontSize:11,color:MT}}>{item.qty}x {fmt(item.price)}</div>
            {selectedItems[item.id]?.checked&&(
              <input type="number" min="1" max={item.qty} value={selectedItems[item.id]?.qty}
                onChange={e=>{ e.stopPropagation(); updateQty(item.id,e.target.value); }}
                onClick={e=>e.stopPropagation()}
                style={{width:50,padding:'3px 6px',border:`1px solid ${RD}`,borderRadius:6,fontSize:12,textAlign:'center'}}/>
            )}
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Alasan *</label>
          <select value={reason} onChange={e=>setReason(e.target.value)}
            style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
            <option value="">-- Pilih --</option>
            {['Barang rusak','Barang cacat','Salah produk','Salah ukuran','Kelebihan stok','Lainnya'].map(r=><option key={r} value={r}>{r}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Proses</label>
          <select value={action} onChange={e=>setAction(e.target.value)}
            style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
            <option value="refund">💵 Refund</option>
            <option value="tukar_barang">🔄 Tukar Barang</option>
          </select>
        </div>
      </div>
      {total>0&&<div style={{background:'#FFF0F0',borderRadius:8,padding:'8px 12px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontWeight:700,color:RD}}>Total Retur</span>
        <span style={{fontWeight:800,color:RD,fontSize:14}}>{fmt(total)}</span>
      </div>}
      <div style={{display:'flex',gap:8}}>
        <button onClick={onDone} style={{flex:1,padding:10,background:'#eee',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600}}>Batal</button>
        <button onClick={save} disabled={saving||!total}
          style={{flex:2,padding:10,background:saving||!total?MT:RD,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>
          {saving?'⏳ Menyimpan...':'🔄 Proses Retur'}
        </button>
      </div>
    </div>
  );
}



// ── RETUR FROM INVOICE ────────────────────────────────────────────────────
function ReturFromInvoice() {
  const [invoiceNo, setInvoiceNo]   = useState('');
  const [transaction, setTransaction] = useState(null);
  const [txItems, setTxItems]       = useState([]);
  const [searching, setSearching]   = useState(false);
  const [notFound, setNotFound]     = useState(false);
  const [selectedItems, setSelectedItems] = useState({});
  const [reason, setReason]         = useState('');
  const [action, setAction]         = useState('refund');
  const [saving, setSaving]         = useState(false);
  const [success, setSuccess]       = useState(null);

  const searchInvoice = async() => {
    if(!invoiceNo.trim()) return;
    setSearching(true); setNotFound(false); setTransaction(null); setTxItems([]);
    try {
      const txs = await sbGet('transactions',{eq:{invoice_no:invoiceNo.trim()}});
      if(!txs||txs.length===0){ setNotFound(true); setSearching(false); return; }
      const tx = txs[0];
      setTransaction(tx);
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id}});
      setTxItems(items||[]);
      const init = {};
      items.forEach(i=>{ init[i.id]={checked:false,qty:i.qty,price:i.price}; });
      setSelectedItems(init);
    } catch(e){ setNotFound(true); }
    setSearching(false);
  };

  const toggleItem = (id) => setSelectedItems(p=>({...p,[id]:{...p[id],checked:!p[id].checked}}));
  const updateQtyRetur = (id,val) => setSelectedItems(p=>({...p,[id]:{...p[id],qty:Math.max(1,parseInt(val)||1)}}));
  const totalRetur = txItems.filter(i=>selectedItems[i.id]?.checked).reduce((s,i)=>s+(selectedItems[i.id]?.price||i.price)*(selectedItems[i.id]?.qty||i.qty),0);

  const saveRetur = async() => {
    const returItems = txItems.filter(i=>selectedItems[i.id]?.checked);
    if(returItems.length===0) return alert('Pilih minimal 1 barang!');
    if(!reason) return alert('Alasan retur wajib!');
    setSaving(true);
    try {
      const now = new Date();
      const returnNo = `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
      const ret = await sbInsert('returns',[{
        return_no:returnNo, type:'dari_pelanggan', transaction_id:transaction.id,
        customer:transaction.customer||'Umum', reason, action, total:totalRetur, status:'Selesai',
        notes:`Retur dari invoice ${invoiceNo}`,
      }]);
      const retId = ret[0]?.id;
      if(retId) {
        await sbInsert('return_items', returItems.map(i=>({
          return_id:retId, product_id:i.product_id||null,
          product_name:i.product_name, satuan:i.satuan||'pcs',
          qty:selectedItems[i.id]?.qty||i.qty,
          price:selectedItems[i.id]?.price||i.price, reason,
        })));
        // Kembalikan stok — barang rusak/cacat tidak masuk stok jual
        const layakJual = !/rusak|cacat/i.test(reason);
        for(const item of returItems) {
          if(!item.product_id) continue;
          const qtyR = selectedItems[item.id]?.qty||item.qty;
          if(layakJual) {
            await stokMasuk(item.product_id, qtyR, `Retur dari ${invoiceNo}`);
          } else {
            await sbInsert('stock_logs',[{
              product_id:item.product_id, type:'masuk', qty:0,
              notes:`Retur ${qtyR} pcs (${reason} — tidak masuk stok jual) dari ${invoiceNo}`,
            }]).catch(()=>{});
          }
        }
      }
      // Catat kas keluar kalau refund uang ke pelanggan
      if(action==='refund') await catatPembayaran({transaction_id:transaction.id, type:'keluar', amount:totalRetur, note:`Refund retur ${returnNo} (${invoiceNo})`});
      notifyDataChanged('retur');
      setSuccess(returnNo);
      setTransaction(null); setTxItems([]); setInvoiceNo('');
      setSelectedItems({}); setReason(''); setAction('refund');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🔄 Retur dari Invoice</div>
      {success&&(
        <div style={{background:'#E8F5E9',border:`1px solid ${G}`,borderRadius:10,padding:14,marginBottom:14,textAlign:'center'}}>
          <div style={{fontSize:24,marginBottom:4}}>✅</div>
          <div style={{fontWeight:700,color:GD}}>Retur berhasil!</div>
          <div style={{fontSize:12,color:MT,marginTop:4}}>No: <b>{success}</b></div>
          <button onClick={()=>setSuccess(null)} style={{marginTop:10,padding:'8px 20px',background:G,color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Retur Lagi</button>
        </div>
      )}
      {!success&&(
        <>
          <div style={{display:'flex',gap:8,marginBottom:14}}>
            <input value={invoiceNo} onChange={e=>setInvoiceNo(e.target.value.toUpperCase())}
              placeholder="Nomor invoice (INV-xxx)" onKeyDown={e=>e.key==='Enter'&&searchInvoice()}
              style={{flex:1,padding:'11px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',fontFamily:'monospace'}}
              onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
            <button onClick={searchInvoice} disabled={searching||!invoiceNo.trim()}
              style={{padding:'11px 20px',background:searching?MT:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer'}}>
              {searching?'⏳':'🔍 Cari'}
            </button>
          </div>
          {notFound&&<div style={{textAlign:'center',padding:'20px 0',color:RD}}><div style={{fontSize:32}}>❌</div><div style={{fontWeight:600}}>Invoice tidak ditemukan</div></div>}
          {transaction&&(
            <>
              <div style={{background:'#F5F6FA',borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{transaction.invoice_no}</div>
                  <div style={{fontSize:11,color:MT}}>{transaction.customer||'Umum'} · {transaction.created_at?.slice(0,10)}</div>
                </div>
                <div style={{fontWeight:800,color:G}}>{fmt(transaction.total)}</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:MT,marginBottom:6}}>Pilih barang yang diretur:</div>
                {txItems.map(item=>(
                  <div key={item.id} onClick={()=>toggleItem(item.id)}
                    style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',borderRadius:9,marginBottom:5,background:selectedItems[item.id]?.checked?'#E8F5E9':'#F5F6FA',border:`1.5px solid ${selectedItems[item.id]?.checked?G:'#eee'}`,cursor:'pointer'}}>
                    <input type="checkbox" checked={selectedItems[item.id]?.checked||false} onChange={()=>toggleItem(item.id)} style={{width:16,height:16,accentColor:G}} onClick={e=>e.stopPropagation()}/>
                    <div style={{flex:1,fontSize:12,fontWeight:500}}>{item.product_name}</div>
                    <div style={{fontSize:11,color:MT}}>{item.qty}x {fmt(item.price)}</div>
                    {selectedItems[item.id]?.checked&&(
                      <input type="number" min="1" max={item.qty} value={selectedItems[item.id]?.qty}
                        onChange={e=>{e.stopPropagation();updateQtyRetur(item.id,e.target.value);}}
                        onClick={e=>e.stopPropagation()}
                        style={{width:50,padding:'3px 6px',border:`1px solid ${G}`,borderRadius:6,fontSize:12,textAlign:'center'}}/>
                    )}
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
                <div>
                  <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Alasan *</label>
                  <select value={reason} onChange={e=>setReason(e.target.value)}
                    style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
                    <option value="">-- Pilih --</option>
                    {['Barang rusak','Barang cacat','Salah produk','Salah ukuran','Kelebihan stok','Lainnya'].map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>Proses</label>
                  <select value={action} onChange={e=>setAction(e.target.value)}
                    style={{width:'100%',padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,background:'#fff'}}>
                    <option value="refund">💵 Refund</option>
                    <option value="tukar_barang">🔄 Tukar Barang</option>
                  </select>
                </div>
              </div>
              {totalRetur>0&&<div style={{background:GL,borderRadius:8,padding:'8px 12px',marginBottom:10,display:'flex',justifyContent:'space-between'}}>
                <span style={{fontWeight:700}}>Total Retur</span>
                <span style={{fontWeight:800,color:GD,fontSize:14}}>{fmt(totalRetur)}</span>
              </div>}
              <button onClick={saveRetur} disabled={saving||!totalRetur}
                style={{width:'100%',padding:12,background:saving||!totalRetur?MT:RD,color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:14,cursor:'pointer'}}>
                {saving?'⏳ Menyimpan...':'🔄 Proses Retur'}
              </button>
            </>
          )}
        </>
      )}
    </div>
  );
}


// ── LAPORAN LABA RUGI ─────────────────────────────────────────────────────
function LaporanLabaRugi({period}) {
  const [dataBarang, setDataBarang] = useState([]);
  const [dataPeriode, setDataPeriode] = useState([]);
  const [loading, setLoading]       = useState(true);
  const [activeTab, setActiveTab]   = useState('periode'); // periode | barang

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const [txs, items, prods, rets, retItems] = await Promise.all([
          sbGetAll('transactions',{order:'created_at'}),
          sbGetAll('transaction_items',{order:'id'}),
          sbGetAll('products',{select:'id,name,buy_price,price',order:'name'}),
          sbGetAll('returns',{order:'created_at'}).catch(()=>[]),
          sbGetAll('return_items',{order:'id'}).catch(()=>[]),
        ]);

        const prodMap = {};
        prods.forEach(p=>{ prodMap[p.name]={buy_price:p.buy_price||0, price:p.price||0}; });

        const validTxs = txs.filter(t=>t.created_at>=sinceStr&&(t.status==='Lunas'||t.status==='Piutang'));
        const validTxIds = new Set(validTxs.map(t=>t.id));
        const filteredItems = items.filter(i=>validTxIds.has(i.transaction_id));

        // Per barang
        const barangMap = {};
        filteredItems.forEach(i=>{
          const buyPrice = prodMap[i.product_name]?.buy_price || 0;
          if(!barangMap[i.product_name]) barangMap[i.product_name] = {name:i.product_name, qty:0, omset:0, modal:0, laba:0, hasBuyPrice: buyPrice>0};
          barangMap[i.product_name].qty   += i.qty;
          barangMap[i.product_name].omset += i.price * i.qty;
          barangMap[i.product_name].modal += buyPrice * i.qty;
          barangMap[i.product_name].laba  += (i.price - buyPrice) * i.qty;
        });
        // Retur pelanggan mengurangi angka per barang
        const validRets = rets.filter(r=>r.created_at>=sinceStr&&r.type!=='ke_supplier');
        const validRetIds = new Set(validRets.map(r=>r.id));
        const filteredRetItems = retItems.filter(ri=>validRetIds.has(ri.return_id));
        filteredRetItems.forEach(ri=>{
          const buyPrice = prodMap[ri.product_name]?.buy_price || 0;
          const b = barangMap[ri.product_name];
          if(b){
            b.qty   -= ri.qty;
            b.omset -= ri.price * ri.qty;
            b.modal -= buyPrice * ri.qty;
            b.laba  -= (ri.price - buyPrice) * ri.qty;
          }
        });
        setDataBarang(Object.values(barangMap).sort((a,b)=>b.laba-a.laba));

        // Per hari
        const hariMap = {};
        for(let i=days-1;i>=0;i--){
          const d = new Date();
          d.setDate(d.getDate()-i);
          const key = d.toISOString().slice(0,10);
          hariMap[key] = {date:key, omset:0, modal:0, laba:0};
        }
        filteredItems.forEach(i=>{
          const tx = txs.find(t=>t.id===i.transaction_id);
          const key = tx?.created_at?.slice(0,10);
          if(key && hariMap[key]) {
            const buyPrice = prodMap[i.product_name]?.buy_price || 0;
            hariMap[key].omset += i.price * i.qty;
            hariMap[key].modal += buyPrice * i.qty;
            hariMap[key].laba  += (i.price - buyPrice) * i.qty;
          }
        });
        // Retur pelanggan mengurangi angka per hari
        filteredRetItems.forEach(ri=>{
          const ret = validRets.find(r=>r.id===ri.return_id);
          const key = ret?.created_at?.slice(0,10);
          if(key && hariMap[key]) {
            const buyPrice = prodMap[ri.product_name]?.buy_price || 0;
            hariMap[key].omset -= ri.price * ri.qty;
            hariMap[key].modal -= buyPrice * ri.qty;
            hariMap[key].laba  -= (ri.price - buyPrice) * ri.qty;
          }
        });
        setDataPeriode(Object.values(hariMap));
      } catch(e){ console.error(e); }
      setLoading(false);
    })();
  },[period]);

  const totalOmset = dataBarang.reduce((s,d)=>s+d.omset,0);
  const totalModal  = dataBarang.reduce((s,d)=>s+d.modal,0);
  const totalLaba   = dataBarang.reduce((s,d)=>s+d.laba,0);
  const prodTanpaHargaBeli = dataBarang.filter(d=>!d.hasBuyPrice).length;
  const maxLaba = Math.max(...dataBarang.map(d=>Math.abs(d.laba)),1);
  const maxHariLaba = Math.max(...dataPeriode.map(d=>Math.abs(d.laba)),1);

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>💹 Laporan Laba Rugi ({period} Hari)</div>

      {/* Warning jika ada produk tanpa harga beli */}
      {prodTanpaHargaBeli>0&&(
        <div style={{background:'#FFF3E0',border:`1px solid ${OR}`,borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#7d4e00'}}>
          ⚠️ <b>{prodTanpaHargaBeli} produk</b> belum diisi harga beli — laba tidak akurat. Edit produk di menu Manajemen → Produk.
        </div>
      )}

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
        {[
          {label:'Total Omset',value:fmt(totalOmset),color:'#3498DB',icon:'💰'},
          {label:'Total Modal',value:fmt(totalModal),color:OR,icon:'🏭'},
          {label:'Total Laba',value:fmt(totalLaba),color:totalLaba>=0?G:RD,icon:totalLaba>=0?'📈':'📉'},
        ].map((s,i)=>(
          <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:'10px 12px',borderLeft:`3px solid ${s.color}`}}>
            <div style={{fontSize:10,color:MT}}>{s.icon} {s.label}</div>
            <div style={{fontSize:14,fontWeight:800,color:s.color,marginTop:3}}>{s.value}</div>
            {i===2&&totalOmset>0&&<div style={{fontSize:10,color:MT,marginTop:2}}>Margin: {Math.round(totalLaba/totalOmset*100)}%</div>}
          </div>
        ))}
      </div>

      {/* Tab switch */}
      <div style={{display:'flex',gap:0,background:'#F5F6FA',borderRadius:10,overflow:'hidden',marginBottom:14}}>
        {[['periode','📅 Per Hari'],['barang','🏪 Per Produk']].map(([tab,label])=>(
          <button key={tab} onClick={()=>setActiveTab(tab)}
            style={{flex:1,padding:'9px 0',border:'none',background:activeTab===tab?G:'transparent',color:activeTab===tab?'#fff':MT,fontWeight:activeTab===tab?700:500,cursor:'pointer',fontSize:12,transition:'all 0.15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Per Hari */}
      {activeTab==='periode'&&(
        <div>
          {/* Mini bar chart */}
          {dataPeriode.some(d=>d.laba!==0)&&(
            <div style={{display:'flex',alignItems:'flex-end',gap:2,height:80,marginBottom:14,padding:'0 4px'}}>
              {dataPeriode.map((d,i)=>{
                const h = Math.abs(d.laba)/maxHariLaba*70;
                const isPos = d.laba>=0;
                return (
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
                    <div style={{width:'100%',background:isPos?G:RD,borderRadius:'2px 2px 0 0',height:Math.max(h,d.laba!==0?2:1),opacity:d.laba===0?0.2:0.85}}/>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{maxHeight:300,overflowY:'auto'}}>
            {dataPeriode.filter(d=>d.omset>0).length===0
              ? <div style={{textAlign:'center',padding:'24px 0',color:MT}}>Belum ada data penjualan di periode ini</div>
              : dataPeriode.filter(d=>d.omset>0).reverse().map((d,i)=>(
                <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',background:'#F5F6FA',borderRadius:8,marginBottom:5,borderLeft:`3px solid ${d.laba>=0?G:RD}`}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:12}}>{d.date}</div>
                    <div style={{fontSize:10,color:MT,marginTop:1}}>Omset: {fmt(d.omset)} · Modal: {fmt(d.modal)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontWeight:800,fontSize:14,color:d.laba>=0?G:RD}}>{fmt(d.laba)}</div>
                    {d.omset>0&&<div style={{fontSize:10,color:MT}}>{Math.round(d.laba/d.omset*100)}% margin</div>}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* Per Produk */}
      {activeTab==='barang'&&(
        <div style={{maxHeight:400,overflowY:'auto'}}>
          {dataBarang.length===0
            ? <div style={{textAlign:'center',padding:'24px 0',color:MT}}>Belum ada data</div>
            : dataBarang.map((d,i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {d.name}
                      {!d.hasBuyPrice&&<span style={{fontSize:9,color:OR,marginLeft:4,background:'#FFF3E0',padding:'1px 4px',borderRadius:3}}>Harga beli belum diisi</span>}
                    </div>
                    <div style={{fontSize:10,color:MT,marginTop:1}}>
                      {d.qty} pcs · Omset: {fmt(d.omset)}
                      {d.hasBuyPrice&&` · Modal: ${fmt(d.modal)}`}
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                    <div style={{fontWeight:800,fontSize:13,color:d.laba>=0?G:RD}}>{d.hasBuyPrice?fmt(d.laba):'—'}</div>
                    {d.hasBuyPrice&&d.omset>0&&<div style={{fontSize:10,color:MT}}>{Math.round(d.laba/d.omset*100)}%</div>}
                  </div>
                </div>
                <div style={{height:5,background:'#F5F6FA',borderRadius:3}}>
                  <div style={{height:'100%',background:d.laba>=0?G:RD,borderRadius:3,width:d.hasBuyPrice?`${(Math.abs(d.laba)/maxLaba)*100}%`:'0%',opacity:0.7}}/>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}
