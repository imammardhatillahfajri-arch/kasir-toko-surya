function HutangPiutang() {
  const [tab, setTab]             = useState('piutang');
  const [transactions, setTrans]  = useState([]);
  const [debts, setDebts]         = useState([]);
  const [loading, setLoading]     = useState(true);
  const [search, setSearch]       = useState('');
  const [filterStatus, setFilterStatus] = useState('belum'); // belum | lunas | semua
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [selectedInvoice, setSelectedInvoice]   = useState(null);
  // Navigasi Hutang Supplier bertingkat: list supplier -> detail supplier -> detail transaksi
  const [selSupplierHutang, setSelSupplierHutang] = useState(null); // nama supplier
  const [selHutangTx, setSelHutangTx]             = useState(null); // item transaksi hutang
  const [hutangSearch, setHutangSearch]           = useState('');
  const [hutangFilterBelum, setHutangFilterBelum] = useState(true);
  const [hutangFilterLunas, setHutangFilterLunas] = useState(false);
  const [txPayments, setTxPayments]               = useState([]);
  const [payAmount, setPayAmount]                 = useState('');
  const [payingHutang, setPayingHutang]           = useState(false);
  const me = getSession();
  const myName = me?.nama||me?.username||'Admin';
  const [txItems, setTxItems]     = useState([]);
  const [showForm, setShowForm]   = useState(false);
  const [form, setForm]           = useState({party_name:'',amount:'',description:'',due_date:''});
  const [saving, setSaving]       = useState(false);
  const [showStruk, setShowStruk] = useState(false);

  const [customers, setCustomers] = useState([]);

  const [poHutang, setPoHutang] = useState([]); // PO dengan bayar=Hutang

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const [txs, dbs, custs, pos] = await Promise.all([
        sbGetAll('transactions',{order:'created_at',asc:false}),
        sbGetAll('debts',{order:'created_at',asc:false}),
        sbGet('customers',{order:'name'}),
        sbGetAll('purchase_orders',{order:'created_at',asc:false}),
      ]);
      setTrans(txs||[]);
      setDebts(dbs||[]);
      setCustomers(custs||[]);
      // Load items untuk setiap PO hutang
      const hutangPOs = (pos||[]).filter(p=>p.bayar==='Hutang'&&p.status!=='Dibatalkan');
      const withItems = await Promise.all(hutangPOs.map(async po=>({
        ...po,
        items: await sbGet('po_items',{eq:{po_id:po.id},order:'id'})
      })));
      setPoHutang(withItems);
    } catch(e){}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const today = new Date().toISOString().slice(0,10);

  // Group piutang by customer
  const piutangTx = transactions.filter(t=>t.status==='Piutang'||t.status==='Lunas'&&(t.paid||0)<t.total);
  const allPiutang = transactions.filter(t=>t.status==='Piutang');

  const customerMap = {};
  allPiutang.forEach(t=>{
    const name = t.customer||'Umum';
    if(!customerMap[name]) customerMap[name]={name,txList:[],total:0,sisa:0,overdue:0,dueToday:0,dueSoon:0,txCount:0};
    customerMap[name].txList.push(t);
    customerMap[name].total += t.total;
    customerMap[name].sisa  += t.total-(t.paid||0);
    customerMap[name].txCount++;
    if(t.due_date){
      if(t.due_date<today)       customerMap[name].overdue  += t.total-(t.paid||0);
      else if(t.due_date===today) customerMap[name].dueToday += t.total-(t.paid||0);
      else                        customerMap[name].dueSoon  += t.total-(t.paid||0);
    }
  });

  // Also include lunas transactions in customer history
  transactions.filter(t=>t.status==='Lunas'&&t.customer).forEach(t=>{
    const name = t.customer;
    if(customerMap[name]) customerMap[name].txList.push(t);
  });

  const customerList = Object.values(customerMap)
    .filter(c=>!search || c.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.sisa-a.sisa);

  const totalPiutang = customerList.reduce((s,c)=>s+c.sisa,0);
  const totalTx      = allPiutang.length;
  const totalOverdue = customerList.reduce((s,c)=>s+c.overdue,0);

  // Hutang manual
  const hutangList  = debts.filter(d=>d.type==='hutang');
  const totalHutang = hutangList.filter(d=>d.status!=='Lunas').reduce((s,d)=>s+(d.amount-(d.paid||0)),0);

  // ── Hutang Supplier: unifikasi PO-hutang + hutang manual, dikelompokkan per supplier ──
  const hutangSupplierMap = {};
  const ensureSup = name => {
    if(!hutangSupplierMap[name]) hutangSupplierMap[name] = {name, items:[], totalSisa:0};
    return hutangSupplierMap[name];
  };
  poHutang.forEach(po=>{
    const name = po.supplier||'Tanpa Nama';
    const sisa = (po.total||0)-(po.paid||0);
    const isLunas = po.bayar==='Lunas'||sisa<=0;
    const s = ensureSup(name);
    s.items.push({source:'po', id:po.id, key:'po-'+po.id, supplier:name, total:po.total||0, paid:po.paid||0, sisa:Math.max(0,sisa), due_date:po.due_date, created_at:po.created_at, status:isLunas?'Lunas':'Belum Lunas', raw:po});
    if(!isLunas) s.totalSisa += Math.max(0,sisa);
  });
  hutangList.forEach(d=>{
    const name = d.party_name||'Tanpa Nama';
    const sisa = (d.amount||0)-(d.paid||0);
    const isLunas = d.status==='Lunas'||sisa<=0;
    const s = ensureSup(name);
    s.items.push({source:'manual', id:d.id, key:'debt-'+d.id, supplier:name, total:d.amount||0, paid:d.paid||0, sisa:Math.max(0,sisa), due_date:d.due_date, created_at:d.created_at, status:isLunas?'Lunas':'Belum Lunas', description:d.description, raw:d});
    if(!isLunas) s.totalSisa += Math.max(0,sisa);
  });
  Object.values(hutangSupplierMap).forEach(s=>{
    s.items.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
    const unpaid = s.items.filter(i=>i.status==='Belum Lunas').sort((a,b)=>(a.due_date||'9999-99-99').localeCompare(b.due_date||'9999-99-99'));
    s.nearest = unpaid[0]||null;
  });
  const hutangSupplierList = Object.values(hutangSupplierMap)
    .filter(s=>{
      if(hutangSearch && !s.name.toLowerCase().includes(hutangSearch.toLowerCase())) return false;
      const hasBelum = s.items.some(i=>i.status==='Belum Lunas');
      const hasLunas = s.items.some(i=>i.status==='Lunas');
      if(hutangFilterBelum&&hutangFilterLunas) return hasBelum||hasLunas;
      if(hutangFilterBelum) return hasBelum;
      if(hutangFilterLunas) return hasLunas;
      return true;
    })
    .sort((a,b)=>b.totalSisa-a.totalSisa);
  const totalHutangSemua  = Object.values(hutangSupplierMap).reduce((s,x)=>s+x.totalSisa,0);
  const totalTxHutangSemua= Object.values(hutangSupplierMap).reduce((s,x)=>s+x.items.length,0);
  const supplierDetail = selSupplierHutang ? hutangSupplierMap[selSupplierHutang] : null;

  // Catat pembayaran hutang (PO atau manual) — tersinkron ke buku kas & status otomatis
  const catatBayarHutang = async(item, jumlah) => {
    const refNo = genRefNo();
    if(item.source==='po') {
      await sbInsert('po_payments',[{po_id:item.id, amount:jumlah, paid_by:myName, ref_no:refNo}]);
      const newPaid = (item.paid||0)+jumlah;
      await sbUpdate('purchase_orders', item.id, {paid:newPaid, bayar: newPaid>=item.total?'Lunas':'Hutang'});
    } else {
      await sbInsert('debt_payments',[{debt_id:item.id, amount:jumlah, paid_by:myName, ref_no:refNo}]);
      const newPaid = (item.paid||0)+jumlah;
      await sbUpdate('debts', item.id, {paid:newPaid, status: newPaid>=item.total?'Lunas':'Belum'});
    }
    await catatPembayaran({type:'keluar', amount:jumlah, note:`Bayar hutang ${item.supplier} (${item.source==='po'?'PO-'+item.id:'manual'})`});
  };

  const lunasiSekaligusSupplier = async(sup) => {
    const unpaid = sup.items.filter(i=>i.status==='Belum Lunas'&&i.sisa>0);
    if(!unpaid.length) return alert('Tidak ada hutang yang belum lunas.');
    if(!confirm(`Lunasi SEMUA hutang ${sup.name}?\nTotal: ${fmt(sup.totalSisa)} (${unpaid.length} transaksi)`)) return;
    try {
      for(const item of unpaid) await catatBayarHutang(item, item.sisa);
      notifyDataChanged('hutang');
      load();
      setSelSupplierHutang(null);
      alert(`✅ Semua hutang ${sup.name} berhasil dilunasi!`);
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const loadTxPayments = async(item) => {
    setTxPayments([]);
    try {
      const rows = item.source==='po'
        ? await sbGetAll('po_payments',{eq:{po_id:item.id},order:'created_at'})
        : await sbGetAll('debt_payments',{eq:{debt_id:item.id},order:'created_at'});
      setTxPayments(rows||[]);
    } catch(e){ setTxPayments([]); }
  };

  const openHutangTx = (item) => { setSelHutangTx(item); loadTxPayments(item); };

  const hapusPembayaranHutang = async(item, payment) => {
    if(!confirm(`Hapus pembayaran ${fmt(payment.amount)} ini?\nSisa hutang akan bertambah kembali.`)) return;
    try {
      const sbc = window._sb || (window._sb = window.supabase.createClient(SB_URL, SB_KEY));
      if(item.source==='po') {
        await sbc.from('po_payments').delete().eq('id', payment.id);
        const newPaid = Math.max(0,(item.paid||0)-payment.amount);
        await sbUpdate('purchase_orders', item.id, {paid:newPaid, bayar: newPaid>=item.total?'Lunas':'Hutang'});
      } else {
        await sbc.from('debt_payments').delete().eq('id', payment.id);
        const newPaid = Math.max(0,(item.paid||0)-payment.amount);
        await sbUpdate('debts', item.id, {paid:newPaid, status: newPaid>=item.total?'Lunas':'Belum'});
      }
      load();
      const updated = {...item, paid:Math.max(0,(item.paid||0)-payment.amount), sisa:item.sisa+payment.amount};
      setSelHutangTx(updated);
      loadTxPayments(item);
      alert('✅ Pembayaran dihapus, sisa hutang disesuaikan.');
    } catch(e){ alert('Gagal: '+e.message); }
  };

  const bayarHutangTx = async() => {
    const jumlah = parseInt(String(payAmount).replace(/\D/g,''))||0;
    if(jumlah<=0) return alert('Masukkan jumlah pembayaran!');
    if(jumlah>selHutangTx.sisa) return alert(`Jumlah melebihi sisa hutang: ${fmt(selHutangTx.sisa)}`);
    setPayingHutang(true);
    try {
      await catatBayarHutang(selHutangTx, jumlah);
      notifyDataChanged('hutang');
      const newPaid = (selHutangTx.paid||0)+jumlah;
      const updated = {...selHutangTx, paid:newPaid, sisa:selHutangTx.total-newPaid, status:newPaid>=selHutangTx.total?'Lunas':'Belum Lunas'};
      setSelHutangTx(updated);
      setPayAmount('');
      load();
      loadTxPayments(selHutangTx);
      alert(`✅ Pembayaran ${fmt(jumlah)} berhasil dicatat!${updated.status==='Lunas'?' Hutang LUNAS!':''}`);
    } catch(e){ alert('Gagal: '+e.message); }
    setPayingHutang(false);
  };

  // Open invoice detail
  const openInvoice = async(tx) => {
    setSelectedInvoice({...tx, itemsLoading:true});
    setTxItems([]);
    try {
      const items = await sbGet('transaction_items',{eq:{transaction_id:tx.id},order:'id'});
      setTxItems(items||[]);
    } catch(e){}
    setSelectedInvoice(prev=>({...prev, itemsLoading:false}));
  };

  // Lunasi sekaligus semua piutang pelanggan
  const lunasiSekaligus = async(customer) => {
    if(!confirm(`Lunasi SEMUA piutang ${customer.name}?\nTotal: ${fmt(customer.sisa)}`)) return;
    try {
      for(const tx of customer.txList.filter(t=>t.status==='Piutang')) {
        const sisaTx = tx.total-(tx.paid||0);
        await sbUpdate('transactions',tx.id,{status:'Lunas',paid:tx.total,change:0});
        await catatPembayaran({transaction_id:tx.id, amount:sisaTx, note:`Pelunasan piutang ${tx.invoice_no||('#'+tx.id)}`});
      }
      notifyDataChanged('piutang');
      load();
      setSelectedCustomer(null);
      alert(`✅ Semua piutang ${customer.name} berhasil dilunasi!`);
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // Tandai 1 invoice lunas
  const tandaiLunas = async(tx) => {
    if(!confirm(`Tandai ${tx.invoice_no} LUNAS?\nTotal: ${fmt(tx.total)}`)) return;
    try {
      await sbUpdate('transactions',tx.id,{status:'Lunas',paid:tx.total,change:0});
      notifyDataChanged('piutang');
      load();
      setSelectedInvoice(null);
      alert('✅ Piutang berhasil dilunasi!');
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // Bayar sebagian
  const [bayarInput, setBayarInput] = useState('');
  const bayarSebagian = async(tx) => {
    const jumlah = parseInt(bayarInput)||0;
    if(!jumlah||jumlah<=0) return alert('Masukkan jumlah bayar!');
    const sisa = tx.total-(tx.paid||0);
    if(jumlah>sisa) return alert(`Jumlah bayar melebihi sisa: ${fmt(sisa)}`);
    try {
      const newPaid  = (tx.paid||0)+jumlah;
      const newStatus = newPaid>=tx.total?'Lunas':'Piutang';
      await sbUpdate('transactions',tx.id,{paid:newPaid,status:newStatus,change:Math.max(0,newPaid-tx.total)});
      await catatPembayaran({transaction_id:tx.id, amount:jumlah, note:`Pembayaran piutang ${tx.invoice_no||('#'+tx.id)}`});
      notifyDataChanged('piutang');
      setBayarInput('');
      load();
      setSelectedInvoice(null);
      alert(`✅ Pembayaran ${fmt(jumlah)} berhasil!${newStatus==='Lunas'?' Piutang LUNAS!':''}`);
    } catch(e){ alert('Gagal: '+e.message); }
  };

  // ── STRUK PIUTANG VIEW — pakai StrukSukses sama seperti transaksi penjualan ──
  if(showStruk && selectedInvoice) return (
    <StrukSukses
      cart={txItems.map(i=>({...i,name:i.product_name,unit:i.satuan||i.unit||'pcs',cartKey:i.id}))}
      total={selectedInvoice.total}
      paidNum={selectedInvoice.paid||0}
      invoice={selectedInvoice.invoice_no}
      customer={selectedInvoice.customer||'Umum'}
      metodeBayar={selectedInvoice.metode_bayar||'Piutang'}
      status={selectedInvoice.status}
      kasirName={selectedInvoice.dilayani_oleh||'Admin'}
      txId={selectedInvoice.id}
      onNew={()=>setShowStruk(false)}
    />
  );

  // ── INVOICE DETAIL VIEW ──
  if(selectedInvoice) {
    const sisa = selectedInvoice.total-(selectedInvoice.paid||0);
    const isOverdue = selectedInvoice.due_date&&selectedInvoice.due_date<today;
    return (
      <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={()=>setSelectedInvoice(null)} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
          <div>
            <div style={{fontWeight:700,fontSize:14}}>{selectedCustomer?.name||selectedInvoice.customer||'Umum'}</div>
            <div style={{fontSize:10,color:MT,fontFamily:'monospace'}}>{selectedInvoice.invoice_no}</div>
          </div>
          <button onClick={()=>setShowStruk(true)} style={{marginLeft:'auto',background:'#eee',border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,fontWeight:600}}>
            Lihat Struk
          </button>
        </div>

        {/* Status badge */}
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:sisa<=0?G:RD}}/>
          <span style={{fontWeight:700,fontSize:13,color:sisa<=0?G:RD}}>{sisa<=0?'Lunas':'Belum Lunas'}</span>
        </div>

        {/* Info grid */}
        <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:12}}>
            <div><div style={{color:MT,fontSize:10}}>Tanggal Transaksi</div><div style={{fontWeight:600,marginTop:2}}>{selectedInvoice.created_at?.slice(0,16).replace('T',' ')}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Jatuh Tempo</div><div style={{fontWeight:600,marginTop:2,color:isOverdue?RD:selectedInvoice.due_date?OR:MT}}>{selectedInvoice.due_date||'Tidak di set'}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Total</div><div style={{fontWeight:700,fontSize:14,marginTop:2}}>{fmt(selectedInvoice.total)}</div></div>
            <div><div style={{color:MT,fontSize:10}}>Belum Dibayar</div><div style={{fontWeight:700,fontSize:14,color:RD,marginTop:2}}>{fmt(sisa)}</div></div>
          </div>
          {isOverdue&&<div style={{marginTop:8,background:'#FFF0F0',borderRadius:8,padding:'6px 10px',fontSize:11,color:RD,fontWeight:700}}>🚨 LEWAT JATUH TEMPO!</div>}
        </div>

        {/* Items */}
        <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>📋 Detail Barang</div>
          {selectedInvoice.itemsLoading ? <Loading/> : txItems.map((item,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f5f5f5',fontSize:12}}>
              <div>
                <div style={{fontWeight:600}}>{item.product_name}</div>
                <div style={{fontSize:10,color:MT}}>{item.qty} x {fmt(item.price)}</div>
              </div>
              <div style={{fontWeight:700,color:G}}>{fmt(item.qty*item.price)}</div>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:14,paddingTop:8,borderTop:`2px solid ${G}`,marginTop:4}}>
            <span>Total</span><span style={{color:G}}>{fmt(selectedInvoice.total)}</span>
          </div>
        </div>

        {/* History pembayaran */}
        <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>History Pembayaran</div>
          <div style={{background:GL,borderRadius:8,padding:'8px 12px',marginBottom:6,fontSize:12}}>
            <div style={{color:GD,fontWeight:600}}>Tgl Pembayaran: {selectedInvoice.created_at?.slice(0,10)}</div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'4px 0'}}>
            <span style={{color:MT}}>No. 1 · Uang Muka</span>
            <span style={{fontWeight:700,color:RD}}>Belum Dibayar: {fmt(sisa)}</span>
          </div>
          <div style={{fontSize:11,color:MT,marginTop:4}}>No: {selectedInvoice.invoice_no}</div>
          <div style={{fontSize:11,color:MT}}>Oleh: {window.TOKO_NAMA||'Surya Listrik'}</div>
        </div>

        {/* Bayar */}
        {sisa>0&&(
          <div style={{background:'#fff',borderRadius:12,padding:14,marginBottom:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>💳 Catat Pembayaran</div>
            <input value={bayarInput} onChange={e=>setBayarInput(e.target.value.replace(/\D/g,''))}
              placeholder={`Jumlah bayar (sisa: ${fmt(sisa)})`} inputMode="numeric"
              style={{width:'100%',padding:'11px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:15,fontWeight:700,boxSizing:'border-box',outline:'none',marginBottom:10}}
              onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
            <div style={{display:'flex',gap:6,marginBottom:10}}>
              {[sisa, Math.round(sisa/2)].filter(v=>v>0).map((v,i)=>(
                <button key={i} onClick={()=>setBayarInput(String(v))}
                  style={{flex:1,padding:'7px 0',background:'#F5F6FA',border:'1px solid #eee',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600}}>
                  {i===0?'Bayar Lunas':fmt(v)}
                </button>
              ))}
            </div>
            <button onClick={()=>bayarSebagian(selectedInvoice)}
              style={{width:'100%',padding:13,background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:15,cursor:'pointer'}}>
              PEMBAYARAN
            </button>
          </div>
        )}

        {sisa<=0&&(
          <div style={{background:GL,borderRadius:12,padding:14,textAlign:'center',boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
            <div style={{fontSize:24,marginBottom:4}}>✅</div>
            <div style={{fontWeight:700,color:GD}}>Piutang Sudah Lunas!</div>
          </div>
        )}
      </div>
    );
  }

  // ── CUSTOMER DETAIL VIEW ──
  if(selectedCustomer) {
    const filteredTx = selectedCustomer.txList
      .filter(t=>filterStatus==='semua'||(filterStatus==='belum'&&t.status==='Piutang')||(filterStatus==='lunas'&&t.status==='Lunas'))
      .sort((a,b)=>b.created_at?.localeCompare(a.created_at));
    const masihPiutang = selectedCustomer.txList.filter(t=>t.status==='Piutang');
    return (
      <div style={{padding:16,maxWidth:500,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={()=>setSelectedCustomer(null)} style={{background:'none',border:'none',cursor:'pointer',color:G,fontWeight:700,fontSize:14,padding:0}}>←</button>
          <div style={{fontWeight:700,fontSize:16}}>Kredit/Piutang</div>
        </div>

        {/* Summary card */}
        <div style={{background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${OR}30`}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:OR+'33',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>👤</div>
            <div style={{fontWeight:800,fontSize:16}}>{selectedCustomer.name}</div>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:MT}}>Total Piutang</div>
              <div style={{fontWeight:800,fontSize:18,color:RD}}>{fmt(selectedCustomer.sisa)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,color:MT}}>Total Transaksi</div>
              <div style={{fontWeight:800,fontSize:18}}>{masihPiutang.length}</div>
            </div>
          </div>
          {masihPiutang.length>0&&(
            <button onClick={()=>lunasiSekaligus(selectedCustomer)}
              style={{width:'100%',padding:12,background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:14,cursor:'pointer'}}>
              ✅ Lunasi Sekaligus
            </button>
          )}
        </div>

        {/* Filter */}
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            style={{flex:1,padding:'8px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
            <option value="belum">Belum Lunas</option>
            <option value="lunas">Lunas</option>
            <option value="semua">Semua Transaksi</option>
          </select>
        </div>

        {/* List transaksi */}
        <div style={{fontWeight:700,fontSize:13,color:MT,marginBottom:8}}>Daftar Transaksi</div>
        {filteredTx.length===0
          ? <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Tidak ada transaksi</div>
          : filteredTx.map((tx,i)=>{
            const sisa = tx.total-(tx.paid||0);
            const isLunas = tx.status==='Lunas'||sisa<=0;
            const isOverdue = !isLunas&&tx.due_date&&tx.due_date<today;
            return (
              <div key={tx.id} onClick={()=>openInvoice(tx)}
                style={{background:'#fff',borderRadius:12,padding:'14px 16px',marginBottom:8,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',cursor:'pointer',borderLeft:`3px solid ${isLunas?G:isOverdue?RD:OR}`}}
                onMouseEnter={e=>e.currentTarget.style.background='#F5F6FA'}
                onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:G}}>{tx.created_at?.slice(0,10)}</div>
                    <div style={{fontSize:11,color:MT,marginTop:2,fontFamily:'monospace'}}>{tx.invoice_no}</div>
                    <div style={{fontSize:11,color:MT}}>
                      {isLunas?'Sudah dibayar':'Belum dibayar'} · Jatuh Tempo: {tx.due_date||'-'}
                    </div>
                    {isOverdue&&<div style={{fontSize:10,color:RD,fontWeight:700,marginTop:2}}>🚨 Lewat jatuh tempo!</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:11,color:isLunas?G:RD,fontWeight:600}}>{isLunas?'Lunas':'Belum lunas'}</div>
                    <div style={{fontWeight:800,fontSize:14,color:isLunas?G:RD,marginTop:2}}>{fmt(isLunas?tx.total:sisa)}</div>
                  </div>
                </div>
              </div>
            );
          })
        }
      </div>
    );
  }

  // ── MAIN VIEW ──
  return (
    <div style={{padding:16,maxWidth:700,margin:'0 auto'}}>
      {/* Tabs */}
      <div style={{display:'flex',gap:0,background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',marginBottom:14}}>
        {[['piutang','💰 Piutang Pelanggan'],['hutang','🏭 Hutang Supplier']].map(([t,label])=>(
          <button key={t} onClick={()=>setTab(t)}
            style={{flex:1,padding:'11px 8px',border:'none',background:tab===t?G:'transparent',color:tab===t?'#fff':MT,fontWeight:tab===t?700:500,cursor:'pointer',fontSize:13}}>
            {label}
          </button>
        ))}
      </div>

      {/* ── TAB PIUTANG ── */}
      {tab==='piutang'&&(
        <>
          {/* Search */}
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <div style={{position:'relative',flex:1}}>
              <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:16}}>🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Nama pelanggan..."
                style={{width:'100%',padding:'9px 12px 9px 34px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',boxSizing:'border-box'}}
                onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
            </div>
          </div>

          {/* Summary card */}
          <div style={{background:'linear-gradient(135deg,#FFF3E0,#FFE0B2)',borderRadius:14,padding:'14px 18px',marginBottom:14,border:`1px solid ${OR}30`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{fontSize:32}}>💳</div>
              <div>
                <div style={{fontSize:12,color:MT}}>Piutang</div>
                <div style={{fontWeight:800,fontSize:20,color:RD}}>{fmt(totalPiutang)}</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:12,color:MT}}>Total Transaksi</div>
              <div style={{fontWeight:800,fontSize:22}}>{totalTx}</div>
            </div>
          </div>

          {/* Filter belum/lunas */}
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>
            {[['belum','Belum Lunas'],['lunas','Lunas'],['semua','Semua']].map(([val,label])=>(
              <label key={val} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13}}>
                <input type="checkbox" checked={filterStatus===val} onChange={()=>setFilterStatus(val)}
                  style={{width:16,height:16,accentColor:G}}/>
                <span style={{fontWeight:filterStatus===val?700:400}}>{label}</span>
              </label>
            ))}
          </div>

          {loading ? <Loading/> : customerList.length===0 ? (
            <div style={{textAlign:'center',padding:'40px 0',color:MT,background:'#fff',borderRadius:12}}>
              <div style={{fontSize:40,marginBottom:8}}>✅</div>
              <div style={{fontWeight:700}}>Tidak ada piutang</div>
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {customerList.map((c,i)=>{
                const isOverdue  = c.overdue>0;
                const isDueToday = c.dueToday>0;
                return (
                  <div key={i} onClick={()=>setSelectedCustomer(c)}
                    style={{background:'#fff',borderRadius:12,padding:'13px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F5F6FA'}
                    onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                    <div style={{width:28,height:28,borderRadius:'50%',background:'#F5F6FA',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,color:MT,flexShrink:0}}>
                      {i+1}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14}}>{c.name}</div>
                      {(c.overdue>0||c.dueToday>0)&&(
                        <div style={{fontSize:10,color:isOverdue?RD:OR,fontWeight:600,marginTop:1}}>
                          JT: {isOverdue?'LEWAT':'Hari ini'} · {fmt(isOverdue?c.overdue:c.dueToday)}
                        </div>
                      )}
                      {!isOverdue&&!isDueToday&&c.txList[0]?.due_date&&(
                        <div style={{fontSize:10,color:MT,marginTop:1}}>JT: {c.txList[0].due_date}</div>
                      )}
                      <div style={{fontSize:11,color:MT,marginTop:1}}>{fmt(c.sisa)}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:RD}}/>
                        <span style={{fontSize:11,color:MT}}>Belum Lunas</span>
                      </div>
                      <div style={{fontWeight:800,fontSize:15,color:RD,marginTop:4}}>{fmt(c.sisa)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Tambah piutang manual */}
          <button onClick={()=>setShowForm(true)}
            style={{width:'100%',marginTop:14,padding:14,background:G,color:'#fff',border:'none',borderRadius:12,fontWeight:800,fontSize:15,cursor:'pointer'}}>
            + Tambah Piutang
          </button>
        </>
      )}

      {/* ── TAB HUTANG SUPPLIER ── */}
      {tab==='hutang'&&(
        selHutangTx ? (
          /* ═══ LEVEL 3: DETAIL TRANSAKSI HUTANG ═══ */
          <HutangTxDetail
            item={selHutangTx}
            payments={txPayments}
            payAmount={payAmount} setPayAmount={setPayAmount}
            paying={payingHutang}
            onBack={()=>{setSelHutangTx(null);setTxPayments([]);setPayAmount('');}}
            onBayar={bayarHutangTx}
            onHapusPembayaran={(p)=>hapusPembayaranHutang(selHutangTx,p)}
          />
        ) : supplierDetail ? (
          /* ═══ LEVEL 2: DETAIL SUPPLIER (daftar transaksi) ═══ */
          <HutangSupplierDetail
            supplier={supplierDetail}
            onBack={()=>setSelSupplierHutang(null)}
            onOpenTx={openHutangTx}
            onLunasiSekaligus={()=>lunasiSekaligusSupplier(supplierDetail)}
            onBuatHutang={()=>{ setForm(f=>({...f,party_name:supplierDetail.name})); setShowForm(true); }}
          />
        ) : (
          /* ═══ LEVEL 1: DAFTAR SUPPLIER ═══ */
          <>
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <input value={hutangSearch} onChange={e=>setHutangSearch(e.target.value)} placeholder="🔍 Cari nama supplier..."
                style={{flex:1,padding:'10px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,boxSizing:'border-box'}}/>
            </div>

            <div style={{background:'linear-gradient(135deg,#F3E5F5,#E1BEE7)',borderRadius:14,padding:'14px 18px',marginBottom:14,border:'1px solid #CE93D830',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:12,color:MT}}>Total Hutang</div>
                <div style={{fontWeight:800,fontSize:20,color:'#8E44AD'}}>{fmt(totalHutangSemua)}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,color:MT}}>Total Transaksi</div>
                <div style={{fontWeight:800,fontSize:20}}>{totalTxHutangSemua}</div>
              </div>
            </div>

            <div style={{display:'flex',gap:16,marginBottom:14,alignItems:'center'}}>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13,fontWeight:600}}>
                <input type="checkbox" checked={hutangFilterBelum} onChange={e=>setHutangFilterBelum(e.target.checked)}
                  style={{width:18,height:18,accentColor:G}}/> Belum Lunas
              </label>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13,fontWeight:600}}>
                <input type="checkbox" checked={hutangFilterLunas} onChange={e=>setHutangFilterLunas(e.target.checked)}
                  style={{width:18,height:18,accentColor:G}}/> Lunas
              </label>
            </div>

            {loading ? <Loading/> : hutangSupplierList.length===0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:MT,background:'#fff',borderRadius:12}}>
                <div style={{fontSize:36}}>✅</div><div>Tidak ada hutang supplier</div>
              </div>
            ) : (
              <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden'}}>
                {hutangSupplierList.map((s,i)=>{
                  const belumCount = s.items.filter(x=>x.status==='Belum Lunas').length;
                  const lunas = belumCount===0;
                  return (
                    <div key={s.name} onClick={()=>setSelSupplierHutang(s.name)}
                      style={{padding:'14px 16px',borderBottom:i<hutangSupplierList.length-1?'1px solid #f0f0f0':'none',cursor:'pointer',display:'flex',gap:10}}>
                      <div style={{fontWeight:700,color:MT,minWidth:18}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</div>
                        <div style={{fontSize:11,color:MT,marginTop:2}}>{s.nearest?.due_date?`JT: ${s.nearest.due_date}`:''}</div>
                        {s.nearest&&<div style={{fontSize:12,fontWeight:700,color:'#8E44AD',marginTop:2}}>{fmt(s.nearest.sisa)}</div>}
                      </div>
                      <div style={{textAlign:'right',flexShrink:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:5,justifyContent:'flex-end'}}>
                          <span style={{width:8,height:8,borderRadius:'50%',background:lunas?G:RD,display:'inline-block'}}/>
                          <span style={{fontSize:12,fontWeight:700,color:lunas?GD:RD}}>{lunas?'Lunas':'Belum Lunas'}</span>
                        </div>
                        <div style={{fontWeight:800,fontSize:14,color:lunas?GD:RD,marginTop:4}}>{fmt(s.totalSisa)}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <button onClick={()=>{setForm(f=>({...f,party_name:''})); setShowForm(true);}}
              style={{width:'100%',marginTop:16,padding:'13px 0',background:G,color:'#fff',border:'none',borderRadius:28,fontWeight:800,fontSize:14,cursor:'pointer'}}>
              Tambah Hutang
            </button>
          </>
        )
      )}

      {/* Form Catat/Tambah Hutang Manual — dipakai dari level 1 & level 2 */}
      {showForm&&tab==='hutang'&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
          onClick={e=>{if(e.target===e.currentTarget){setShowForm(false);setForm({party_name:'',amount:'',description:'',due_date:''});}}}>
          <div style={{background:'#fff',borderRadius:16,padding:20,width:'100%',maxWidth:400,boxShadow:'0 8px 30px rgba(0,0,0,0.3)'}}>
            <h4 style={{margin:'0 0 12px',fontSize:15,fontWeight:800}}>📝 Catat Hutang ke Supplier</h4>
            {[['party_name','Nama Supplier *','text'],['description','Keterangan','text'],['amount','Jumlah (Rp) *','number'],['due_date','Jatuh Tempo','date']].map(([k,label,type])=>(
              <div key={k} style={{marginBottom:8}}>
                <label style={{fontSize:11,color:MT,fontWeight:600,display:'block',marginBottom:3}}>{label}</label>
                <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                  type={type} placeholder={label}
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
            ))}
            <div style={{display:'flex',gap:8,marginTop:10}}>
              <button onClick={()=>{setShowForm(false);setForm({party_name:'',amount:'',description:'',due_date:''}); }} style={{flex:1,padding:10,background:'#eee',border:'none',borderRadius:8,cursor:'pointer'}}>Batal</button>
              <button onClick={async()=>{
                if(!form.party_name||!form.amount) return alert('Nama & jumlah wajib!');
                setSaving(true);
                try {
                  await sbInsert('debts',[{...form,type:'hutang',amount:parseInt(form.amount),paid:0,status:'Belum'}]);
                  setShowForm(false); setForm({party_name:'',amount:'',description:'',due_date:''});
                  load();
                } catch(e){ alert('Gagal: '+e.message); }
                setSaving(false);
              }} disabled={saving} style={{flex:2,padding:10,background:saving?MT:G,color:'#fff',border:'none',borderRadius:8,fontWeight:700,cursor:'pointer'}}>
                {saving?'⏳':'💾 Simpan'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function ManajemenRetur() {
  const [returns, setReturns]     = useState([]);
  const [products, setProducts]   = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [showForm, setShowForm]   = useState(false);
  const [activeTab, setActiveTab] = useState('semua'); // semua | pelanggan | supplier
  const [search, setSearch]       = useState('');

  // Form state
  const [form, setForm] = useState({
    type: 'dari_pelanggan', // dari_pelanggan | ke_supplier
    transaction_id: '',
    customer: '',
    supplier_id: '',
    reason: '',
    action: 'refund', // refund | tukar_barang
    notes: '',
  });
  const [items, setItems] = useState([{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
  const [saving, setSaving] = useState(false);

  const load = async() => {
    setLoading(true);
    try {
      const [rets, prods, sups] = await Promise.all([
        sbGetAll('returns',{order:'created_at',asc:false}),
        sbGetAll('products',{order:'name'}),
        sbGet('suppliers',{order:'name'}),
      ]);
      setReturns(rets||[]);
      setProducts(prods||[]);
      setSuppliers(sups||[]);
    } catch(e){}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const genReturnNo = () => {
    const now = new Date();
    return `RTR-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
  };

  const addItem = () => setItems(prev=>[...prev,{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
  const removeItem = (i) => setItems(prev=>prev.filter((_,idx)=>idx!==i));
  const updateItem = (i,field,val) => setItems(prev=>prev.map((item,idx)=>idx===i?{...item,[field]:val}:item));

  const selectProduct = (i, productId) => {
    const prod = products.find(p=>p.id===parseInt(productId));
    if(prod) updateItem(i,'product_name',prod.name);
    if(prod) updateItem(i,'price',prod.price);
    updateItem(i,'product_id',productId);
  };

  const total = items.reduce((s,i)=>s+(parseInt(i.price)||0)*(parseInt(i.qty)||0),0);

  const save = async() => {
    if(!form.customer&&form.type==='dari_pelanggan') return alert('Nama pelanggan wajib!');
    if(!form.supplier_id&&form.type==='ke_supplier') return alert('Supplier wajib dipilih!');
    if(items.some(i=>!i.product_name)) return alert('Nama produk wajib diisi!');
    setSaving(true);
    try {
      const sup = suppliers.find(s=>s.id===parseInt(form.supplier_id));
      const retData = {
        return_no: genReturnNo(),
        type: form.type,
        customer: form.type==='dari_pelanggan'?form.customer:'',
        supplier: form.type==='ke_supplier'?(sup?.name||''):'',
        supplier_id: form.type==='ke_supplier'?parseInt(form.supplier_id)||null:null,
        reason: form.reason,
        action: form.type==='dari_pelanggan'?form.action:'retur_supplier',
        total,
        notes: form.notes,
        status: 'Selesai',
      };
      const ret = await sbInsert('returns',[retData]);
      const retId = ret[0]?.id;

      // Insert items
      if(retId) {
        await sbInsert('return_items', items.map(i=>({
          return_id: retId,
          product_id: parseInt(i.product_id)||null,
          product_name: i.product_name,
          qty: parseInt(i.qty)||1,
          price: parseInt(i.price)||0,
          reason: i.reason,
        })));

        // Update stok - retur dari pelanggan: stok naik, retur ke supplier: stok turun
        for(const item of items) {
          if(item.product_id) {
            const prod = products.find(p=>p.id===parseInt(item.product_id));
            if(prod) {
              const newStok = form.type==='dari_pelanggan'
                ? prod.stock + parseInt(item.qty)
                : prod.stock - parseInt(item.qty);
              await sbUpdate('products', parseInt(item.product_id), {stock: Math.max(0,newStok)});
              await sbInsert('stock_logs',[{
                product_id: parseInt(item.product_id),
                type: form.type==='dari_pelanggan'?'masuk':'keluar',
                qty: parseInt(item.qty),
                notes: `Retur ${form.type==='dari_pelanggan'?'dari pelanggan':'ke supplier'}: ${form.reason}`,
              }]);
            }
          }
        }
      }

      setShowForm(false);
      setForm({type:'dari_pelanggan',transaction_id:'',customer:'',supplier_id:'',reason:'',action:'refund',notes:''});
      setItems([{product_id:'',product_name:'',qty:1,price:0,reason:''}]);
      load();
      alert('✅ Retur berhasil dicatat!');
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  const filtered = returns.filter(r=>{
    if(activeTab==='pelanggan' && r.type!=='dari_pelanggan') return false;
    if(activeTab==='supplier'  && r.type!=='ke_supplier') return false;
    if(search && !r.return_no?.toLowerCase().includes(search.toLowerCase()) &&
       !r.customer?.toLowerCase().includes(search.toLowerCase()) &&
       !r.supplier?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const totalRetur   = returns.filter(r=>r.type==='dari_pelanggan').reduce((s,r)=>s+r.total,0);
  const totalSupplier = returns.filter(r=>r.type==='ke_supplier').reduce((s,r)=>s+r.total,0);

  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800}}>🔄 Manajemen Retur</h2>
        <button onClick={()=>setShowForm(true)}
          style={{padding:'9px 18px',background:G,color:'#fff',border:'none',borderRadius:10,fontWeight:700,cursor:'pointer',fontSize:14}}>
          + Catat Retur
        </button>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:'4px solid #E74C3C'}}>
          <div style={{fontSize:11,color:MT}}>🔄 Retur dari Pelanggan</div>
          <div style={{fontSize:18,fontWeight:800,color:'#E74C3C',marginTop:4}}>{fmt(totalRetur)}</div>
          <div style={{fontSize:11,color:MT}}>{returns.filter(r=>r.type==='dari_pelanggan').length} transaksi</div>
        </div>
        <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',borderLeft:'4px solid #8E44AD'}}>
          <div style={{fontSize:11,color:MT}}>📦 Retur ke Supplier</div>
          <div style={{fontSize:18,fontWeight:800,color:'#8E44AD',marginTop:4}}>{fmt(totalSupplier)}</div>
          <div style={{fontSize:11,color:MT}}>{returns.filter(r=>r.type==='ke_supplier').length} transaksi</div>
        </div>
      </div>

      {/* Tabs + Search */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',background:'#fff',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
          {[['semua','Semua'],['pelanggan','Dari Pelanggan'],['supplier','Ke Supplier']].map(([id,label])=>(
            <button key={id} onClick={()=>setActiveTab(id)}
              style={{padding:'8px 14px',border:'none',background:activeTab===id?G:'transparent',color:activeTab===id?'#fff':MT,fontWeight:activeTab===id?700:500,cursor:'pointer',fontSize:12}}>
              {label}
            </button>
          ))}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Cari nomor retur / nama..."
          style={{flex:1,padding:'8px 12px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',minWidth:200}}/>
      </div>

      {/* Form tambah retur */}
      {showForm && (
        <div style={{background:'#fff',borderRadius:14,padding:20,marginBottom:16,boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{margin:0,fontSize:16}}>📝 Catat Retur Baru</h3>
            <button onClick={()=>setShowForm(false)} style={{background:'#eee',border:'none',borderRadius:'50%',width:30,height:30,cursor:'pointer',fontSize:16}}>×</button>
          </div>

          {/* Jenis retur */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:6}}>Jenis Retur</label>
            <div style={{display:'flex',gap:8}}>
              {[['dari_pelanggan','🔄 Dari Pelanggan','#E74C3C'],['ke_supplier','📦 Ke Supplier','#8E44AD']].map(([val,label,color])=>(
                <button key={val} onClick={()=>setForm(f=>({...f,type:val}))}
                  style={{flex:1,padding:'10px 0',border:`2px solid ${form.type===val?color:'#eee'}`,borderRadius:10,background:form.type===val?color+'18':'#fff',color:form.type===val?color:MT,fontWeight:form.type===val?700:500,cursor:'pointer',fontSize:13}}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Info pelanggan / supplier */}
          {form.type==='dari_pelanggan' ? (
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Nama Pelanggan *</label>
                <input value={form.customer} onChange={e=>setForm(f=>({...f,customer:e.target.value}))}
                  placeholder="Nama pelanggan..."
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
              </div>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Proses Retur</label>
                <select value={form.action} onChange={e=>setForm(f=>({...f,action:e.target.value}))}
                  style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                  <option value="refund">💵 Refund (Uang kembali)</option>
                  <option value="tukar_barang">🔄 Tukar Barang</option>
                </select>
              </div>
            </div>
          ) : (
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Supplier *</label>
              <select value={form.supplier_id} onChange={e=>setForm(f=>({...f,supplier_id:e.target.value}))}
                style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,background:'#fff'}}>
                <option value="">-- Pilih Supplier --</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
          )}

          {/* Alasan */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Alasan Retur *</label>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
              {['Barang rusak','Barang cacat','Salah produk','Salah ukuran','Kelebihan stok','Lainnya'].map(r=>(
                <button key={r} onClick={()=>setForm(f=>({...f,reason:r}))}
                  style={{padding:'4px 10px',border:`1.5px solid ${form.reason===r?RD:'#eee'}`,borderRadius:16,background:form.reason===r?'#FFF0F0':'#fff',color:form.reason===r?RD:MT,fontSize:11,cursor:'pointer',fontWeight:form.reason===r?700:500}}>
                  {r}
                </button>
              ))}
            </div>
            <input value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}
              placeholder="Ketik alasan retur..."
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>

          {/* Items */}
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <label style={{fontSize:12,fontWeight:600,color:MT}}>Daftar Barang Diretur</label>
              <button onClick={addItem} style={{padding:'4px 10px',background:GL,border:`1px solid ${G}`,borderRadius:6,cursor:'pointer',fontSize:12,color:GD,fontWeight:600}}>+ Tambah</button>
            </div>
            {items.map((item,i)=>(
              <div key={i} style={{background:'#F5F6FA',borderRadius:10,padding:10,marginBottom:8}}>
                <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:8,marginBottom:6}}>
                  <ProductSearchInput products={products} value={item.product_id}
                    placeholder="Cari produk..."
                    onSelect={p=>selectProduct(i,p.id)}/>
                  <input value={item.qty} onChange={e=>updateItem(i,'qty',e.target.value)} type="number" min="1" placeholder="Qty"
                    style={{padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
                  <input value={item.price} onChange={e=>updateItem(i,'price',e.target.value)} type="number" placeholder="Harga"
                    style={{padding:'8px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:12,boxSizing:'border-box'}}/>
                  {items.length>1&&<button onClick={()=>removeItem(i)} style={{padding:'6px 8px',background:'#FFF0F0',border:`1px solid ${RD}`,borderRadius:8,cursor:'pointer',color:RD,fontSize:12}}>🗑️</button>}
                </div>
                <input value={item.reason} onChange={e=>updateItem(i,'reason',e.target.value)} placeholder="Kondisi/alasan item ini..."
                  style={{width:'100%',padding:'7px 10px',border:'1.5px solid #eee',borderRadius:8,fontSize:11,boxSizing:'border-box'}}/>
              </div>
            ))}
          </div>

          {/* Total */}
          <div style={{background:GL,borderRadius:10,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:700,fontSize:14}}>Total Nilai Retur</span>
            <span style={{fontWeight:800,fontSize:18,color:GD}}>{fmt(total)}</span>
          </div>

          {/* Catatan */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:MT,display:'block',marginBottom:4}}>Catatan (opsional)</label>
            <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
              placeholder="Catatan tambahan..."
              style={{width:'100%',padding:'9px 12px',border:'1.5px solid #eee',borderRadius:8,fontSize:13,boxSizing:'border-box'}}/>
          </div>

          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:12,background:'#eee',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700}}>Batal</button>
            <button onClick={save} disabled={saving}
              style={{flex:2,padding:12,background:saving?MT:G,color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:14}}>
              {saving?'⏳ Menyimpan...':'✅ Simpan Retur'}
            </button>
          </div>
        </div>
      )}

      {/* List retur */}
      {loading ? <Loading/> : filtered.length===0 ? (
        <div style={{textAlign:'center',padding:'40px 0',color:MT}}>
          <div style={{fontSize:40,marginBottom:8}}>🔄</div>

function KasManualForm({onClose, onSaved}) {
  const today = new Date().toISOString().slice(0,10);
  const [tipe, setTipe]       = React.useState('masuk');
  const [nominal, setNominal] = React.useState('');
  const [kontak, setKontak]   = React.useState('');
  const [tanggal, setTanggal] = React.useState(today);
  const [catatan, setCatatan] = React.useState('');
  const [saving, setSaving]   = React.useState(false);

  const save = async() => {
    const amt = parseInt(String(nominal).replace(/\D/g,''))||0;
    if(amt<=0) return alert('Isi nominal!');
    if(!catatan.trim()) return alert('Isi catatan (untuk apa uang ini)!');
    setSaving(true);
    try {
      await sbInsert('payments',[{
        transaction_id: null,
        type: tipe,
        amount: amt,
        method: 'Manual',
        note: catatan.trim()+(kontak.trim()?` — ${kontak.trim()}`:''),
        created_at: tanggal===today ? new Date().toISOString() : tanggal+'T12:00:00+07:00',
      }]);
      notifyDataChanged('kas');
      alert(`✅ ${tipe==='masuk'?'Pemasukan':'Pengeluaran'} lain ${fmt(amt)} tercatat!\nMuncul di Laporan Arus Keuangan tanggal ${tanggal}.`);
      onSaved&&onSaved();
      onClose();
    } catch(e){ alert('Gagal: '+e.message); }
    setSaving(false);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#fff',borderRadius:16,padding:20,width:'100%',maxWidth:420,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 30px rgba(0,0,0,0.3)'}}>
        <div style={{fontWeight:800,fontSize:16,marginBottom:14}}>💰 Transaksi Keuangan</div>

        <div style={{fontSize:12,color:MT,fontWeight:600,marginBottom:6}}>Transaksi</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[['masuk','Pemasukan',G,GL],['keluar','Pengeluaran',RD,'#FFF0F0']].map(([val,label,col,bg])=>(
            <button key={val} onClick={()=>setTipe(val)}
              style={{flex:1,padding:12,border:`2px solid ${tipe===val?col:'#eee'}`,borderRadius:10,background:tipe===val?bg:'#fff',color:tipe===val?col:MT,fontWeight:tipe===val?800:500,cursor:'pointer',fontSize:14}}>
              {label}
            </button>
          ))}
        </div>

        <div style={{fontSize:12,color:MT,fontWeight:600,marginBottom:4}}>Nominal</div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,padding:'10px 14px',border:`2px solid ${tipe==='masuk'?G:RD}`,borderRadius:12}}>
          <span style={{fontWeight:800,fontSize:20,color:MT}}>Rp</span>
          <input type="text" inputMode="numeric" value={nominal?parseInt(String(nominal).replace(/\D/g,'')||'0').toLocaleString('id-ID'):''}
            onChange={e=>setNominal(e.target.value.replace(/\D/g,''))} placeholder="0"
            style={{flex:1,border:'none',outline:'none',fontSize:26,fontWeight:900,color:tipe==='masuk'?GD:RD,minWidth:0,background:'transparent'}}/>
        </div>

        <div style={{fontSize:11,color:MT,fontWeight:600,marginBottom:4}}>Kontak / Sumber (opsional)</div>
        <input value={kontak} onChange={e=>setKontak(e.target.value)} placeholder={tipe==='masuk'?'Dari siapa / sumber dana':'Ke siapa / tujuan'}

function Keuangan({refreshKey}) {
  const [txList,   setTxList]   = useState([]);
  const [returns,  setReturns]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [activeTab,setActiveTab]= useState('semua');
  const [search,   setSearch]   = useState('');
  const [showKasForm,setShowKasForm]= useState(false);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const [txs, rets] = await Promise.all([
        sbGetAll('transactions',{order:'created_at',asc:false}),
        sbGetAll('returns',{order:'created_at',asc:false}),
      ]);
      setTxList(txs||[]);
      setReturns(rets||[]);
    } catch(e){}
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const today    = new Date().toISOString().slice(0,10);
  const todayTx  = txList.filter(t=>t.created_at?.slice(0,10)===today&&t.status==='Lunas');
  const todayDP  = txList.filter(t=>t.created_at?.slice(0,10)===today&&t.status==='Piutang').reduce((s,t)=>s+(t.paid||0),0);
  const todayRet = returns.filter(r=>r.created_at?.slice(0,10)===today&&r.type==='dari_pelanggan');

  // Pendapatan hari ini = omset lunas - retur hari ini
  const pendapatanHariIni = todayTx.reduce((s,t)=>s+t.total,0) + todayDP - todayRet.reduce((s,r)=>s+r.total,0);

  // Total keseluruhan
  const totalOmset   = txList.filter(t=>t.status==='Lunas').reduce((s,t)=>s+t.total,0);
  const totalRetur   = returns.filter(r=>r.type==='dari_pelanggan').reduce((s,r)=>s+r.total,0);
  const totalNeto    = totalOmset - totalRetur;
  const totalPiutang = txList.filter(t=>t.status==='Piutang').reduce((s,t)=>s+(t.total-(t.paid||0)),0);

  // Filter list
  const filteredTx = txList.filter(t=>{
    if(activeTab==='lunas'   && t.status!=='Lunas') return false;
    if(activeTab==='piutang' && t.status!=='Piutang') return false;
    if(activeTab==='retur') return false;
    if(search && !t.invoice_no?.toLowerCase().includes(search.toLowerCase()) &&
       !t.customer?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const filteredRet = returns.filter(r=>{
    if(search && !r.return_no?.toLowerCase().includes(search.toLowerCase()) &&
       !r.customer?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{padding:16,maxWidth:900,margin:'0 auto'}}>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'Pendapatan Hari Ini',value:fmt(pendapatanHariIni),icon:'📈',color:G,sub:`${todayTx.length} tx - ${fmt(todayRet.reduce((s,r)=>s+r.total,0))} retur`},
          {label:'Total Omset (Neto)',value:fmt(totalNeto),icon:'💎',color:'#3498DB',sub:`Bruto ${fmt(totalOmset)} - Retur ${fmt(totalRetur)}`},
          {label:'Total Piutang',value:fmt(totalPiutang),icon:'⏳',color:OR,sub:`${txList.filter(t=>t.status==='Piutang').length} transaksi belum lunas`},
          {label:'Total Retur',value:fmt(totalRetur),icon:'🔄',color:RD,sub:`${returns.filter(r=>r.type==='dari_pelanggan').length} retur dari pelanggan`},
        ].map((d,i)=>(
          <div key={i} style={{background:'#fff',borderRadius:12,padding:'12px 16px',boxShadow:'0 2px 8px rgba(0,0,0,0.07)',borderLeft:`4px solid ${d.color}`}}>
            <div style={{fontSize:20}}>{d.icon}</div>
            <div style={{fontSize:11,color:MT,marginTop:4}}>{d.label}</div>
            <div style={{fontSize:17,fontWeight:800,color:d.color,marginTop:2}}>{d.value}</div>
            <div style={{fontSize:10,color:MT,marginTop:2}}>{d.sub}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:0,background:'#fff',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 6px rgba(0,0,0,0.07)',marginBottom:12}}>
        {[['semua','Semua'],['lunas','✅ Lunas'],['piutang','⏳ Piutang'],['retur','🔄 Retur']].map(([tab,label])=>(
          <button key={tab} onClick={()=>setActiveTab(tab)}
            style={{flex:1,padding:'10px 4px',border:'none',background:activeTab===tab?G:'transparent',color:activeTab===tab?'#fff':MT,fontWeight:activeTab===tab?700:500,cursor:'pointer',fontSize:11,transition:'all 0.15s'}}>
            {label}
          </button>
        ))}
      </div>

      {/* Search */}
      <div style={{marginBottom:12}}>
        <button onClick={()=>setShowKasForm(true)}
          style={{width:'100%',padding:12,background:'#fff',border:`2px dashed ${G}`,borderRadius:12,color:GD,fontWeight:800,fontSize:13,cursor:'pointer',marginBottom:12}}>
          ➕ Catat Pemasukan / Pengeluaran Lain
        </button>
        {showKasForm&&<KasManualForm onClose={()=>setShowKasForm(false)} onSaved={load}/>}
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Cari invoice / nama pelanggan..."
          style={{width:'100%',padding:'9px 14px',border:'1.5px solid #eee',borderRadius:10,fontSize:13,outline:'none',boxSizing:'border-box'}}
          onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor='#eee'}/>
      </div>

      {/* List */}
      <div style={{background:'#fff',borderRadius:12,boxShadow:'0 1px 6px rgba(0,0,0,0.07)',overflow:'hidden'}}>
        {loading ? <div style={{padding:20}}><Loading/></div> : (

          activeTab==='retur' ? (
            // Retur list
            filteredRet.length===0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada retur</div>
            ) : filteredRet.map((r,i)=>(
              <div key={r.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid #f5f5f5',borderLeft:`3px solid ${r.type==='dari_pelanggan'?RD:'#8E44AD'}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,fontFamily:'monospace'}}>{r.return_no}</div>
                  <div style={{fontSize:11,color:MT,marginTop:2}}>{r.customer||r.supplier||'—'} · {r.reason}</div>
                  <div style={{fontSize:10,color:MT}}>{r.created_at?.slice(0,10)} · {r.created_at?.slice(11,16)}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:RD}}>-{fmt(r.total)}</div>
                  <div style={{fontSize:10,color:r.action==='refund'?RD:G,fontWeight:600,marginTop:2}}>
                    {r.action==='refund'?'💵 Refund':'🔄 Tukar'}
                  </div>
                </div>
              </div>
            ))
          ) : (
            // Transaksi list
            filteredTx.length===0 ? (
              <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada transaksi</div>
            ) : filteredTx.map((t,i)=>(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:'1px solid #f5f5f5'}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.invoice_no}</div>
                  <div style={{fontSize:11,color:MT,marginTop:2}}>{t.customer||'Umum'}</div>
                  <div style={{fontSize:10,color:MT}}>{t.created_at?.slice(0,10)} · {t.created_at?.slice(11,16)}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontWeight:800,fontSize:14,color:t.status==='Lunas'?G:OR}}>{fmt(t.total)}</div>
                  <div style={{fontSize:11,fontWeight:600,color:t.status==='Lunas'?GD:OR,marginTop:2}}>{t.status}</div>
                </div>
              </div>
            ))
          )
        )}
      </div>
    </div>
  );
}



// ── LAPORAN PENJUALAN BARANG ───────────────────────────────────────────────
function LaporanPenjualanBarang({period}) {
  const [data, setData]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortBy, setSortBy]   = useState('omset'); // omset | qty

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const [txs, items] = await Promise.all([
          sbGetAll('transactions',{order:'created_at'}),
          sbGetAll('transaction_items',{order:'id'}),
        ]);

        const validTxIds = new Set(
          txs.filter(t=>t.created_at>=sinceStr&&t.status==='Lunas').map(t=>t.id)
        );

        const map = {};
        items.filter(i=>validTxIds.has(i.transaction_id)).forEach(i=>{
          const key = i.product_name;
          if(!map[key]) map[key] = {name:key, qty:0, omset:0, transaksi:0};
          map[key].qty      += i.qty;
          map[key].omset    += i.price * i.qty;
          map[key].transaksi++;
        });

        const sorted = Object.values(map).sort((a,b)=>b[sortBy]-a[sortBy]);
        setData(sorted);
      } catch(e){}
      setLoading(false);
    })();
  },[period, sortBy]);

  const totalOmset = data.reduce((s,d)=>s+d.omset,0);
  const totalQty   = data.reduce((s,d)=>s+d.qty,0);
  const maxOmset   = Math.max(...data.map(d=>d.omset),1);

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14}}>🏪 Penjualan Barang ({period} Hari)</div>
        <div style={{display:'flex',gap:6}}>
          {[['omset','Omset'],['qty','Qty']].map(([val,label])=>(
            <button key={val} onClick={()=>setSortBy(val)}
              style={{padding:'5px 12px',border:`1.5px solid ${sortBy===val?G:'#eee'}`,borderRadius:16,background:sortBy===val?G:'#fff',color:sortBy===val?'#fff':MT,fontSize:11,fontWeight:sortBy===val?700:500,cursor:'pointer'}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
        <div style={{background:GL,borderRadius:8,padding:'8px 12px'}}>
          <div style={{fontSize:10,color:MT}}>Total Omset</div>
          <div style={{fontSize:15,fontWeight:800,color:GD}}>{fmt(totalOmset)}</div>
        </div>
        <div style={{background:'#E3F2FD',borderRadius:8,padding:'8px 12px'}}>
          <div style={{fontSize:10,color:MT}}>Total Qty Terjual</div>
          <div style={{fontSize:15,fontWeight:800,color:'#1976D2'}}>{totalQty.toLocaleString('id-ID')} pcs</div>
        </div>
      </div>

      {data.length===0 ? (
        <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada data penjualan</div>
      ) : (
        <div style={{maxHeight:400,overflowY:'auto'}}>
          {data.map((d,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                  <div style={{width:22,height:22,borderRadius:6,background:i<3?['#FFF9C4','#F5F5F5','#FBE9E7'][i]:GL,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:i<3?['#F57F17','#616161','#BF360C'][i]:GD,flexShrink:0}}>
                    {i+1}
                  </div>
                  <div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.name}</div>
                </div>
                <div style={{textAlign:'right',flexShrink:0,marginLeft:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:G}}>{fmt(d.omset)}</div>
                  <div style={{fontSize:10,color:MT}}>{d.qty} pcs · {d.transaksi} tx</div>
                </div>
              </div>
              <div style={{height:5,background:'#F5F6FA',borderRadius:3}}>
                <div style={{height:'100%',background:i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':G,borderRadius:3,width:`${(d.omset/maxOmset)*100}%`}}/>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── LAPORAN PENJUALAN KATEGORI ─────────────────────────────────────────────
function LaporanPenjualanKategori({period}) {
  const [data, setData]       = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const [txs, items, prods] = await Promise.all([
          sbGetAll('transactions',{order:'created_at'}),
          sbGetAll('transaction_items',{order:'id'}),
          sbGetAll('products',{select:'id,name,category',order:'name'}),
        ]);

        const validTxIds = new Set(
          txs.filter(t=>t.created_at>=sinceStr&&t.status==='Lunas').map(t=>t.id)
        );

        const prodMap = {};
        prods.forEach(p=>{ prodMap[p.name] = p.category||'Lainnya'; });

        const map = {};
        items.filter(i=>validTxIds.has(i.transaction_id)).forEach(i=>{
          const cat = (prodMap[i.product_name]||'Lainnya').split(' > ')[0];
          if(!map[cat]) map[cat] = {name:cat, qty:0, omset:0};
          map[cat].qty   += i.qty;
          map[cat].omset += i.price * i.qty;
        });

        const sorted = Object.values(map).sort((a,b)=>b.omset-a.omset);
        setData(sorted);
      } catch(e){}
      setLoading(false);
    })();
  },[period]);

  const totalOmset = data.reduce((s,d)=>s+d.omset,0);
  const colors = ['#2ECC71','#3498DB','#E74C3C','#F39C12','#9B59B6','#1ABC9C','#E67E22','#34495E'];

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>📂 Penjualan per Kategori ({period} Hari)</div>

      {data.length===0 ? (
        <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada data</div>
      ) : (
        <>
          {/* Bar visual */}
          <div style={{marginBottom:16}}>
            {data.map((d,i)=>(
              <div key={i} style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:12}}>
                  <span style={{fontWeight:600}}>{d.name}</span>
                  <span style={{color:colors[i%colors.length],fontWeight:700}}>{fmt(d.omset)} · {Math.round(d.omset/totalOmset*100)}%</span>
                </div>
                <div style={{height:8,background:'#F5F6FA',borderRadius:4}}>
                  <div style={{height:'100%',background:colors[i%colors.length],borderRadius:4,width:`${(d.omset/totalOmset)*100}%`,transition:'width 0.5s'}}/>
                </div>
              </div>
            ))}
          </div>
          {/* Total */}
          <div style={{borderTop:'1px solid #eee',paddingTop:10,display:'flex',justifyContent:'space-between',fontWeight:700}}>
            <span>Total</span>
            <span style={{color:G}}>{fmt(totalOmset)}</span>
          </div>
        </>
      )}
    </div>
  );
}

// ── LAPORAN METODE PEMBAYARAN ─────────────────────────────────────────────
function LaporanMetodePembayaran({period}) {
  const [data, setData]       = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const days = parseInt(period)||30;
        const since = new Date();
        since.setDate(since.getDate()-days);
        const sinceStr = since.toISOString();

        const txs = await sbGetAll('transactions',{order:'created_at'});
        const filtered = txs.filter(t=>t.created_at>=sinceStr&&t.status==='Lunas');

        const map = {};
        filtered.forEach(t=>{
          const metode = t.metode_bayar||'Tunai';
          if(!map[metode]) map[metode] = {name:metode, count:0, total:0};
          map[metode].count++;
          map[metode].total += t.total;
        });

        setData(Object.values(map).sort((a,b)=>b.total-a.total));
      } catch(e){}
      setLoading(false);
    })();
  },[period]);

  const totalOmset = data.reduce((s,d)=>s+d.total,0);
  const metodeIcons = {'Tunai':'💵','QRIS':'📱','Transfer':'🏦'};
  const metodeColors = {'Tunai':G,'QRIS':'#8E44AD','Transfer':'#3498DB'};

  if(loading) return <Loading/>;

  return (
    <div style={{background:'#fff',borderRadius:12,padding:16,boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>💳 Metode Pembayaran ({period} Hari)</div>

      {data.length===0 ? (
        <div style={{textAlign:'center',padding:'32px 0',color:MT}}>Belum ada data</div>
      ) : (
        <>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {data.map((d,i)=>{
              const color = metodeColors[d.name]||'#607D8B';
              const icon  = metodeIcons[d.name]||'💰';
              const pct   = Math.round(d.total/totalOmset*100);
              return (
                <div key={i} style={{background:'#F5F6FA',borderRadius:12,padding:'12px 16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:40,height:40,borderRadius:10,background:'#fff',border:`2px solid ${color}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
                        {icon}
                      </div>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:TX}}>{d.name}</div>
                        <div style={{fontSize:11,color:MT}}>{d.count} transaksi</div>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontWeight:800,fontSize:16,color}}>{fmt(d.total)}</div>
                      <div style={{fontSize:11,color:MT}}>{pct}% dari total</div>
                    </div>
                  </div>
                  <div style={{height:6,background:'#eee',borderRadius:3}}>
                    <div style={{height:'100%',background:color,borderRadius:3,width:`${pct}%`}}/>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{borderTop:'1px solid #eee',marginTop:12,paddingTop:10,display:'flex',justifyContent:'space-between',fontWeight:700}}>
            <span>Total</span>
            <span style={{color:G}}>{fmt(totalOmset)}</span>
          </div>
        </>
      )}
    </div>
  );
}

function EditItemRow({item, products, onSelect, onQtyChange, onPriceChange, onRemove}) {
